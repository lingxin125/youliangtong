<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>丰收云 - 新增银行账户</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="shared.js"></script>
</head>
<body class="bg-[#F7F8FA]">
<div class="mobile-container relative bg-[#F7F8FA]">
    <div id="statusBar"></div>
    <div id="navBar"></div>

    <div class="flex-1 overflow-y-auto no-scrollbar px-4 pt-4 pb-28">
        <div id="accountTypePanel" class="bg-white rounded-2xl p-4 border border-black/[0.04] shadow-[0_2px_8px_rgba(15,23,42,0.04)] mb-3">
            <div class="flex items-center gap-2 mb-3">
                <span class="w-5 h-5 rounded-full bg-primary text-white text-[12px] font-semibold flex items-center justify-center">1</span>
                <span class="text-[14px] font-semibold text-gray-800">选择账户类型</span>
            </div>
            <div id="accountTypeGrid" class="grid grid-cols-2 gap-3">
                <button id="personalTypeBtn" type="button" onclick="setAccountType('personal')" class="relative h-[88px] rounded-2xl border px-3 flex flex-col items-center justify-center transition-colors">
                    <span class="w-9 h-9 rounded-full bg-emerald-50 text-primary flex items-center justify-center mb-2">
                        <i class="fas fa-user text-base"></i>
                    </span>
                    <span class="text-[15px] font-semibold">个人账户</span>
                    <span class="text-[11px] text-gray-400 mt-1">个人银行卡收款</span>
                    <span id="personalTypeCheck" class="absolute -right-1.5 -top-1.5 w-6 h-6 rounded-full bg-primary text-white text-[12px] items-center justify-center ring-2 ring-white" style="display:none;">
                        <i class="fas fa-check"></i>
                    </span>
                </button>
                <button id="publicTypeBtn" type="button" onclick="setAccountType('public')" class="relative h-[88px] rounded-2xl border px-3 flex flex-col items-center justify-center transition-colors">
                    <span class="w-9 h-9 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center mb-2">
                        <i class="fas fa-building text-base"></i>
                    </span>
                    <span class="text-[15px] font-semibold">对公账户</span>
                    <span class="text-[11px] text-gray-400 mt-1">企业对公账户收款</span>
                    <span id="publicTypeCheck" class="absolute -right-1.5 -top-1.5 w-6 h-6 rounded-full bg-primary text-white text-[12px] items-center justify-center ring-2 ring-white" style="display:none;">
                        <i class="fas fa-check"></i>
                    </span>
                </button>
            </div>
        </div>

        <div class="bg-white rounded-2xl p-4 border border-black/[0.04] shadow-[0_2px_8px_rgba(15,23,42,0.04)] space-y-3">
            <div class="flex items-center gap-2 pb-1">
                <span class="w-5 h-5 rounded-full bg-slate-500 text-white text-[12px] font-semibold flex items-center justify-center">2</span>
                <span id="accountInfoTitle" class="text-[14px] font-semibold text-gray-800">填写账户信息</span>
            </div>
            <div id="ownerRelationWrap">
                <label class="block text-[12px] text-gray-500 mb-2">银行卡归属</label>
                <div class="grid grid-cols-2 gap-2">
                    <button id="selfOwnerBtn" type="button" onclick="setOwnerRelation('self')" class="h-10 rounded-full text-[13px] font-medium transition-colors">本人银行卡</button>
                    <button id="otherOwnerBtn" type="button" onclick="setOwnerRelation('other')" class="h-10 rounded-full text-[13px] font-medium transition-colors">非本人银行卡</button>
                </div>
                <div id="ownerRelationTip" class="mt-2 rounded-xl bg-emerald-50 px-3 py-2 text-[12px] text-emerald-700">本人银行卡请填写本人真实信息。</div>
            </div>

            <div id="holderField">
                <label id="holderLabel" class="block text-[12px] text-gray-500 mb-1.5">姓名</label>
                <input id="holderInput" class="w-full h-11 rounded-xl border border-gray-200 bg-gray-50 px-3 text-sm text-gray-800 outline-none focus:border-primary focus:bg-white" placeholder="请输入姓名">
            </div>
            <div id="mobileField">
                <label class="block text-[12px] text-gray-500 mb-1.5">手机号</label>
                <input id="mobileInput" class="w-full h-11 rounded-xl border border-gray-200 bg-gray-50 px-3 text-sm text-gray-800 outline-none focus:border-primary focus:bg-white" placeholder="请输入手机号" inputmode="tel" maxlength="11" style="font-family:Poppins,monospace;">
            </div>
            <div id="idNoField">
                <label class="block text-[12px] text-gray-500 mb-1.5">身份证号</label>
                <input id="idNoInput" class="w-full h-11 rounded-xl border border-gray-200 bg-gray-50 px-3 text-sm text-gray-800 outline-none focus:border-primary focus:bg-white" placeholder="请输入身份证号" maxlength="18" style="font-family:Poppins,monospace;">
            </div>
            <div>
                <label id="bankNoLabel" class="block text-[12px] text-gray-500 mb-1.5">银行卡号</label>
                <input id="bankNoInput" oninput="onBankNoInput()" class="w-full h-11 rounded-xl border border-gray-200 bg-gray-50 px-3 text-sm text-gray-800 outline-none focus:border-primary focus:bg-white" placeholder="请输入银行卡号" inputmode="numeric" style="font-family:Poppins,monospace;">
            </div>
            <div id="bankFieldArea"></div>
        </div>
    </div>

    <div class="absolute bottom-0 left-0 right-0 px-4 pb-6 pt-3 bg-[#F7F8FA] border-t border-black/[0.04]">
        <button onclick="submitBankForm()" class="w-full h-12 rounded-2xl bg-primary text-white text-[15px] font-semibold shadow-glow active:scale-[0.98] transition-transform">
            确认新增
        </button>
    </div>

    <div id="toastTip" class="hidden absolute left-1/2 -translate-x-1/2 bottom-24 px-4 py-2 bg-black/80 text-white text-xs rounded-lg z-[90] opacity-0 pointer-events-none transition-all duration-200"></div>
</div>

<script>
    var q = new URLSearchParams(window.location.search);
    var sourceParam = q.get('source') || 'farmer-my.html';
    var merchantType = q.get('merchantType') || 'personal';
    var isEnterpriseMerchant = ['public', 'enterprise', 'company'].indexOf(merchantType) >= 0;
    var BANK_KEY = 'ylt_farmer_bank_account_v1';
    var currentAccountType = isEnterpriseMerchant ? 'personal' : 'personal';
    var ownerRelation = 'self';

    var BANK_BIN_MAP = {
        '6215': '中国邮政储蓄银行',
        '6221': '中国邮政储蓄银行',
        '6228': '中国邮政储蓄银行',
        '6222': '中国工商银行',
        '6230': '中国农业银行',
        '6216': '中国银行',
        '6217': '中国建设银行'
    };
    var MANUAL_BANKS = [
        { name: '烟台农商银行', branches: ['福山清洋支行', '芝罘幸福支行', '牟平宁海支行'] },
        { name: '烟台银行', branches: ['烟台市芝罘支行', '烟台市开发区支行', '烟台市莱山支行'] },
        { name: '威海市商业银行', branches: ['威海环翠支行', '威海高区支行'] }
    ];

    document.getElementById('statusBar').innerHTML = renderStatusBar();
    document.getElementById('navBar').innerHTML = renderHeader('新增银行账户', buildBackUrl());
    initPage();

    function buildBackUrl() {
        return 'farmer-account-manage.html?source=' + encodeURIComponent(sourceParam) + '&merchantType=' + (isEnterpriseMerchant ? 'public' : 'personal');
    }

    function initPage() {
        document.getElementById('accountTypeGrid').className = 'grid gap-3 ' + (isEnterpriseMerchant ? 'grid-cols-2' : 'grid-cols-1');
        document.getElementById('publicTypeBtn').style.display = isEnterpriseMerchant ? 'flex' : 'none';
        setAccountType('personal');
        setOwnerRelation('self');
        renderBankArea({ state: 'pending' });
    }

    function setAccountType(type) {
        currentAccountType = isEnterpriseMerchant ? type : 'personal';
        var isPublic = currentAccountType === 'public';
        document.getElementById('ownerRelationWrap').style.display = isPublic ? 'none' : 'block';
        document.getElementById('mobileField').style.display = isPublic ? 'none' : 'block';
        document.getElementById('idNoField').style.display = isPublic ? 'none' : 'block';
        document.getElementById('holderLabel').textContent = isPublic ? '对公账户名' : '姓名';
        document.getElementById('holderInput').placeholder = isPublic ? '请输入对公账户名' : '请输入姓名';
        document.getElementById('bankNoLabel').textContent = isPublic ? '银行账号' : '银行卡号';
        document.getElementById('bankNoInput').placeholder = isPublic ? '请输入银行账号' : '请输入银行卡号';
        document.getElementById('accountInfoTitle').textContent = isPublic ? '填写账户信息（企业账户）' : '填写账户信息';
        updateTypeCards();
    }

    function updateTypeCards() {
        var personalActive = currentAccountType === 'personal';
        var personalBtn = document.getElementById('personalTypeBtn');
        var publicBtn = document.getElementById('publicTypeBtn');
        personalBtn.className = 'relative h-[92px] rounded-2xl border px-3 flex flex-col items-center justify-center transition-colors ' +
            (personalActive ? 'border-primary bg-emerald-50/60 text-gray-900 shadow-[0_8px_20px_rgba(17,166,74,0.08)]' : 'border-gray-200 bg-white text-gray-700');
        publicBtn.className = 'relative h-[92px] rounded-2xl border px-3 flex-col items-center justify-center transition-colors ' +
            (!personalActive ? 'border-primary bg-emerald-50/60 text-gray-900' : 'border-gray-200 bg-white text-gray-700');
        publicBtn.style.display = isEnterpriseMerchant ? 'flex' : 'none';
        document.getElementById('personalTypeCheck').style.display = personalActive ? 'flex' : 'none';
        document.getElementById('publicTypeCheck').style.display = personalActive ? 'none' : 'flex';
    }

    function setOwnerRelation(value) {
        ownerRelation = value;
        var tip = document.getElementById('ownerRelationTip');
        document.getElementById('selfOwnerBtn').className = 'h-10 rounded-full text-[13px] font-medium transition-colors ' +
            (ownerRelation === 'self' ? 'border border-primary bg-white text-primary' : 'bg-gray-50 text-gray-500');
        document.getElementById('otherOwnerBtn').className = 'h-10 rounded-full text-[13px] font-medium transition-colors ' +
            (ownerRelation === 'other' ? 'border border-primary bg-white text-primary' : 'bg-gray-50 text-gray-500');
        tip.className = 'mt-2 rounded-xl px-3 py-2 text-[12px] ' +
            (ownerRelation === 'self' ? 'bg-emerald-50 text-emerald-700' : 'bg-blue-50 text-blue-600');
        tip.textContent = ownerRelation === 'self'
            ? '本人银行卡请填写本人真实信息。'
            : '非本人银行卡请填写实际持卡人信息。';
    }

    function matchBankByNo(no) {
        var digits = String(no || '').replace(/\D/g, '');
        if (digits.length < 6) return { state: 'pending' };
        var bank = BANK_BIN_MAP[digits.slice(0, 4)];
        return bank ? { state: 'auto', bank: bank } : { state: 'manual' };
    }

    function buildBranchOptions(bankName) {
        var bank = MANUAL_BANKS.filter(function(item) { return item.name === bankName; })[0] || MANUAL_BANKS[0];
        return bank.branches.map(function(branch, idx) {
            return '<option value="' + branch + '"' + (idx === 0 ? ' selected' : '') + '>' + branch + '</option>';
        }).join('');
    }

    function renderBankArea(match) {
        var selectCls = 'w-full h-11 rounded-xl border border-gray-200 bg-gray-50 px-3 text-sm text-gray-800 outline-none focus:border-primary focus:bg-white';
        if (match.state === 'manual') {
            var bankOptions = MANUAL_BANKS.map(function(bank, idx) {
                return '<option value="' + bank.name + '"' + (idx === 0 ? ' selected' : '') + '>' + bank.name + '</option>';
            }).join('');
            document.getElementById('bankFieldArea').innerHTML = '' +
                '<label class="block text-[12px] text-gray-500 mb-1.5">开户行</label>' +
                '<select id="bankInput" onchange="onManualBankChange()" class="' + selectCls + '">' + bankOptions + '</select>' +
                '<div class="mt-3">' +
                    '<label class="block text-[12px] text-gray-500 mb-1.5">开户支行</label>' +
                    '<select id="branchInput" class="' + selectCls + '">' + buildBranchOptions(MANUAL_BANKS[0].name) + '</select>' +
                '</div>';
            return;
        }
        var bankName = match.state === 'auto' ? match.bank : '';
        document.getElementById('bankFieldArea').innerHTML = '' +
            '<label class="block text-[12px] text-gray-500 mb-1.5">开户行</label>' +
            '<div class="w-full h-11 rounded-xl border border-gray-200 bg-gray-50 px-3 flex items-center text-sm ' + (bankName ? 'text-gray-800 font-medium' : 'text-gray-300') + '">' + (bankName || '输入卡号后自动识别') + '</div>';
    }

    function onBankNoInput() {
        renderBankArea(matchBankByNo(document.getElementById('bankNoInput').value));
    }

    function onManualBankChange() {
        document.getElementById('branchInput').innerHTML = buildBranchOptions(document.getElementById('bankInput').value);
    }

    function loadBankAccount() {
        try {
            var stored = localStorage.getItem(BANK_KEY);
            if (stored) return JSON.parse(stored);
        } catch (e) {}
        return null;
    }

    function submitBankForm() {
        if (loadBankAccount()) {
            showToast('已存在银行账户，仅支持修改');
            return;
        }
        var holder = (document.getElementById('holderInput').value || '').trim();
        var mobile = (document.getElementById('mobileInput').value || '').trim().replace(/\s+/g, '');
        var idNo = (document.getElementById('idNoInput').value || '').trim().replace(/\s+/g, '');
        var bankNo = (document.getElementById('bankNoInput').value || '').trim().replace(/\s+/g, '');
        var isPublic = currentAccountType === 'public';

        if (!holder || !bankNo || (!isPublic && (!mobile || !idNo))) {
            showToast('请完整填写银行账户信息');
            return;
        }
        if (!isPublic && !/^1\d{10}$/.test(mobile)) {
            showToast('请输入正确的手机号');
            return;
        }
        if (!isPublic && !/^\d{17}[\dXx]$/.test(idNo)) {
            showToast('请输入正确的身份证号');
            return;
        }

        var match = matchBankByNo(bankNo);
        if (match.state === 'pending') {
            showToast(isPublic ? '请输入正确的银行账号' : '请输入正确的银行卡号');
            return;
        }
        var bank = '';
        var branch = '';
        var branchAuto = true;
        if (match.state === 'auto') {
            bank = match.bank;
        } else {
            bank = document.getElementById('bankInput').value;
            branch = document.getElementById('branchInput').value;
            branchAuto = false;
        }

        var record = isPublic
            ? { accountType: 'public', accountName: holder, accountNo: bankNo, bank: bank, branch: branch, branchAuto: branchAuto, merchantType: 'public' }
            : { accountType: 'personal', name: holder, mobile: mobile, idNo: idNo, cardNo: bankNo, bank: bank, branch: branch, branchAuto: branchAuto, ownerRelation: ownerRelation, merchantType: isEnterpriseMerchant ? 'public' : 'personal' };
        try {
            localStorage.setItem(BANK_KEY, JSON.stringify(record));
        } catch (e) {}
        showToast('银行账户已新增');
        setTimeout(function() {
            window.location.href = buildBackUrl();
        }, 800);
    }

    function showToast(text) {
        var tip = document.getElementById('toastTip');
        tip.textContent = text;
        tip.classList.remove('hidden');
        tip.classList.remove('opacity-0');
        tip.style.transform = 'translate(-50%, 0)';
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(function() {
            tip.classList.add('opacity-0');
            setTimeout(function() {
                tip.classList.add('hidden');
            }, 200);
        }, 1800);
    }
</script>
</body>
</html>
