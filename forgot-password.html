<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>丰收云 - 找回登录密码</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="shared.js"></script>
    <style>
        /* body { background-color: #fff; } */
        .login-input {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #F9FAFB;
            border: 1px solid #E5E7EB;
            border-radius: 12px;
            padding: 0 14px;
            height: 48px;
            overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
            margin-bottom: 20px;
        }
        .login-input:focus-within {
            border-color: #11A64A;
            box-shadow: 0 0 0 3px rgba(17,166,74,0.08);
        }
        .login-input i.icon {
            color: #9CA3AF;
            font-size: 14px;
            width: 18px;
            text-align: center;
        }
        .login-input input {
            flex: 1;
            min-width: 0;
            border: none;
            background: transparent;
            outline: none;
            font-size: 14px;
            color: #1F2937;
            font-family: inherit;
        }
        .login-input input::placeholder {
            color: #D1D5DB;
        }

        /* Bg decorations */
        .decor-circle-1 {
            position: absolute;
            top: -50px;
            right: -50px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(17, 166, 74, 0.08) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            z-index: -1;
            pointer-events: none;
        }
        .toast-tip {
            position: absolute;
            left: 50%;
            right: auto;
            bottom: 70px;
            padding: 11px 14px;
            background: rgba(17, 24, 39, 0.9);
            border-radius: 11px;
            color: #fff;
            font-size: 12px;
            line-height: 1.45;
            width: fit-content;
            max-width: calc(100% - 32px);
            text-align: center;
            z-index: 80;
            opacity: 0;
            pointer-events: none;
            transform: translate(-50%, 8px);
            transition: all 0.2s ease;
        }
        .toast-tip.show {
            opacity: 1;
            transform: translate(-50%, 0);
        }
    </style>
</head>
<body class="bg-gray-50/50">
<div class="mobile-container relative overflow-hidden bg-gray-50/50">
    <div class="decor-circle-1"></div>
    
    <div id="statusBar"></div>
    <div id="navBar"></div>

    <div class="px-5 pt-8 pb-6 bg-white rounded-3xl mt-4 shadow-sm mx-4">
        <!-- 页面大标题区 -->
        <div class="mb-8">
            <h1 class="text-[28px] font-bold text-gray-800 mb-2">找回登录密码</h1>
            <p class="text-[13px] text-gray-500 font-medium">验证手机号以重置您的密码</p>
        </div>

        <div class="space-y-1">
            <!-- 手机号码 -->
            <div class="login-input">
                <i class="fas fa-mobile-alt icon"></i>
                <input type="tel" id="mobile" placeholder="请输入绑定的手机号" maxlength="11">
            </div>

            <!-- 验证码 -->
            <div class="login-input">
                <i class="fas fa-shield-alt icon"></i>
                <input type="text" id="verifyCode" placeholder="请输入验证码" maxlength="6">
                <button onclick="getSmsCode()" id="smsBtn"
                    class="shrink-0 text-xs font-medium text-primary whitespace-nowrap rounded-lg bg-primary-bg border border-primary/20 hover:bg-primary/10 transition-colors"
                    style="padding: 6px 12px; line-height: 1; height: 32px;">
                    获取验证码
                </button>
            </div>

            <!-- 新密码 -->
            <!-- 新密码 -->
            <div class="mb-2">
                <div class="login-input" style="margin-bottom:12px;">
                    <i class="fas fa-lock icon"></i>
                    <input type="password" id="newPwd" placeholder="请设置新密码">
                    <i class="fas fa-eye-slash text-gray-300 cursor-pointer text-sm w-6 text-center" id="togglePwd1" onclick="togglePassword('newPwd', 'togglePwd1')"></i>
                </div>
                <!-- 确认新密码 -->
                <div class="login-input" style="margin-bottom:0px;">
                    <i class="fas fa-lock icon"></i>
                    <input type="password" id="newPwdConfirm" placeholder="请再次输入新密码">
                    <i class="fas fa-eye-slash text-gray-300 cursor-pointer text-sm w-6 text-center" id="togglePwd2" onclick="togglePassword('newPwdConfirm', 'togglePwd2')"></i>
                </div>
                <div class="text-[11px] text-gray-400 mt-2 ml-1 mb-6">密码长度需 6-20 位字母或数字组合</div>
            </div>
        </div>

        <!-- 提交按钮 -->
        <div class="mt-8">
            <button onclick="submitReset()" id="submitBtn"
                class="login-btn w-full h-12 rounded-xl text-white font-semibold text-[15px] shadow-glow transition-all active:scale-[0.98]"
                style="background:linear-gradient(135deg,#11A64A 0%,#0D8A3C 100%);">
                重置并登录
            </button>
        </div>
    </div>
    
    <div id="toastTip" class="toast-tip"></div>
</div>

<script>
    document.getElementById('statusBar').innerHTML = renderStatusBar();
    document.getElementById('navBar').innerHTML = renderHeader('找回密码', 'login.html');

    // 密码显示/隐藏切换
    function togglePassword(inputId, iconId) {
        var inp = document.getElementById(inputId);
        var icon = document.getElementById(iconId);
        var isText = inp.type === 'text';
        inp.type = isText ? 'password' : 'text';
        icon.classList.toggle('fa-eye', !isText);
        icon.classList.toggle('fa-eye-slash', isText);
    }
    
    // 获取验证码
    function getSmsCode() {
        var mobile = document.getElementById('mobile').value.trim();
        if(!mobile || mobile.length !== 11) {
            showToast('请输入正确的11位手机号码');
            return;
        }

        var btn = document.getElementById('smsBtn');
        var sec = 60;
        btn.disabled = true;
        btn.style.opacity = '0.5';
        btn.textContent = sec + 's';
        showToast('验证码已发送');
        var timer = setInterval(function() {
            sec--;
            btn.textContent = sec + 's';
            if (sec <= 0) {
                clearInterval(timer);
                btn.disabled = false;
                btn.style.opacity = '1';
                btn.textContent = '获取验证码';
            }
        }, 1000);
    }

    function showToast(msg) {
        var tip = document.getElementById('toastTip');
        tip.textContent = msg;
        tip.classList.add('show');
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(function() {
            tip.classList.remove('show');
        }, 2000);
    }
    
    function submitReset() {
        var mobile = document.getElementById('mobile').value.trim();
        var code = document.getElementById('verifyCode').value.trim();
        var pwd = document.getElementById('newPwd').value.trim();
        var pwdConfirm = document.getElementById('newPwdConfirm').value.trim();
        
        if(!mobile || mobile.length !== 11) {
            showToast('请输入完整的手机号码');
            return;
        }
        if(!code || code.length < 4) {
            showToast('请输入有效的验证码');
            return;
        }
        if(!pwd || pwd.length < 6) {
            showToast('密码长度不能少于6位');
            return;
        }
        if(pwd !== pwdConfirm) {
            showToast('两次输入的密码不一致');
            return;
        }
        
        showToast('重置成功，正在登录...');
        setTimeout(() => {
            // 这里可以根据实际逻辑判断跳去首页，暂且统一条首页
            window.location.href = 'farmer-home.html';
        }, 1500);
    }
</script>
</body>
</html>
