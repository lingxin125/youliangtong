<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>丰收云 - 登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="shared.js"></script>
    <style>
        /* 输入框样式 */
        .login-input {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #F9FAFB;
            border: 1px solid #E5E7EB;
            border-radius: 12px;
            padding: 0 14px;
            height: 48px;
            overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .login-input:focus-within {
            border-color: #11A64A;
            box-shadow: 0 0 0 3px rgba(17,166,74,0.08);
        }
        .login-input i {
            color: #9CA3AF;
            font-size: 14px;
            width: 18px;
            text-align: center;
        }
        .login-input input {
            flex: 1;
            min-width: 0;
            border: none;
            background: transparent;
            outline: none;
            font-size: 14px;
            color: #1F2937;
            font-family: inherit;
        }
        .login-input input::placeholder {
            color: #D1D5DB;
        }
        .agreement {
            margin-top: 14px;
            font-size: 10px;
            color: #9CA3AF;
            line-height: 1.5;
        }
        .agreement-row {
            display: flex;
            align-items: flex-start;
            gap: 6px;
        }
        .agreement input[type="checkbox"] {
            margin-top: 1px;
            width: 12px;
            height: 12px;
            accent-color: #11A64A;
            cursor: pointer;
        }
        .agreement a {
            color: #6B7280;
            text-decoration: none;
        }
        .agreement a:hover {
            color: #11A64A;
        }
        .toast-tip {
            position: absolute;
            left: 50%;
            right: auto;
            bottom: 70px;
            padding: 11px 14px;
            background: rgba(17, 24, 39, 0.9);
            border-radius: 11px;
            color: #fff;
            font-size: 12px;
            line-height: 1.45;
            width: fit-content;
            max-width: calc(100% - 32px);
            text-align: center;
            z-index: 80;
            opacity: 0;
            pointer-events: none;
            transform: translate(-50%, 8px);
            transition: all 0.2s ease;
        }
        .toast-tip.show {
            opacity: 1;
            transform: translate(-50%, 0);
        }
        /* 分隔线 */
        .login-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 22px 0 14px;
        }
        .login-divider::before,
        .login-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #E5E7EB;
        }
        .login-divider span {
            font-size: 12px;
            color: #9CA3AF;
            flex-shrink: 0;
        }
        /* 微信快捷登录 */
        .wechat-login-area {
            display: flex;
            justify-content: center;
        }
        .wechat-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #07C160;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(7, 193, 96, 0.22);
        }
        .wechat-btn:active {
            transform: scale(0.95);
        }
        .wechat-btn i {
            color: #FFFFFF;
            font-size: 16px;
        }
        /* 微信授权加载状态 */
        .wechat-loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }
        .wechat-loading-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .wechat-loading-overlay .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .wechat-loading-overlay .text {
            color: #fff;
            font-size: 14px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        /* 测试手机号提示 */
        .test-hint {
            margin-top: 16px;
            padding: 10px 12px;
            background: rgba(17,166,74,0.06);
            border-radius: 10px;
            font-size: 11px;
            color: #6B7280;
            line-height: 1.7;
        }
        .test-hint .title {
            font-weight: 500;
            color: #374151;
            margin-bottom: 2px;
        }
        .test-hint .phone {
            font-family: 'Poppins', monospace;
            color: #11A64A;
            font-weight: 500;
            cursor: pointer;
        }
        .test-hint .phone:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="mobile-container">
    <!-- 状态栏 -->
    <div id="statusBar"></div>

    <!-- 登录内容区 -->
    <div class="flex-1 overflow-y-auto no-scrollbar flex flex-col items-center px-8 pt-6">

        <!-- Logo 区域 -->
        <div class="flex flex-col items-center mb-6">
            <img src="丰收云logo.png" alt="丰收云" class="w-20 h-20 rounded-2xl shadow-card mb-4" />
            <h1 class="text-2xl font-bold text-gray-800 tracking-wide" style="font-family:Poppins,'Noto Sans SC',sans-serif;">丰收云</h1>
            <p class="text-xs text-gray-400 mt-1 tracking-widest">农产品收购交易平台</p>
        </div>

        <!-- 登录表单卡片 -->
        <div class="glass-panel rounded-2xl p-5 w-full">
            <div class="text-center text-[16px] font-semibold text-gray-700 mb-1">手机号登录</div>
            <div class="text-center text-[12px] text-gray-400 mb-4">请输入手机号并完成验证码验证</div>

            <!-- 手机号输入 -->
            <div class="login-input mb-3">
                <i class="fas fa-mobile-alt"></i>
                <input type="tel" placeholder="请输入手机号" maxlength="11" id="phoneInput" />
            </div>

            <!-- 验证码输入 -->
            <div class="login-input mb-4" id="smsField">
                <i class="fas fa-shield-alt"></i>
                <input type="text" placeholder="请输入验证码" maxlength="6" id="smsInput" />
                <button onclick="getSmsCode()" id="smsBtn"
                    class="shrink-0 text-xs font-medium text-primary whitespace-nowrap rounded-lg bg-primary-bg border border-primary/20 hover:bg-primary/10 transition-colors"
                    style="padding: 6px 12px; line-height: 1; height: 32px;">
                    获取验证码
                </button>
            </div>

            <!-- 登录按钮 -->
            <button onclick="doLogin()" id="loginBtn"
                class="login-btn w-full h-12 rounded-xl text-white font-semibold text-[15px] shadow-glow transition-all active:scale-[0.98]"
                style="background:linear-gradient(135deg,#11A64A 0%,#0D8A3C 100%);">
                登 录
            </button>

            <!-- 分隔线 -->
            <div class="login-divider">
                <span>或</span>
            </div>

            <!-- 微信快捷登录 -->
            <div class="wechat-login-area">
                <button class="wechat-btn" onclick="doWechatLogin()" aria-label="微信快捷登录" title="微信快捷登录">
                    <i class="fab fa-weixin"></i>
                </button>
            </div>
        </div>

        <div class="agreement w-full px-2">
            <div class="agreement-row">
                <input type="checkbox" id="agreeTermsCheckbox" />
                <label for="agreeTermsCheckbox">
                    登录前请先阅读并同意
                    <a href="#">《用户服务协议》</a>和<a href="#">《隐私政策》</a>
                </label>
            </div>
        </div>
    </div>

    <!-- 微信授权加载遮罩 -->
    <div id="wechatLoading" class="wechat-loading-overlay">
        <div class="spinner"></div>
        <div class="text">微信授权中...</div>
    </div>

    <div id="toastTip" class="toast-tip"></div>
</div>

<script>
// 渲染状态栏
document.getElementById('statusBar').innerHTML = renderStatusBar();

// 角色切换
function switchRole(role) {
    currentRole = role;
    var slider = document.getElementById('roleSlider');
    var btnBuyer = document.getElementById('roleBuyer');
    var btnFarmer = document.getElementById('roleFarmer');
    if (role === 'farmer') {
        slider.classList.add('right');
        btnBuyer.classList.remove('active');
        btnFarmer.classList.add('active');
    } else {
        slider.classList.remove('right');
        btnBuyer.classList.add('active');
        btnFarmer.classList.remove('active');
    }
}

// 获取验证码（模拟60秒倒计时）
function getSmsCode() {
    var btn = document.getElementById('smsBtn');
    var sec = 60;
    btn.disabled = true;
    btn.style.opacity = '0.5';
    btn.textContent = sec + 's';
    var timer = setInterval(function() {
        sec--;
        btn.textContent = sec + 's';
        if (sec <= 0) {
            clearInterval(timer);
            btn.disabled = false;
            btn.style.opacity = '1';
            btn.textContent = '获取验证码';
        }
    }, 1000);
}


function showToast(msg) {
    var tip = document.getElementById('toastTip');
    tip.textContent = msg;
    tip.classList.add('show');
    clearTimeout(showToast.timer);
    showToast.timer = setTimeout(function() {
        tip.classList.remove('show');
    }, 1800);
}

// 登录 - 默认进入农户端
function doLogin() {
    if (!document.getElementById('agreeTermsCheckbox').checked) {
        showToast('请先勾选并同意用户协议与隐私政策');
        return;
    }
    // 原型默认以双身份用户登录，默认进农户端
    if (window.UserIdentityStore) {
        UserIdentityStore.login('13700005555');
    }
    _navigateTo('farmer-home.html');
}

// 微信快捷登录
function doWechatLogin() {
    if (!document.getElementById('agreeTermsCheckbox').checked) {
        showToast('请先勾选并同意用户协议与隐私政策');
        return;
    }
    var overlay = document.getElementById('wechatLoading');
    if (overlay) overlay.style.display = 'flex';
    setTimeout(function() {
        if (window.UserIdentityStore) {
            UserIdentityStore.login('13700005555');
        }
        _navigateTo('farmer-home.html');
    }, 1200);
}
</script>
</body>
</html>
