<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>收购商进件类型填写说明</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f7f5;
    
      --card: rgba(255, 255, 255, 0.96);
      --line: #dbe7de;
      --text: #13221a;
      --muted: #637166;
      --accent: #15803d;
      --accent-soft: rgba(21, 128, 61, 0.08);
      --warning: #b45309;
      --shadow: 0 20px 48px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Noto Sans SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(21, 128, 61, 0.08), transparent 32%),
        radial-gradient(circle at top right, rgba(180, 83, 9, 0.06), transparent 24%),
        linear-gradient(180deg, #f7faf8 0%, var(--bg) 100%);
      min-height: 100vh;
    }

    .page-shell {
      width: min(1440px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }

    .hero {
      background: linear-gradient(135deg, #123c24 0%, #166534 42%, #1b7f43 100%);
      border-radius: 28px;
      padding: 30px 34px 28px;
      color: #fff;
      position: relative;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(18, 60, 36, 0.2);
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      pointer-events: none;
      filter: blur(2px);
    }

    .hero::before {
      width: 260px;
      height: 260px;
      background: rgba(255, 255, 255, 0.08);
      top: -90px;
      right: -60px;
    }

    .hero::after {
      width: 220px;
      height: 220px;
      background: rgba(255, 255, 255, 0.05);
      bottom: -110px;
      left: 44%;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.18fr) minmax(360px, 0.82fr);
      gap: 28px;
      position: relative;
      z-index: 1;
    }

    .hero-title {
      font-size: 34px;
      line-height: 1.18;
      font-weight: 800;
      margin: 0 0 10px;
      letter-spacing: 0.4px;
    }

    .hero-subtitle {
      margin: 0;
      max-width: 760px;
      font-size: 14px;
      line-height: 1.85;
      color: rgba(255, 255, 255, 0.88);
    }

    .hero-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      align-content: start;
    }

    .hero-stat {
      padding: 16px 16px 14px;
      background: rgba(255, 255, 255, 0.11);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 18px;
      backdrop-filter: blur(10px);
      min-height: 92px;
    }

    .hero-stat-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.72);
      margin-bottom: 8px;
    }

    .hero-stat-value {
      font-family: "Poppins", sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
    }

    .hero-stat-value.small {
      font-family: "Noto Sans SC", sans-serif;
      font-size: 15px;
      line-height: 1.7;
      font-weight: 600;
    }

    .content-shell {
      margin-top: 22px;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .glass-card {
      background: var(--card);
      border: 1px solid rgba(219, 231, 222, 0.94);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .sidebar {
      position: sticky;
      top: 18px;
      overflow: hidden;
    }

    .sidebar-section {
      padding: 20px 20px 18px;
      border-bottom: 1px solid #edf2ee;
    }

    .sidebar-section:last-child {
      border-bottom: none;
    }

    .section-kicker {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: #2f6b47;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .type-tabs {
      display: grid;
      gap: 10px;
    }

    .type-tab {
      position: relative;
      width: 100%;
      text-align: left;
      padding: 14px 15px;
      border: 1px solid #dce6df;
      border-radius: 18px;
      background: #fff;
      cursor: pointer;
      transition: all 0.22s ease;
      overflow: hidden;
    }

    .type-tab:hover {
      transform: translateY(-1px);
      border-color: #b7d4c2;
      box-shadow: 0 10px 20px rgba(21, 128, 61, 0.08);
    }

    .type-tab.active {
      border-color: rgba(21, 128, 61, 0.22);
      box-shadow: 0 16px 24px rgba(21, 128, 61, 0.1);
      background: linear-gradient(180deg, rgba(21, 128, 61, 0.08), rgba(255,255,255,0.95));
    }

    .type-tab-badge {
      width: 11px;
      height: 11px;
      border-radius: 999px;
      display: inline-block;
      margin-right: 10px;
      vertical-align: middle;
      box-shadow: 0 0 0 4px rgba(21, 128, 61, 0.08);
    }

    .type-tab-title {
      font-size: 15px;
      font-weight: 700;
      color: #163524;
      line-height: 1.4;
    }

    .type-tab-sub {
      margin-top: 6px;
      font-size: 12px;
      color: #66756a;
      line-height: 1.65;
    }

    .summary-grid {
      display: grid;
      gap: 10px;
    }

    .summary-pill {
      padding: 12px 13px;
      background: #f9fbfa;
      border: 1px solid #e6efe9;
      border-radius: 16px;
    }

    .summary-pill-label {
      font-size: 11px;
      color: #809083;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }

    .summary-pill-value {
      font-size: 14px;
      color: #1d2d23;
      line-height: 1.65;
      font-weight: 600;
    }

    .summary-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 10px;
    }

    .summary-list li {
      position: relative;
      padding-left: 18px;
      font-size: 13px;
      color: #425144;
      line-height: 1.75;
    }

    .summary-list li::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #16a34a;
      position: absolute;
      left: 0;
      top: 9px;
      box-shadow: 0 0 0 5px rgba(22, 163, 74, 0.08);
    }

    .main-panel {
      padding: 0;
      overflow: hidden;
    }

    .main-header {
      padding: 22px 24px 18px;
      border-bottom: 1px solid #eef3ef;
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(247,250,248,0.96));
    }

    .main-header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      margin-bottom: 12px;
    }

    .main-title {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      font-weight: 800;
      color: #142419;
    }

    .main-subtitle {
      margin: 8px 0 0;
      font-size: 14px;
      color: #627062;
      line-height: 1.8;
      max-width: 920px;
    }

    .header-chip {
      display: inline-flex;
      align-items: center;
      padding: 8px 14px;
      background: #f7faf8;
      border: 1px solid #dfe9e1;
      border-radius: 999px;
      font-size: 12px;
      color: #314337;
      font-weight: 700;
      white-space: nowrap;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .meta-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid #e5ece7;
      font-size: 12px;
      color: #47604e;
      font-weight: 600;
    }

    .modules-wrap {
      padding: 16px 18px 22px;
      display: grid;
      gap: 18px;
    }

    .module-card {
      border: 1px solid #dfe8e1;
      border-radius: 24px;
      background: linear-gradient(180deg, #ffffff 0%, #fbfdfb 100%);
      box-shadow: 0 18px 38px rgba(15, 23, 42, 0.06);
      overflow: hidden;
    }

    .module-head {
      padding: 18px 20px 16px;
      border-bottom: 1px solid #edf1ed;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
    }

    .module-head-main {
      min-width: 0;
    }

    .module-index {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 42px;
      height: 42px;
      padding: 0 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      color: #fff;
      box-shadow: inset 0 -6px 14px rgba(255,255,255,0.08);
    }

    .module-title {
      margin: 0;
      font-size: 20px;
      line-height: 1.35;
      font-weight: 800;
      color: #15251a;
    }

    .module-subtitle {
      margin: 8px 0 0;
      font-size: 13px;
      color: #6c7a6d;
      line-height: 1.75;
    }

    .module-body {
      display: grid;
      grid-template-columns: minmax(420px, 0.78fr) minmax(380px, 0.92fr);
      gap: 18px;
      padding: 18px 18px 20px;
      align-items: start;
    }

    .image-panel {
      border-radius: 22px;
      background: linear-gradient(180deg, #eff6f1 0%, #f7faf8 100%);
      border: 1px solid #d9e7de;
      padding: 16px;
      position: sticky;
      top: 20px;
    }

    .image-stage {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      background: #fff;
      border: 1px solid #d8e4da;
      box-shadow: 0 14px 28px rgba(15, 23, 42, 0.06);
    }

    .image-stage img {
      display: block;
      width: 100%;
      height: auto;
      background: #fff;
    }

    .anchor-dot {
      position: absolute;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 2px solid #fff;
      box-shadow: 0 10px 18px rgba(0, 0, 0, 0.16);
      color: #fff;
      font-family: "Poppins", sans-serif;
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: translate(-50%, -50%);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      z-index: 3;
    }

    .anchor-dot:hover,
    .anchor-dot.active {
      transform: translate(-50%, -50%) scale(1.08);
      box-shadow: 0 16px 24px rgba(0, 0, 0, 0.2);
    }

    .annotation-panel {
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .annotation-card {
      position: relative;
      border: 1px solid #dde7de;
      border-radius: 20px;
      background: #fff;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.04);
      padding: 16px 16px 14px;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .annotation-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 30px rgba(15, 23, 42, 0.06);
      border-color: #cfe1d3;
    }

    .annotation-card.active {
      border-color: rgba(21, 128, 61, 0.28);
      box-shadow: 0 18px 36px rgba(21, 128, 61, 0.1);
      background: linear-gradient(180deg, rgba(21, 128, 61, 0.06), #fff);
    }

    .annotation-top {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .annotation-index {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: "Poppins", sans-serif;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
      box-shadow: inset 0 -4px 8px rgba(255,255,255,0.12);
    }

    .annotation-title {
      margin: 1px 0 0;
      font-size: 16px;
      line-height: 1.45;
      font-weight: 800;
      color: #18261c;
    }

    .annotation-desc {
      margin: 0;
      font-size: 13px;
      line-height: 1.85;
      color: #526055;
    }

    .annotation-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .annotation-tag {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: #f7faf8;
      border: 1px solid #e1ebe3;
      color: #4e6454;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
    }

    .empty-state {
      padding: 42px 24px;
      text-align: center;
      color: #66756a;
      font-size: 14px;
      line-height: 1.8;
    }

    @media (max-width: 1240px) {
      .content-shell,
      .hero-grid,
      .module-body {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: relative;
        top: 0;
      }

      .image-panel {
        position: relative;
        top: 0;
      }
    }

    @media (max-width: 860px) {
      .page-shell {
        width: min(100vw - 18px, 100%);
        padding-top: 12px;
      }

      .hero,
      .glass-card,
      .module-card {
        border-radius: 20px;
      }

      .hero {
        padding: 22px 18px;
      }

      .hero-title {
        font-size: 28px;
      }

      .main-header,
      .modules-wrap {
        padding-left: 14px;
        padding-right: 14px;
      }

      .module-head,
      .module-body {
        padding-left: 14px;
        padding-right: 14px;
      }

      .module-body {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <section class="hero">
      <div class="hero-grid">
        <div>
          <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full border border-white/15 bg-white/10 text-[12px] font-semibold tracking-[0.12em] uppercase text-white/85">
            内部培训 · 收购商进件规则说明
          </div>
          <h1 id="pageTitle" class="hero-title">收购商进件类型填写说明</h1>
          <p id="pageSubtitle" class="hero-subtitle"></p>
        </div>
        <div class="hero-meta">
          <div class="hero-stat">
            <div class="hero-stat-label">说明来源</div>
            <div id="sourceNote" class="hero-stat-value small">-</div>
          </div>
          <div class="hero-stat">
            <div class="hero-stat-label">最近整理时间</div>
            <div id="updatedAt" class="hero-stat-value">-</div>
          </div>
          <div class="hero-stat">
            <div class="hero-stat-label">当前类型</div>
            <div id="activeTypeName" class="hero-stat-value">-</div>
          </div>
          <div class="hero-stat">
            <div class="hero-stat-label">阅读提示</div>
            <div id="usageTip" class="hero-stat-value small">-</div>
          </div>
        </div>
      </div>
    </section>

    <section class="content-shell">
      <aside class="sidebar glass-card">
        <div class="sidebar-section">
          <div class="section-kicker">类型切换</div>
          <div id="typeTabs" class="type-tabs"></div>
        </div>
        <div class="sidebar-section">
          <div class="section-kicker">类型摘要</div>
          <div class="summary-grid">
            <div class="summary-pill">
              <div class="summary-pill-label">商户类型</div>
              <div id="summaryMerchantType" class="summary-pill-value">-</div>
            </div>
            <div class="summary-pill">
              <div class="summary-pill-label">结算类型</div>
              <div id="summarySettlementType" class="summary-pill-value">-</div>
            </div>
            <div class="summary-pill">
              <div class="summary-pill-label">截图页数</div>
              <div id="summaryPageCount" class="summary-pill-value">-</div>
            </div>
          </div>
        </div>
        <div class="sidebar-section">
          <div class="section-kicker">重点模块</div>
          <ul id="focusModules" class="summary-list"></ul>
        </div>
        <div class="sidebar-section">
          <div class="section-kicker">关键提示</div>
          <ul id="keyPoints" class="summary-list"></ul>
        </div>
        <div class="sidebar-section">
          <div class="section-kicker">差异说明</div>
          <ul id="differences" class="summary-list"></ul>
        </div>
      </aside>

      <main class="main-panel glass-card">
        <div class="main-header">
          <div class="main-header-top">
            <div>
              <h2 id="mainTypeTitle" class="main-title">-</h2>
              <p id="mainTypeSubtitle" class="main-subtitle">-</p>
            </div>
            <div id="pageCounterChip" class="header-chip">-</div>
          </div>
          <div id="metaRow" class="meta-row"></div>
        </div>
        <div id="modulesWrap" class="modules-wrap">
          <div class="empty-state">正在加载说明内容...</div>
        </div>
      </main>
    </section>
  </div>

  <script src="merchant-intake-guide-data.js"></script>
  <script>
    const guideData = window.MerchantIntakeGuideData;
    const state = {
      activeTypeId: guideData && guideData.types && guideData.types[0] ? guideData.types[0].id : '',
      activeAnnotationId: ''
    };

    function qs(id) {
      return document.getElementById(id);
    }

    function renderStaticMeta() {
      qs('pageTitle').textContent = guideData.title;
      qs('pageSubtitle').textContent = guideData.subtitle;
      qs('sourceNote').textContent = guideData.sourceNote;
      qs('updatedAt').textContent = guideData.updatedAt;
      qs('usageTip').textContent = guideData.usageTip;
    }

    function getActiveType() {
      return guideData.types.find(item => item.id === state.activeTypeId) || guideData.types[0];
    }

    function createListItems(targetId, items) {
      const target = qs(targetId);
      target.innerHTML = (items || []).map(item => `<li>${item}</li>`).join('');
    }

    function renderTabs() {
      const tabs = qs('typeTabs');
      tabs.innerHTML = guideData.types.map(type => {
        const active = type.id === state.activeTypeId ? 'active' : '';
        return `
          <button class="type-tab ${active}" data-type-id="${type.id}">
            <div class="type-tab-title"><span class="type-tab-badge" style="background:${type.accent};"></span>${type.label}</div>
            <div class="type-tab-sub">${type.merchantType}<br>${type.settlementType}</div>
          </button>
        `;
      }).join('');

      tabs.querySelectorAll('.type-tab').forEach(btn => {
        btn.addEventListener('click', () => {
          state.activeTypeId = btn.dataset.typeId;
          state.activeAnnotationId = '';
          render();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      });
    }

    function renderTypeSummary(type) {
      qs('activeTypeName').textContent = type.label;
      qs('summaryMerchantType').textContent = type.merchantType;
      qs('summarySettlementType').textContent = type.settlementType;
      qs('summaryPageCount').textContent = `${type.pageCount} 页截图说明`;
      qs('mainTypeTitle').textContent = type.label;
      qs('mainTypeSubtitle').textContent = `本类型共 ${type.pageCount} 页截图，以下按截图顺序逐页说明填写内容，并结合 Excel 规则补充默认值、OCR 回填、非必填与差异要求。`;
      qs('pageCounterChip').textContent = `${type.pageCount} 页 / ${type.annotationsCount || countAnnotations(type)} 个说明点`;

      createListItems('focusModules', type.focusModules);
      createListItems('keyPoints', type.keyPoints);
      createListItems('differences', type.differences);

      const metaRow = qs('metaRow');
      metaRow.innerHTML = [
        `商户类型：${type.merchantType}`,
        `结算类型：${type.settlementType}`,
        `页面结构：截图分屏标注`,
        `内容依据：截图 + Excel`
      ].map(text => `<div class="meta-badge">${text}</div>`).join('');
    }

    function countAnnotations(type) {
      return (type.pages || []).reduce((sum, page) => sum + (page.annotations ? page.annotations.length : 0), 0);
    }

    function ensureActiveAnnotation(type) {
      if (state.activeAnnotationId) return;
      const firstPage = type.pages && type.pages[0];
      const firstAnnotation = firstPage && firstPage.annotations && firstPage.annotations[0];
      state.activeAnnotationId = firstAnnotation ? `${type.id}:${firstPage.title}:${firstAnnotation.id}` : '';
    }

    function buildAnnotationKey(typeId, pageTitle, annotationId) {
      return `${typeId}:${pageTitle}:${annotationId}`;
    }

    function renderPages(type) {
      ensureActiveAnnotation(type);
      const wrap = qs('modulesWrap');

      wrap.innerHTML = (type.pages || []).map((page, pageIndex) => {
        const accent = type.accent;
        const dots = (page.annotations || []).map((annotation, annotationIndex) => {
          const key = buildAnnotationKey(type.id, page.title, annotation.id);
          const activeClass = key === state.activeAnnotationId ? 'active' : '';
          return `
            <button
              type="button"
              class="anchor-dot ${activeClass}"
              data-annotation-key="${key}"
              style="left:${annotation.x}%; top:${annotation.y}%; background:${accent};"
              aria-label="${annotation.title}"
            >${annotationIndex + 1}</button>
          `;
        }).join('');

        const cards = (page.annotations || []).map((annotation, annotationIndex) => {
          const key = buildAnnotationKey(type.id, page.title, annotation.id);
          const activeClass = key === state.activeAnnotationId ? 'active' : '';
          return `
            <article
              class="annotation-card ${activeClass}"
              data-annotation-key="${key}"
            >
              <div class="annotation-top">
                <span class="annotation-index" style="background:${accent};">${annotationIndex + 1}</span>
                <div class="annotation-title">${annotation.title}</div>
              </div>
              <p class="annotation-desc">${annotation.desc}</p>
              <div class="annotation-tags">
                ${(annotation.tags || []).map(tag => `<span class="annotation-tag">${tag}</span>`).join('')}
              </div>
            </article>
          `;
        }).join('');

        return `
          <section class="module-card">
            <div class="module-head">
              <div class="module-head-main">
                <h3 class="module-title">第 ${pageIndex + 1} 页：${page.title}</h3>
                <p class="module-subtitle">${page.subtitle || ''}</p>
              </div>
              <div class="module-index" style="background:${accent};">P${pageIndex + 1}</div>
            </div>
            <div class="module-body">
              <div class="image-panel">
                <div class="image-stage">
                  <img src="${page.image}" alt="${page.title}" loading="lazy">
                  ${dots}
                </div>
              </div>
              <div class="annotation-panel">
                ${cards}
              </div>
            </div>
          </section>
        `;
      }).join('');

      bindAnnotationEvents();
    }

    function bindAnnotationEvents() {
      document.querySelectorAll('[data-annotation-key]').forEach(node => {
        node.addEventListener('mouseenter', () => {
          state.activeAnnotationId = node.dataset.annotationKey;
          syncActiveAnnotation();
        });
        node.addEventListener('click', () => {
          state.activeAnnotationId = node.dataset.annotationKey;
          syncActiveAnnotation();
        });
      });
    }

    function syncActiveAnnotation() {
      document.querySelectorAll('[data-annotation-key]').forEach(node => {
        node.classList.toggle('active', node.dataset.annotationKey === state.activeAnnotationId);
      });
    }

    function render() {
      const type = getActiveType();
      renderTabs();
      renderTypeSummary(type);
      renderPages(type);
    }

    renderStaticMeta();
    render();
  </script>
</body>
</html>
