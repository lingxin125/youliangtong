<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>丰收云 - 结算信息修改</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="shared.js"></script>
</head>
<body class="bg-[#F7F8FA]">
<div class="mobile-container relative bg-[#F7F8FA]">
    <div id="statusBar"></div>
    <div id="navBar"></div>

    <div class="flex-1 overflow-y-auto no-scrollbar px-4 pt-4 pb-24">
        

        <div class="bg-white rounded-2xl border border-black/[0.04] shadow-elevation-1 overflow-hidden">
            <div class="px-4 py-3 flex items-center justify-between border-b border-gray-50">
                <div class="flex items-center gap-2">
                    <div class="w-1 h-3.5 bg-primary rounded-full"></div>
                    <span id="cardTitle" class="text-[15px] font-semibold text-gray-800">个人结算信息</span>
                </div>
                <span id="accountTypeBadge" class="px-2 py-0.5 rounded-full bg-emerald-50 text-primary text-[11px] font-medium">个人户</span>
            </div>
            <div id="fieldList"></div>
        </div>
        <!-- <div class="rounded-2xl bg-emerald-50/70 border border-emerald-100 px-3 py-2.5 text-[12px] leading-5 text-emerald-700 mb-3">
            <i class="fas fa-circle-info mr-1"></i>
            结算信息用于银行付款或收款校验。每次仅支持修改一项，提交前需完成手机号验证码校验。
        </div> -->
    </div>

    <button id="demoSwitch" onclick="toggleDemoAccountType()" class="absolute right-4 bottom-6 z-40 rounded-full bg-white border border-emerald-100 shadow-[0_8px_24px_rgba(15,23,42,0.12)] px-3 h-10 flex items-center gap-2 active:scale-[0.98] transition-transform">
        <span class="w-5 h-5 rounded-full bg-primary text-white flex items-center justify-center text-[10px]">
            <i class="fas fa-building"></i>
        </span>
        <span id="demoSwitchText" class="text-[12px] font-semibold text-gray-700">演示公户</span>
    </button>

    <div id="editModal" class="absolute inset-0 z-[80] bg-black/40 flex items-end opacity-0 pointer-events-none transition-opacity duration-300">
        <div id="editModalContent" class="w-full bg-white rounded-t-[24px] p-5 max-h-[86vh] overflow-y-auto no-scrollbar transform translate-y-full transition-transform duration-300 shadow-[0_-10px_40px_rgba(0,0,0,0.12)]">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <div id="editModalTitle" class="text-[16px] font-semibold text-gray-800">修改结算信息</div>
                    <div id="editModalDesc" class="text-[12px] text-gray-400 mt-1">请先完成手机号验证码校验</div>
                </div>
                <button onclick="closeEditModal()" class="w-8 h-8 flex items-center justify-center text-gray-400 active:text-gray-700">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="editModalBody"></div>
        </div>
    </div>

    <div id="toastTip" class="hidden absolute left-1/2 -translate-x-1/2 bottom-24 px-4 py-2 bg-black/80 text-white text-xs rounded-lg z-[90] opacity-0 pointer-events-none transition-all duration-200"></div>
</div>

<script>
    var q = new URLSearchParams(window.location.search);
    var sourcePage = q.get('source') || 'buyer-my.html';
    var isFarmerPage = sourcePage.indexOf('farmer') >= 0;
    var isPublicDemo = false;
    var editState = { key: '', step: 'verify', smsSent: {} };

    var settlementData = {
        personal: {
            name: isFarmerPage ? '李大姐' : '张三',
            mobile: isFarmerPage ? '13800006666' : '13700005555',
            idNo: isFarmerPage ? '370611197802146628' : '370602198608126219',
            cardNo: isFarmerPage ? '6215853322334455' : '6221888800002233',
            bank: '中国邮政储蓄银行',
            branch: isFarmerPage ? '烟台市福山区支行' : '烟台市芝罗区支行'
        },
        public: {
            accountName: isFarmerPage ? '李大姐家庭农场' : '张三的粮站',
            mobile: isFarmerPage ? '13800006666' : '13700005555',
            accountNo: isFarmerPage ? '6221888800008899' : '6221888800002233',
            bank: '中国邮政储蓄银行',
            branch: isFarmerPage ? '烟台市福山区支行' : '烟台市芝罗区支行'
        }
    };

    document.getElementById('statusBar').innerHTML = renderStatusBar();
    document.getElementById('navBar').innerHTML = renderHeader('结算信息修改', sourcePage);
    renderPage();

    function getCurrentData() {
        return isPublicDemo ? settlementData.public : settlementData.personal;
    }

    function getFields() {
        if (isPublicDemo) {
            return [
                { key: 'accountName', label: '对公账户名称', editable: true, placeholder: '请输入对公账户名称' },
                { key: 'mobile', label: '手机号', editable: false },
                { key: 'accountNo', label: '银行账号', editable: true, placeholder: '请输入银行账号', mono: true },
                { key: 'bank', label: '开户行', editable: false },
                { key: 'branch', label: '开户支行', editable: false }
            ];
        }
        return [
            { key: 'name', label: '姓名', editable: true, placeholder: '请输入姓名' },
            { key: 'mobile', label: '手机号', editable: true, placeholder: '请输入新手机号', mono: true },
            { key: 'idNo', label: '身份证号', editable: true, placeholder: '请输入身份证号', mono: true },
            { key: 'cardNo', label: '银行卡号', editable: true, placeholder: '请输入银行卡号', mono: true },
            { key: 'bank', label: '开户行', editable: false },
            { key: 'branch', label: '开户支行', editable: false }
        ];
    }

    function renderPage() {
        document.getElementById('cardTitle').textContent = isPublicDemo ? '结算信息' : '结算信息';
        document.getElementById('accountTypeBadge').textContent = isPublicDemo ? '公户' : '个人';
        document.getElementById('demoSwitchText').textContent = isPublicDemo ? '演示个人户' : '演示公户';
        var data = getCurrentData();
        document.getElementById('fieldList').innerHTML = getFields().map(function(field) {
            return renderFieldRow(field, data[field.key] || '');
        }).join('');
    }

    function renderFieldRow(field, value) {
        var valueHtml = '<span class="text-[14px] font-medium text-gray-800 text-right truncate ' + (field.mono ? 'font-mono' : '') + '">' + maskValue(field.key, value) + '</span>';
        var actionHtml = field.editable
            ? '<button onclick="openEditModal(\'' + field.key + '\')" class="ml-3 shrink-0 text-[12px] font-medium text-primary">修改</button>'
            : '';
        return '' +
            '<div class="px-4 border-b border-gray-50 last:border-b-0">' +
                '<div class="py-3.5 flex items-center justify-between gap-3">' +
                    '<span class="text-[14px] text-gray-500 shrink-0">' + field.label + '</span>' +
                    '<div class="flex items-center justify-end min-w-0 flex-1">' + valueHtml + actionHtml + '</div>' +
                '</div>' +
            '</div>';
    }

    function getFieldMeta(key) {
        return getFields().find(function(field) { return field.key === key; }) || null;
    }

    function openEditModal(key) {
        editState = { key: key, step: key === 'mobile' ? 'mobile' : 'verify', smsSent: {} };
        renderEditModal();
        var modal = document.getElementById('editModal');
        var content = document.getElementById('editModalContent');
        modal.classList.remove('pointer-events-none', 'opacity-0');
        content.classList.remove('translate-y-full');
    }

    function closeEditModal() {
        var modal = document.getElementById('editModal');
        var content = document.getElementById('editModalContent');
        modal.classList.add('pointer-events-none', 'opacity-0');
        content.classList.add('translate-y-full');
        editState = { key: '', step: 'verify', smsSent: {} };
    }

    function renderEditModal() {
        var field = getFieldMeta(editState.key);
        if (!field) return;
        document.getElementById('editModalTitle').textContent = '修改' + field.label;
        document.getElementById('editModalDesc').textContent = editState.key === 'mobile'
            ? '请完成原手机号与新手机号验证'
            : (editState.step === 'verify' ? '请先验证当前手机号' : '');
        document.getElementById('editModalBody').innerHTML = editState.key === 'mobile'
            ? renderMobileEditPanel()
            : (editState.step === 'verify' ? renderVerifyPanel(field) : renderSensitiveEditPanel(field));
    }

    function renderVerifyPanel(field) {
        var data = getCurrentData();
        return '' +
            '<div class="rounded-2xl bg-gray-50 border border-gray-100 px-3 py-3 mb-4">' +
                '<div class="text-[12px] text-gray-400 mb-1">当前手机号</div>' +
                '<div class="text-[15px] font-semibold text-gray-800" style="font-family:Poppins,monospace;">' + maskValue('mobile', data.mobile) + '</div>' +
            '</div>' +
            renderCodeInput('当前手机号验证码', 'codeInput', '请输入验证码', 'currentMobile') +
            '<button onclick="verifyCurrentMobile()" class="w-full h-11 rounded-xl bg-primary text-white text-[14px] font-semibold mt-4 active:scale-[0.98] transition-transform">下一步</button>';
    }

    function renderSensitiveEditPanel(field) {
        var data = getCurrentData();
        var value = data[field.key] || '';
        var isBankField = field.key === 'cardNo' || field.key === 'accountNo';
        return '' +
            '<div class="rounded-2xl bg-emerald-50/70 border border-emerald-100 px-3 py-3 mb-4">' +
                '<div class="text-[12px] text-emerald-700/80 mb-1">当前' + field.label + '</div>' +
                '<div class="text-[15px] font-semibold text-gray-800 break-all ' + (field.mono ? 'font-mono' : '') + '">' + value + '</div>' +
            '</div>' +
            '<label class="block text-[12px] text-gray-500 mb-1.5">新的' + field.label + '</label>' +
            '<input id="newValueInput" class="w-full h-11 rounded-xl border border-gray-200 bg-gray-50 px-3 text-sm text-gray-800 outline-none focus:border-primary focus:bg-white" placeholder="' + (field.placeholder || '请输入新内容') + '" value="' + value + '">' +
            (isBankField ? renderBankEditFields(data) : '') +
            '<div class="flex gap-2 mt-4">' +
                '<button onclick="closeEditModal()" class="flex-1 h-11 rounded-xl border border-gray-200 bg-white text-gray-600 text-[14px] font-medium active:scale-[0.98] transition-transform">取消</button>' +
                '<button onclick="confirmSensitiveEdit()" class="flex-1 h-11 rounded-xl bg-primary text-white text-[14px] font-semibold active:scale-[0.98] transition-transform">确认修改</button>' +
            '</div>';
    }

    function renderBankEditFields(data) {
        var banks = [
            { name: '中国邮政储蓄银行', branches: ['烟台市芝罗区支行', '烟台市福山区支行', '烟台市莱山区支行'] },
            { name: '中国农业银行', branches: ['烟台市开发区支行', '烟台市莱山区支行', '烟台市福山区支行'] },
            { name: '烟台农商银行', branches: ['福山清洋支行', '芝罘幸福支行', '牟平宁海支行'] }
        ];
        var bankOptions = banks.map(function(bank) {
            return '<option value="' + bank.name + '"' + (bank.name === data.bank ? ' selected' : '') + '>' + bank.name + '</option>';
        }).join('');
        var allBranches = banks.reduce(function(list, bank) { return list.concat(bank.branches); }, []);
        if (allBranches.indexOf(data.branch) < 0 && data.branch) allBranches.unshift(data.branch);
        var branchOptions = allBranches.map(function(branch) {
            return '<option value="' + branch + '"' + (branch === data.branch ? ' selected' : '') + '>' + branch + '</option>';
        }).join('');
        return '' +
            '<div class="mt-3">' +
                '<label class="block text-[12px] text-gray-500 mb-1.5">开户行</label>' +
                '<select id="bankInput" class="w-full h-11 rounded-xl border border-gray-200 bg-gray-50 px-3 text-sm text-gray-800 outline-none focus:border-primary focus:bg-white">' + bankOptions + '</select>' +
            '</div>' +
            '<div class="mt-3">' +
                '<label class="block text-[12px] text-gray-500 mb-1.5">开户支行</label>' +
                '<select id="branchInput" class="w-full h-11 rounded-xl border border-gray-200 bg-gray-50 px-3 text-sm text-gray-800 outline-none focus:border-primary focus:bg-white">' + branchOptions + '</select>' +
            '</div>';
    }

    function renderMobileEditPanel() {
        return '' +
            '<div class="space-y-3">' +
                '<div class="rounded-2xl bg-gray-50 border border-gray-100 px-3 py-3">' +
                    '<div class="text-[12px] text-gray-400 mb-1">原手机号</div>' +
                    '<div class="text-[15px] font-semibold text-gray-800" style="font-family:Poppins,monospace;">' + maskValue('mobile', getCurrentData().mobile) + '</div>' +
                '</div>' +
                renderCodeInput('原手机号验证码', 'oldCodeInput', '请输入原手机号验证码', 'oldMobile') +
                '<div>' +
                    '<label class="block text-[12px] text-gray-500 mb-1.5">新手机号</label>' +
                    '<input id="newValueInput" class="w-full h-11 rounded-xl border border-gray-200 bg-gray-50 px-3 text-sm text-gray-800 outline-none focus:border-primary focus:bg-white" placeholder="请输入新手机号" inputmode="tel" maxlength="11">' +
                '</div>' +
                renderCodeInput('新手机号验证码', 'newCodeInput', '请输入新手机号验证码', 'newMobile') +
                '<div class="flex gap-2 pt-1">' +
                    '<button onclick="closeEditModal()" class="flex-1 h-11 rounded-xl border border-gray-200 bg-white text-gray-600 text-[14px] font-medium active:scale-[0.98] transition-transform">取消</button>' +
                    '<button onclick="confirmMobileEdit()" class="flex-1 h-11 rounded-xl bg-primary text-white text-[14px] font-semibold active:scale-[0.98] transition-transform">确认修改</button>' +
                '</div>' +
            '</div>';
    }

    function renderCodeInput(label, inputId, placeholder, codeKey) {
        return '' +
            '<div>' +
                '<label class="block text-[12px] text-gray-500 mb-1.5">' + label + '</label>' +
                '<div class="flex gap-2">' +
                    '<input id="' + inputId + '" class="flex-1 h-11 rounded-xl border border-gray-200 bg-gray-50 px-3 text-sm text-gray-800 outline-none focus:border-primary focus:bg-white" placeholder="' + placeholder + '" inputmode="numeric" maxlength="6">' +
                    '<button onclick="sendCode(\'' + codeKey + '\')" class="w-[96px] h-11 rounded-xl border border-emerald-100 bg-emerald-50 text-primary text-[12px] font-semibold active:scale-[0.98] transition-transform">获取验证码</button>' +
                '</div>' +
            '</div>';
    }

    function sendCode(key) {
        editState.smsSent[key] = true;
        showToast('验证码已发送');
    }

    function verifyCurrentMobile() {
        var code = document.getElementById('codeInput').value.trim();
        if (!editState.smsSent.currentMobile) {
            showToast('请先获取验证码');
            return;
        }
        if (code !== '123456') {
            showToast('验证码错误');
            return;
        }
        editState.step = 'edit';
        renderEditModal();
    }

    function confirmSensitiveEdit() {
        var field = getFieldMeta(editState.key);
        var newValue = document.getElementById('newValueInput').value.trim();
        if (!field || !newValue) {
            showToast('请填写新内容');
            return;
        }
        getCurrentData()[editState.key] = newValue;
        if (editState.key === 'cardNo' || editState.key === 'accountNo') {
            getCurrentData().bank = document.getElementById('bankInput').value;
            getCurrentData().branch = document.getElementById('branchInput').value;
        }
        closeEditModal();
        renderPage();
        showToast('修改成功');
    }

    function confirmMobileEdit() {
        var newValue = document.getElementById('newValueInput').value.trim();
        var oldCode = document.getElementById('oldCodeInput').value.trim();
        var newCode = document.getElementById('newCodeInput').value.trim();
        if (!newValue) {
            showToast('请填写新手机号');
            return;
        }
        if (!editState.smsSent.oldMobile || !editState.smsSent.newMobile) {
            showToast('请先获取原手机号和新手机号验证码');
            return;
        }
        if (oldCode !== '123456' || newCode !== '123456') {
            showToast('验证码错误');
            return;
        }
        getCurrentData().mobile = newValue;
        closeEditModal();
        renderPage();
        showToast('修改成功');
    }

    function toggleDemoAccountType() {
        isPublicDemo = !isPublicDemo;
        closeEditModal();
        renderPage();
    }

    function maskValue(key, value) {
        var clean = String(value || '');
        if (key === 'name' && clean.length > 1) return clean.slice(0, 1) + '*'.repeat(clean.length - 1);
        if (key === 'mobile' && clean.length === 11) return clean.slice(0, 3) + '****' + clean.slice(-4);
        if (key === 'idNo' && clean.length >= 10) return clean.slice(0, 6) + '********' + clean.slice(-4);
        if ((key === 'cardNo' || key === 'accountNo') && clean.length > 8) return clean.slice(0, 4) + ' **** **** ' + clean.slice(-4);
        return clean || '-';
    }

    function showToast(text) {
        var tip = document.getElementById('toastTip');
        tip.textContent = text;
        tip.classList.remove('hidden');
        tip.classList.remove('opacity-0');
        tip.style.transform = 'translate(-50%, 0)';
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(function() {
            tip.classList.add('opacity-0');
            setTimeout(function() {
                tip.classList.add('hidden');
            }, 200);
        }, 1800);
    }
</script>
</body>
</html>
