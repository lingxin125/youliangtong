<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>丰收云 - 开单权限</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;800&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="shared.js?v=20260425-team-permission-v4"></script>
    <style>
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .toast-msg {
            position: absolute;
            left: 50%;
            bottom: 110px;
            transform: translateX(-50%);
            padding: 10px 16px;
            background: rgba(17, 24, 39, 0.88);
            color: #fff;
            border-radius: 12px;
            font-size: 12px;
            z-index: 130;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease;
            white-space: nowrap;
        }
        .toast-msg.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .billing-sheet-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            z-index: 90;
            opacity: 0;
            visibility: hidden;
            transition: all 0.22s ease;
        }
        .billing-sheet-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        .billing-sheet {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 100;
            background: #fff;
            border-radius: 24px 24px 0 0;
            transform: translateY(100%);
            transition: transform 0.26s ease;
            box-shadow: 0 -12px 30px rgba(15, 23, 42, 0.18);
        }
        .billing-sheet.show {
            transform: translateY(0);
        }
        .billing-sheet-handle {
            width: 40px;
            height: 4px;
            background: #d1d5db;
            border-radius: 999px;
            margin: 12px auto;
        }
        .permission-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .channel-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 6px 22px rgba(15, 23, 42, 0.045);
        }
        .channel-logo {
            width: 40px;
            height: 40px;
            border-radius: 13px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
            font-weight: 800;
            flex-shrink: 0;
        }
        .channel-logo.wechat {
            background: #e8f8ef;
            color: #09b95a;
            border: 1px solid rgba(9, 185, 90, 0.16);
        }
        .channel-logo.psbcApp {
            background: #edf8f1;
            color: #1e9f55;
            border: 1px solid rgba(30, 159, 85, 0.14);
        }
        .channel-action-btn {
            min-width: 92px;
            height: 32px;
            padding: 0 12px;
            border-radius: 999px;
            border: 1px solid rgba(17, 166, 74, 0.2);
            background: #f2fbf6;
            color: #11a64a;
            font-size: 13px;
            font-weight: 700;
        }
        .channel-action-btn:active {
            transform: scale(0.97);
        }
        .channel-opened {
            min-width: 92px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #11a64a;
            font-size: 12px;
            font-weight: 700;
        }
        .permission-tip {
            padding: 12px 14px;
            border-radius: 16px;
            background: linear-gradient(180deg, #fff8f1 0%, #fff2e4 100%);
            border: 1px solid rgba(245, 158, 11, 0.14);
            color: #c46a16;
            box-shadow: 0 6px 18px rgba(245, 158, 11, 0.06);
        }
        .permission-tip-icon {
            width: 22px;
            height: 22px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(245, 158, 11, 0.12);
            color: #f59e0b;
            flex-shrink: 0;
        }
        .qr-preview {
            width: 220px;
            height: 220px;
            margin: 0 auto;
            padding: 14px;
            border-radius: 24px;
            background: linear-gradient(180deg, #fafcfd 0%, #ffffff 100%);
            border: 1px solid #edf1f5;
            box-shadow: 0 10px 26px rgba(15, 23, 42, 0.06);
            cursor: pointer;
        }
        .qr-preview img {
            width: 100%;
            height: 100%;
            border-radius: 16px;
            object-fit: cover;
            display: block;
        }
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }
        .qr-save-btn {
            width: 100%;
            height: 42px;
            margin-top: 14px;
            border-radius: 14px;
            border: 1px solid rgba(27, 182, 85, 0.18);
            background: #1bb655;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            box-shadow: 0 8px 20px rgba(27, 182, 85, 0.2);
        }
    </style>
</head>
<body>
<div class="mobile-container bg-[#F7F8FA] relative overflow-hidden">
    <div id="statusBar"></div>
    <div id="navBar"></div>

    <div class="flex-1 overflow-y-auto hide-scrollbar px-4 pt-3 pb-8">
        <div id="emptyState" class="hidden rounded-[20px] bg-white px-5 py-6 text-center text-[14px] text-gray-500 shadow-[0_8px_24px_rgba(15,23,42,0.04)]">
            未找到该业务员信息
        </div>

        <div id="permissionContent" class="space-y-4">
            <div id="permissionList" class="permission-list"></div>

            <div class="permission-tip flex gap-2.5">
                <span class="permission-tip-icon">
                    <i class="fas fa-circle-info text-[11px]"></i>
                </span>
                <div class="text-[11px] leading-5">
                    本页面用于开通业务员扫码开单权限。开通后，业务员可直接使用微信或邮储银行 App 扫描农户出示的二维码进行开单，全程无需登录丰收云，操作更快捷。
                </div>
            </div>

            <button
                type="button"
                onclick="refreshPermissionStatus()"
                class="w-full h-[46px] bg-[#1bb655] text-white text-[14px] font-bold rounded-[14px] shadow-[0_8px_18px_rgba(27,182,85,0.2)] active:scale-[0.97] transition-all"
            >
                刷新状态
            </button>
        </div>
    </div>

    <div id="qrOverlay" class="billing-sheet-overlay" onclick="closeQrSheet()"></div>
    <div id="qrSheet" class="billing-sheet">
        <div class="billing-sheet-handle"></div>
        <div class="px-5 pb-6 pb-safe">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <div id="qrSheetTitle" class="text-[16px] font-bold text-gray-800">扫码开通</div>
                    <div class="text-[12px] text-gray-400 mt-1">请由业务员本人扫码完成授权</div>
                </div>
                <button
                    type="button"
                    onclick="closeQrSheet()"
                    class="w-8 h-8 rounded-full bg-gray-50 text-gray-400 active:scale-95 transition-transform"
                >
                    <i class="fas fa-times text-sm"></i>
                </button>
            </div>

            <div class="qr-preview" onclick="openMockScanH5()">
                <img src="mock-qr.svg" alt="开通二维码">
            </div>

            <button type="button" onclick="saveQrCode()" class="qr-save-btn">
                <i class="fas fa-download mr-1.5"></i>保存二维码
            </button>

            <button
                type="button"
                onclick="closeQrSheet()"
                class="w-full h-11 mt-5 rounded-xl bg-white border border-gray-200 text-gray-700 text-[15px] font-bold shadow-[0_8px_20px_rgba(15,23,42,0.04)] active:scale-[0.98] transition-all"
            >
                取消
            </button>
        </div>
    </div>

    <div id="toastMsg" class="toast-msg"></div>
</div>

<script>
document.getElementById('statusBar').innerHTML = renderStatusBar();
document.getElementById('navBar').innerHTML = renderHeader('开单权限', 'buyer-team.html');

var store = window.TeamMockStore || null;
var BILLING_CHANNELS = [
    { key: 'wechat', label: '微信', icon: 'fab fa-weixin', glyph: '微', className: 'wechat' },
    { key: 'psbcApp', label: '邮储银行 App', icon: '', glyph: '邮', className: 'psbcApp' }
];
var currentMember = null;
var currentPermissions = { wechat: false, psbcApp: false };
var selectedChannelKey = 'wechat';

function getQuery(name) {
    var params = new URLSearchParams(window.location.search);
    return params.get(name) || '';
}

function getTeam() {
    return store ? store.getCurrentTeam() : null;
}

function getMemberById(userId) {
    var team = getTeam();
    var members = team && Array.isArray(team.members) ? team.members : [];
    for (var index = 0; index < members.length; index += 1) {
        if (members[index] && members[index].userId === userId) return members[index];
    }
    return null;
}

function getPermissions(member) {
    if (!member) return { wechat: false, psbcApp: false };
    if (store && typeof store.getBillingPermissions === 'function') {
        var team = getTeam();
        if (team && team.teamId) {
            return store.getBillingPermissions(team.teamId, member.userId);
        }
    }
    return member.billingPermissions || { wechat: false, psbcApp: false };
}

function showToast(msg) {
    var toast = document.getElementById('toastMsg');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(showToast.timer);
    showToast.timer = setTimeout(function () {
        toast.classList.remove('show');
    }, 1600);
}

function renderChannelIcon(channel) {
    var iconHtml = channel.icon
        ? '<i class="' + channel.icon + '"></i>'
        : '<span class="text-[15px] font-bold">' + channel.glyph + '</span>';
    return '<span class="channel-logo ' + channel.className + '">' + iconHtml + '</span>';
}

function renderList() {
    var list = document.getElementById('permissionList');
    list.innerHTML = BILLING_CHANNELS.map(function (channel) {
        var opened = !!currentPermissions[channel.key];
        return (
            '<div class="channel-card">' +
                renderChannelIcon(channel) +
                '<div class="flex-1 min-w-0">' +
                    '<div class="text-[15px] font-bold text-[#1F2937]">' + channel.label + '</div>' +
                '</div>' +
                (
                    opened
                        ? '<div class="channel-opened">已开通</div>'
                        : '<button type="button" class="channel-action-btn" onclick="openQrSheet(\'' + channel.key + '\')">扫码开通</button>'
                ) +
            '</div>'
        );
    }).join('');
}

function openQrSheet(channelKey) {
    selectedChannelKey = channelKey || 'wechat';
    document.getElementById('qrSheetTitle').textContent = '扫码开通';
    document.getElementById('qrOverlay').classList.add('show');
    document.getElementById('qrSheet').classList.add('show');
}

function closeQrSheet() {
    document.getElementById('qrOverlay').classList.remove('show');
    document.getElementById('qrSheet').classList.remove('show');
}

function openMockScanH5() {
    var memberId = getQuery('memberId');
    window.location.href = 'buyer-team-permission-h5.html?memberId=' + encodeURIComponent(memberId) + '&channel=' + encodeURIComponent(selectedChannelKey);
}

function saveQrCode() {
    var link = document.createElement('a');
    link.href = 'mock-qr.svg';
    link.download = '开单权限二维码.svg';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    showToast('二维码已开始保存');
}

function refreshPermissionStatus(showMsg) {
    currentMember = getMemberById(getQuery('memberId'));
    currentPermissions = getPermissions(currentMember);
    renderList();
    if (showMsg !== false) {
        showToast('状态已刷新');
    }
}

function render() {
    if (!store || !store.isOwnerOrManager || !store.isOwnerOrManager()) {
        window.location.href = 'buyer-team.html';
        return;
    }

    currentMember = getMemberById(getQuery('memberId'));
    if (!currentMember) {
        document.getElementById('emptyState').classList.remove('hidden');
        document.getElementById('permissionContent').classList.add('hidden');
        return;
    }

    refreshPermissionStatus(false);

    var openedChannel = getQuery('opened');
    if (openedChannel) {
        showToast('开通状态已更新');
    }
}

render();
</script>
</body>
</html>
