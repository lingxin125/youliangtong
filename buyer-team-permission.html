<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>丰收云 - 开单权限</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="shared.js?v=20260424-team-permission-v2"></script>
    <style>
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .sheet-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.42);
            z-index: 90;
            opacity: 0;
            visibility: hidden;
            transition: all .22s ease;
        }
        .sheet-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        .sheet-panel {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 100;
            background: #fff;
            border-radius: 24px 24px 0 0;
            transform: translateY(100%);
            transition: transform .26s ease;
            box-shadow: 0 -12px 30px rgba(15, 23, 42, .18);
        }
        .sheet-panel.show {
            transform: translateY(0);
        }
        .sheet-handle {
            width: 40px;
            height: 4px;
            background: #d1d5db;
            border-radius: 999px;
            margin: 12px auto;
        }
        .toast-msg {
            position: absolute;
            left: 50%;
            bottom: 108px;
            transform: translateX(-50%);
            padding: 10px 16px;
            background: rgba(17,24,39,.88);
            color: #fff;
            border-radius: 12px;
            font-size: 12px;
            z-index: 130;
            opacity: 0;
            pointer-events: none;
            transition: opacity .25s ease, transform .25s ease;
            white-space: nowrap;
        }
        .toast-msg.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .channel-icon {
            width: 40px;
            height: 40px;
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            border: 1px solid transparent;
            flex-shrink: 0;
        }
        .channel-icon.wechat {
            background: #eafbf1;
            color: #07c160;
            border-color: rgba(7,193,96,.14);
        }
        .channel-icon.alipay {
            background: #ecf5ff;
            color: #1677ff;
            border-color: rgba(22,119,255,.14);
        }
        .channel-icon.unionpay {
            background: #eef3ff;
            color: #3a63ff;
            border-color: rgba(58,99,255,.14);
        }
        .channel-icon.psbcApp {
            background: #eefaf3;
            color: #1e9f55;
            border-color: rgba(30,159,85,.14);
        }
        .channel-action-btn {
            min-width: 96px;
            height: 38px;
            padding: 0 16px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
            border: 1px solid rgba(17,166,74,.18);
            background: #f2fbf5;
            color: #11A64A;
            transition: all .18s ease;
        }
        .channel-action-btn:active {
            transform: scale(.96);
        }
        .channel-opened {
            min-width: 96px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #11A64A;
            font-size: 13px;
            font-weight: 700;
        }
        .qr-wrap {
            width: 232px;
            height: 232px;
            margin: 0 auto;
            padding: 16px;
            border-radius: 28px;
            background: linear-gradient(180deg, #f8fbfc 0%, #ffffff 100%);
            border: 1px solid #edf2f7;
            box-shadow: inset 0 1px 0 rgba(255,255,255,.84), 0 14px 32px rgba(15,23,42,.05);
            cursor: pointer;
        }
        .qr-wrap img {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            object-fit: cover;
            display: block;
        }
    </style>
</head>
<body>
<div class="mobile-container bg-[#F7F8FA] relative">
    <div id="statusBar"></div>
    <div id="navBar"></div>

    <div class="flex-1 overflow-y-auto hide-scrollbar px-4 pt-4 pb-6">
        <div class="space-y-3" id="permissionList"></div>
        <button
            type="button"
            onclick="refreshPermissionStatus()"
            class="w-full h-12 mt-5 bg-[#13b15a] text-white text-[15px] font-bold rounded-xl shadow-[0_6px_20px_rgba(19,177,90,0.25)] active:scale-[0.97] transition-all"
        >
            刷新状态
        </button>
    </div>

    <div class="sheet-overlay" id="qrOverlay" onclick="closeQrSheet()"></div>
    <div class="sheet-panel" id="qrSheet">
        <div class="sheet-handle"></div>
        <div class="px-5 pb-6">
            <div class="flex items-center justify-between mb-4">
                <button type="button" onclick="closeQrSheet()" class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 active:scale-95 transition-transform">
                    <i class="fas fa-chevron-left text-sm"></i>
                </button>
                <h3 class="text-[16px] font-bold text-gray-800">扫码开通</h3>
                <button type="button" onclick="closeQrSheet()" class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 active:scale-95 transition-transform">
                    <i class="fas fa-times text-sm"></i>
                </button>
            </div>

            <div class="qr-wrap" onclick="openMockScanH5()">
                <img src="mock-qr.svg" alt="开通二维码">
            </div>

            <div class="text-center text-[12px] text-gray-400 mt-4" id="qrHintText">点击二维码可模拟扫码进入授权页</div>

            <button type="button" onclick="openMockScanH5()" class="w-full h-12 mt-6 bg-[#F6F7F9] text-gray-500 font-bold text-[15px] rounded-xl border border-[#E5E7EB] active:scale-[0.98] transition-all">
                取消
            </button>
        </div>
    </div>

    <div id="toastMsg" class="toast-msg"></div>
</div>

<script>
document.getElementById('statusBar').innerHTML = renderStatusBar();
document.getElementById('navBar').innerHTML = renderHeader('开单权限', 'buyer-team.html');

var store = window.TeamMockStore || null;
var BILLING_CHANNELS = [
    { key: 'wechat', label: '微信', icon: 'fab fa-weixin', glyph: '微', className: 'wechat' },
    { key: 'alipay', label: '支付宝', icon: 'fab fa-alipay', glyph: '支', className: 'alipay' },
    { key: 'unionpay', label: '云闪付', icon: '', glyph: '云', className: 'unionpay' },
    { key: 'psbcApp', label: '邮储银行 App', icon: '', glyph: '邮', className: 'psbcApp' }
];
var currentMember = null;
var currentPermissions = null;
var selectedChannelKey = 'wechat';

function getQuery(name) {
    var params = new URLSearchParams(window.location.search);
    return params.get(name) || '';
}

function getTeam() {
    return store ? store.getCurrentTeam() : null;
}

function getMemberById(userId) {
    var team = getTeam();
    var members = team && Array.isArray(team.members) ? team.members : [];
    for (var index = 0; index < members.length; index += 1) {
        if (members[index] && members[index].userId === userId) return members[index];
    }
    return null;
}

function getPermissions(member) {
    if (!member) return { wechat: false, alipay: false, unionpay: false, psbcApp: false };
    if (store && typeof store.getBillingPermissions === 'function') {
        var team = getTeam();
        if (team && team.teamId) return store.getBillingPermissions(team.teamId, member.userId);
    }
    return member.billingPermissions || { wechat: false, alipay: false, unionpay: false, psbcApp: false };
}

function renderChannelIcon(channel) {
    var iconHtml = channel.icon
        ? '<i class="' + channel.icon + '"></i>'
        : '<span class="text-[15px] font-bold">' + channel.glyph + '</span>';
    return '<span class="channel-icon ' + channel.className + '">' + iconHtml + '</span>';
}

function showToast(msg) {
    var toast = document.getElementById('toastMsg');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(showToast.timer);
    showToast.timer = setTimeout(function () {
        toast.classList.remove('show');
    }, 1600);
}

function openQrSheet(channelKey) {
    selectedChannelKey = channelKey || 'wechat';
    var channel = BILLING_CHANNELS.find(function (item) { return item.key === selectedChannelKey; }) || BILLING_CHANNELS[0];
    document.getElementById('qrHintText').textContent = '请使用' + channel.label + '扫一扫完成授权开通';
    document.getElementById('qrOverlay').classList.add('show');
    document.getElementById('qrSheet').classList.add('show');
}

function closeQrSheet() {
    document.getElementById('qrOverlay').classList.remove('show');
    document.getElementById('qrSheet').classList.remove('show');
}

function openMockScanH5() {
    var memberId = getQuery('memberId');
    window.location.href = 'buyer-team-permission-h5.html?memberId=' + encodeURIComponent(memberId) + '&channel=' + encodeURIComponent(selectedChannelKey);
}

function renderList() {
    document.getElementById('permissionList').innerHTML = BILLING_CHANNELS.map(function (channel) {
        var enabled = !!currentPermissions[channel.key];
        return (
            '<div class="w-full glass-card rounded-[20px] p-4 flex items-center gap-3.5">' +
                renderChannelIcon(channel) +
                '<div class="flex-1 min-w-0">' +
                    '<span class="text-[16px] font-semibold text-gray-800">' + channel.label + '</span>' +
                '</div>' +
                (enabled
                    ? '<span class="channel-opened">已开通</span>'
                    : '<button type="button" class="channel-action-btn" onclick="openQrSheet(\'' + channel.key + '\')">扫码开通</button>'
                ) +
            '</div>'
        );
    }).join('');
}

function refreshPermissionStatus() {
    currentMember = getMemberById(getQuery('memberId'));
    currentPermissions = getPermissions(currentMember);
    renderList();
    showToast('状态已刷新');
}

function render() {
    if (!store || !store.isOwnerOrManager || !store.isOwnerOrManager()) {
        window.location.href = 'buyer-team.html';
        return;
    }

    currentMember = getMemberById(getQuery('memberId'));
    if (!currentMember) {
        document.getElementById('permissionList').innerHTML = '<div class="glass-card rounded-[20px] p-5 text-center text-[14px] text-gray-500">未找到该业务员信息</div>';
        return;
    }

    currentPermissions = getPermissions(currentMember);
    renderList();
}

render();
</script>
</body>
</html>
