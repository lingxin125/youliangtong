<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>丰收云 - 我的</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="shared.js?v=20260324"></script>
    <style>
        .logout-modal-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            z-index: 95;
            display: flex;
            align-items: flex-end;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.22s ease;
        }
        .logout-modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .logout-modal-sheet {
            width: 100%;
            background: #fff;
            border-radius: 22px 22px 0 0;
            padding: 16px 16px calc(18px + env(safe-area-inset-bottom));
            transform: translateY(18px);
            transition: transform 0.22s ease;
            box-shadow: 0 -12px 30px rgba(15, 23, 42, 0.2);
        }
        .logout-modal-overlay.show .logout-modal-sheet {
            transform: translateY(0);
        }
        .identity-chip {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            font-size: 11px;
            font-weight: 500;
            border-radius: 9999px;
            background: rgba(17, 166, 74, 0.08);
            color: #11A64A;
            border: 1px solid rgba(17, 166, 74, 0.15);
        }
    </style>
</head>
<body>
<div class="mobile-container">
    <!-- 状态栏 -->
    <div id="statusBar"></div>
    <!-- 导航栏 -->
    <div id="navBar"></div>

    <!-- 主内容区 -->
    <div class="flex-1 overflow-y-auto no-scrollbar px-4 pb-4 space-y-4" style="padding-bottom:80px;">

        <!-- 用户信息卡片 -->
        <a href="unified-profile.html" class="glass-panel rounded-2xl p-5 mt-3 block no-underline active:scale-[0.98] transition-transform" style="text-decoration:none;">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 rounded-full bg-gray-200 flex items-center justify-center border-2 border-white shadow-sm overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=200&h=200&fit=crop&crop=face" alt="头像" class="w-full h-full object-cover">
                </div>
                <div class="flex-1">
                    <div class="flex items-center gap-2 mb-1">
                        <span id="userName" class="text-base font-bold text-gray-800">王老板</span>
                    </div>
                    <!-- 身份标签 -->
                    <div id="identityTags" class="flex flex-wrap gap-1.5 mb-1"></div>
                    <div class="text-xs text-gray-400 flex items-center gap-1.5" style="font-family:Poppins;">
                        <span id="merchantNo">YLT202603001</span>
                        <i class="far fa-copy text-gray-400 text-[11px] cursor-pointer active:text-primary" onclick="return copyTopMerchantNo(event, 'merchantNo')" title="复制商户号"></i>
                    </div>
                </div>
                <i class="fas fa-chevron-right text-gray-300 text-sm"></i>
            </div>
        </a>

        <!-- 功能菜单 -->
        <div class="bg-white rounded-2xl overflow-hidden border border-black/[0.04]">
            <!-- 消息通知 -->
            <a href="unified-notifications.html?source=my" class="flex items-center justify-between px-4 py-3.5 no-underline" style="text-decoration:none;">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-orange-50 flex items-center justify-center">
                        <i class="fas fa-bell text-orange-500 text-sm"></i>
                    </div>
                    <span class="text-sm text-gray-700">消息通知</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-red-500"></div>
                    <i class="fas fa-chevron-right text-gray-300 text-xs"></i>
                </div>
            </a>
            <div class="h-px bg-gray-100 mx-4"></div>
            <!-- 需求管理 -->
            <a href="unified-demand-manage.html" class="flex items-center justify-between px-4 py-3.5 no-underline" style="text-decoration:none;">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-green-50 flex items-center justify-center">
                        <i class="fas fa-list-check text-green-600 text-sm"></i>
                    </div>
                    <span class="text-sm text-gray-700">需求管理</span>
                </div>
                <i class="fas fa-chevron-right text-gray-300 text-xs"></i>
            </a>
            <div class="h-px bg-gray-100 mx-4"></div>
            <!-- 交易记录 -->
            <a href="unified-orders.html" class="flex items-center justify-between px-4 py-3.5 no-underline" style="text-decoration:none;">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-blue-50 flex items-center justify-center">
                        <i class="fas fa-receipt text-blue-500 text-sm"></i>
                    </div>
                    <span class="text-sm text-gray-700">交易记录</span>
                </div>
                <i class="fas fa-chevron-right text-gray-300 text-xs"></i>
            </a>
            <div class="h-px bg-gray-100 mx-4"></div>
            <!-- 合作农户 -->
            <a href="unified-contacts.html" class="flex items-center justify-between px-4 py-3.5 no-underline" style="text-decoration:none;">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-teal-50 flex items-center justify-center">
                        <i class="fas fa-address-book text-teal-600 text-sm"></i>
                    </div>
                    <span class="text-sm text-gray-700">合作农户</span>
                </div>
                <i class="fas fa-chevron-right text-gray-300 text-xs"></i>
            </a>
            <div class="h-px bg-gray-100 mx-4"></div>
            <!-- 账户安全 -->
            <a href="account-security.html?source=unified-my.html" class="flex items-center justify-between px-4 py-3.5 no-underline" style="text-decoration:none;">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-slate-50 flex items-center justify-center">
                        <i class="fas fa-shield-halved text-slate-500 text-sm"></i>
                    </div>
                    <span class="text-sm text-gray-700">账户安全</span>
                </div>
                <i class="fas fa-chevron-right text-gray-300 text-xs"></i>
            </a>
            <div class="h-px bg-gray-100 mx-4"></div>
            <!-- 帮助与反馈 -->
            <a href="#" class="flex items-center justify-between px-4 py-3.5 no-underline" style="text-decoration:none;">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center">
                        <i class="fas fa-question-circle text-primary text-sm"></i>
                    </div>
                    <span class="text-sm text-gray-700">帮助与反馈（占位）</span>
                </div>
                <i class="fas fa-chevron-right text-gray-300 text-xs"></i>
            </a>
        </div>

        <!-- 服务通知设置 -->
        <div class="bg-white rounded-2xl p-4 border border-black/[0.04] shadow-[0_1px_3px_rgba(0,0,0,0.04)]">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-green-50 flex items-center justify-center">
                        <i class="fab fa-weixin text-green-500 text-sm"></i>
                    </div>
                    <div>
                        <div class="text-sm text-gray-700">微信服务通知（待定）</div>
                        <div class="text-[11px] text-gray-400">开启后接收订单、支付等通知</div>
                    </div>
                </div>
                <!-- 开关 -->
                <div class="relative inline-block w-11 h-6 cursor-pointer" onclick="toggleWechatNotify()">
                    <input type="checkbox" id="wechatNotifySwitch" class="peer sr-only">
                    <div class="w-11 h-6 bg-gray-200 rounded-full peer peer-checked:bg-primary transition-colors duration-300"></div>
                    <div class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full shadow transition-transform duration-300 peer-checked:translate-x-5"></div>
                </div>
            </div>
        </div>

        <!-- 退出登录 -->
        <div class="pt-4">
            <a href="#" onclick="return openLogoutModal(event)" class="block w-full py-3 rounded-2xl bg-white border border-black/[0.04] text-red-500 text-sm font-medium text-center no-underline" style="text-decoration:none;">
                退出登录
            </a>
            <div class="mt-2 text-center text-[11px] text-gray-400 tracking-wide select-none">版本号 v1.1.0</div>
        </div>
    </div>

    <!-- 退出登录确认弹窗 -->
    <div id="logoutModal" class="logout-modal-overlay" onclick="closeLogoutModal()">
        <div class="logout-modal-sheet" onclick="event.stopPropagation()">
            <div class="text-[16px] font-semibold text-gray-800 text-center mb-2">退出当前账号</div>
            <div class="text-[12px] text-gray-500 text-center mb-4">退出后需要重新登录才能继续使用</div>
            <div class="flex gap-2.5">
                <button class="flex-1 h-11 rounded-xl bg-white border border-gray-200 text-sm text-gray-600 active:scale-[0.98] transition-transform" onclick="closeLogoutModal()">取消</button>
                <button class="flex-1 h-11 rounded-xl bg-red-500 text-white text-sm font-medium active:scale-[0.98] transition-transform" onclick="confirmLogout()">退出登录</button>
            </div>
        </div>
    </div>

    <!-- 底部导航栏 -->
    <div id="tabBar"></div>
</div>

<script>
document.getElementById('statusBar').innerHTML = renderStatusBar();
document.getElementById('navBar').innerHTML = renderHeader('我的');
document.getElementById('tabBar').innerHTML = renderUnifiedTabBar('mine');

// 确保演示用户有登录 session（原型自动登录）
function ensureDemoSession() {
    var ids = window.UserIdentityStore;
    if (!ids) return;
    if (!ids.getCurrentUser()) {
        // 默认以王老板（13700005555）登录，roles: ["buyer","farmer"]
        ids.login("13700005555");
    }
}

// 从 UnifiedMockStore 读取用户信息并渲染
function initProfile() {
    ensureDemoSession();
    var store = window.UnifiedMockStore;
    if (!store) return;
    var profile = store.getUserProfile();

    // 用户名
    var nameEl = document.getElementById('userName');
    if (nameEl && profile.name) {
        nameEl.textContent = profile.name;
    }

    // 商户号
    var merchantEl = document.getElementById('merchantNo');
    if (merchantEl && profile.merchantId) {
        merchantEl.textContent = profile.merchantId;
    }

    // 身份标签 chips + 切换按钮
    var tagsEl = document.getElementById('identityTags');
    if (tagsEl) {
        var html = '';
        // 渲染身份标签
        if (profile.identityTags && profile.identityTags.length > 0) {
            html += profile.identityTags.map(function(tag) {
                return '<span class="identity-chip">' + tag + '</span>';
            }).join('');
        }
        // 多角色时渲染切换按钮
        var ids = window.UserIdentityStore;
        if (ids && ids.hasMultipleRoles()) {
            var otherRole = ids.getOtherRole();
            var otherLabel = ids.getRoleLabel(otherRole);
            html += '<button onclick="switchRole(event)" class="inline-flex items-center gap-1 px-2.5 py-0.5 text-[11px] text-gray-500 bg-gray-100 rounded-full border border-gray-200 active:bg-gray-200 transition-colors" style="font-weight:500;line-height:1.4;">'
                  + '切换为' + otherLabel
                  + ' <i class="fas fa-arrow-right-arrow-left text-[9px] text-gray-400"></i>'
                  + '</button>';
        }
        tagsEl.innerHTML = html;
    }
}

// 身份切换
function switchRole(event) {
    if (event) {
        event.preventDefault();
        event.stopPropagation();
    }
    var ids = window.UserIdentityStore;
    if (!ids) return;
    var otherRole = ids.getOtherRole();
    if (otherRole) {
        ids.setCurrentRole(otherRole);
        location.reload();
    }
}

// 微信服务通知开关
function toggleWechatNotify() {
    var checkbox = document.getElementById('wechatNotifySwitch');
    checkbox.checked = !checkbox.checked;

    try {
        localStorage.setItem('ylt_wechat_notify_enabled', checkbox.checked ? '1' : '0');
    } catch (e) {}

    showToast(checkbox.checked ? '已开启微信服务通知' : '已关闭微信服务通知');
}

// 初始化开关状态
function initWechatNotify() {
    var checkbox = document.getElementById('wechatNotifySwitch');
    try {
        var enabled = localStorage.getItem('ylt_wechat_notify_enabled');
        checkbox.checked = enabled === '1';
    } catch (e) {
        checkbox.checked = false;
    }
}

// Toast 提示
function showToast(msg) {
    var existing = document.querySelector('.toast-msg');
    if (existing) existing.remove();

    var div = document.createElement('div');
    div.className = 'toast-msg fixed left-1/2 -translate-x-1/2 bottom-24 px-4 py-2 bg-black/80 text-white text-xs rounded-lg z-[120]';
    div.textContent = msg;
    document.body.appendChild(div);

    setTimeout(function() {
        div.style.opacity = '0';
        div.style.transition = 'opacity 0.3s';
        setTimeout(function() { div.remove(); }, 300);
    }, 1500);
}

function copyTopMerchantNo(event, id) {
    if (event) {
        if (typeof event.preventDefault === 'function') event.preventDefault();
        if (typeof event.stopPropagation === 'function') event.stopPropagation();
        if (typeof event.stopImmediatePropagation === 'function') event.stopImmediatePropagation();
    }
    var merchantNo = (document.getElementById(id) || {}).textContent || '';
    if (!merchantNo) {
        showToast('未获取到商户号');
        return false;
    }
    if (navigator.clipboard) {
        navigator.clipboard.writeText(merchantNo).then(function() {
            showToast('商户号已复制');
        }).catch(function() {
            showToast('复制失败，请手动复制');
        });
    } else {
        var input = document.createElement('input');
        input.value = merchantNo;
        document.body.appendChild(input);
        input.select();
        try {
            document.execCommand('copy');
            showToast('商户号已复制');
        } catch (e) {
            showToast('复制失败，请手动复制');
        }
        document.body.removeChild(input);
    }
    return false;
}

function openLogoutModal(event) {
    if (event) {
        if (typeof event.preventDefault === 'function') event.preventDefault();
        if (typeof event.stopPropagation === 'function') event.stopPropagation();
    }
    var modal = document.getElementById('logoutModal');
    if (!modal) return false;
    modal.classList.add('show');
    return false;
}

function closeLogoutModal() {
    var modal = document.getElementById('logoutModal');
    if (!modal) return;
    modal.classList.remove('show');
}

function confirmLogout() {
    window.location.href = 'login.html';
}

// 页面加载时初始化
initProfile();
initWechatNotify();
</script>
</body>
</html>
