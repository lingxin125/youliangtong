<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>丰收云 - 欢迎</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="shared.js"></script>
    <style>
        .page-bg {
            background-color: #F7F8FA;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* 微信授权加载状态 */
        .wechat-loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }
        .wechat-loading-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .wechat-loading-overlay .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="mobile-container page-bg">
    <!-- 状态栏和顶部胶囊导航 -->
    <div id="statusBar"></div>
    <div class="h-11 flex items-center justify-center relative bg-transparent z-50 pointer-events-none">
        <h1 class="text-[17px] font-medium text-gray-900">丰收云</h1>
        <!-- 小程序胶囊 -->
        <div class="absolute right-3 top-1/2 -translate-y-1/2 flex items-center pointer-events-auto">
            <div class="flex items-center bg-white/60 border border-gray-200 rounded-full h-8 px-3 gap-2 shadow-sm backdrop-blur-md">
                <i class="fas fa-ellipsis text-gray-700 text-sm"></i>
                <div class="w-[1px] h-3.5 bg-gray-300"></div>
                <i class="fas fa-bullseye text-gray-700 text-sm"></i>
            </div>
        </div>
    </div>

    <div class="flex-1 flex flex-col items-center px-8 pb-16 justify-between">
        
        <!-- 上半部分：巨大 Logo 区域 -->
        <div class="flex flex-col items-center w-full mt-[10vh]">
            <img src="丰收云logo新.png" alt="丰收云" class="w-56 h-auto drop-shadow-sm mb-5" onerror="this.src='丰收云logo.png'" style="mix-blend-mode: multiply;" />
            <p class="text-[14px] text-gray-500 tracking-[4px] font-medium">农产品收购交易平台</p>
        </div>

        <div class="flex-1"></div> <!-- 占位符，将按钮往上推一点 -->

        <!-- 下半部分：双按钮 -->
        <div class="w-full flex flex-col gap-4 mb-32 px-2"> <!-- 进一步上移 -->
            <!-- 手机号快捷登录 (白底绿边) -->
            <button onclick="window.location.href='login.html'" 
                class="w-full h-[48px] rounded-[10px] font-medium text-[15px] text-[#11A64A] bg-white border border-[#11A64A] transition-all active:scale-[0.98] focus:outline-none">
                手机号快捷登录
            </button>
            
            <!-- 一键登录 (纯绿底) -->
            <button onclick="doWechatLogin()" 
                class="w-full h-[48px] rounded-[10px] font-medium text-[15px] text-white bg-[#11A64A] shadow-[0_4px_14px_rgba(17,166,74,0.3)] transition-all active:scale-[0.98] border border-transparent focus:outline-none">
                一键登录
            </button>
        </div>
    </div>

    <!-- 微信授权加载遮罩 -->
    <div id="wechatLoading" class="wechat-loading-overlay">
        <div class="spinner"></div>
        <div class="text-white text-sm">授权登录中...</div>
    </div>
</div>

<script>
    // 初始化状态栏
    document.getElementById('statusBar').innerHTML = renderStatusBar('light');

    function doWechatLogin() {
        const loader = document.getElementById('wechatLoading');
        loader.classList.add('show');
        
        setTimeout(() => {
            // 使用统一身份存储库登录（模拟农户身份）
            if (window.UserIdentityStore) {
                UserIdentityStore.login('13700005555'); 
            } else {
                localStorage.setItem('ylt_current_user', JSON.stringify({
                    mobile: '13700005555',
                    name: '王老板',
                    roles: ['buyer', 'farmer'],
                    currentRole: 'farmer'
                }));
            }
            
            window.location.href = 'farmer-home.html';
        }, 1200);
    }
</script>
</body>
</html>
