<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>丰收云 - 编辑模板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="shared.js"></script>
    <style>
        .page-bg { background:#F7F8FA; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
        .content { flex:1; overflow-y:auto; padding:14px 16px 96px; }
        .section-title { display:flex; align-items:center; gap:7px; margin:14px 0 9px; font-size:15px; font-weight:800; color:#111827; }
        .section-title::before { content:''; width:4px; height:15px; border-radius:999px; background:#11A64A; }
        .form-card { border-radius:16px; background:#fff; border:1px solid rgba(15,23,42,.05); overflow:hidden; box-shadow:0 4px 14px rgba(15,23,42,.025); }
        .form-block { padding:13px; border-bottom:1px solid #F1F5F9; }
        .form-block:last-child { border-bottom:0; }
        .field-label { color:#111827; font-size:14px; font-weight:750; line-height:1.25; }
        .field-help { margin-top:4px; color:#94A3B8; font-size:11.5px; line-height:1.35; }
        .row-input { width:100%; height:42px; margin-top:9px; border:1px solid #E5E7EB; border-radius:12px; padding:0 12px; font-size:13px; outline:none; background:#fff; color:#111827; }
        .row-input:focus { border-color:#11A64A; box-shadow:0 0 0 3px rgba(17,166,74,.08); }
        .row-select { width:100%; height:42px; margin-top:9px; border:1px solid #E5E7EB; border-radius:12px; padding:0 34px 0 12px; font-size:13px; outline:none; background:#fff; color:#111827; appearance:none; }
        .select-wrap { position:relative; }
        .select-wrap::after { content:'\f107'; font-family:'Font Awesome 6 Free'; font-weight:900; position:absolute; right:13px; bottom:12px; color:#94A3B8; font-size:12px; pointer-events:none; }
        .seg { display:flex; margin-top:10px; background:#F1F5F9; padding:3px; border-radius:12px; gap:3px; }
        .seg button { flex:1; min-height:34px; border-radius:9px; font-size:12px; font-weight:800; color:#64748B; white-space:nowrap; }
        .seg button.active { background:#fff; color:#11A64A; box-shadow:0 1px 4px rgba(15,23,42,.08); }
        .switch-row { min-height:58px; padding:10px 13px; display:flex; align-items:center; justify-content:space-between; gap:14px; border-bottom:1px solid #F1F5F9; }
        .switch-row:last-child { border-bottom:0; }
        .switch { width:44px; height:24px; flex:none; border-radius:999px; background:#CBD5E1; padding:2px; transition:.2s; }
        .switch::after { content:''; display:block; width:20px; height:20px; border-radius:999px; background:#fff; transition:.2s; box-shadow:0 1px 3px rgba(0,0,0,.18); }
        .switch.on { background:#11A64A; }
        .switch.on::after { transform:translateX(20px); }
        .bottom-bar { position:absolute; left:0; right:0; bottom:0; padding:10px 16px calc(12px + env(safe-area-inset-bottom)); background:rgba(247,248,250,.96); border-top:1px solid rgba(226,232,240,.9); backdrop-filter:blur(10px); }
        .bottom-actions { display:flex; gap:10px; }
        .btn { height:46px; border-radius:15px; display:flex; align-items:center; justify-content:center; gap:7px; font-size:15px; font-weight:800; white-space:nowrap; }
        .btn.soft { flex:1; background:#fff; color:#475569; border:1px solid #E5E7EB; }
        .btn.primary { flex:1.1; background:#11A64A; color:#fff; box-shadow:0 10px 20px rgba(17,166,74,.18); }
        .toast { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); z-index:600; padding:10px 18px; border-radius:14px; color:#fff; background:rgba(0,0,0,.76); font-size:13px; opacity:0; pointer-events:none; transition:.22s; white-space:nowrap; }
        .toast.show { opacity:1; }
    </style>
</head>
<body>
<div class="mobile-container">
    <div id="statusBar"></div>
    <div id="navBar"></div>

    <div class="page-bg">
        <main id="content" class="content no-scrollbar">
            <div class="section-title">基础配置</div>
            <section class="form-card">
                <div class="form-block">
                    <div class="field-label">模板名称</div>
                    <div class="field-help">模板标题，用于区分不同开单配置。</div>
                    <input id="sceneNameInput" class="row-input" maxlength="16" placeholder="例如：桃子快收">
                </div>
                <div class="form-block">
                    <div class="field-label">适用说明</div>
                    <div class="field-help">展示在配置列表中，备注此配置的适用场景或范围。</div>
                    <input id="sceneDescInput" class="row-input" maxlength="36" placeholder="例如：适合水果、蔬菜等收购">
                </div>
            </section>

            <div class="section-title">称重配置</div>
            <section id="weightConfigBlock" class="form-card">
                <div class="form-block">
                    <div class="field-label">称重模式</div>
                    <div class="field-help">设置开单时的过磅方式：毛重、皮重，或总重量。</div>
                    <div class="seg">
                        <button id="modeStandardBtn" onclick="setWeightFieldMode('standard')" type="button">毛重 / 皮重</button>
                        <button id="modeQuickBtn" onclick="setWeightFieldMode('quick')" type="button">总重量</button>
                    </div>
                </div>
                <div class="form-block">
                    <div class="field-label">默认单位</div>
                    <div class="field-help">设置开单时默认的重量单位</div>
                    <div class="select-wrap">
                        <select id="unitSelectInput" class="row-select" onchange="setUnitValue(this.value)">
                            <option value="斤">斤</option>
                            <option value="公斤">公斤</option>
                            <option value="吨">吨</option>
                            <option value="袋">袋</option>
                            <option value="箱">箱</option>
                            <option value="筐">筐</option>
                            <option value="件">件</option>
                        </select>
                    </div>
                </div>
                <div class="switch-row">
                    <div class="min-w-0">
                        <div class="field-label">扣杂</div>
                        <div class="field-help">设置是否启用扣杂</div>
                    </div>
                    <button id="deductionSwitch" class="switch" type="button" onclick="toggleField('deduction')"></button>
                </div>
                <div id="deductionConfigBlock" class="form-block">
                    <div class="field-label">扣杂方式</div>
                    <div class="field-help">选择开单时计算扣杂的方式。</div>
                    <div class="seg">
                        <button id="deductionRatioBtn" onclick="setDeductionMode('ratio')" type="button">扣减比例</button>
                        <button id="deductionDirectBtn" onclick="setDeductionMode('direct')" type="button">直接填杂重</button>
                    </div>
                </div>
            </section>

            <div class="section-title">计价配置</div>
            <section class="form-card">
                <div class="form-block">
                    <div class="field-label">计价方式</div>
                    <div class="field-help">设置开单时允许的计价方式</div>
                    <div class="seg">
                        <button id="scopeUnitBtn" onclick="setPricingScope('unit')" type="button">仅单价</button>
                        <button id="scopeFixedBtn" onclick="setPricingScope('fixed')" type="button">仅一口价</button>
                        <button id="scopeBothBtn" onclick="setPricingScope('both')" type="button">两者都支持</button>
                    </div>
                </div>
                <div id="defaultModeBlock" class="form-block">
                    <div class="field-label">默认计价方式</div>
                    <div class="field-help">设置开单时默认的计价方式。</div>
                    <div class="seg">
                        <button id="defaultUnitBtn" onclick="setDefaultPriceMode('unit')" type="button">单价</button>
                        <button id="defaultFixedBtn" onclick="setDefaultPriceMode('fixed')" type="button">一口价</button>
                    </div>
                </div>
            </section>

            <div class="section-title">其他配置</div>
            <section class="form-card">
                <div class="switch-row">
                    <div class="min-w-0">
                        <div class="field-label">拍照留存</div>
                        <div class="field-help">设置开单时是否启用拍照留存</div>
                    </div>
                    <button id="photoSwitch" class="switch" type="button" onclick="toggleField('photo')"></button>
                </div>
                <div class="switch-row">
                    <div class="min-w-0">
                        <div class="field-label">入库仓库</div>
                        <div class="field-help">设置开单时是否启用入库仓库</div>
                    </div>
                    <button id="warehouseSwitch" class="switch" type="button" onclick="toggleField('warehouse')"></button>
                </div>
            </section>
        </main>

        <div id="bottomBar" class="bottom-bar">
            <div class="bottom-actions">
                <button type="button" class="btn soft" onclick="cancelEdit()">取消</button>
                <button type="button" class="btn primary" onclick="saveDraftScene()">保存</button>
            </div>
        </div>
    </div>

    <div id="toastTip" class="toast"></div>
</div>

<script>
document.getElementById('statusBar').innerHTML = renderStatusBar();

var sceneId = new URLSearchParams(window.location.search).get('id');
var draftScene = null;
var editingIsNew = !sceneId;
document.getElementById('navBar').innerHTML = renderHeader(editingIsNew ? '新增模板' : '编辑模板', 'buyer-billing-config.html');

function showToast(msg) {
    var tip = document.getElementById('toastTip');
    tip.textContent = msg;
    tip.classList.add('show');
    clearTimeout(showToast.timer);
    showToast.timer = setTimeout(function () { tip.classList.remove('show'); }, 1500);
}

function canManageBillingConfig() {
    if (typeof TeamMockStore === 'undefined') return true;
    if (!TeamMockStore.getCurrentRole || !TeamMockStore.getRoleInfo) return true;
    var role = TeamMockStore.getCurrentRole();
    var info = TeamMockStore.getRoleInfo(role);
    return !!(info && info.canManage);
}

function getStore() {
    return window.BillingSceneConfigStore;
}

function escapeHtml(value) {
    return String(value || '').replace(/[&<>"']/g, function (ch) {
        return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[ch];
    });
}

function syncDraftFromInputs() {
    if (!draftScene) return;
    draftScene.name = document.getElementById('sceneNameInput').value.trim();
    draftScene.desc = document.getElementById('sceneDescInput').value.trim();
    draftScene.unit = document.getElementById('unitSelectInput').value || '斤';
    draftScene.defaultRatio = '';
    draftScene.defaultMisc = '';
    draftScene.fields.remark = true;
}

function setActive(id, active) {
    var el = document.getElementById(id);
    if (el) el.classList.toggle('active', !!active);
}

function setVisible(id, visible) {
    var el = document.getElementById(id);
    if (el) el.style.display = visible ? '' : 'none';
}

function renderForm() {
    if (!draftScene) return;
    var currentName = draftScene.name;
    draftScene = getStore().normalizeScene(draftScene);
    if (editingIsNew && !currentName) draftScene.name = '';
    document.getElementById('sceneNameInput').value = draftScene.name;
    document.getElementById('sceneDescInput').value = draftScene.desc;
    document.getElementById('unitSelectInput').value = draftScene.unit || '斤';
    ['modeStandardBtn','modeQuickBtn','scopeUnitBtn','scopeFixedBtn','scopeBothBtn','defaultUnitBtn','defaultFixedBtn','deductionRatioBtn','deductionDirectBtn'].forEach(function (id) {
        setActive(id, false);
    });
    setActive(draftScene.mode === 'quick' ? 'modeQuickBtn' : 'modeStandardBtn', true);
    setActive(draftScene.pricingScope === 'unit' ? 'scopeUnitBtn' : draftScene.pricingScope === 'fixed' ? 'scopeFixedBtn' : 'scopeBothBtn', true);
    setActive(draftScene.defaultPriceMode === 'fixed' ? 'defaultFixedBtn' : 'defaultUnitBtn', true);
    setActive(draftScene.deductionMode === 'direct' ? 'deductionDirectBtn' : 'deductionRatioBtn', true);

    setVisible('defaultModeBlock', draftScene.pricingScope === 'both');
    setVisible('deductionConfigBlock', draftScene.fields.deduction);

    ['deduction','photo','warehouse'].forEach(function (key) {
        var el = document.getElementById(key + 'Switch');
        if (el) el.classList.toggle('on', !!draftScene.fields[key]);
    });
}

function setWeightFieldMode(mode) {
    syncDraftFromInputs();
    draftScene.mode = mode;
    if (mode === 'quick') {
        draftScene.fields.tare = false;
        draftScene.fields.warehouse = false;
    } else {
        draftScene.fields.tare = true;
        draftScene.fields.deduction = true;
        draftScene.fields.warehouse = true;
    }
    renderForm();
}

function setUnitValue(unit) {
    syncDraftFromInputs();
    draftScene.unit = unit || '斤';
    renderForm();
}

function setPricingScope(scope) {
    syncDraftFromInputs();
    draftScene.pricingScope = scope;
    if (scope === 'unit') draftScene.defaultPriceMode = 'unit';
    if (scope === 'fixed') draftScene.defaultPriceMode = 'fixed';
    renderForm();
}

function setDefaultPriceMode(mode) {
    syncDraftFromInputs();
    draftScene.defaultPriceMode = mode;
    renderForm();
}

function setDeductionMode(mode) {
    syncDraftFromInputs();
    draftScene.deductionMode = mode;
    renderForm();
}

function toggleField(key) {
    syncDraftFromInputs();
    draftScene.fields[key] = !draftScene.fields[key];
    renderForm();
}

function cancelEdit() {
    window.location.href = 'buyer-billing-config.html';
}

function saveDraftScene() {
    syncDraftFromInputs();
    if (!draftScene.name) {
        showToast('请填写模板名称');
        return;
    }
    draftScene.builtIn = false;
    draftScene.fields.remark = true;
    getStore().upsertScene(draftScene, false);
    showToast('已保存');
    setTimeout(function () { window.location.href = 'buyer-billing-config.html'; }, 450);
}

function renderNoPermission() {
    document.getElementById('content').innerHTML = '<div class="form-card text-center mt-6 py-8"><div class="text-[16px] font-bold text-gray-900">暂无配置权限</div><div class="text-[12px] text-gray-400 mt-2">开单配置由超管统一维护。</div></div>';
    document.getElementById('bottomBar').style.display = 'none';
}

function initPage() {
    if (!canManageBillingConfig()) {
        renderNoPermission();
        return;
    }
    if (sceneId) {
        var state = getStore().read();
        var found = state.scenes.find(function (item) { return item.id === sceneId; });
        if (!found) {
            window.location.href = 'buyer-billing-config.html';
            return;
        }
        if (found.builtIn) {
            window.location.href = 'buyer-billing-config-detail.html?id=' + encodeURIComponent(found.id);
            return;
        }
        draftScene = getStore().normalizeScene(found);
    } else {
        draftScene = getStore().createBlankScene ? getStore().createBlankScene() : getStore().normalizeScene({ id:'scene-' + Date.now(), builtIn:false, name:'', desc:'' });
    }
    renderForm();
}

initPage();
</script>
</body>
</html>
