<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>丰收云 - 开通权限确认</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;800&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="shared.js?v=20260424-team-permission-v2"></script>
    <style>
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .channel-logo {
            width: 58px;
            height: 58px;
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 800;
            border: 1px solid transparent;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.06);
        }
        .channel-logo.wechat {
            background: linear-gradient(135deg, #18c964 0%, #07c160 100%);
            color: #fff;
        }
        .channel-logo.psbcApp {
            background: linear-gradient(135deg, #34c56f 0%, #1e9f55 100%);
            color: #fff;
        }
        .permission-link-mark {
            width: 34px;
            height: 34px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #b8bfca;
            background: rgba(255,255,255,0.82);
            box-shadow: 0 6px 14px rgba(15, 23, 42, 0.05);
        }
        .harvest-brand img {
            width: 74px;
            height: 74px;
            object-fit: contain;
            display: block;
        }
    </style>
</head>
<body>
<div class="mobile-container bg-[#F7F8FA] relative overflow-hidden">
    <div id="statusBar"></div>
    <div id="navBar"></div>

    <div class="flex-1 overflow-y-auto hide-scrollbar px-5 pt-6 pb-32">
        <div class="flex items-center justify-center gap-4 pt-5">
            <div id="channelLogo"></div>
            <div class="permission-link-mark">
                <i class="fas fa-shield-halved text-[14px]"></i>
            </div>
            <div class="harvest-brand">
                <img src="丰收云logo新.png" alt="丰收云 logo">
            </div>
        </div>

        <div class="mt-9 rounded-[24px] bg-white px-5 py-5 shadow-[0_10px_26px_rgba(15,23,42,0.045)] border border-white/70">
            <div class="text-[15px] leading-8 text-[#4B5565]" id="descLine1"></div>
            <div class="text-[15px] leading-8 text-[#4B5565] mt-1" id="descLine2"></div>
            <div class="text-[14px] leading-7 font-semibold text-[#F59E0B] mt-3" id="descHighlight"></div>
        </div>
    </div>

    <div class="absolute left-0 right-0 bottom-0 px-5 pb-6 pt-5 bg-gradient-to-t from-[#F7F8FA] via-[#F7F8FA] to-transparent">
        <div class="grid grid-cols-2 gap-3">
            <button type="button" onclick="goBack()" class="h-12 rounded-xl bg-white text-gray-700 text-[15px] font-bold shadow-[0_8px_20px_rgba(15,23,42,0.05)] border border-gray-100 active:scale-[0.98] transition-all">
                取消
            </button>
            <button type="button" onclick="confirmOpen()" class="h-12 rounded-xl bg-[#13b15a] text-white text-[15px] font-bold shadow-[0_6px_20px_rgba(19,177,90,0.25)] active:scale-[0.97] transition-all">
                确认开通
            </button>
        </div>
    </div>
</div>

<script>
document.getElementById('statusBar').innerHTML = renderStatusBar();
document.getElementById('navBar').innerHTML = renderHeader('开通权限', 'buyer-team-permission.html?memberId=' + encodeURIComponent(new URLSearchParams(window.location.search).get('memberId') || ''));

var store = window.TeamMockStore || null;
var BILLING_CHANNELS = {
    wechat: { key: 'wechat', label: '微信', icon: 'fab fa-weixin', glyph: '微', className: 'wechat' },
    psbcApp: { key: 'psbcApp', label: '邮储银行 App', icon: '', glyph: '邮', className: 'psbcApp' }
};

function getQuery(name) {
    var params = new URLSearchParams(window.location.search);
    return params.get(name) || '';
}

function getTeam() {
    return store ? store.getCurrentTeam() : null;
}

function getMemberById(userId) {
    var team = getTeam();
    var members = team && Array.isArray(team.members) ? team.members : [];
    for (var index = 0; index < members.length; index += 1) {
        if (members[index] && members[index].userId === userId) return members[index];
    }
    return null;
}

function renderChannelLogo(channel) {
    var iconHtml = channel.icon
        ? '<i class="' + channel.icon + '"></i>'
        : '<span class="text-[22px] font-black">' + channel.glyph + '</span>';
    return '<span class="channel-logo ' + channel.className + '">' + iconHtml + '</span>';
}

function goBack() {
    var memberId = getQuery('memberId');
    window.location.href = 'buyer-team-permission.html?memberId=' + encodeURIComponent(memberId);
}

function render() {
    if (!store || !store.isOwnerOrManager || !store.isOwnerOrManager()) {
        window.location.href = 'buyer-team.html';
        return;
    }

    var member = getMemberById(getQuery('memberId'));
    var channel = BILLING_CHANNELS[getQuery('channel')] || BILLING_CHANNELS.wechat;
    if (!member) return;

    document.getElementById('channelLogo').innerHTML = renderChannelLogo(channel);
    document.getElementById('descLine1').textContent = '您正在申请开通' + channel.label + '扫码开单权限。';
    document.getElementById('descLine2').textContent = '开通后，可直接使用' + channel.label + '扫描农户出示的二维码进行开单，无需登录丰收云，操作更快捷。';
    document.getElementById('descHighlight').textContent = '请确认是否由您本人操作，继续开通。';
}

function confirmOpen() {
    var team = getTeam();
    var memberId = getQuery('memberId');
    var channelKey = getQuery('channel');
    if (!team || !memberId || !channelKey) return;

    var success = store && typeof store.updateMemberBillingPermission === 'function'
        ? store.updateMemberBillingPermission(team.teamId, memberId, channelKey, true)
        : false;
    if (!success) return;

    window.location.href = 'buyer-team-permission.html?memberId=' + encodeURIComponent(memberId) + '&opened=' + encodeURIComponent(channelKey);
}

render();
</script>
</body>
</html>
