// Toast 提示
function showToast(msg) {
    var existing = document.querySelector('.toast-msg');
    if (existing) existing.remove();

    var div = document.createElement('div');
    div.className = 'toast-msg fixed left-1/2 -translate-x-1/2 bottom-24 px-4 py-2 bg-black/80 text-white text-xs rounded-lg z-[120]';
    div.textContent = msg;
    document.body.appendChild(div);

    setTimeout(function() {
        div.style.opacity = '0';
        div.style.transition = 'opacity 0.3s';
        setTimeout(function() { div.remove(); }, 300);
    }, 1500);
}

function copyTopMobile(event, id) {
    if (event) {
        if (typeof event.preventDefault === 'function') event.preventDefault();
        if (typeof event.stopPropagation === 'function') event.stopPropagation();
        if (typeof event.stopImmediatePropagation === 'function') event.stopImmediatePropagation();
    }
    var mobile = (document.getElementById(id) || {}).textContent || '';
    if (!mobile) {
        showToast('未获取到手机号');
        return false;
    }
    if (navigator.clipboard) {
        navigator.clipboard.writeText(mobile).then(function() {
            showToast('手机号已复制');
        }).catch(function() {
            showToast('复制失败，请手动复制');
        });
    } else {
        var input = document.createElement('input');
        input.value = mobile;
        document.body.appendChild(input);
        input.select();
        try {
            document.execCommand('copy');
            showToast('手机号已复制');
        } catch (e) {
            showToast('复制失败，请手动复制');
        }
        document.body.removeChild(input);
    }
    return false;
}

function drawMockQr(canvas, content) {
    var ctx = canvas.getContext('2d');
    var size = canvas.width;
    var modules = 29;
    var cell = Math.floor(size / modules);
    var offset = Math.floor((size - cell * modules) / 2);
    var reserved = [];
    var x;
    var y;

    for (y = 0; y < modules; y += 1) {
        reserved[y] = [];
        for (x = 0; x < modules; x += 1) {
            reserved[y][x] = false;
        }
    }

    function markFinder(startX, startY) {
        var ix;
        var iy;
        for (iy = -1; iy <= 7; iy += 1) {
            for (ix = -1; ix <= 7; ix += 1) {
                var rx = startX + ix;
                var ry = startY + iy;
                if (rx >= 0 && rx < modules && ry >= 0 && ry < modules) {
                    reserved[ry][rx] = true;
                }
            }
        }
        for (iy = 0; iy < 7; iy += 1) {
            for (ix = 0; ix < 7; ix += 1) {
                var px = startX + ix;
                var py = startY + iy;
                var isOuter = ix === 0 || ix === 6 || iy === 0 || iy === 6;
                var isInner = ix >= 2 && ix <= 4 && iy >= 2 && iy <= 4;
                var black = isOuter || isInner;
                ctx.fillStyle = black ? '#111827' : '#FFFFFF';
                ctx.fillRect(offset + px * cell, offset + py * cell, cell, cell);
            }
        }
    }

    function hashSeed(text) {
        var seed = 0;
        for (var i = 0; i < text.length; i += 1) {
            seed = (seed * 131 + text.charCodeAt(i)) % 2147483647;
        }
        return seed || 97;
    }

    var seed = hashSeed(content);
    function random() {
        seed = (seed * 48271) % 2147483647;
        return seed / 2147483647;
    }

    ctx.clearRect(0, 0, size, size);
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(0, 0, size, size);

    markFinder(0, 0);
    markFinder(modules - 7, 0);
    markFinder(0, modules - 7);

    for (x = 8; x < modules - 8; x += 1) {
        reserved[6][x] = true;
        reserved[x][6] = true;
        ctx.fillStyle = x % 2 === 0 ? '#111827' : '#FFFFFF';
        ctx.fillRect(offset + x * cell, offset + 6 * cell, cell, cell);
        ctx.fillRect(offset + 6 * cell, offset + x * cell, cell, cell);
    }

    for (y = 0; y < modules; y += 1) {
        for (x = 0; x < modules; x += 1) {
            if (reserved[y][x]) continue;
            if (random() > 0.5) {
                ctx.fillStyle = '#111827';
                ctx.fillRect(offset + x * cell, offset + y * cell, cell, cell);
            }
        }
    }
}

function getBuyerCurrentContext() {
    var currentRole = typeof UserIdentityStore !== 'undefined' ? (UserIdentityStore.getCurrentRole() || 'buyer') : 'buyer';
    var currentUser = typeof UserIdentityStore !== 'undefined' ? UserIdentityStore.getCurrentUser() : null;
    var teams = [];
    if (currentUser && Array.isArray(currentUser.teams)) {
        teams = currentUser.teams.slice();
    } else if (typeof TeamMockStore !== 'undefined' && TeamMockStore.getAllTeams) {
        teams = TeamMockStore.getAllTeams();
    }
    var currentTeamId = currentUser && currentUser.currentTeamId ? currentUser.currentTeamId : null;
    if (!currentTeamId && typeof TeamMockStore !== 'undefined' && TeamMockStore.getCurrentTeam) {
        var fallbackTeam = TeamMockStore.getCurrentTeam();
        currentTeamId = fallbackTeam ? fallbackTeam.teamId : null;
    }
    var currentTeam = null;
    for (var i = 0; i < teams.length; i++) {
        if (teams[i] && teams[i].teamId === currentTeamId) {
            currentTeam = teams[i];
            break;
        }
    }
    if (!currentTeam && teams.length) currentTeam = teams[0];
    return {
        currentRole: currentRole,
        currentUser: currentUser,
        teams: teams,
        currentTeam: currentTeam
    };
}

    var currentMobile = currentUser && currentUser.mobile ? currentUser.mobile : '';
    var users = UserIdentityStore.listDemoUsers();
    list.innerHTML = users.map(function(user) {
        var active = user.mobile === currentMobile;
        var roleText = (user.roles || []).map(function(role) {
            return role === 'buyer' ? '收购商' : '农户';
        }).join(' / ');
        return '<button type="button" class="account-option-card w-full p-4 text-left ' + (active ? 'active' : '') + '" onclick="switchDemoAccount(\'' + user.mobile + '\')">'
            + '<div class="flex items-start gap-3">'
            + '<div class="w-10 h-10 rounded-[12px] ' + (active ? 'bg-[#EBF7F0] border border-[#11A64A]/10' : 'bg-gray-50 border border-gray-100') + ' flex items-center justify-center shrink-0">'
            + '<i class="fas fa-user-circle ' + (active ? 'text-[#11A64A]' : 'text-gray-400') + ' text-[16px]"></i>'
            + '</div>'
            + '<div class="flex-1 min-w-0">'
            + '<div class="flex items-center gap-2 mb-1">'
            + '<span class="text-[15px] font-semibold text-gray-800 truncate">' + (user.name || '未命名账号') + '</span>'
            + (active ? '<span class="text-[10px] px-2 py-0.5 rounded-full bg-[#E5F5EC] text-[#11A64A] font-medium shrink-0">当前账号</span>' : '')
            + '</div>'
            + '<div class="text-[12px] text-gray-500 font-poppins mb-1">' + user.mobile + '</div>'
            + '<div class="text-[12px] text-gray-400">' + (roleText || '--') + '</div>'
            + '</div>'
            + '</div>'
            + '</button>';
    }).join('');
}

(function initSwitchRole() {
    var otherRole = _defaultSwitchRole;
    var label = getSwitchActionText(otherRole);
    var hasMultipleRoles = false;
    if (typeof UserIdentityStore !== 'undefined') {
        var user = UserIdentityStore.getCurrentUser();
        if (user) {
            hasMultipleRoles = !!(UserIdentityStore.hasMultipleRoles());
            if (hasMultipleRoles) {
                otherRole = UserIdentityStore.getOtherRole() || _defaultSwitchRole;
                label = UserIdentityStore.getRoleLabel(otherRole);
            }
        }
    }

    _switchTargetRole = otherRole;
    _switchTargetLabel = label;
    _switchTargetActionText = getSwitchActionText(otherRole);

    var chipWrap = document.getElementById('buyerSwitchRoleWrap');
    var chipLabel = document.getElementById('buyerSwitchRoleLabel');
    if (chipWrap) {
        if (hasMultipleRoles) {
            chipWrap.classList.remove('hidden');
        } else {
            chipWrap.classList.add('hidden');
        }
    }
    if (chipLabel) {
        chipLabel.textContent = '切换到' + _switchTargetActionText;
    }

    var modalDesc = document.getElementById('switchRoleModalDesc');
    if (modalDesc) modalDesc.textContent = '确认切换到' + _switchTargetActionText + '身份？切换后将进入' + _switchTargetActionText + '首页';
    renderBuyerProfileContext();
})();

function openSwitchRoleModal(event) {
    if (event) {
        if (typeof event.preventDefault === 'function') event.preventDefault();
        if (typeof event.stopPropagation === 'function') event.stopPropagation();
    }
    var modal = document.getElementById('switchRoleModal');
    if (!modal) return false;
    modal.classList.add('show');
    return false;
}

function closeSwitchRoleModal() {
    var modal = document.getElementById('switchRoleModal');
    if (!modal) return;
    modal.classList.remove('show');
}

function confirmSwitchRole() {
    if (!_switchTargetRole) return;
    if (typeof UserIdentityStore !== 'undefined') {
        UserIdentityStore.setCurrentRole(_switchTargetRole);
        window.location.href = UserIdentityStore.getHomeUrl(_switchTargetRole);
        return;
    }
    window.location.href = _switchTargetRole === 'buyer' ? 'buyer-home.html' : 'farmer-home.html';
}

function openTeamSwitcher() {
    var ctx = getBuyerCurrentContext();
    if (!ctx.teams || ctx.teams.length <= 1) return false;
    var modal = document.getElementById('teamSwitchModal');
    if (!modal) return false;
    renderTeamSwitchList();
    modal.classList.add('show');
    return false;
}

function closeTeamSwitcher() {
    var modal = document.getElementById('teamSwitchModal');
    if (!modal) return;
    modal.classList.remove('show');
}

function selectBuyerTeam(teamId) {
    if (!teamId || typeof TeamMockStore === 'undefined') return;
    TeamMockStore.switchTeam(teamId);
    if (typeof UserIdentityStore !== 'undefined' && UserIdentityStore.setCurrentTeamId) {
        UserIdentityStore.setCurrentTeamId(teamId);
    }
    renderBuyerProfileContext();
    renderTeamSwitchList();
    closeTeamSwitcher();
    showToast('已切换团队');
}

function openAccountSwitcher(event) {
    if (event) {
        if (typeof event.preventDefault === 'function') event.preventDefault();
        if (typeof event.stopPropagation === 'function') event.stopPropagation();
    }
    var modal = document.getElementById('accountSwitchModal');
    if (!modal) return false;
    renderAccountSwitchList();
    modal.classList.add('show');
    return false;
}

function closeAccountSwitcher() {
    var modal = document.getElementById('accountSwitchModal');
    if (!modal) return;
    modal.classList.remove('show');
}

function switchDemoAccount(mobile) {
    if (!mobile || typeof UserIdentityStore === 'undefined' || !UserIdentityStore.switchAccount) return;
    var result = UserIdentityStore.switchAccount(mobile, 'buyer');
    if (!result) {
        showToast('切换账号失败');
        return;
    }
    showToast('已切换账号');
    setTimeout(function() {
        window.location.href = result.homeUrl || 'buyer-home.html';
    }, 250);
}

// 版本切换
var currentAppVersion = 'standard';
var tempSelectedVersion = 'standard';

function openVersionSwitcher(e) {
    if (e) e.preventDefault();
    tempSelectedVersion = currentAppVersion;
    updateVersionOptionUI(tempSelectedVersion);
    document.getElementById('versionSwitchModal').classList.add('show');
    return false;
}

function closeVersionSwitcher() {
    document.getElementById('versionSwitchModal').classList.remove('show');
}

function selectVersionOption(version) {
    tempSelectedVersion = version;
    updateVersionOptionUI(version);
}

function updateVersionOptionUI(version) {
    var options = document.querySelectorAll('.version-option');
    options.forEach(function(opt) {
        var isTarget = opt.getAttribute('data-version') === version;
        var checkEl = opt.querySelector('.version-check');
        if (isTarget) {
            opt.classList.add('border-primary', 'bg-primary/5');
            opt.classList.remove('border-gray-100', 'bg-white');
            if (checkEl) {
                checkEl.classList.add('bg-primary');
                checkEl.classList.remove('border', 'border-gray-200');
                checkEl.innerHTML = '<i class="fas fa-check text-white text-[10px]"></i>';
            }
        } else {
            opt.classList.remove('border-primary', 'bg-primary/5');
            opt.classList.add('border-gray-100', 'bg-white');
            if (checkEl) {
                checkEl.classList.remove('bg-primary');
                checkEl.classList.add('border', 'border-gray-200');
                checkEl.innerHTML = '';
            }
        }
    });
}

function confirmSwitchVersion() {
    currentAppVersion = tempSelectedVersion;
    var hintEl = document.getElementById('currentVersionHint');
    if (hintEl) {
        hintEl.textContent = currentAppVersion === 'standard' ? '标准版' : '关怀版';
        if (currentAppVersion === 'elderly') {
            hintEl.classList.add('bg-orange-50', 'text-orange-500');
            hintEl.classList.remove('bg-primary/10', 'text-primary');
        } else {
            hintEl.classList.remove('bg-orange-50', 'text-orange-500');
            hintEl.classList.add('bg-primary/10', 'text-primary');
        }
    }
    
    showToast('已切换至' + (currentAppVersion === 'standard' ? '标准版' : '关怀版'));
    setTimeout(closeVersionSwitcher, 300);
}

if (captureState === 'modal') {
    setTimeout(function() {
        openInviteModal();
    }, 120);
}
</script>
</body>
</html>
