<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>丰收云 - 模板详情</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="shared.js"></script>
    <style>
        .page-bg { background:#F7F8FA; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
        .content { flex:1; overflow-y:auto; padding:14px 16px 116px; }
        .section-title { display:flex; align-items:center; gap:7px; margin:14px 0 9px; font-size:15px; font-weight:800; color:#111827; }
        .section-title::before { content:''; width:4px; height:15px; border-radius:999px; background:#11A64A; }
        .form-card { border-radius:16px; background:#fff; border:1px solid rgba(15,23,42,.05); overflow:hidden; box-shadow:0 4px 14px rgba(15,23,42,.025); }
        .form-block { padding:13px; border-bottom:1px solid #F1F5F9; }
        .form-block:last-child { border-bottom:0; }
        .field-label { color:#111827; font-size:14px; font-weight:750; line-height:1.25; }
        .field-help { margin-top:4px; color:#94A3B8; font-size:11.5px; line-height:1.35; }
        .readonly-value { min-height:42px; margin-top:9px; border:1px solid #E5E7EB; border-radius:12px; padding:10px 12px; display:flex; align-items:center; color:#111827; background:#FAFBFC; font-size:13px; font-weight:750; line-height:1.35; overflow-wrap:anywhere; }
        .seg { display:flex; margin-top:10px; background:#F1F5F9; padding:3px; border-radius:12px; gap:3px; }
        .seg span { flex:1; min-height:34px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; color:#64748B; white-space:nowrap; }
        .seg span.active { background:#fff; color:#11A64A; box-shadow:0 1px 4px rgba(15,23,42,.08); }
        .switch-row { min-height:58px; padding:10px 13px; display:flex; align-items:center; justify-content:space-between; gap:14px; border-bottom:1px solid #F1F5F9; }
        .switch-row:last-child { border-bottom:0; }
        .switch-view { width:44px; height:24px; flex:none; border-radius:999px; background:#CBD5E1; padding:2px; }
        .switch-view::after { content:''; display:block; width:20px; height:20px; border-radius:999px; background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.18); }
        .switch-view.on { background:#11A64A; }
        .switch-view.on::after { transform:translateX(20px); }
        .bottom-bar { position:absolute; left:0; right:0; bottom:0; padding:10px 16px calc(12px + env(safe-area-inset-bottom)); background:rgba(247,248,250,.96); border-top:1px solid rgba(226,232,240,.9); backdrop-filter:blur(10px); }
        .bottom-actions { display:flex; gap:10px; }
        .btn { height:46px; padding:0 14px; border-radius:15px; display:flex; align-items:center; justify-content:center; gap:7px; font-size:15px; font-weight:800; white-space:nowrap; }
        .btn.soft { flex:1; background:#fff; color:#475569; border:1px solid #E5E7EB; }
        .toast { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); z-index:600; padding:10px 18px; border-radius:14px; color:#fff; background:rgba(0,0,0,.76); font-size:13px; opacity:0; pointer-events:none; transition:.22s; white-space:nowrap; }
        .toast.show { opacity:1; }
    </style>
</head>
<body>
<div class="mobile-container">
    <div id="statusBar"></div>
    <div id="navBar"></div>

    <div class="page-bg">
        <main id="content" class="content no-scrollbar"></main>
        <div id="bottomBar" class="bottom-bar"></div>
    </div>

    <div id="toastTip" class="toast"></div>
</div>

<script>
document.getElementById('statusBar').innerHTML = renderStatusBar();
document.getElementById('navBar').innerHTML = renderHeader('模板详情', 'buyer-billing-config.html');

var sceneId = new URLSearchParams(window.location.search).get('id') || 'standard';
var scene = null;

function showToast(msg) {
    var tip = document.getElementById('toastTip');
    tip.textContent = msg;
    tip.classList.add('show');
    clearTimeout(showToast.timer);
    showToast.timer = setTimeout(function () { tip.classList.remove('show'); }, 1500);
}

function canManageBillingConfig() {
    if (typeof TeamMockStore === 'undefined') return true;
    if (!TeamMockStore.getCurrentRole || !TeamMockStore.getRoleInfo) return true;
    var role = TeamMockStore.getCurrentRole();
    var info = TeamMockStore.getRoleInfo(role);
    return !!(info && info.canManage);
}

function escapeHtml(value) {
    return String(value || '').replace(/[&<>"']/g, function (ch) {
        return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[ch];
    });
}

function getStore() {
    return window.BillingSceneConfigStore;
}

function getSceneDesc(item) {
    if (item.desc) return item.desc;
    return item.mode === 'quick' ? '适合水果、蔬菜等快速收购，只填总重量和价格。' : '适合粮食等需要毛重、皮重、净重的标准收购。';
}

function section(title, rows) {
    return '<div class="section-title">' + escapeHtml(title) + '</div><section class="form-card">' + rows.join('') + '</section>';
}

function valueBlock(title, help, value) {
    return '<div class="form-block">'
        + '<div class="field-label">' + escapeHtml(title) + '</div>'
        + '<div class="field-help">' + escapeHtml(help || '') + '</div>'
        + '<div class="readonly-value">' + escapeHtml(value || '不设置') + '</div>'
        + '</div>';
}

function segmentBlock(title, help, options) {
    return '<div class="form-block">'
        + '<div class="field-label">' + escapeHtml(title) + '</div>'
        + '<div class="field-help">' + escapeHtml(help || '') + '</div>'
        + '<div class="seg">' + options.map(function (item) {
            return '<span class="' + (item.active ? 'active' : '') + '">' + escapeHtml(item.label) + '</span>';
        }).join('') + '</div>'
        + '</div>';
}

function switchRow(title, help, enabled) {
    return '<div class="switch-row">'
        + '<div class="min-w-0"><div class="field-label">' + escapeHtml(title) + '</div><div class="field-help">' + escapeHtml(help || '') + '</div></div>'
        + '<div class="switch-view ' + (enabled ? 'on' : '') + '"></div>'
        + '</div>';
}

function renderContent(state) {
    var html = section('基础配置', [
        valueBlock('模板名称', '模板标题，用于区分不同开单配置。', scene.name || '未命名模板'),
        valueBlock('适用说明', '展示在配置列表中，备注此配置的适用场景或范围。', getSceneDesc(scene))
    ]);
    html += section('称重配置', [
        segmentBlock('称重模式', '设置开单时的过磅方式：毛重、皮重，或总重量。', [
            { label: '毛重 / 皮重', active: scene.mode !== 'quick' },
            { label: '总重量', active: scene.mode === 'quick' }
        ]),
        valueBlock('默认单位', '设置开单时默认的重量单位', scene.unit || '斤'),
        switchRow('扣杂', '设置是否启用扣杂', !!(scene.fields && scene.fields.deduction)),
        scene.fields && scene.fields.deduction ? segmentBlock('扣杂方式', '选择开单时计算扣杂的方式。', [
            { label: '扣减比例', active: scene.deductionMode !== 'direct' },
            { label: '直接填杂重', active: scene.deductionMode === 'direct' }
        ]) : ''
    ]);
    html += section('计价配置', [
        segmentBlock('计价方式', '设置开单时允许的计价方式', [
            { label: '仅单价', active: scene.pricingScope === 'unit' },
            { label: '仅一口价', active: scene.pricingScope === 'fixed' },
            { label: '两者都支持', active: scene.pricingScope === 'both' }
        ]),
        scene.pricingScope === 'both' ? segmentBlock('默认计价方式', '设置开单时默认的计价方式。', [
            { label: '单价', active: scene.defaultPriceMode !== 'fixed' },
            { label: '一口价', active: scene.defaultPriceMode === 'fixed' }
        ]) : ''
    ]);
    html += section('其他配置', [
        switchRow('拍照留存', '设置开单时是否启用拍照留存', !!(scene.fields && scene.fields.photo)),
        switchRow('入库仓库', '设置开单时是否启用入库仓库', !!(scene.fields && scene.fields.warehouse))
    ]);
    document.getElementById('content').innerHTML = html;
}

function goBackList() {
    window.location.href = 'buyer-billing-config.html';
}

function renderBottom(state) {
    document.getElementById('bottomBar').innerHTML = '<div class="bottom-actions"><button type="button" class="btn soft" onclick="goBackList()">返回</button></div>';
    document.getElementById('bottomBar').style.display = 'block';
}

function renderPage() {
    if (!canManageBillingConfig()) {
        document.getElementById('content').innerHTML = '<div class="form-card text-center mt-6 py-8"><div class="text-[16px] font-bold text-gray-900">暂无配置权限</div><div class="text-[12px] text-gray-400 mt-2">开单配置由超管统一维护。</div></div>';
        document.getElementById('bottomBar').style.display = 'none';
        return;
    }
    var state = getStore().read();
    var found = state.scenes.find(function (item) { return item.id === sceneId; });
    if (!found) {
        window.location.href = 'buyer-billing-config.html';
        return;
    }
    scene = getStore().normalizeScene(found);
    renderContent(state);
    renderBottom(state);
}

renderPage();
</script>
</body>
</html>
