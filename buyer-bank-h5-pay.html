<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>手机银行支付</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="shared.js"></script>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #f7f8fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .cashier-header-bg {
            position: absolute;
            top: 48px;
            left: 0;
            right: 0;
            height: 160px;
            background: linear-gradient(135deg, #13b15a 0%, #0d964a 100%);
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
            z-index: 0;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
        }

        /* Information Rows */
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 10px 0;
            border-bottom: 1px dashed #f1f5f9;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            font-size: 14px;
            color: #64748b;
            flex-shrink: 0;
            width: 80px;
        }

        .info-value {
            font-size: 14px;
            color: #1e293b;
            font-weight: 500;
            text-align: right;
            line-height: 1.5;
            word-break: break-all;
        }

        .pay-method-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .pay-method-card {
            position: relative;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            background: #fff;
            transition: all 0.18s ease;
            width: 100%;
        }

        .pay-method-card.selected {
            border-color: #13b15a;
            background: #f2fbf6;
            box-shadow: 0 6px 18px rgba(19, 177, 90, 0.08);
        }

        .pay-method-card.disabled {
            opacity: 0.55;
            background: #f8fafc;
        }

        .pay-method-radio {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 1.5px solid #cbd5e1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 2px;
            background: #fff;
        }

        .pay-method-radio {
            order: 2;
            margin-top: 0;
            align-self: center;
        }

        .pay-method-radio::after {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #13b15a;
            opacity: 0;
            transition: opacity 0.18s ease;
        }

        .pay-method-card.selected .pay-method-radio {
            border-color: #13b15a;
        }

        .pay-method-card.selected .pay-method-radio::after {
            opacity: 1;
        }

        .pay-method-main {
            min-width: 0;
            flex: 1;
        }

        .pay-method-title-row {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .pay-method-account-icon {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: #13b15a;
            background: #ecfdf3;
        }

        .pay-method-account-icon.wallet {
            background: #eef2ff;
            color: #5b5bd6;
        }

        .pay-method-account-icon.cash {
            background: #fff8eb;
            padding: 4px;
        }

        .pay-method-account-icon i {
            font-size: 14px;
        }

        .pay-method-account-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }

        .pay-method-account-icon.cash img {
            object-fit: contain;
            border-radius: 0;
        }

        .pay-method-title-wrap {
            min-width: 0;
            flex: 1;
        }

        .pay-method-title {
            font-size: 13px;
            font-weight: 700;
            color: #111827;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .pay-method-badge {
            display: inline-flex;
            align-items: center;
            margin-left: 6px;
            padding: 1px 5px;
            border-radius: 999px;
            background: #F0F5FF;
            color: #108EE9;
            font-size: 10px;
            font-weight: 700;
            vertical-align: middle;
        }

        .pay-method-tag {
            display: inline-flex;
            align-items: center;
            margin-left: 6px;
            padding: 2px 6px;
            border-radius: 999px;
            background: #dcfce7;
            color: #16a34a;
            font-size: 10px;
            font-weight: 700;
            vertical-align: middle;
        }

        .pay-method-sub {
            margin-top: 0;
            font-size: 12px;
            color: #64748b;
            line-height: 1.35;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .pay-method-owner {
            display: none;
        }

        .pay-method-more-dot {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            margin-top: 8px;
            margin-left: auto;
            padding: 2px 2px 0;
            font-size: 12px;
            color: #13b15a;
            font-weight: 700;
            line-height: 1;
            width: fit-content;
            align-self: flex-end;
        }

        .payment-current-line {
            margin-top: 8px;
            font-size: 12px;
            color: #64748b;
            line-height: 1.35;
        }

        .payment-current-line span {
            color: #111827;
            font-weight: 700;
        }

        .pay-method-account {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #d8eadf;
            font-size: 12px;
            color: #374151;
            line-height: 1.35;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .pay-method-tag {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 2px 6px;
            background: #dcfce7;
            color: #16a34a;
            font-size: 10px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .pay-method-action {
            border: none;
            background: transparent;
            color: #13b15a;
            font-size: 12px;
            font-weight: 700;
            padding: 6px 0 6px 8px;
            flex-shrink: 0;
            white-space: nowrap;
            line-height: 1;
        }

        .pay-method-action:disabled {
            color: #94a3b8;
        }

        .more-account-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 0;
            height: 0;
            padding: 0;
            margin: 0;
            border: none;
            background: transparent;
            color: transparent;
            overflow: visible;
        }

        .sheet-mask {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            z-index: 80;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .sheet-mask.show {
            opacity: 1;
            pointer-events: auto;
        }

        .account-sheet {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 90;
            background: #fff;
            border-top-left-radius: 22px;
            border-top-right-radius: 22px;
            padding: 16px 16px 28px;
            transform: translateY(110%);
            transition: transform 0.24s ease;
            box-shadow: 0 -16px 40px rgba(15, 23, 42, 0.16);
        }

        .account-sheet.show {
            transform: translateY(0);
        }

        #accountOptionList {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 14px;
            align-items: center;
        }

        .account-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 16px 14px;
            border: 1px solid #e9eef5;
            border-radius: 14px;
            background: #fff;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.03);
            width: 100%;
            max-width: 100%;
        }

        .account-option-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: #ecfdf3;
            color: #13b15a;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .account-option-icon i {
            font-size: 14px;
        }

        .account-option-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }

        .account-option-icon.wallet {
            background: #eef2ff;
            color: #5b5bd6;
        }

        .cash-confirm-mask {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            z-index: 95;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .cash-confirm-mask.show {
            display: flex;
        }

        .cash-confirm-card {
            width: 100%;
            max-width: 312px;
            background: #fff;
            border-radius: 18px;
            padding: 22px 18px 18px;
            text-align: center;
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.18);
        }

        .cash-confirm-icon,
        .cash-success-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 14px;
            border-radius: 20px;
            background: #fff8eb;
            padding: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cash-confirm-icon img,
        .cash-success-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .cash-success-page {
            position: fixed;
            top: 0;
            bottom: 0;
            left: 50%;
            z-index: 120;
            background: #F7F8FA;
            display: none;
            flex-direction: column;
            width: 100%;
            max-width: 430px;
            transform: translateX(-50%);
        }

        .cash-success-page.show {
            display: flex;
        }

        .cash-success-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 28px 72px;
            text-align: center;
        }

        .account-option-title {
            font-size: 14px;
            font-weight: 700;
            color: #111827;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .account-option-sub {
            margin-top: 3px;
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .account-option.selected {
            border-color: #13b15a;
            background: #f2fbf6;
            box-shadow: 0 6px 16px rgba(19, 177, 90, 0.08);
        }

        .account-option-radio {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 1.5px solid #cbd5e1;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .account-option-radio::after {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #13b15a;
            opacity: 0;
        }

        .account-option.selected .account-option-radio {
            border-color: #13b15a;
        }

        .account-option.selected .account-option-radio::after {
            opacity: 1;
        }

        /* Loading Spinner */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 20px;
            height: 20px;
            -webkit-animation: spin 1s linear infinite;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Toast */
        .toast-tip {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
            white-space: nowrap;
        }

        .toast-tip.show {
            opacity: 1;
        }
    </style>
</head>

<body>

    <div class="mobile-container relative flex flex-col overflow-hidden" id="appContainer">
        <!-- 原生黑色状态栏 -->
        <div id="statusBar" class="relative z-20"></div>

        <!-- 模拟银行的沉浸式高级蓝/绿色背景 -->
        <div class="cashier-header-bg"></div>

        <!-- 导航栏 -->
        <div id="navBar" class="relative z-20">
            <div class="flex items-center justify-between px-4 mt-2 h-[44px] text-white">
                <div class="w-10 h-10 flex items-center justify-start text-white cursor-pointer"
                    onclick="history.back()">
                    <i class="fas fa-chevron-left text-lg"></i>
                </div>
                <div class="text-[17px] font-semibold absolute left-0 right-0 text-center pointer-events-none">确认付款
                </div>
                <div class="w-10"></div>
            </div>
        </div>

        <!-- 核心滚动内容区 -->
        <div class="flex-1 overflow-y-auto no-scrollbar relative z-10 px-4 pt-4 pb-32">

            <!-- 卡片1：交易金额核心区 -->
            <div
                class="glass-panel rounded-2xl p-6 mb-4 flex flex-col items-center justify-center text-center relative overflow-hidden">
                <div
                    class="absolute top-0 right-0 w-32 h-32 bg-[#13b15a]/10 rounded-full blur-3xl -mr-10 -mt-10 opacity-60">
                </div>

                <!-- <div class="w-12 h-12 bg-[#13b15a]/10 text-[#13b15a] rounded-full flex items-center justify-center mb-3 shadow-[0_4px_12px_rgba(19,177,90,0.15)] z-10">
                <i class="fas fa-building-columns text-[20px]"></i>
            </div> -->

                <div class="text-[16px] text-[#111827] font-medium mb-3 z-10">应付金额</div>

                <div class="inline-flex items-baseline justify-center gap-[2px] text-[34px] font-bold text-[#111827] tracking-tight leading-none z-10"
                    style="font-family:Poppins;">
                    <span class="text-[18px] font-bold leading-none">¥</span>
                    <span id="mainAmount">0.00</span>
                </div>
            </div>

            <!-- 卡片2：详细信息校验 -->
            <div class="glass-panel rounded-2xl p-4 mb-4">

                <!-- 订单信息 -->
                <div class="flex items-center gap-2 mb-3 text-[14px] font-bold text-gray-800">
                    <div class="w-1 h-3.5 bg-[#13b15a] rounded-full"></div>
                    <span>订单信息</span>
                </div>
                <div class="info-row">
                    <span class="info-label">收粮订单号</span>
                    <span id="infoGrainOrderNo" class="info-value font-mono"></span>
                </div>
                <div class="info-row">
                    <span class="info-label">下单时间</span>
                    <span id="infoCreatedAt" class="info-value"></span>
                </div>

                <!-- 收款方信息 -->
                <div class="flex items-center gap-2 mb-3 mt-4 text-[14px] font-bold text-gray-800">
                    <div class="w-1 h-3.5 bg-[#13b15a] rounded-full"></div>
                    <span>收款方信息</span>
                </div>
                <div class="info-row">
                    <span class="info-label">收款方</span>
                    <span id="payeeNameText" class="info-value"></span>
                </div>
                <div class="info-row">
                    <span class="info-label">收款银行</span>
                    <span id="payeeBankNameText" class="info-value"></span>
                </div>
                <div class="info-row">
                    <span class="info-label">收款卡号</span>
                    <span id="payeeCardNoText" class="info-value"></span>
                </div>

                <!-- 付款方式 -->
                <div class="flex items-center gap-2 mb-3 mt-4 text-[14px] font-bold text-gray-800">
                    <div class="w-1 h-3.5 bg-[#13b15a] rounded-full"></div>
                    <span>付款账户</span>
                </div>
                <div id="payMethodList" class="pay-method-list"></div>

            </div>

        </div>

        <!-- 底部固定操作区 -->
        <div class="absolute bottom-0 left-0 right-0 p-5 bg-white border-t border-gray-100 pb-8 z-50">
            <button id="payBtn"
                class="w-full h-12 bg-[#13b15a] active:bg-[#0d964a] text-white font-bold text-[16px] rounded-xl shadow-[0_8px_20px_rgba(19,177,90,0.3)] transition-all flex items-center justify-center gap-2"
                onclick="processPayment()">
                确认付款
            </button>
        </div>

        <div id="sheetMask" class="sheet-mask" onclick="closeAccountSheet()"></div>
        <div id="accountSheet" class="account-sheet">
            <div class="flex items-center justify-between mb-2">
                <div>
                    <div id="accountSheetTitle" class="text-[16px] font-bold text-gray-900">选择付款账户</div>
                    <!-- <div class="text-[12px] text-gray-400 mt-1">本次支付使用选中的账户</div> -->
                </div>
                <button class="w-9 h-9 rounded-full bg-gray-100 text-gray-500" onclick="closeAccountSheet()">
                    <i class="fas fa-xmark"></i>
                </button>
            </div>
            <div id="accountOptionList"></div>
        </div>

        <div id="cashConfirmMask" class="cash-confirm-mask">
            <div class="cash-confirm-card">
                <div class="cash-confirm-icon"><img src="./现金支付.png" alt=""></div>
                <div class="text-[17px] font-bold text-gray-900 mb-2">确认现金支付</div>
                <div class="text-[13px] text-gray-500 leading-relaxed mb-5">请确认是否已完成线下现金交易</div>
                <div class="grid grid-cols-2 gap-3">
                    <button type="button" class="h-11 rounded-xl bg-gray-100 text-gray-600 font-bold text-[14px]" onclick="closeCashConfirm()">取消</button>
                    <button type="button" class="h-11 rounded-xl bg-[#13b15a] text-white font-bold text-[14px]" onclick="confirmCashPayment()">确认</button>
                </div>
            </div>
        </div>

        <div id="toastTip" class="toast-tip"></div>
    </div>

    <div id="cashSuccessPage" class="cash-success-page">
        <div id="statusBarSuccess" class="relative z-20"></div>
        <div class="flex items-center justify-between px-4 mt-2 h-[44px] text-gray-800">
            <div class="w-10 h-10 flex items-center justify-start cursor-pointer" onclick="goCashSuccessBack()">
                <i class="fas fa-chevron-left text-lg"></i>
            </div>
            <div class="text-[17px] font-semibold absolute left-0 right-0 text-center pointer-events-none">支付结果</div>
            <div class="w-10"></div>
        </div>
        <div class="cash-success-content">
            <div class="w-16 h-16 rounded-full bg-green-50 flex items-center justify-center mb-4">
                <i class="fas fa-check-circle text-[#13b15a] text-[32px]"></i>
            </div>
            <div class="text-[20px] font-bold text-gray-900 mb-2">支付成功</div>
            <div class="text-[14px] text-gray-500 leading-relaxed max-w-[260px]">现金已完成支付，请务必确认已完成线下交易。</div>
        </div>
    </div>

    <script>
        // 解析参数
        const params = new URLSearchParams(window.location.search);
        const fallbackNow = new Date();
        const mockStore = window.BuyerMockStore || null;
        const payerProfile = (typeof mockStore !== 'undefined' && mockStore && typeof mockStore.getPayer === 'function')
            ? mockStore.getPayer()
            : { name: '张老板', org: '保定收购站' };

        const state = {
            grainOrderNo: params.get('grainOrderNo') || params.get('orderNo') || 'SL' + fallbackNow.toISOString().replace(/[-:TZ.]/g, '').slice(0, 14),
            paymentOrderNo: params.get('paymentOrderNo') || params.get('payOrderNo') || '',
            amount: parseFloat(params.get('amount')) || 38500.00,
            payeeCompany: params.get('payeeCompany') || params.get('payeeOrg') || '个体农户',
            payeeName: params.get('payeeName') || '李大姐',
            payeeBank: params.get('payeeBank') || '中国邮政储蓄银行',
            payeeCard: params.get('payeeCard') || '尾号 8888',
            payerName: params.get('payerName') || payerProfile.name || '张老板',
            payerCompany: params.get('payerCompany') || params.get('companyName') || params.get('payerOrg') || payerProfile.org || '保定收购站有限公司',
            payerBank: params.get('payerBank') || '中国农业银行',
            payerCard: params.get('payerCard') || '尾号 5678',
            createdAt: params.get('createdAt') || fallbackNow.toISOString(),
        };
        state.paymentOrderNo = state.paymentOrderNo || buildPaymentOrderNo(state.grainOrderNo);

        const ACCOUNT_STORAGE_KEY = 'ylt_buyer_payment_accounts';
        const CASH_PAYMENT_ID = 'cash-payment';
        const DEFAULT_ACCOUNTS = [
            { id: 'buyer-1', type: 'public', bank: '中国邮政储蓄银行', branch: '烟台市芝罘区支行', cardNo: '6221888800002233', holder: '张三的粮站', accountName: '张三的粮站', isDefault: true },
            { id: 'buyer-private-2', type: 'self_private', bank: '中国邮政储蓄银行', branch: '烟台市福山区支行', cardNo: '6221888866664321', holder: '张三', mobile: '13700005555', idNo: '370602198608126219', isDefault: false },
            { id: 'buyer-private-4', type: 'self_private', bank: '中国邮政储蓄银行', branch: '烟台市莱山区支行', cardNo: '6221888899991122', holder: '张三', mobile: '13700005555', idNo: '370602198608126219', isDefault: false },
            { id: 'buyer-wallet-1', type: 'ecny_wallet', bank: '中国邮政储蓄银行', walletId: '008188889012', walletLevel: 'III类钱包', holder: '张三', mobile: '13700005555', idNo: '370602198608126219', isDefault: false }
        ];
        let paymentAccounts = loadPaymentAccounts();
        let selectedAccountId = '';

        // 渲染基础 UI
        document.getElementById('statusBar').innerHTML = renderStatusBar();
        document.getElementById('statusBarSuccess').innerHTML = renderStatusBar();

        function formatMoney(amount) {
            return amount.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function formatTime(isoString) {
            if (!isoString) return '';
            const d = new Date(isoString);
            return d.getFullYear() + '-' +
                String(d.getMonth() + 1).padStart(2, '0') + '-' +
                String(d.getDate()).padStart(2, '0') + ' ' +
                String(d.getHours()).padStart(2, '0') + ':' +
                String(d.getMinutes()).padStart(2, '0');
        }

        function deterministicDigits(seed, length) {
            const source = String(seed || '000000000000');
            let hash = 0;
            let output = '';
            for (let i = 0; i < source.length; i += 1) {
                hash = (hash * 131 + source.charCodeAt(i)) % 1000000007;
            }
            for (let i = 0; i < length; i += 1) {
                hash = (hash * 1103515245 + 12345 + i) % 2147483647;
                output += String(hash % 10);
            }
            return output;
        }

        function buildPaymentOrderNo(grainOrderNo) {
            return 'ZF' + deterministicDigits('PAY-' + (grainOrderNo || ''), 18);
        }

        function loadPaymentAccounts() {
            try {
                const raw = localStorage.getItem(ACCOUNT_STORAGE_KEY);
                if (!raw) {
                    const supportedDefaults = DEFAULT_ACCOUNTS.filter(isSupportedPaymentAccount);
                    localStorage.setItem(ACCOUNT_STORAGE_KEY, JSON.stringify(supportedDefaults));
                    return supportedDefaults.slice();
                }
                const parsed = JSON.parse(raw);
                if (!Array.isArray(parsed) || !parsed.length) return DEFAULT_ACCOUNTS.filter(isSupportedPaymentAccount);
                const merged = mergeDemoAccounts(parsed).filter(isSupportedPaymentAccount);
                localStorage.setItem(ACCOUNT_STORAGE_KEY, JSON.stringify(merged));
                return merged;
            } catch (err) {
                return DEFAULT_ACCOUNTS.filter(isSupportedPaymentAccount);
            }
        }

        function mergeDemoAccounts(accounts) {
            const list = Array.isArray(accounts) ? accounts.slice() : [];
            const hasDefault = list.some(item => item && item.isDefault);
            DEFAULT_ACCOUNTS.forEach(demo => {
                const sameId = list.some(item => item && item.id === demo.id);
                const sameNo = list.some(item => item && item.type === demo.type && item.cardNo && demo.cardNo && item.cardNo === demo.cardNo);
                const sameWallet = list.some(item => item && item.type === 'ecny_wallet' && item.walletId && demo.walletId && item.walletId === demo.walletId);
                if (!sameId && !sameNo && !sameWallet) {
                    list.push(Object.assign({}, demo, { isDefault: hasDefault ? false : !!demo.isDefault }));
                }
            });
            return list;
        }

        function isSupportedPaymentAccount(account) {
            if (!account) return false;
            if (account.type === 'ecny_wallet') return true;
            return String(account.bank || '').includes('邮政储蓄');
        }

        function chooseDefaultAccount() {
            const defaultAccount = paymentAccounts.find(item => item.isDefault) || paymentAccounts[0];
            if (defaultAccount) {
                selectedAccountId = defaultAccount.id;
                return;
            }
            selectedAccountId = '';
        }

        function cardLastFour(value) {
            const clean = String(value || '').replace(/\D/g, '');
            return clean ? clean.slice(-4) : '--';
        }

        function maskWalletId(walletId) {
            const clean = String(walletId || '').replace(/\s+/g, '');
            if (!clean) return '--';
            if (clean.length <= 8) return clean;
            return clean.slice(0, 4) + ' **** ' + clean.slice(-4);
        }

        function accountTitle(account) {
            if (!account) return '';
            if (account.type === 'cash') return '现金支付';
            if (account.type === 'ecny_wallet') return '数字人民币钱包';
            return account.bank || '银行卡';
        }

        function accountSummary(account) {
            if (!account) return '暂无可用账户';
            if (account.type === 'cash') return '线下现金交易';
            if (account.type === 'ecny_wallet') {
                return (account.bank || '中国邮政储蓄银行') + ' · ' + (account.walletLevel || 'III类钱包') + ' · ' + maskWalletId(account.walletId);
            }
            return (account.bank || '银行卡') + ' · 尾号 ' + cardLastFour(account.cardNo);
        }

        function accountPickerSummary(account) {
            if (!account) return '暂无可用账户';
            if (account.type === 'cash') return '线下现金交易';
            if (account.type === 'ecny_wallet') {
                return '钱包ID ' + maskWalletId(account.walletId);
            }
            return '尾号 ' + cardLastFour(account.cardNo);
        }

        function accountOwner(account) {
            if (!account) return '';
            if (account.type === 'public') return account.accountName || account.holder || '';
            return account.holder || '';
        }

        function accountTypeLabel(account) {
            if (!account) return '';
            if (account.type === 'cash') return '现金';
            if (account.type === 'public') return '对公';
            if (account.type === 'ecny_wallet') return '数币钱包';
            return '个人';
        }

        function accountTypeIcon(account) {
            if (!account) return './通用银行.png';
            if (account.type === 'cash') return './现金支付.png';
            if (account.type === 'ecny_wallet') return './数字人民币.png';
            if (String(account.bank || '').includes('邮政储蓄')) return './邮政银行.png';
            return './通用银行.png';
        }

        function getCashPaymentAccount() {
            return { id: CASH_PAYMENT_ID, type: 'cash', bank: '现金支付', holder: '线下现金交易', isDefault: false };
        }

        function orderedAccounts() {
            return paymentAccounts.slice();
        }

        function allPaymentOptions() {
            return [getCashPaymentAccount()].concat(orderedAccounts());
        }

        function getPaymentOption(accountId) {
            if (accountId === CASH_PAYMENT_ID) return getCashPaymentAccount();
            return paymentAccounts.find(item => item.id === accountId) || null;
        }

        function visibleAccounts() {
            return allPaymentOptions().slice(0, 3);
        }

        function renderPayMethods() {
            const wrap = document.getElementById('payMethodList');
            const visible = visibleAccounts();
            const hasMore = allPaymentOptions().length > visible.length;
            wrap.innerHTML = visible.map(account => {
                const selected = account.id === selectedAccountId;
                const title = accountTitle(account);
                const summary = account.type === 'cash' ? '线下现金交易' : ('尾号 ' + cardLastFour(account.type === 'ecny_wallet' ? account.walletId : account.cardNo));
                const badge = account.type === 'public' ? '<span class="pay-method-badge">公户</span>' : '';
                return '' +
                    '<div class="pay-method-card ' + (selected ? 'selected' : '') + '" onclick="selectAccount(\'' + account.id + '\')">' +
                    '<div class="pay-method-main">' +
                    '<div class="pay-method-title-row">' +
                    '<div class="pay-method-account-icon ' + (account.type === 'cash' ? 'cash' : account.type === 'ecny_wallet' ? 'wallet' : 'bank') + '">' +
                    '<img src="' + accountTypeIcon(account) + '" alt="">' +
                    '</div>' +
                    '<div class="pay-method-title-wrap">' +
                    '<div class="pay-method-title">' + title + badge + (selected ? '<span class="pay-method-tag">当前</span>' : '') + '</div>' +
                    '<div class="pay-method-sub">' + summary + '</div>' +
                    '</div>' +
                    '</div>' +
                    '</div>' +
                    '<div class="pay-method-radio"></div>' +
                    '</div>';
            }).join('') + (hasMore ? '<div class="pay-method-more-dot" onclick="openAccountSheet()">更多付款账户 <i class="fas fa-angle-right text-[10px]"></i></div>' : '');
            updatePayButton();
        }

        function openAccountSheet() {
            const accounts = orderedAccounts();
            if (!accounts.length) {
                showToast('暂无可用付款账户');
                return;
            }
            document.getElementById('accountSheetTitle').textContent = '付款账户';
            document.getElementById('accountOptionList').innerHTML = accounts.map(account => {
                const checked = account.id === selectedAccountId;
                const title = account.type === 'ecny_wallet' ? '数字人民币钱包' : (account.bank || '银行卡');
                const sub = account.type === 'ecny_wallet'
                    ? ('钱包ID ' + maskWalletId(account.walletId))
                    : ('尾号 ' + cardLastFour(account.cardNo));
                return '' +
                    '<div class="account-option ' + (checked ? 'selected' : '') + '" onclick="pickAccount(\'' + account.id + '\')">' +
                    '<div class="account-option-icon ' + (account.type === 'ecny_wallet' ? 'wallet' : 'bank') + '"><img src="' + accountTypeIcon(account) + '" alt=""></div>' +
                    '<div class="min-w-0 flex-1">' +
                    '<div class="account-option-title">' + title + '</div>' +
                    '<div class="account-option-sub">' + sub + '</div>' +
                    '</div>' +
                    '<div class="account-option-radio"></div>' +
                    '</div>';
            }).join('');
            document.getElementById('sheetMask').classList.add('show');
            document.getElementById('accountSheet').classList.add('show');
        }

        function selectAccount(accountId) {
            const account = getPaymentOption(accountId);
            if (!account) return;
            selectedAccountId = account.id;
            renderPayMethods();
            if (document.getElementById('accountSheet').classList.contains('show')) {
                document.getElementById('accountOptionList').querySelectorAll('.account-option').forEach(item => item.classList.remove('selected'));
                const selected = document.querySelector('#accountOptionList .account-option:nth-child(' + (orderedAccounts().findIndex(item => item.id === accountId) + 1) + ')');
                if (selected) selected.classList.add('selected');
            }
        }

        function pickAccount(accountId) {
            const account = paymentAccounts.find(item => item.id === accountId);
            if (!account) return;
            selectedAccountId = account.id;
            closeAccountSheet();
            renderPayMethods();
        }

        function closeAccountSheet() {
            document.getElementById('sheetMask').classList.remove('show');
            document.getElementById('accountSheet').classList.remove('show');
        }

        function updatePayButton() {
            const btn = document.getElementById('payBtn');
            if (!btn || btn.disabled) return;
            const account = getPaymentOption(selectedAccountId);
            btn.textContent = account && account.type === 'cash' ? '确认现金支付' : '确认付款';
        }

        function openCashConfirm() {
            document.getElementById('cashConfirmMask').classList.add('show');
        }

        function closeCashConfirm() {
            document.getElementById('cashConfirmMask').classList.remove('show');
        }

        function goCashSuccessBack() {
            window.location.href = 'buyer-order-manage.html?stage=done&tab=success';
        }

        function syncCashPaymentToOrder() {
            if (typeof mockStore === 'undefined' || !mockStore || typeof mockStore.upsertOrder !== 'function') return;
            mockStore.upsertOrder({
                id: state.grainOrderNo,
                status: 'success',
                payeeName: state.payeeName,
                payeeBank: state.payeeBank,
                payeeCard: state.payeeCard,
                amount: Number(state.amount),
                createdAt: state.createdAt,
                payMethod: 'cash',
                paidAt: new Date().toISOString(),
                payerName: state.payerName,
                payerCompany: state.payerCompany,
                payerBank: '',
                payerCard: '',
                paymentNote: '现金支付，已确认线下现金交易完成',
                paymentOrderNo: state.paymentOrderNo
            });
        }

        function showCashSuccessPage() {
            closeCashConfirm();
            syncCashPaymentToOrder();
            document.getElementById('cashSuccessPage').classList.add('show');
        }

        function confirmCashPayment() {
            showCashSuccessPage();
        }

        function fillPage() {
            document.getElementById('mainAmount').textContent = formatMoney(state.amount);

            // 订单信息
            document.getElementById('infoGrainOrderNo').textContent = state.grainOrderNo;
            document.getElementById('infoCreatedAt').textContent = formatTime(state.createdAt);

            // 收款方信息
            document.getElementById('payeeNameText').textContent = state.payeeName;
            document.getElementById('payeeBankNameText').textContent = state.payeeBank;
            document.getElementById('payeeCardNoText').textContent = state.payeeCard;
            chooseDefaultAccount();
            renderPayMethods();
        }

        function showToast(msg) {
            const tip = document.getElementById('toastTip');
            tip.textContent = msg;
            tip.classList.add('show');
            clearTimeout(showToast.timer);
            showToast.timer = setTimeout(() => {
                tip.classList.remove('show');
            }, 2500);
        }

        function processPayment() {
            const btn = document.getElementById('payBtn');
            const selectedAccount = getPaymentOption(selectedAccountId);

            // 防止重复点击
            if (btn.disabled) return;

            if (!selectedAccount) {
                showToast('请选择付款账户');
                return;
            }

            if (selectedAccount.type === 'cash') {
                openCashConfirm();
                return;
            }

            // 变为加载中状态
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.classList.add('opacity-90');
            btn.innerHTML = `<div class="spinner"></div><span class="ml-2">处理中...</span>`;

            // 模拟网络请求
            setTimeout(() => {
                btn.innerHTML = `<i class="fas fa-check-circle"></i><span class="ml-2">支付成功</span>`;
                btn.classList.remove('bg-blue-600', 'active:bg-blue-700');
                btn.classList.add('bg-green-500');

                showToast('支付处理完成');

                // 模拟成功后返回到原本的小程序收银台/订单页 (通常H5支付完会跳回回调地址)
                setTimeout(() => {
                    // 如果存在 mock 存储，这里其实应该把 mockStore 里的状态改为 success，但由于作用域隔离在不同页面，这里做简化展示，直接返回。
                    history.back();
                }, 1500);

            }, 2000);
        }

        // 初始化
        fillPage();
    </script>
</body>

</html>
