<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>丰收云 - 订单详情</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="shared.js"></script>
    <style>
        .info-card {
            background: #fff;
            border: 1px solid rgba(0, 0, 0, 0.04);
            border-radius: 16px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.03);
            padding: 16px;
            margin-bottom: 12px;
        }
        .status-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }
        .summary-box {
            background: linear-gradient(135deg, #F0FDF4 0%, #DCFCE7 100%);
            border-radius: 14px;
            padding: 14px 16px;
            margin-top: 10px;
            border: 1px solid rgba(17, 166, 74, 0.12);
        }
        .summary-label {
            font-size: 11px;
            color: #6B7280;
        }
        .summary-amount {
            margin-top: 4px;
            font-family: Poppins, sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: #11A64A;
            line-height: 1.1;
        }
        .section-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 12px;
        }
        .section-title-main {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }
        .section-dot {
            width: 4px;
            height: 14px;
            background: #11A64A;
            border-radius: 2px;
            flex-shrink: 0;
        }
        .section-title-text {
            font-size: 14px;
            font-weight: 600;
            color: #374151;
        }
        .product-name-box {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 14px;
            border-radius: 14px;
            background: linear-gradient(180deg, #FCFDFD 0%, #F7F8FA 100%);
            border: 1px solid #EEF1F4;
        }
        .product-icon {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: #EBF7F0;
            color: #11A64A;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .product-title {
            font-size: 12px;
            color: #9CA3AF;
            line-height: 1.2;
        }
        .product-value {
            margin-top: 3px;
            font-size: 16px;
            font-weight: 700;
            color: #1F2937;
            line-height: 1.3;
        }
        .billing-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }
        .billing-field.col-span-2 {
            grid-column: span 2;
        }
        .field-label {
            display: block;
            font-size: 12px;
            color: #6B7280;
            margin-bottom: 6px;
        }
        .field-shell {
            display: flex;
            align-items: center;
            border: 1px solid #E5E7EB;
            border-radius: 12px;
            background: #F9FAFB;
            overflow: hidden;
            min-height: 40px;
            transition: all 0.18s ease;
        }
        .field-shell.editable:focus-within {
            border-color: #11A64A;
            background: #FFFFFF;
            box-shadow: 0 0 0 3px rgba(17, 166, 74, 0.08);
        }
        .field-input {
            min-width: 0;
            flex: 1;
            height: 40px;
            padding: 0 12px;
            font-size: 14px;
            font-weight: 600;
            color: #1F2937;
            background: transparent;
            outline: none;
            border: none;
            font-family: Poppins, 'Noto Sans SC', sans-serif;
        }
        .field-display {
            min-width: 0;
            flex: 1;
            padding: 10px 12px;
            font-size: 14px;
            font-weight: 600;
            color: #1F2937;
            line-height: 20px;
        }
        .field-display.text-primary {
            color: #11A64A;
        }
        .field-display.placeholder {
            color: #9CA3AF;
            font-weight: 500;
        }
        .field-unit {
            flex-shrink: 0;
            min-width: 30px;
            padding-right: 12px;
            text-align: right;
            font-size: 12px;
            color: #9CA3AF;
        }
        .textarea-shell {
            border: 1px solid #E5E7EB;
            border-radius: 12px;
            background: #F9FAFB;
            transition: all 0.18s ease;
        }
        .textarea-shell:focus-within {
            border-color: #11A64A;
            background: #FFFFFF;
            box-shadow: 0 0 0 3px rgba(17, 166, 74, 0.08);
        }
        .field-textarea {
            width: 100%;
            min-height: 76px;
            padding: 12px;
            border: none;
            outline: none;
            resize: none;
            background: transparent;
            color: #1F2937;
            font-size: 14px;
            line-height: 1.6;
        }
        .textarea-display {
            min-height: 76px;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #E5E7EB;
            background: #F9FAFB;
            color: #1F2937;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .textarea-display.placeholder {
            color: #9CA3AF;
        }
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .photo-grid img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            cursor: pointer;
        }
        .payee-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: linear-gradient(to bottom right, #EBF7F0, #F4FBF6);
            border: 1px solid rgba(17, 166, 74, 0.15);
            border-radius: 16px;
        }
        .lightbox-overlay {
            position: fixed;
            inset: 0;
            z-index: 999;
            background: rgba(0, 0, 0, 0.88);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
        }
        .lightbox-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .lightbox-overlay img {
            max-width: 95%;
            max-height: 85vh;
            border-radius: 12px;
        }
        .billing-sheet-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            z-index: 90;
            opacity: 0;
            visibility: hidden;
            transition: all 0.22s ease;
        }
        .billing-sheet-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        .billing-sheet {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 100;
            background: #fff;
            border-radius: 24px 24px 0 0;
            transform: translateY(100%);
            transition: transform 0.26s ease;
            max-height: 78%;
            overflow-y: auto;
            box-shadow: 0 -12px 30px rgba(15, 23, 42, 0.18);
        }
        .billing-sheet.show {
            transform: translateY(0);
        }
        .billing-sheet-handle {
            width: 40px;
            height: 4px;
            background: #D1D5DB;
            border-radius: 999px;
            margin: 12px auto;
        }
        .client-item {
            transition: all 0.2s;
            border: 1.5px solid transparent;
        }
        .client-item.selected {
            border-color: #11A64A;
            background: #EBF7F0;
        }
        .toast-tip {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.82);
            color: white;
            padding: 12px 22px;
            border-radius: 16px;
            font-size: 14px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.25s;
            z-index: 1000;
            white-space: nowrap;
        }
        .toast-tip.show {
            opacity: 1;
        }
    </style>
</head>
<body class="bg-[#F7F8FA]">
<div class="mobile-container bg-[#F7F8FA]">
    <div id="statusBar"></div>

    <div id="navBarPlaceholder" class="relative z-[60] px-4 pt-3 pb-2 flex items-center justify-between bg-transparent">
        <button onclick="window.location.href = backHref" class="w-10 h-10 flex items-center justify-center rounded-full bg-white shadow-sm border border-gray-100 active:scale-90 transition-transform text-gray-600">
            <i class="fas fa-chevron-left"></i>
        </button>
        <div class="text-[16px] font-bold text-gray-800" id="pageTitleText">订单详情</div>
        <div class="w-[87px] h-[32px] bg-white rounded-full border border-gray-200/50 flex items-center justify-between px-3 shadow-sm">
            <div class="flex-1 flex items-center justify-center"><i class="fas fa-ellipsis-h text-gray-800 text-xs"></i></div>
            <div class="w-[1px] h-[18px] bg-gray-300"></div>
            <div class="flex-1 flex items-center justify-center"><i class="far fa-dot-circle text-gray-800 text-sm"></i></div>
        </div>
    </div>

    <div id="contentArea" class="flex-1 overflow-y-auto no-scrollbar p-4" style="padding-bottom:96px; background:#F7F8FA;">
        <div class="info-card text-center">
            <div id="statusChip" class="status-chip mx-auto w-fit">
                <i id="statusIcon" class="fas fa-file-pen"></i>
                <span id="statusTitle">挂单中</span>
            </div>
            <div id="statusDesc" class="text-[11px] text-gray-400 mt-2">请补充订单信息</div>
            <div class="summary-box">
                <div class="summary-label">应付金额</div>
                <div id="amountText" class="summary-amount">¥ 0.00</div>
            </div>
        </div>

        <div class="info-card">
            <div class="section-title">
                <div class="section-title-main">
                    <div class="section-dot"></div>
                    <span class="section-title-text">开单品类</span>
                </div>
            </div>
            <div class="product-name-box">
                <div class="product-icon">
                    <i class="fas fa-box text-[15px]"></i>
                </div>
                <div class="min-w-0 flex-1">
                    <div class="product-title">当前品类</div>

                </div>

        </div>

        <div class="info-card">
            <div class="section-title">
                <div class="section-title-main">
                    <div class="section-dot"></div>
                    <span class="section-title-text">称重计价</span>
                </div>
            </div>
            <div class="billing-grid">
                <div class="billing-field col-span-2">
                    <label class="field-label">农产品名称</label>

                <div class="billing-field">
                    <label class="field-label">毛重 <span class="text-red-400">*</span></label>

                <div class="billing-field">

                <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center shrink-0 shadow-sm border border-[#11A64A]/10">

        <img id="lightboxImage" src="" alt="图片预览">

    <div id="toastTip" class="toast-tip"></div>

<script>
const params = new URLSearchParams(window.location.search);
const orderNo = params.get('orderNo');
const backHref = params.get('back') || 'buyer-order-manage.html?tab=draft';
const mockStore = window.BuyerMockStore || null;
const clientStore = window.ClientMockStore || null;

let order = null;
let state = {
    status: '',
    selectedClientId: null,
    productName: '',
    grossWeight: 0,
    tareWeight: 0,
    deduction: 0,
    unitPrice: 0,
    remark: '',
};

document.getElementById('statusBar').innerHTML = renderStatusBar();

if (orderNo && mockStore && typeof mockStore.findOrderById === 'function') {
    order = mockStore.findOrderById(orderNo);
}

if (!order) {
    document.getElementById('pageTitleText').textContent = '订单不存在';
    document.getElementById('contentArea').innerHTML = '<div class="info-card text-center mt-8"><div class="text-[15px] font-semibold text-gray-700 mb-1">订单未找到</div><a href="buyer-order-manage.html" class="inline-block mt-3 px-6 py-2.5 bg-primary text-white text-sm font-medium rounded-xl no-underline" style="text-decoration:none;">返回订单管理</a></div>';
} else {
    initState();
    renderPage();
}

function initState() {
    state.status = order.status || 'draft';
    state.productName = order.productName || order.categorySecondary || '';
    state.grossWeight = Number(order.grossWeight || 0);
    state.tareWeight = Number(order.tareWeight || 0);
    state.deduction = Number(order.deduction || 0);
    state.unitPrice = Number(order.unitPrice || 0);
    state.priceMode = order.priceMode || 'unit';
    state.remark = order.remark || '';
}

function getPageTitle() {
    if (state.status === 'draft') return '编辑挂单';
    if (state.status === 'pending_price') return '补充单价';
    return '订单详情';
}

function isPendingClient() {
    return state.status === 'pending_client';
}

function canEditBilling() {
    return state.status === 'draft' || state.status === 'pending_price' || state.status === 'unpaid';
}

function calcNetWeight() {
    return Math.max(Number(state.grossWeight || 0) - Number(state.tareWeight || 0) - Number(state.deduction || 0), 0);
}

function calcAmount() {
    if (state.priceMode === 'fixed') {
        return Number(state.unitPrice || 0); // 一口价：金额直接等于输入值
    }
    return Math.round(calcNetWeight() * Number(state.unitPrice || 0) * 100) / 100;
}

function fmtMoney(amount) {
    return '¥ ' + Number(amount || 0).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtNumber(value, keepZero) {
    const num = Number(value || 0);
    if (!keepZero && num <= 0) return '--';
    return Number.isInteger(num) ? String(num) : num.toFixed(2).replace(/\.?0+$/, '');
}

function getUnit() {
    return order.unit || '斤';
}

function fmtQty(value, unit, keepZero) {
    const num = Number(value || 0);
    if (!keepZero && num <= 0) return '--';
    return fmtNumber(num, true) + (unit || getUnit());
}

function fmtUnitPrice(value, unit) {
    const num = Number(value || 0);
    if (num <= 0) return '--';
    return '¥' + num.toFixed(2) + '/' + (unit || getUnit());
}

function renderFieldShell(content, editable) {
    return `<div class="field-shell ${editable ? 'editable' : ''}">${content}</div>`;
}

function renderInputField(value, unit, handler) {
    return renderFieldShell(
        `<input type="number" value="${value || ''}" class="field-input" placeholder="0" step="0.01" oninput="${handler}(this.value)">
         <span class="field-unit">${unit}</span>`,
        true
    );
}

function renderTextInputField(value, placeholder, handler) {
    return renderFieldShell(
        `<input type="text" value="${escapeHtml(value || '')}" class="field-input" placeholder="${placeholder}" oninput="${handler}(this.value)">`,
        true
    );
}

function renderDisplayField(text, unit, isPrimary, placeholder) {
    return renderFieldShell(
        `<span class="field-display ${isPrimary ? 'text-primary' : ''} ${placeholder ? 'placeholder' : ''}">${text}</span>
         ${unit ? `<span class="field-unit">${unit}</span>` : ''}`,
        false
    );
}

function renderTextareaField(value) {
    return `<div class="textarea-shell">
        <textarea class="field-textarea" placeholder="选填" oninput="onRemarkChange(this.value)">${escapeHtml(value || '')}</textarea>
    </div>`;
}

function renderTextareaDisplay(value) {
    const hasValue = !!String(value || '').trim();
    return `<div class="textarea-display ${hasValue ? '' : 'placeholder'}">${hasValue ? escapeHtml(value) : '未填写'}</div>`;
}

function renderPage() {
    const pt = document.getElementById('pageTitleText');
    if (pt) pt.textContent = getPageTitle();
    renderStatus();
    renderProduct();
    renderBilling();
    renderPayee();
    renderPhotos();
    renderBottomActions();
}

function renderStatus() {
    const chip = document.getElementById('statusChip');
    const title = document.getElementById('statusTitle');
    const desc = document.getElementById('statusDesc');
    const icon = document.getElementById('statusIcon');
    document.getElementById('amountText').textContent = fmtMoney(calcAmount());

    if (state.status === 'draft') {
        chip.className = 'status-chip mx-auto w-fit bg-gray-100 text-gray-600';
        icon.className = 'fas fa-file-pen';
        title.textContent = '挂单中';
        desc.textContent = '请补充称重计价信息';
        return;
    }
    if (state.status === 'pending_price') {
        chip.className = 'status-chip mx-auto w-fit bg-blue-50 text-blue-600';
        icon.className = 'fas fa-tag';
        title.textContent = '待开价';
        desc.textContent = '请补充单价完成开单';
        return;
    }
    if (state.status === 'pending_client') {
        chip.className = 'status-chip mx-auto w-fit bg-blue-50 text-blue-600';
        icon.className = 'fas fa-user-clock';
        title.textContent = '待客户付款';
        desc.textContent = order.clientName ? ('已转给 ' + order.clientName + '，当前订单只读') : '等待客户付款';
        return;
    }
    chip.className = 'status-chip mx-auto w-fit bg-amber-50 text-amber-600';
    icon.className = 'fas fa-file-invoice';
    title.textContent = '待结算';
    desc.textContent = '订单信息已完整，可直接付款或转给客户';
}

function renderProduct() {
    document.getElementById('productNameText').textContent = order.categorySecondary || order.productName || '--';
}

function renderBilling() {
    const editable = canEditBilling();
    document.getElementById('productNameWrap').innerHTML = editable
        ? renderTextInputField(state.productName, '请输入农产品名称', 'onProductNameChange')
        : renderDisplayField(state.productName || '--', '', false, !state.productName);
    document.getElementById('grossWeightWrap').innerHTML = editable
        ? renderInputField(state.grossWeight, getUnit(), 'onGrossWeightChange')
        : renderDisplayField(fmtNumber(state.grossWeight, false), getUnit(), false, Number(state.grossWeight || 0) <= 0);
    document.getElementById('tareWeightWrap').innerHTML = editable
        ? renderInputField(state.tareWeight, getUnit(), 'onTareChange')
        : renderDisplayField(fmtNumber(state.tareWeight, false), getUnit(), false, Number(state.tareWeight || 0) <= 0);
    document.getElementById('deductionWrap').innerHTML = editable
        ? renderInputField(state.deduction, getUnit(), 'onDeductionChange')
        : renderDisplayField(fmtNumber(state.deduction, false), getUnit(), false, Number(state.deduction || 0) <= 0);
    document.getElementById('netWeightWrap').innerHTML = renderDisplayField(fmtNumber(calcNetWeight(), true), getUnit(), true, false);

    // 价格标签区：可编辑时显示分段器，只读时显示文字标签
    var priceLabelArea = document.getElementById('priceLabelArea');
    if (editable) {
        var isUnit = state.priceMode === 'unit';
        priceLabelArea.innerHTML = '<div class="flex items-center bg-gray-100 rounded-lg p-0.5" style="width:fit-content;">' +
            '<button type="button" onclick="setPriceMode(\'unit\')" id="priceModeUnit" class="px-3 py-1 rounded-md text-[12px] font-medium ' + (isUnit ? 'bg-white text-primary shadow-sm' : 'text-gray-500') + '">单价</button>' +
            '<button type="button" onclick="setPriceMode(\'fixed\')" id="priceModeFixed" class="px-3 py-1 rounded-md text-[12px] font-medium ' + (!isUnit ? 'bg-white text-primary shadow-sm' : 'text-gray-500') + '">一口价</button>' +
            '</div>';
    } else {
        priceLabelArea.innerHTML = '<label class="field-label" style="margin-bottom:0;">' + (state.priceMode === 'fixed' ? '一口价' : '单价') + '</label>';
    }

    var priceUnit = state.priceMode === 'fixed' ? '元' : ('元/' + getUnit());
    var priceDisplay = state.priceMode === 'fixed'
        ? (state.unitPrice > 0 ? '¥' + Number(state.unitPrice).toFixed(2) : '--')
        : (state.unitPrice > 0 ? '¥' + Number(state.unitPrice).toFixed(2) : '--');
    var priceDisplaySuffix = state.priceMode === 'fixed' ? '' : (state.unitPrice > 0 ? '/' + getUnit() : '');

    document.getElementById('unitPriceWrap').innerHTML = editable
        ? renderInputField(state.unitPrice, priceUnit, 'onPriceChange')
        : renderDisplayField(priceDisplay, priceDisplaySuffix, false, Number(state.unitPrice || 0) <= 0);
    document.getElementById('remarkWrap').innerHTML = editable ? renderTextareaField(state.remark) : renderTextareaDisplay(state.remark);
}

function renderPayee() {
    document.getElementById('payeeNameText').textContent = order.payeeName || '--';
    document.getElementById('payeeMetaText').textContent = [order.payeeBank, order.payeeCard].filter(Boolean).join(' · ') || '--';
}

function normalizePhotos(list) {
    if (!Array.isArray(list)) return [];
    return list.map(function(item) {
        return item && typeof item === 'object' ? (item.url || '') : String(item || '');
    }).filter(Boolean);
}

function renderPhotos() {
    const photos = normalizePhotos(order.photos);
    document.getElementById('photoCount').textContent = `(${photos.length}/9)`;
    const grid = document.getElementById('photoGrid');
    const empty = document.getElementById('photoEmpty');
    if (!photos.length) {
        grid.innerHTML = '';
        empty.style.display = '';
        return;
    }
    empty.style.display = 'none';
    grid.innerHTML = photos.map(function(url) {
        return `<img src="${url}" alt="照片" onclick="openLightbox('${url}')">`;
    }).join('');
}

function renderBottomActions() {
    const el = document.getElementById('bottomActions');
    if (state.status === 'draft' || state.status === 'pending_price') {
        el.innerHTML = `
            <button onclick="saveEdit()" class="flex-1 h-[48px] bg-white border border-gray-200 text-gray-600 rounded-[20px] text-sm font-semibold active:scale-95 transition-all">暂存</button>
            <button onclick="confirmOpen()" class="flex-1 h-[48px] bg-primary text-white rounded-[20px] text-sm font-semibold active:scale-95 transition-all shadow-[0_8px_20px_-6px_rgba(17,166,74,0.4)]">确认开单</button>`;
        return;
    }
    if (state.status === 'pending_client') {
        el.innerHTML = `
            <button onclick="withdrawOrder()" class="flex-1 h-[48px] bg-white border border-red-100 text-red-500 rounded-[20px] text-sm font-semibold active:scale-95 transition-all">撤回</button>
            <button onclick="goPayNow()" class="flex-1 h-[48px] bg-primary text-white rounded-[20px] text-sm font-semibold active:scale-95 transition-all shadow-[0_8px_20px_-6px_rgba(17,166,74,0.4)]">立即付款</button>`;
        return;
    }
    el.innerHTML = `
        <button onclick="openClientSheet()" class="flex-1 h-[48px] bg-white border border-primary text-primary rounded-[20px] text-sm font-semibold active:scale-95 transition-all">转给客户</button>
        <button onclick="goPayNow()" class="flex-1 h-[48px] bg-primary text-white rounded-[20px] text-sm font-semibold active:scale-95 transition-all shadow-[0_8px_20px_-6px_rgba(17,166,74,0.4)]">立即付款</button>`;
}

function onGrossWeightChange(value) {
    state.grossWeight = Number(value || 0);
    renderPage();
}

function onProductNameChange(value) {
    state.productName = String(value || '').trim();
}

function onTareChange(value) {
    state.tareWeight = Number(value || 0);
    renderPage();
}

function onDeductionChange(value) {
    state.deduction = Number(value || 0);
    renderPage();
}

function onPriceChange(value) {
    state.unitPrice = Number(value || 0);
    renderPage();
}

function setPriceMode(mode) {
    state.priceMode = mode === 'fixed' ? 'fixed' : 'unit';
    renderPage();
}

function onRemarkChange(value) {
    state.remark = value;
}

function validateBilling(requirePrice) {
    if (Number(state.grossWeight || 0) <= 0) {
        showToast('请填写毛重');
        return false;
    }
    if (Number(state.tareWeight || 0) < 0) {
        showToast('皮重不能为负数');
        return false;
    }
    if (Number(state.deduction || 0) < 0) {
        showToast('扣杂不能为负数');
        return false;
    }
    if ((Number(state.tareWeight || 0) + Number(state.deduction || 0)) > Number(state.grossWeight || 0)) {
        showToast('皮重和扣杂不能大于毛重');
        return false;
    }
    if (requirePrice && Number(state.unitPrice || 0) <= 0) {
        showToast(state.priceMode === 'fixed' ? '请填写一口价' : '请填写单价');
        return false;
    }
    return true;
}

function getNextStatus() {
    if (Number(state.tareWeight || 0) <= 0) return 'draft';
    if (Number(state.unitPrice || 0) <= 0) return 'pending_price';
    return 'unpaid';
}

function buildPatchByCurrentState() {
    const netWeight = calcNetWeight();
    const amount = calcAmount();
    const status = getNextStatus();
    const productName = state.productName || order.productName || order.categorySecondary || '';
    return {
        productName: productName,
        grossWeight: Number(state.grossWeight || 0),
        tareWeight: Number(state.tareWeight || 0),
        deduction: Number(state.deduction || 0),
        netWeight: netWeight,
        unitPrice: Number(state.unitPrice || 0),
        priceMode: state.priceMode || 'unit',
        amount: amount,
        remark: String(state.remark || '').trim(),
        status: status,
        summary: (productName || '农产品') + ' x ' + fmtNumber(netWeight, true) + (getUnit() || '斤'),
        items: [{
            name: productName || '农产品',
            qty: netWeight,
            unit: getUnit(),
            price: Number(state.unitPrice || 0),
            subtotal: amount
        }]
    };
}

function saveEdit() {
    if (!validateBilling(false)) return;
    const patch = buildPatchByCurrentState();
    if (mockStore && typeof mockStore.updateOrder === 'function') {
        order = mockStore.updateOrder(orderNo, patch) || Object.assign({}, order, patch);
    } else {
        order = Object.assign({}, order, patch);
    }
    state.status = order.status || patch.status;
    showToast(patch.status === 'draft' ? '已挂单' : (patch.status === 'pending_price' ? '已保存为待开价' : '已保存为待结算'));
    setTimeout(function() { window.location.href = backHref; }, 500);
}

function confirmOpen() {
    if (!validateBilling(true)) return;
    const patch = buildPatchByCurrentState();
    patch.status = 'unpaid';
    if (mockStore && typeof mockStore.updateOrder === 'function') {
        order = mockStore.updateOrder(orderNo, patch) || Object.assign({}, order, patch);
    } else {
        order = Object.assign({}, order, patch);
    }
    state.status = 'unpaid';
    window.location.href = 'buyer-billing-done.html?orderNo=' + encodeURIComponent(orderNo);
}

function goPayNow() {
    if (state.status !== 'pending_client' && !validateBilling(true)) return;
    const patch = buildPatchByCurrentState();
    patch.status = 'unpaid';
    if (mockStore && typeof mockStore.updateOrder === 'function') {
        order = mockStore.updateOrder(orderNo, patch) || Object.assign({}, order, patch);
    } else {
        order = Object.assign({}, order, patch);
    }
    window.location.href = 'buyer-billing-done.html?orderNo=' + encodeURIComponent(orderNo);
}

function withdrawOrder() {
    if (!(mockStore && typeof mockStore.withdrawFromClient === 'function')) return;
    order = mockStore.withdrawFromClient(orderNo) || order;
    initState();
    renderPage();
    showToast('已撤回');
    setTimeout(function() { window.location.href = backHref; }, 500);
}

function openLightbox(url) {
    document.getElementById('lightboxImage').src = url;
    document.getElementById('lightboxOverlay').classList.add('show');
}

function closeLightbox() {
    document.getElementById('lightboxOverlay').classList.remove('show');
}

function openClientSheet() {
    state.selectedClientId = null;
    document.getElementById('clientSearchInput').value = '';
    document.getElementById('clientSheetOverlay').classList.add('show');
    document.getElementById('clientSheet').classList.add('show');
    renderClientList();
}

function closeClientSheet() {
    document.getElementById('clientSheetOverlay').classList.remove('show');
    document.getElementById('clientSheet').classList.remove('show');
}

function renderClientList() {
    const list = clientStore && typeof clientStore.getClients === 'function' ? clientStore.getClients() : [];
    const keyword = (document.getElementById('clientSearchInput').value || '').trim().toLowerCase();
    const filtered = list.filter(function(item) {
        if (!keyword) return true;
        return (item.name || '').toLowerCase().includes(keyword) || (item.mobile || '').toLowerCase().includes(keyword);
    });
    document.getElementById('confirmClientBtn').disabled = !state.selectedClientId;
    document.getElementById('noClientTip').style.display = filtered.length ? 'none' : '';
    document.getElementById('clientListContainer').innerHTML = filtered.map(function(item) {
        const selected = state.selectedClientId === item.id;
        return `
            <div class="client-item glass-card rounded-2xl p-3.5 flex items-center gap-3 ${selected ? 'selected' : ''}" onclick="selectClient('${item.id}')">
                <div class="w-11 h-11 rounded-full bg-blue-100 flex items-center justify-center shrink-0 border border-blue-100">
                    <i class="fas fa-user-tie text-blue-500 text-[14px]"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2">
                        <span class="text-[14px] font-semibold text-gray-800 truncate">${item.name}</span>
                        ${selected ? '<i class="fas fa-check-circle text-primary text-sm"></i>' : ''}
                    </div>
                    <div class="text-[12px] text-gray-400 mt-0.5">${item.mobile}</div>
                </div>
            </div>`;
    }).join('');
}

function selectClient(id) {
    state.selectedClientId = id;
    renderClientList();
}

function confirmClient() {
    if (!validateBilling(true)) return;
    if (!state.selectedClientId) {
        showToast('请选择一个客户');
        return;
    }
    const patch = buildPatchByCurrentState();
    patch.status = 'unpaid';
    if (mockStore && typeof mockStore.updateOrder === 'function') {
        order = mockStore.updateOrder(orderNo, patch) || Object.assign({}, order, patch);
    } else {
        order = Object.assign({}, order, patch);
    }
    const client = clientStore && clientStore.findClientById ? clientStore.findClientById(state.selectedClientId) : null;
    if (!client) {
        showToast('客户信息异常');
        return;
    }
    if (mockStore && typeof mockStore.transferToClient === 'function') {
        order = mockStore.transferToClient(orderNo, client.id, client.name, client.mobile) || order;
    }
    showToast('已发送给 ' + client.name);
    setTimeout(function() { window.location.href = backHref; }, 500);
}

function escapeHtml(str) {
    return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function showToast(msg) {
    const el = document.getElementById('toastTip');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(showToast.timer);
    showToast.timer = setTimeout(function() {
        el.classList.remove('show');
    }, 1800);
}
</script>
</body>
</html>
