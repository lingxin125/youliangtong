<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>丰收云 - 附言管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="shared.js"></script>
    <style>
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .sheet-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            z-index: 90;
            opacity: 0;
            visibility: hidden;
            transition: all 0.22s ease;
        }
        .sheet-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        .bottom-sheet {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 100;
            background: #fff;
            border-radius: 24px 24px 0 0;
            transform: translateY(100%);
            transition: transform 0.26s ease;
            max-height: 82%;
            overflow-y: auto;
            box-shadow: 0 -12px 30px rgba(15, 23, 42, 0.18);
        }
        .bottom-sheet.show {
            transform: translateY(0);
        }
        .sheet-handle {
            width: 40px;
            height: 4px;
            background: #d1d5db;
            border-radius: 999px;
            margin: 12px auto;
        }
        .toast-msg {
            position: absolute;
            left: 50%;
            bottom: 108px;
            transform: translateX(-50%);
            padding: 10px 16px;
            background: rgba(17, 24, 39, 0.88);
            color: #fff;
            border-radius: 12px;
            font-size: 12px;
            z-index: 130;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease;
            white-space: nowrap;
        }
        .toast-msg.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }
        .action-bar {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 40;
            background: #FFFFFF;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            padding: 14px 20px;
            padding-bottom: calc(14px + env(safe-area-inset-bottom, 8px));
        }
        .section-title-bar {
            width: 6px;
            height: 16px;
            border-radius: 999px;
            background: linear-gradient(180deg, #11A64A 0%, #388E3C 100%);
        }
    </style>
</head>
<body>
<div class="mobile-container relative">
    <div id="statusBar"></div>
    <div id="navBar"></div>

    <div class="flex-1 overflow-y-auto hide-scrollbar pb-28">
        <div class="px-5 pt-4 mb-3 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="section-title-bar"></div>
                <span class="text-[15px] font-bold text-gray-800 tracking-wide">默认附言模板</span>
            </div>
            <span id="presetCount" class="px-2 py-0.5 rounded-full bg-green-50 text-[#11A64A] text-[10px] font-bold">0</span>
        </div>
        <div id="presetList" class="px-4 space-y-3"></div>

        <div class="px-5 mt-6 mb-3 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="section-title-bar"></div>
                <span class="text-[15px] font-bold text-gray-800 tracking-wide">自定义附言</span>
            </div>
            <span id="customCount" class="px-2 py-0.5 rounded-full bg-gray-100 text-gray-500 text-[10px] font-bold">0</span>
        </div>
        <div id="customList" class="px-4 space-y-3"></div>
        <div id="customEmpty" class="hidden px-5 py-10 text-center">
            <div class="w-14 h-14 mx-auto rounded-full bg-[#F0FDF4] flex items-center justify-center mb-4">
                <i class="fas fa-pen text-[#11A64A] text-[20px]"></i>
            </div>
            <div class="text-[15px] font-medium text-gray-700">暂无自定义附言</div>
            <div class="text-[12px] text-gray-400 mt-2">可点击下方按钮新增常用附言模板</div>
        </div>
    </div>

    <div class="action-bar">
        <button onclick="openRemarkEditor()" class="w-full h-12 bg-gradient-to-r from-[#11A64A] to-[#388E3C] text-white font-bold text-[15px] rounded-xl shadow-[0_8px_20px_rgba(17,166,74,0.2)] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
            <i class="fas fa-plus"></i>
            <span>自定义附言</span>
        </button>
    </div>

    <div id="editorOverlay" class="sheet-overlay" onclick="closeRemarkEditor()"></div>
    <div id="editorSheet" class="bottom-sheet">
        <div class="sheet-handle"></div>
        <div class="px-5 pb-6 pb-safe">
            <div class="flex items-center justify-between mb-5">
                <h3 id="editorTitle" class="text-[16px] font-bold text-gray-800">新增附言</h3>
                <button onclick="closeRemarkEditor()" class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 active:scale-95 transition-transform">
                    <i class="fas fa-times text-sm"></i>
                </button>
            </div>

            <div class="mb-4">
                <label class="text-[13px] font-medium text-gray-600 block mb-1.5">附言名称</label>
                <div class="relative flex items-center border border-gray-200 rounded-xl bg-gray-50 focus-within:bg-white focus-within:border-[#11A64A] focus-within:ring-2 focus-within:ring-[#11A64A]/20 transition-all overflow-hidden">
                    <i class="fas fa-tag text-gray-400 absolute left-3.5 text-sm"></i>
                    <input type="text" id="remarkNameInput" placeholder="请输入附言名称" class="w-full pl-9 pr-3 py-3 text-sm outline-none bg-transparent m-0 font-medium text-gray-800">
                </div>
            </div>

            <div class="mb-3">
                <label class="text-[13px] font-medium text-gray-600 block mb-1.5">附言内容</label>
                <div class="border border-gray-200 rounded-xl bg-gray-50 focus-within:bg-white focus-within:border-[#11A64A] focus-within:ring-2 focus-within:ring-[#11A64A]/20 transition-all overflow-hidden">
                    <textarea id="remarkTemplateInput" rows="4" placeholder="请输入附言内容" class="w-full px-3.5 py-3 text-sm outline-none bg-transparent resize-none text-gray-800 leading-6" oninput="updatePreview()"></textarea>
                </div>
            </div>

            <div class="mb-4 rounded-2xl bg-[#F7F8FA] border border-gray-100 px-3.5 py-3">
                <div class="text-[12px] font-medium text-gray-700 mb-2">可用参数（点击插入）</div>
                <div class="flex flex-wrap gap-2" id="paramChips">
                    <button type="button" onclick="insertPlaceholder('{农产品名称}')" class="px-2.5 py-1 rounded-lg bg-white border border-gray-200 text-[11px] text-gray-600 active:scale-[0.97] transition-all">{农产品名称}</button>
                    <button type="button" onclick="insertPlaceholder('{净重}')" class="px-2.5 py-1 rounded-lg bg-white border border-gray-200 text-[11px] text-gray-600 active:scale-[0.97] transition-all">{净重}</button>
                    <button type="button" onclick="insertPlaceholder('{付款方}')" class="px-2.5 py-1 rounded-lg bg-white border border-gray-200 text-[11px] text-gray-600 active:scale-[0.97] transition-all">{付款方}</button>
                    <button type="button" onclick="insertPlaceholder('{日期}')" class="px-2.5 py-1 rounded-lg bg-white border border-gray-200 text-[11px] text-gray-600 active:scale-[0.97] transition-all">{日期}</button>
                    <button type="button" onclick="insertPlaceholder('{金额}')" class="px-2.5 py-1 rounded-lg bg-white border border-gray-200 text-[11px] text-gray-600 active:scale-[0.97] transition-all">{金额}</button>
                    <button type="button" onclick="insertPlaceholder('{收款人}')" class="px-2.5 py-1 rounded-lg bg-white border border-gray-200 text-[11px] text-gray-600 active:scale-[0.97] transition-all">{收款人}</button>
                </div>
            </div>

            <div class="mb-6 rounded-2xl bg-[#F0FDF4] border border-green-100 px-3.5 py-3">
                <div class="flex items-center justify-between gap-2 mb-1">
                    <div class="text-[12px] font-medium text-[#11A64A]">示例预览</div>
                    <div id="remarkPreviewCount" class="text-[11px] text-gray-400">0/20</div>
                </div>
                <div id="remarkPreviewText" class="text-[13px] text-gray-700 leading-6">请输入附言内容</div>
                <div id="remarkPreviewWarn" class="text-[11px] text-red-500 mt-2 hidden">银行附言建议不超过20字，超出后实际到账可能被截断</div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="closeRemarkEditor()" class="h-11 rounded-xl bg-gray-100 text-gray-600 font-bold text-[14px] active:bg-gray-200 transition-colors">取消</button>
                <button onclick="saveRemark()" class="h-11 rounded-xl bg-[#11A64A] text-white font-bold text-[14px] shadow-[0_4px_12px_rgba(17,166,74,0.2)] active:scale-[0.98] transition-all">保存</button>
            </div>
        </div>
    </div>

    <div id="deleteOverlay" class="sheet-overlay" onclick="closeDeleteSheet()"></div>
    <div id="deleteSheet" class="bottom-sheet">
        <div class="sheet-handle"></div>
        <div class="px-5 pb-6 pb-safe">
            <div class="flex flex-col items-center text-center mb-5">
                <div class="w-14 h-14 rounded-full bg-red-50 flex items-center justify-center mb-3">
                    <i class="fas fa-trash text-red-500 text-[20px]"></i>
                </div>
                <h3 class="text-[16px] font-bold text-gray-800 mb-1">确认删除该附言？</h3>
                <p id="deleteDesc" class="text-[12px] text-gray-400 leading-5">删除后不可恢复，请谨慎操作。</p>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="closeDeleteSheet()" class="h-11 rounded-xl bg-gray-100 text-gray-600 font-bold text-[14px] active:bg-gray-200 transition-colors">取消</button>
                <button onclick="confirmDeleteRemark()" class="h-11 rounded-xl bg-red-500 text-white font-bold text-[14px] shadow-[0_4px_12px_rgba(239,68,68,0.18)] active:scale-[0.98] transition-all">删除</button>
            </div>
        </div>
    </div>

    <div id="toastMsg" class="toast-msg"></div>
    <div id="tabBar"></div>
</div>

<script>
document.getElementById('statusBar').innerHTML = renderStatusBar();
document.getElementById('navBar').innerHTML = renderHeader('附言管理', 'buyer-my.html');

var store = window.RemarkMockStore;
var editingRemarkId = null;
var deletingRemarkId = null;

function escapeText(text) {
    return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function showToast(msg) {
    var toast = document.getElementById('toastMsg');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(showToast.timer);
    showToast.timer = setTimeout(function () {
        toast.classList.remove('show');
    }, 1600);
}

function getAllRemarks() {
    return store && store.getRemarks ? store.getRemarks() : [];
}

function getDisplayDefaultRemark() {
    return store && store.getDefaultRemark ? store.getDefaultRemark() : null;
}

function buttonHTML(label, handler, type) {
    var cls = 'px-3 py-1.5 rounded-lg text-[12px] font-medium active:scale-[0.97] transition-all ';
    if (type === 'primary') {
        cls += 'bg-[#F0FDF4] text-[#11A64A] border border-green-100';
    } else if (type === 'danger') {
        cls += 'bg-red-50 text-red-500 border border-red-100';
    } else {
        cls += 'bg-gray-100 text-gray-600 border border-gray-200';
    }
    return '<button class="' + cls + '" onclick="' + handler + '">' + label + '</button>';
}

function remarkCardHTML(remark, defaultId) {
    var isDefault = remark.id === defaultId;
    var actions = [];
    if (remark.type === 'custom') {
        actions.push(buttonHTML('编辑', 'openRemarkEditor(\'' + escapeText(remark.id) + '\')', 'muted'));
        actions.push(buttonHTML('删除', 'openDeleteSheet(\'' + escapeText(remark.id) + '\')', 'danger'));
    }
    if (!isDefault) {
        actions.push(buttonHTML('设为默认', 'setAsDefault(\'' + escapeText(remark.id) + '\')', 'primary'));
    }

    return (
        '<div class="glass-card rounded-2xl p-3.5">' +
            '<div class="flex items-start gap-3">' +
                '<div class="w-10 h-10 rounded-xl ' + (remark.type === 'preset' ? 'bg-[#F0FDF4]' : 'bg-[#F7F8FA]') + ' flex items-center justify-center shrink-0">' +
                    '<i class="fas ' + (remark.type === 'preset' ? 'fa-file-signature text-[#11A64A]' : 'fa-pen-to-square text-gray-500') + ' text-[15px]"></i>' +
                '</div>' +
                '<div class="flex-1 min-w-0">' +
                    '<div class="flex items-center gap-2 mb-1.5 flex-wrap">' +
                        '<span class="text-[14px] font-medium text-gray-800">' + escapeText(remark.name) + '</span>' +
                        (isDefault ? '<span class="px-2 py-0.5 rounded-full bg-green-50 border border-green-100 text-[#11A64A] text-[10px] font-bold">默认</span>' : '') +
                    '</div>' +
                    '<div class="text-[12px] text-gray-500 leading-5 break-all">' + escapeText(remark.template) + '</div>' +
                '</div>' +
            '</div>' +
            '<div class="mt-3 pt-3 border-t border-gray-100 flex items-center justify-end gap-2 flex-wrap">' +
                actions.join('') +
            '</div>' +
        '</div>'
    );
}

function render() {
    var all = getAllRemarks();
    var defaultRemark = getDisplayDefaultRemark();
    var defaultId = defaultRemark ? defaultRemark.id : '';
    var presets = all.filter(function (item) { return item.type === 'preset'; });
    var customs = all.filter(function (item) { return item.type === 'custom'; });

    document.getElementById('presetCount').textContent = presets.length;
    document.getElementById('customCount').textContent = customs.length;

    document.getElementById('presetList').innerHTML = presets.map(function (item) {
        return remarkCardHTML(item, defaultId);
    }).join('');

    var customList = document.getElementById('customList');
    var customEmpty = document.getElementById('customEmpty');
    if (!customs.length) {
        customList.innerHTML = '';
        customEmpty.classList.remove('hidden');
    } else {
        customEmpty.classList.add('hidden');
        customList.innerHTML = customs.map(function (item) {
            return remarkCardHTML(item, defaultId);
        }).join('');
    }
}

function openRemarkEditor(id) {
    editingRemarkId = id || null;
    var title = document.getElementById('editorTitle');
    var nameInput = document.getElementById('remarkNameInput');
    var templateInput = document.getElementById('remarkTemplateInput');

    if (editingRemarkId) {
        var remark = getAllRemarks().find(function (item) {
            return item.id === editingRemarkId;
        });
        if (!remark) {
            showToast('未找到附言模板');
            return;
        }
        title.textContent = '编辑附言';
        nameInput.value = remark.name || '';
        templateInput.value = remark.template || '';
    } else {
        title.textContent = '新增附言';
        nameInput.value = '';
        templateInput.value = '';
    }

    updatePreview();
    document.getElementById('editorOverlay').classList.add('show');
    document.getElementById('editorSheet').classList.add('show');

    setTimeout(function () {
        nameInput.focus();
    }, 100);
}

function insertPlaceholder(text) {
    var textarea = document.getElementById('remarkTemplateInput');
    if (!textarea) return;
    var start = textarea.selectionStart || 0;
    var end = textarea.selectionEnd || 0;
    var value = textarea.value || '';
    textarea.value = value.slice(0, start) + text + value.slice(end);
    var nextPos = start + text.length;
    textarea.focus();
    textarea.setSelectionRange(nextPos, nextPos);
    updatePreview();
}

function updatePreview() {
    var template = document.getElementById('remarkTemplateInput').value.trim();
    var preview = document.getElementById('remarkPreviewText');
    var countEl = document.getElementById('remarkPreviewCount');
    var warnEl = document.getElementById('remarkPreviewWarn');
    if (!preview) return;
    if (!template) {
        preview.textContent = '请输入附言内容';
        if (countEl) countEl.textContent = '0/20';
        if (warnEl) warnEl.classList.add('hidden');
        return;
    }
    var rendered = template
        .replace(/\{农产品名称\}|\{商品名称\}/g, '小麦')
        .replace(/\{净重\}/g, '20000斤')
        .replace(/\{付款方\}/g, '张老板收购站')
        .replace(/\{日期\}/g, '04-18')
        .replace(/\{金额\}/g, '38500')
        .replace(/\{收款人\}/g, '李大姐');
    preview.textContent = rendered;
    if (countEl) countEl.textContent = rendered.length + '/20';
    if (warnEl) warnEl.classList.toggle('hidden', rendered.length <= 20);
}

function closeRemarkEditor() {
    editingRemarkId = null;
    document.getElementById('editorOverlay').classList.remove('show');
    document.getElementById('editorSheet').classList.remove('show');
}

function saveRemark() {
    var name = document.getElementById('remarkNameInput').value.trim();
    var template = document.getElementById('remarkTemplateInput').value.trim();

    if (!name) {
        showToast('请输入附言名称');
        return;
    }
    if (!template) {
        showToast('请输入附言内容');
        return;
    }

    if (editingRemarkId) {
        store.updateRemark(editingRemarkId, {
            name: name,
            template: template
        });
        closeRemarkEditor();
        render();
        showToast('已保存附言');
        return;
    }

    store.addCustomRemark(name, template);
    closeRemarkEditor();
    render();
    showToast('已新增附言');
}

function openDeleteSheet(id) {
    deletingRemarkId = id;
    var remark = getAllRemarks().find(function (item) {
        return item.id === id;
    });
    if (!remark) {
        deletingRemarkId = null;
        showToast('未找到附言模板');
        return;
    }
    document.getElementById('deleteDesc').textContent = '“' + (remark.name || '该附言') + '” 删除后不可恢复，请谨慎操作。';
    document.getElementById('deleteOverlay').classList.add('show');
    document.getElementById('deleteSheet').classList.add('show');
}

function closeDeleteSheet() {
    deletingRemarkId = null;
    document.getElementById('deleteOverlay').classList.remove('show');
    document.getElementById('deleteSheet').classList.remove('show');
}

function confirmDeleteRemark() {
    if (!deletingRemarkId) return;
    var success = store.removeRemark(deletingRemarkId);
    if (!success) {
        showToast('删除失败');
        return;
    }
    closeDeleteSheet();
    render();
    showToast('已删除附言');
}

function setAsDefault(id) {
    store.setDefaultRemark(id);
    render();
    showToast('已设为默认');
}

window.addEventListener('pageshow', function () {
    render();
});

render();
</script>
</body>
</html>
