<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>丰收云 - 账户码</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500,700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="shared.js"></script>
    <style>
        /* Toast 提示 */
        .toast-tip {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            padding: 12px 20px;
            background: rgba(17, 24, 39, 0.9);
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .toast-tip.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
    </style>
</head>
<body>
<div class="mobile-container">
    <div id="statusBar"></div>
    <div id="navBar"></div>

    <div class="flex-1 overflow-y-auto no-scrollbar px-4 pb-4" style="padding-bottom:90px;">

        <!-- 账户码展示卡片 (单层 Liquid Glass 风格) -->
        <div class="rounded-3xl p-8 mt-4 text-center relative overflow-hidden" style="background: linear-gradient(145deg, rgba(255,255,255,0.95), rgba(240,253,244,0.7)); border: 1px solid rgba(255,255,255,0.8); box-shadow: 0 16px 32px -12px rgba(17, 166, 74, 0.15), inset 0 2px 4px rgba(255,255,255,1); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);">
            <div class="flex items-center justify-center gap-2 mb-6">
                <i class="fas fa-qrcode text-primary text-xl"></i>
                <span class="text-lg font-bold text-gray-800">我的账户码</span>
            </div>

            <!-- 二维码主体区域 -->
            <div id="qrWrap" class="w-56 h-56 bg-white rounded-3xl mx-auto flex items-center justify-center border border-gray-100/50 shadow-sm relative">
                <!-- 模拟二维码图案 -->
                <div class="w-44 h-44 relative">
                    <svg viewBox="0 0 100 100" class="w-full h-full">
                        <!-- 外边框 -->
                        <rect x="5" y="5" width="25" height="25" fill="none" stroke="#22303c" stroke-width="2" rx="4"/>
                        <rect x="8" y="8" width="19" height="19" fill="#22303c" rx="2"/>
                        <rect x="12" y="12" width="11" height="11" fill="white" rx="1"/>

                        <rect x="70" y="5" width="25" height="25" fill="none" stroke="#22303c" stroke-width="2" rx="4"/>
                        <rect x="73" y="8" width="19" height="19" fill="#22303c" rx="2"/>
                        <rect x="77" y="12" width="11" height="11" fill="white" rx="1"/>

                        <rect x="5" y="70" width="25" height="25" fill="none" stroke="#22303c" stroke-width="2" rx="4"/>
                        <rect x="8" y="73" width="19" height="19" fill="#22303c" rx="2"/>
                        <rect x="12" y="77" width="11" height="11" fill="white" rx="1"/>

                        <!-- 随机数据点 -->
                        <path d="M35 8h4v4h-4zm10 0h4v4h-4zm10 0h4v4h-4zm-20 10h4v4h-4zm15 0h4v4h-4zm10 0h4v4h-4zm-20 10h4v4h-4zm15 0h4v4h-4zm-37 7h4v4h-4zm10 0h4v4h-4zm10 0h4v4h-4zm-20 10h4v4h-4zm12 0h4v4h-4zm-12 10h4v4h-4zm17 0h4v4h-4zm45-20h4v4h-4zm10 0h4v4h-4zm10 0h4v4h-4zm-15 10h4v4h-4zm10 0h4v4h-4zm-15 10h4v4h-4zm10 0h4v4h-4zm-45 15h4v4h-4zm10 0h4v4h-4zm10 0h4v4h-4zm-15 10h4v4h-4zm10 0h4v4h-4zm10 0h4v4h-4zm-25 10h4v4h-4zm15 0h4v4h-4zm15 0h4v4h-4zm10 0h4v4h-4zm10 0h4v4h-4z" fill="#22303c"/>

                        <!-- 中心Logo区域 -->
                        <circle cx="50" cy="50" r="9" fill="white"/>
                        <circle cx="50" cy="50" r="6" fill="#11A64A"/>
                    </svg>
                </div>
                <!-- 丰收云Logo水印 -->
                <div class="absolute inset-0 flex items-center justify-center">
                    <div class="w-12 h-12 bg-white rounded-xl shadow-[0_2px_8px_rgba(0,0,0,0.1)] flex items-center justify-center">
                        <i class="fas fa-wheat-awn text-primary text-xl"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- 操作指引文案移到卡片下方，获得更大排版空间 -->
        <div class="mt-4 px-2">
            <div class="flex items-start gap-2 text-[13px] leading-relaxed text-gray-500 font-medium">
                <i class="fas fa-circle-info text-primary/60 mt-0.5 text-[14px]"></i>
                <p class="flex-1">您可以将此二维码保存并发送给收购商，对方扫码后即可获取您的收款账户信息进行转账付款。</p>
            </div>
        </div>

        <!-- 保存按钮 -->
        <div class="mt-6 flex justify-center">
            <button class="px-8 py-3 rounded-full bg-gradient-to-r from-green-500 to-emerald-600 text-white text-sm font-bold shadow-[0_8px_16px_rgba(16,185,129,0.3)] active:scale-[0.98] transition-transform" onclick="saveQr()">
                <i class="fas fa-download mr-1.5"></i>保存账户码
            </button>
        </div>

        <!-- 收款账户信息卡片 -->
        <div class="glass-card rounded-2xl p-4 mt-3">
            <div class="flex items-center gap-2 mb-3">
                <div class="w-1 h-4 bg-primary rounded-full"></div>
                <span class="text-sm font-medium text-gray-700">收款账户</span>
            </div>
            <!-- 银行账户信息 - 带图标样式 -->
            <div class="bg-white rounded-2xl p-4 border border-gray-100">
                <div class="flex items-center gap-3 mb-4">
                    <!-- 银行Logo -->
                    <div class="w-10 h-10 rounded-full bg-[#11A64A]/10 flex items-center justify-center shrink-0">
                        <i class="fas fa-building-columns text-[#11A64A] text-lg"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="text-sm font-semibold text-gray-800">中国邮政储蓄银行</div>
                        <div class="text-xs text-gray-400 mt-0.5">开户行：烟台市福山区支行</div>
                    </div>
                </div>
                <!-- 分隔线 -->
                <div class="h-px bg-gray-100 mb-3"></div>
                <!-- 卡号和开户人 -->
                <div class="space-y-2">
                    <div class="flex items-center justify-between">
                        <span class="text-xs text-gray-400">银行卡号</span>
                        <span class="text-sm font-medium text-gray-800" style="font-family: 'Poppins', monospace;">6228 **** **** 8888</span>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-xs text-gray-400">开户人</span>
                        <span class="text-sm font-medium text-gray-800">李大姐</span>
                    </div>
                </div>
            </div>
            <div class="text-[10px] text-gray-400 mt-3 flex items-center justify-center">
                <i class="fas fa-shield-halved text-primary/70 mr-1"></i>
                收款账户由网点统一维护，修改请联系客户经理
            </div>
        </div>
    </div>

    <div id="tabBar"></div>
    <div id="toastTip" class="toast-tip"></div>
</div>

<script>
// 动态返回链接
var q = new URLSearchParams(window.location.search);
var sourcePage = q.get('source') || '';
var backLink = sourcePage === 'home' ? 'farmer-home.html' : 'farmer-home.html';

document.getElementById('statusBar').innerHTML = renderStatusBar();
document.getElementById('navBar').innerHTML = renderHeader('账户码', backLink);
document.getElementById('tabBar').innerHTML = renderFarmerTabBar('collection');

// 保存收款码
function saveQr() {
    showToast('已保存到相册');
}

// 显示提示
function showToast(msg) {
    var tip = document.getElementById('toastTip');
    tip.textContent = msg;
    tip.classList.add('show');
    clearTimeout(showToast.timer);
    showToast.timer = setTimeout(function() {
        tip.classList.remove('show');
    }, 1800);
}
</script>
</body>
</html>
