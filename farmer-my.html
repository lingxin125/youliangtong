<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>丰收云 - 我的</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="shared.js"></script>
    <style>
        .role-switch-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            height: 28px;
            padding: 0 12px;
            border-radius: 999px;
            background: #11A64A;
            color: #ffffff;
            font-size: 13px;
            font-weight: 500;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(17, 166, 74, 0.2);
            transition: transform 0.18s ease, opacity 0.18s ease;
        }
        .role-switch-chip:active {
            transform: scale(0.96);
            opacity: 0.85;
        }
        .logout-modal-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            z-index: 95;
            display: flex;
            align-items: flex-end;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.22s ease;
        }
        .logout-modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .logout-modal-sheet {
            width: 100%;
            background: #fff;
            border-radius: 22px 22px 0 0;
            padding: 16px 16px calc(18px + env(safe-area-inset-bottom));
            transform: translateY(18px);
            transition: transform 0.22s ease;
            box-shadow: 0 -12px 30px rgba(15, 23, 42, 0.2);
        }
        .logout-modal-overlay.show .logout-modal-sheet {
            transform: translateY(0);
        }
        .switch-role-modal-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            z-index: 92;
            display: flex;
            align-items: flex-end;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.22s ease;
        }
        .switch-role-modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .switch-role-modal-sheet {
            width: 100%;
            background: #fff;
            border-radius: 22px 22px 0 0;
            padding: 16px 16px calc(18px + env(safe-area-inset-bottom));
            transform: translateY(18px);
            transition: transform 0.22s ease;
            box-shadow: 0 -12px 30px rgba(15, 23, 42, 0.2);
        }
        .switch-role-modal-overlay.show .switch-role-modal-sheet {
            transform: translateY(0);
        }
    </style>
</head>
<body>
<div class="mobile-container">
    <!-- 状态栏 -->

    <!-- 导航栏 -->

    <!-- 主内容区 -->

        <!-- 顶部操作区与用户信息 -->

            <div class="flex justify-end mb-4 pr-1">

                    <button id="farmerSwitchRoleChip" type="button" class="role-switch-chip" onclick="return openSwitchRoleModal(event)">

                    </div>

                        <i class="fas fa-chevron-right text-gray-300 text-[11px] ml-[1px]"></i>

        </div>

        <!-- 功能菜单 -->

            <div class="h-px bg-gray-100 mx-4"></div>
            <!-- 需求管理 -->
            <a href="farmer-demand-manage.html?source=my" class="flex items-center justify-between px-4 py-3.5 no-underline" style="text-decoration:none;">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-green-50 flex items-center justify-center">
                        <i class="fas fa-list-check text-green-600 text-sm"></i>
                    </div>
                    <span class="text-sm text-gray-700">需求管理</span>
                </div>

            </a>
            <div class="h-px bg-gray-100 mx-4"></div>
            <!-- 收款记录 -->
            <a href="farmer-collection-records.html?source=my" class="flex items-center justify-between px-4 py-3.5 no-underline" style="text-decoration:none;">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-blue-50 flex items-center justify-center">
                        <i class="fas fa-receipt text-blue-500 text-sm"></i>
                    </div>
                    <span class="text-sm text-gray-700">收款记录</span>
                </div>
                <i class="fas fa-chevron-right text-gray-300 text-xs"></i>
            </a>
            <div class="h-px bg-gray-100 mx-4"></div>
            <!-- 帮助与反馈 -->
            <a href="#" class="flex items-center justify-between px-4 py-3.5 no-underline" style="text-decoration:none;">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center">
                        <i class="fas fa-question-circle text-primary text-sm"></i>
                    </div>
                    <span class="text-sm text-gray-700">帮助与反馈（占位）</span>
                </div>
                <i class="fas fa-chevron-right text-gray-300 text-xs"></i>
            </a>
            <div class="h-px bg-gray-100 mx-4"></div>
            <!-- 账户管理 -->
            <a href="account-security.html?source=farmer-my.html" class="flex items-center justify-between px-4 py-3.5 no-underline" style="text-decoration:none;">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-emerald-50 flex items-center justify-center">
                        <i class="fas fa-building-columns text-emerald-600 text-sm"></i>
                    </div>
                    <span class="text-sm text-gray-700">账户管理</span>
                </div>
                <i class="fas fa-chevron-right text-gray-300 text-xs"></i>
            </a>
            <div class="h-px bg-gray-100 mx-4"></div>
            <!-- 报表分析 -->
            <a href="buyer-profit-analysis.html" class="flex items-center justify-between px-4 py-3.5 no-underline" style="text-decoration:none;">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-blue-50 flex items-center justify-center">

            </a>
            <!--
            <div class="h-px bg-gray-100 mx-4"></div>
            关于模块（MVP 暂不开放）
            <a href="about-us.html" class="flex items-center justify-between px-4 py-3.5 no-underline" style="text-decoration:none;">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-purple-50 flex items-center justify-center">
                        <i class="fas fa-info-circle text-purple-500 text-sm"></i>
                    </div>
                    <span class="text-sm text-gray-700">关于</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-xs text-gray-400">V1.1.0</span>
                    <i class="fas fa-chevron-right text-gray-300 text-xs"></i>
                </div>
            </a>
            -->
        </div>

        <!-- 服务通知设置 -->
        <div class="bg-white rounded-2xl p-4 border border-black/[0.04] shadow-[0_1px_3px_rgba(0,0,0,0.04)]">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-green-50 flex items-center justify-center">
                        <i class="fab fa-weixin text-green-500 text-sm"></i>
                    </div>
                    <div>
                        <div class="text-sm text-gray-700">微信服务通知（待定）</div>
                        <div class="text-[11px] text-gray-400">开启后接收订单、收款等通知</div>
                    </div>
                </div>
                <!-- 开关 -->
                <div class="relative inline-block w-11 h-6 cursor-pointer" onclick="toggleWechatNotify()">
                    <input type="checkbox" id="wechatNotifySwitch" class="peer sr-only">
                    <div class="w-11 h-6 bg-gray-200 rounded-full peer peer-checked:bg-primary transition-colors duration-300"></div>
                    <div class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full shadow transition-transform duration-300 peer-checked:translate-x-5"></div>
                </div>
            </div>
        </div>

        <!-- 退出登录 -->
        <div class="pt-4">
            <a href="#" onclick="return openLogoutModal(event)" class="block w-full py-3 rounded-2xl bg-white border border-black/[0.04] text-red-500 text-sm font-medium text-center no-underline" style="text-decoration:none;">
                退出登录
            </a>
            <div class="mt-2 text-center text-[11px] text-gray-400 tracking-wide select-none">版本号 v1.1.0</div>
        </div>
    </div>

    <!-- 退出登录确认弹窗 -->
    <div id="logoutModal" class="logout-modal-overlay" onclick="closeLogoutModal()">
        <div class="logout-modal-sheet" onclick="event.stopPropagation()">
            <div class="text-[16px] font-semibold text-gray-800 text-center mb-2">退出当前账号</div>
            <div class="text-[12px] text-gray-500 text-center mb-4">退出后需要重新登录才能继续使用</div>
            <div class="flex gap-2.5">
                <button class="flex-1 h-11 rounded-xl bg-white border border-gray-200 text-sm text-gray-600 active:scale-[0.98] transition-transform" onclick="closeLogoutModal()">取消</button>
                <button class="flex-1 h-11 rounded-xl bg-red-500 text-white text-sm font-medium active:scale-[0.98] transition-transform" onclick="confirmLogout()">退出登录</button>
            </div>
        </div>
    </div>

    <!-- 身份切换确认弹窗 -->
    <div id="switchRoleModal" class="switch-role-modal-overlay" onclick="closeSwitchRoleModal()">
        <div class="switch-role-modal-sheet" onclick="event.stopPropagation()">
            <div class="text-[16px] font-semibold text-gray-800 text-center mb-2">切换身份</div>
            <div id="switchRoleModalDesc" class="text-[12px] text-gray-500 text-center mb-4">确认切换到买方身份？切换后将进入买方首页</div>
            <div class="flex gap-2.5">
                <button class="flex-1 h-11 rounded-xl bg-white border border-gray-200 text-sm text-gray-600 active:scale-[0.98] transition-transform" onclick="closeSwitchRoleModal()">取消</button>
                <button id="switchRoleConfirmBtn" class="flex-1 h-11 rounded-xl bg-primary text-white text-sm font-medium active:scale-[0.98] transition-transform" onclick="confirmSwitchRole()">确认切换</button>
            </div>
        </div>
    </div>

    <!-- 底部导航栏 -->
    <div id="tabBar"></div>
</div>

<script>
document.getElementById('statusBar').innerHTML = renderStatusBar();
document.getElementById('navBar').innerHTML = renderHeader('我的');
document.getElementById('tabBar').innerHTML = renderFarmerTabBar('mine');

// 微信服务通知开关
function toggleWechatNotify() {
    var checkbox = document.getElementById('wechatNotifySwitch');
    checkbox.checked = !checkbox.checked;

    // 保存状态到本地存储
    try {
        localStorage.setItem('ylt_wechat_notify_enabled', checkbox.checked ? '1' : '0');
    } catch (e) {}

    // 显示提示
    showToast(checkbox.checked ? '已开启微信服务通知' : '已关闭微信服务通知');
}

// 初始化开关状态
function initWechatNotify() {
    var checkbox = document.getElementById('wechatNotifySwitch');
    try {
        var enabled = localStorage.getItem('ylt_wechat_notify_enabled');
        checkbox.checked = enabled === '1';
    } catch (e) {
        checkbox.checked = false;
    }
}

// Toast 提示
function showToast(msg) {
    var existing = document.querySelector('.toast-msg');
    if (existing) existing.remove();

    var div = document.createElement('div');
    div.className = 'toast-msg fixed left-1/2 -translate-x-1/2 bottom-24 px-4 py-2 bg-black/80 text-white text-xs rounded-lg z-50';
    div.textContent = msg;
    document.body.appendChild(div);

    setTimeout(function() {
        div.style.opacity = '0';
        div.style.transition = 'opacity 0.3s';
        setTimeout(function() { div.remove(); }, 300);
    }, 1500);
}

function copyTopMerchantNo(event, id) {
    if (event) {
        if (typeof event.preventDefault === 'function') event.preventDefault();
        if (typeof event.stopPropagation === 'function') event.stopPropagation();
        if (typeof event.stopImmediatePropagation === 'function') event.stopImmediatePropagation();
    }
    var merchantNo = (document.getElementById(id) || {}).textContent || '';
    if (!merchantNo) {
        showToast('未获取到商户号');
        return false;
    }
    if (navigator.clipboard) {
        navigator.clipboard.writeText(merchantNo).then(function() {
            showToast('商户号已复制');
        }).catch(function() {
            showToast('复制失败，请手动复制');
        });
    } else {
        var input = document.createElement('input');
        input.value = merchantNo;
        document.body.appendChild(input);
        input.select();
        try {
            document.execCommand('copy');
            showToast('商户号已复制');
        } catch (e) {
            showToast('复制失败，请手动复制');
        }
        document.body.removeChild(input);
    }
    return false;
}

function openLogoutModal(event) {
    if (event) {
        if (typeof event.preventDefault === 'function') event.preventDefault();
        if (typeof event.stopPropagation === 'function') event.stopPropagation();
    }
    var modal = document.getElementById('logoutModal');
    if (!modal) return false;
    modal.classList.add('show');
    return false;
}

function closeLogoutModal() {
    var modal = document.getElementById('logoutModal');
    if (!modal) return;
    modal.classList.remove('show');
}

function confirmLogout() {
    window.location.href = 'login.html';
}

// 页面加载时初始化
initWechatNotify();

// === 身份切换逻辑 ===
var _switchTargetRole = null;
var _switchTargetLabel = '';
var _switchTargetActionText = '';
var _defaultSwitchRole = 'buyer';

function getSwitchActionText(role) {
    return role === 'buyer' ? '买方' : '卖方';
}

(function initSwitchRole() {
    var otherRole = _defaultSwitchRole;
    var label = getSwitchActionText(otherRole);
    if (typeof UserIdentityStore !== 'undefined') {
        var user = UserIdentityStore.getCurrentUser();
        if (user && UserIdentityStore.hasMultipleRoles()) {
            otherRole = UserIdentityStore.getOtherRole() || _defaultSwitchRole;
            label = UserIdentityStore.getRoleLabel(otherRole);
        }
    }

    _switchTargetRole = otherRole;
    _switchTargetLabel = label;
    _switchTargetActionText = getSwitchActionText(otherRole);

    var chipWrap = document.getElementById('farmerSwitchRoleWrap');
    var chipLabel = document.getElementById('farmerSwitchRoleLabel');
    if (chipWrap) {
        chipWrap.classList.remove('hidden');
    }
    if (chipLabel) {
        chipLabel.textContent = '切换到' + _switchTargetActionText;
    }

    var modalDesc = document.getElementById('switchRoleModalDesc');
    if (modalDesc) modalDesc.textContent = '确认切换到' + _switchTargetActionText + '身份？切换后将进入' + _switchTargetActionText + '首页';
})();

function openSwitchRoleModal(event) {
    if (event) {
        if (typeof event.preventDefault === 'function') event.preventDefault();
        if (typeof event.stopPropagation === 'function') event.stopPropagation();
    }
    var modal = document.getElementById('switchRoleModal');
    if (!modal) return false;
    modal.classList.add('show');
    return false;
}

function closeSwitchRoleModal() {
    var modal = document.getElementById('switchRoleModal');
    if (!modal) return;
    modal.classList.remove('show');
}

function confirmSwitchRole() {
    if (!_switchTargetRole) return;
    if (typeof UserIdentityStore !== 'undefined') {
        UserIdentityStore.setCurrentRole(_switchTargetRole);
        window.location.href = UserIdentityStore.getHomeUrl(_switchTargetRole);
        return;
    }
    window.location.href = _switchTargetRole === 'buyer' ? 'buyer-home.html' : 'farmer-home.html';
}
</script>
