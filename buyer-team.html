<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>丰收云 - 团队管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="shared.js?v=20260424-team-permission-v2"></script>
    <style>
        .billing-sheet-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            z-index: 90;
            opacity: 0;
            visibility: hidden;
            transition: all 0.22s ease;
        }
        .billing-sheet-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        .billing-sheet {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 100;
            background: #fff;
            border-radius: 24px 24px 0 0;
            transform: translateY(100%);
            transition: transform 0.26s ease;
            max-height: 82%;
            overflow-y: auto;
            box-shadow: 0 -12px 30px rgba(15, 23, 42, 0.18);
        }
        .billing-sheet.show {
            transform: translateY(0);
        }
        .billing-sheet-handle {
            width: 40px;
            height: 4px;
            background: #d1d5db;
            border-radius: 999px;
            margin: 12px auto;
        }
        .toast-msg {
            position: absolute;
            left: 50%;
            bottom: 108px;
            transform: translateX(-50%);
            padding: 10px 16px;
            background: rgba(17, 24, 39, 0.88);
            color: #fff;
            border-radius: 12px;
            font-size: 12px;
            z-index: 130;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease;
            white-space: nowrap;
        }
        .toast-msg.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .member-swipe-wrapper { position: relative; overflow: hidden; border-radius: 18px; }
        .member-swipe-content { position: relative; z-index: 1; background: transparent; transition: transform 0.2s ease; }
        .member-swipe-delete {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 72px;
            background: #EF4444;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transform: translateX(100%);
            transition: transform 0.2s ease;
        }
        .member-swipe-wrapper.swiped .member-swipe-delete { transform: translateX(0); }
        .member-swipe-wrapper.swiped .member-swipe-content { transform: translateX(-72px); }
        .permission-summary-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
            padding: 11px 12px;
            border-radius: 16px;
            border: 1px solid #edf1f5;
            background: linear-gradient(180deg, #fbfcfd 0%, #f7fafb 100%);
            transition: all 0.18s ease;
        }
        .permission-summary-row:active {
            transform: scale(0.985);
        }
        .permission-icons {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            min-width: 0;
        }
        .permission-icon {
            width: 26px;
            height: 26px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            border: 1px solid transparent;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        .permission-icon.is-off {
            background: #f3f4f6;
            color: #c0c4cc;
            border-color: #eceff3;
        }
        .permission-icon.is-on.wechat {
            background: #eafbf1;
            color: #07c160;
            border-color: rgba(7, 193, 96, 0.14);
        }
        .permission-icon.is-on.alipay {
            background: #ecf5ff;
            color: #1677ff;
            border-color: rgba(22, 119, 255, 0.14);
        }
        .permission-icon.is-on.unionpay {
            background: #eef3ff;
            color: #3a63ff;
            border-color: rgba(58, 99, 255, 0.14);
        }
        .permission-icon.is-on.psbcApp {
            background: #eefaf3;
            color: #1e9f55;
            border-color: rgba(30, 159, 85, 0.14);
        }
        .permission-drill-btn {
            width: 14px;
            height: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: 0;
            color: #c2c8d0;
            flex-shrink: 0;
            transition: all 0.18s ease;
        }
        .permission-drill-btn:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body>
<div class="mobile-container relative">
    <div id="statusBar"></div>
    <div id="navBar"></div>

    <div class="flex-1 overflow-y-auto hide-scrollbar pb-24 relative bg-[#F7F8FA]">
        <div class="bg-white rounded-b-[24px] px-5 pt-4 pb-5 shadow-[0_4px_20px_rgba(0,0,0,0.02)] relative z-10">
            <div class="flex items-start gap-4">
                <div class="w-14 h-14 rounded-full bg-gradient-to-br from-[#EBF7F0] to-[#D1F0DE] border border-[#11A64A]/20 flex items-center justify-center shrink-0">
                    <i class="fas fa-building text-[#11A64A] text-2xl"></i>
                </div>

                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 mb-1">
                        <h2 class="text-[18px] font-bold text-gray-800 truncate" id="teamName">张老板收购站的团队</h2>
                        <button id="editTeamNameBtn" class="w-6 h-6 rounded-md bg-gray-50 flex items-center justify-center text-gray-400 active:scale-95 transition-transform" onclick="openEditTeamNameSheet()">
                            <i class="fas fa-pen text-[10px]"></i>
                        </button>
                    </div>
                    <div class="flex items-center gap-2 flex-wrap">
                        <span class="text-[12px] text-gray-400">共 <span class="font-poppins font-semibold text-gray-700" id="teamCountNum">0</span> 人</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="px-5 mt-5 mb-3 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-1.5 h-4 rounded-full bg-gradient-to-b from-[#11A64A] to-[#388E3C]"></div>
                <span class="text-[15px] font-bold text-gray-800 tracking-wide">业务员列表</span>
            </div>
        </div>

        <div id="memberList" class="px-4 space-y-3"></div>

        <div id="emptyState" class="hidden px-5 pt-16 text-center">
            <div class="w-16 h-16 mx-auto rounded-full bg-[#F0FDF4] flex items-center justify-center mb-4">
                <i class="fas fa-users text-[#11A64A] text-[22px]"></i>
            </div>
            <div class="text-[15px] font-medium text-gray-700">暂无业务员</div>
            <div class="text-[12px] text-gray-400 mt-2">可点击下方按钮添加业务员加入当前团队</div>
        </div>

        <div id="noAccessState" class="hidden px-5 pt-16 text-center">
            <div class="w-16 h-16 mx-auto rounded-full bg-[#FFF7ED] flex items-center justify-center mb-4">
                <i class="fas fa-lock text-[#F59E0B] text-[22px]"></i>
            </div>
            <div class="text-[15px] font-medium text-gray-700">暂无团队管理权限</div>
            <div class="text-[12px] text-gray-400 mt-2 leading-5">当前仅超管可查看团队成员并管理开单权限，请联系超管处理。</div>
        </div>
    </div>

    <div id="teamManageActionBar" class="absolute bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-white/40 px-5 py-4 z-40 pb-safe">
        <button onclick="openAddMemberSheet()" class="w-full h-12 bg-gradient-to-r from-[#11A64A] to-[#388E3C] text-white font-bold text-[15px] rounded-xl shadow-[0_8px_20px_rgba(17,166,74,0.2)] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
            <i class="fas fa-user-plus"></i> 添加业务员
        </button>
    </div>

    <div class="billing-sheet-overlay" id="addMemberOverlay" onclick="closeAddMemberSheet()"></div>
    <div class="billing-sheet" id="addMemberSheet">
        <div class="billing-sheet-handle"></div>
        <div class="px-5 pb-6">
            <div class="flex items-center justify-between mb-5">
                <h3 class="text-[16px] font-bold text-gray-800">添加业务员</h3>
                <button onclick="closeAddMemberSheet()" class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 active:scale-95 transition-transform">
                    <i class="fas fa-times text-sm"></i>
                </button>
            </div>

            <div class="mb-4">
                <label class="text-[13px] font-medium text-gray-600 block mb-1.5">业务员姓名 <span class="text-red-500">*</span></label>
                <div class="relative flex items-center border border-gray-200 rounded-xl bg-gray-50 focus-within:bg-white focus-within:border-[#11A64A] focus-within:ring-2 focus-within:ring-[#11A64A]/20 transition-all overflow-hidden">
                    <i class="fas fa-user text-gray-400 absolute left-3.5 text-sm"></i>
                    <input type="text" id="addMemberName" placeholder="请输入业务员真实姓名" class="w-full pl-9 pr-3 py-3 text-sm outline-none bg-transparent m-0 font-medium text-gray-800">
                </div>
            </div>

            <div class="mb-6">
                <label class="text-[13px] font-medium text-gray-600 block mb-1.5">业务员手机号 <span class="text-red-500">*</span></label>
                <div class="relative flex items-center border border-gray-200 rounded-xl bg-gray-50 focus-within:bg-white focus-within:border-[#11A64A] focus-within:ring-2 focus-within:ring-[#11A64A]/20 transition-all overflow-hidden">
                    <i class="fas fa-mobile-alt text-gray-400 absolute left-3.5 text-sm"></i>
                    <input type="tel" id="addMemberMobile" placeholder="作为业务员的登录账号" class="w-full pl-9 pr-3 py-3 text-sm outline-none bg-transparent m-0 font-poppins font-medium text-gray-800" maxlength="11">
                </div>
            </div>

            <button onclick="confirmAddMember()" class="w-full h-12 bg-[#11A64A] text-white font-bold text-[15px] rounded-xl shadow-[0_4px_12px_rgba(17,166,74,0.2)] active:scale-[0.98] transition-all">
                确认添加
            </button>
            <p class="text-center text-[11px] text-gray-400 mt-3">添加成功后，业务员可通过手机号+验证码登录系统</p>
        </div>
    </div>

    <div class="billing-sheet-overlay" id="editTeamNameOverlay" onclick="closeEditTeamNameSheet()"></div>
    <div class="billing-sheet" id="editTeamNameSheet">
        <div class="billing-sheet-handle"></div>
        <div class="px-5 pb-6">
            <div class="flex items-center justify-between mb-5">
                <h3 class="text-[16px] font-bold text-gray-800">编辑团队名称</h3>
                <button onclick="closeEditTeamNameSheet()" class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 active:scale-95 transition-transform">
                    <i class="fas fa-times text-sm"></i>
                </button>
            </div>
            <div class="mb-5">
                <label class="text-[13px] font-medium text-gray-600 block mb-1.5">团队名称</label>
                <div class="relative flex items-center border border-gray-200 rounded-xl bg-gray-50 focus-within:bg-white focus-within:border-[#11A64A] focus-within:ring-2 focus-within:ring-[#11A64A]/20 transition-all overflow-hidden">
                    <i class="fas fa-building text-gray-400 absolute left-3.5 text-sm"></i>
                    <input type="text" id="teamNameInput" placeholder="请输入团队名称" class="w-full pl-9 pr-3 py-3 text-sm outline-none bg-transparent m-0 font-medium text-gray-800">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="closeEditTeamNameSheet()" class="h-11 rounded-xl bg-gray-100 text-gray-600 font-bold text-[14px] active:bg-gray-200 transition-colors">取消</button>
                <button onclick="saveTeamName()" class="h-11 rounded-xl bg-[#11A64A] text-white font-bold text-[14px] shadow-[0_4px_12px_rgba(17,166,74,0.2)] active:scale-[0.98] transition-all">保存</button>
            </div>
        </div>
    </div>

    <div class="billing-sheet-overlay" id="removeMemberOverlay" onclick="closeRemoveMemberSheet()"></div>
    <div class="billing-sheet" id="removeMemberSheet">
        <div class="billing-sheet-handle"></div>
        <div class="px-5 pb-6 pb-safe">
            <div class="flex flex-col items-center text-center mb-5">
                <div class="w-14 h-14 rounded-full bg-red-50 flex items-center justify-center mb-3">
                    <i class="fas fa-user-minus text-red-500 text-[20px]"></i>
                </div>
                <h3 class="text-[16px] font-bold text-gray-800 mb-1">确认移除该业务员？</h3>
                <p id="removeMemberDesc" class="text-[12px] text-gray-400 leading-5">移除后不可恢复，请谨慎操作。</p>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="closeRemoveMemberSheet()" class="h-11 rounded-xl bg-gray-100 text-gray-600 font-bold text-[14px] active:bg-gray-200 transition-colors">取消</button>
                <button onclick="confirmRemoveMember()" class="h-11 rounded-xl bg-red-500 text-white font-bold text-[14px] shadow-[0_4px_12px_rgba(239,68,68,0.18)] active:scale-[0.98] transition-all">移除</button>
            </div>
        </div>
    </div>

    <div id="toastMsg" class="toast-msg"></div>
</div>

<script>
document.getElementById('statusBar').innerHTML = renderStatusBar();
document.getElementById('navBar').innerHTML = renderHeader('团队管理', 'buyer-my.html');

var store = window.TeamMockStore || null;
var ROLES = store ? store.TEAM_ROLES : {
    owner: { label: '超管', canManage: true },
    operator: { label: '业务员', canManage: false }
};
var BILLING_CHANNELS = [
    { key: 'wechat', label: '微信', icon: 'fab fa-weixin', glyph: '微', className: 'wechat' },
    { key: 'alipay', label: '支付宝', icon: 'fab fa-alipay', glyph: '支', className: 'alipay' },
    { key: 'unionpay', label: '云闪付', icon: '', glyph: '云', className: 'unionpay' },
    { key: 'psbcApp', label: '邮储银行 App', icon: '', glyph: '邮', className: 'psbcApp' }
];

var managingUserId = null;

(function initTeam() {
    if (!store) return;
    var team = store.getCurrentTeam();
    if (!team) {
        var allTeams = store.getAllTeams();
        if (allTeams.length > 0) {
            store.switchTeam(allTeams[0].teamId);
        }
    }
})();

function getTeam() {
    return store ? store.getCurrentTeam() : null;
}

function getMembers() {
    var team = getTeam();
    return team ? store.getMembers(team.teamId) : [];
}

function getCurrentUserSafe() {
    return window.UserIdentityStore && typeof UserIdentityStore.getCurrentUser === 'function'
        ? UserIdentityStore.getCurrentUser()
        : null;
}

function isOwnerRole(role) {
    return role === 'owner';
}

function canManageTeamPage() {
    return isOwnerRole(getCurrentRoleSafe());
}

function roleBadgeClass(role) {
    if (role === 'owner') return 'bg-green-50 text-primary border-green-100';
    return 'bg-gray-100 text-gray-600 border-gray-200';
}

function maskMobile(mobile) {
    if (!mobile || mobile.length < 7) return mobile || '';
    return mobile.substring(0, 3) + '****' + mobile.substring(7);
}

function escapeText(text) {
    return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function showToast(msg) {
    var toast = document.getElementById('toastMsg');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(showToast.timer);
    showToast.timer = setTimeout(function () {
        toast.classList.remove('show');
    }, 1600);
}

function getCurrentRoleSafe() {
    if (!store || typeof store.getCurrentRole !== 'function') return 'owner';
    return store.getCurrentRole() || 'owner';
}

function getRoleInfoSafe(role) {
    if (store && typeof store.getRoleInfo === 'function') {
        return store.getRoleInfo(role) || { label: role || '成员', canManage: role === 'owner' };
    }
    return ROLES[role] || { label: role || '成员', canManage: role === 'owner' };
}

function getMemberById(userId) {
    var members = getMembers();
    for (var i = 0; i < members.length; i++) {
        if (members[i] && members[i].userId === userId) return members[i];
    }
    return null;
}

function getMemberPermissions(member) {
    if (!member) {
        return { wechat: false, alipay: false, unionpay: false, psbcApp: false };
    }
    if (store && typeof store.getBillingPermissions === 'function') {
        var team = getTeam();
        if (team && team.teamId) return store.getBillingPermissions(team.teamId, member.userId);
    }
    var raw = member.billingPermissions || {};
    return {
        wechat: !!raw.wechat,
        alipay: !!raw.alipay,
        unionpay: !!raw.unionpay,
        psbcApp: !!raw.psbcApp
    };
}

function persistTeams(nextTeams) {
    try {
        window.localStorage.setItem('ylt_teams_v1', JSON.stringify(nextTeams || []));
        return true;
    } catch (e) {
        try {
            window.sessionStorage.setItem('ylt_teams_v1', JSON.stringify(nextTeams || []));
            return true;
        } catch (err) {
            return false;
        }
    }
}

function updateMemberBillingPermissionSafe(teamId, userId, channelKey, enabled) {
    if (store && typeof store.updateMemberBillingPermission === 'function') {
        return store.updateMemberBillingPermission(teamId, userId, channelKey, enabled);
    }
    if (!teamId || !userId || !channelKey) return false;
    var teams = store && typeof store.getAllTeams === 'function' ? store.getAllTeams() : [];
    var teamIndex = teams.findIndex(function (item) { return item.teamId === teamId; });
    if (teamIndex < 0) return false;
    var members = Array.isArray(teams[teamIndex].members) ? teams[teamIndex].members : [];
    var memberIndex = members.findIndex(function (item) { return item.userId === userId; });
    if (memberIndex < 0) return false;
    var current = members[memberIndex];
    var nextPermissions = {
        wechat: !!(current.billingPermissions && current.billingPermissions.wechat),
        alipay: !!(current.billingPermissions && current.billingPermissions.alipay),
        unionpay: !!(current.billingPermissions && current.billingPermissions.unionpay),
        psbcApp: !!(current.billingPermissions && current.billingPermissions.psbcApp)
    };
    nextPermissions[channelKey] = !!enabled;
    members[memberIndex].billingPermissions = nextPermissions;
    return persistTeams(teams);
}

function getEnabledPermissionCount(permissions) {
    var count = 0;
    BILLING_CHANNELS.forEach(function (channel) {
        if (permissions[channel.key]) count += 1;
    });
    return count;
}

function renderPermissionIcon(channel, enabled) {
    var iconHtml = channel.icon
        ? '<i class="' + channel.icon + '"></i>'
        : '<span class="text-[12px] font-bold">' + channel.glyph + '</span>';
    return '<span class="permission-icon ' + (enabled ? 'is-on ' + channel.className : 'is-off') + '">' + iconHtml + '</span>';
}

function buildPermissionSummaryIcons(permissions) {
    return BILLING_CHANNELS.map(function (channel) {
        return renderPermissionIcon(channel, !!permissions[channel.key]);
    }).join('');
}

function memberCardHTML(member) {
    var info = member.role === 'owner'
        ? { label: '超管' }
        : { label: '业务员' };
    var isOwner = member.role === 'owner';
    var currentUser = getCurrentUserSafe();
    var canManageTeam = canManageTeamPage();
    var selfTag = currentUser && member.mobile === currentUser.mobile
        ? '<span class="text-[10px] text-gray-400 ml-1 bg-gray-50 px-1.5 py-0.5 rounded-md">(自己)</span>'
        : '';
    var canSwipeDelete = !isOwner && canManageTeam;
    var permissions = getMemberPermissions(member);
    var enabledCount = getEnabledPermissionCount(permissions);

    return (
        '<div class="member-swipe-wrapper' + (managingUserId === member.userId ? ' swiped' : '') + '" id="member-swipe-' + escapeText(member.userId) + '">' +
            '<div class="member-swipe-content">' +
                '<div class="glass-card rounded-[18px] p-4">' +
                    '<div class="flex items-center gap-3.5">' +
                        '<div class="w-12 h-12 rounded-full bg-gradient-to-br from-green-50 to-green-100 flex items-center justify-center shrink-0 border border-green-100/60">' +
                            '<i class="fas fa-user text-[#11A64A] text-[17px]"></i>' +
                        '</div>' +
                        '<div class="flex-1 min-w-0">' +
                            '<div class="flex items-center gap-2 mb-1 flex-wrap">' +
                                '<span class="text-[15px] font-bold text-gray-800">' + escapeText(member.name) + '</span>' +
                                '<span class="text-[10px] px-2 py-0.5 rounded-full border font-medium ' + roleBadgeClass(member.role) + '">' + escapeText(info.label) + '</span>' +
                                selfTag +
                            '</div>' +
                            '<div class="text-[13px] text-gray-500 font-poppins tracking-wide">' + escapeText(maskMobile(member.mobile)) + '</div>' +
                            '<div class="text-[11px] text-gray-400 mt-0.5">加入于 ' + escapeText(member.joinedAt || '--') + '</div>' +
                        '</div>' +
                    '</div>' +
                    '<div class="mt-3">' +
                        '<div class="permission-summary-row">' +
                            '<span class="text-[12px] text-gray-500 shrink-0">开单权限</span>' +
                            '<span class="permission-icons">' + buildPermissionSummaryIcons(permissions) + '</span>' +
                            '<span class="text-[12px] font-semibold text-gray-700 shrink-0">' + enabledCount + '/4</span>' +
                            '<button type="button" class="permission-drill-btn" onclick="event.stopPropagation(); goPermissionManagePage(\'' + escapeText(member.userId) + '\')">' +
                                '<i class="fas fa-chevron-right text-[11px]"></i>' +
                            '</button>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
            '</div>' +
            (canSwipeDelete ? '<div class="member-swipe-delete" onclick="openRemoveMemberSheet(\'' + escapeText(member.userId) + '\')"><i class="fas fa-user-minus mr-1"></i>移除</div>' : '') +
        '</div>'
    );
}

function render() {
    var team = getTeam();
    var members = getMembers().slice();
    var canManage = canManageTeamPage();
    var addBtnWrap = document.getElementById('teamManageActionBar');
    var list = document.getElementById('memberList');
    var empty = document.getElementById('emptyState');
    var noAccess = document.getElementById('noAccessState');
    var editBtn = document.getElementById('editTeamNameBtn');

    var teamName = team ? team.teamName : '—';
    if (!teamName || teamName === '张老板收购站') {
        teamName = '张老板收购站的团队';
    }
    document.getElementById('teamName').textContent = teamName;
    document.getElementById('teamCountNum').textContent = members.length;

    if (addBtnWrap) addBtnWrap.classList.toggle('hidden', !canManage);
    if (editBtn) editBtn.classList.toggle('hidden', !canManage);

    if (!canManage) {
        list.innerHTML = '';
        empty.classList.add('hidden');
        noAccess.classList.remove('hidden');
        return;
    }

    noAccess.classList.add('hidden');
    if (!members.length) {
        list.innerHTML = '';
        empty.classList.remove('hidden');
        return;
    }

    empty.classList.add('hidden');
    var order = { owner: 0, operator: 1 };
    members.sort(function (a, b) {
        return (order[a.role] || 9) - (order[b.role] || 9);
    });
    list.innerHTML = members.map(memberCardHTML).join('');
}

function openAddMemberSheet() {
    if (!canManageTeamPage()) {
        showToast('仅超管可添加业务员');
        return;
    }
    document.getElementById('addMemberName').value = '';
    document.getElementById('addMemberMobile').value = '';
    document.getElementById('addMemberOverlay').classList.add('show');
    document.getElementById('addMemberSheet').classList.add('show');
}

function closeAddMemberSheet() {
    document.getElementById('addMemberOverlay').classList.remove('show');
    document.getElementById('addMemberSheet').classList.remove('show');
}

function confirmAddMember() {
    var team = getTeam();
    if (!team) {
        showToast('未获取到团队信息');
        return;
    }

    var name = document.getElementById('addMemberName').value.trim();
    var mobile = document.getElementById('addMemberMobile').value.trim();

    if (!name) {
        showToast('请输入业务员姓名');
        return;
    }
    if (!/^1\d{10}$/.test(mobile)) {
        showToast('请输入正确的手机号');
        return;
    }

    var members = getMembers();
    var exists = members.some(function (member) {
        return member.mobile === mobile;
    });
    if (exists) {
        showToast('该手机号已在团队中');
        return;
    }

    var today = new Date();
    var joinedAt = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
    store.addMember(team.teamId, {
        userId: 'U' + Date.now(),
        name: name,
        mobile: mobile,
        role: 'operator',
        joinedAt: joinedAt,
        lastActiveAt: joinedAt,
        billingPermissions: { wechat: false, alipay: false, unionpay: false, psbcApp: false }
    });

    closeAddMemberSheet();
    render();
    showToast('已成功添加业务员');
}

function openEditTeamNameSheet() {
    if (!canManageTeamPage()) {
        showToast('仅超管可编辑团队名称');
        return;
    }
    var team = getTeam();
    if (!team) return;
    document.getElementById('teamNameInput').value = team.teamName || '';
    document.getElementById('editTeamNameOverlay').classList.add('show');
    document.getElementById('editTeamNameSheet').classList.add('show');
}

function closeEditTeamNameSheet() {
    document.getElementById('editTeamNameOverlay').classList.remove('show');
    document.getElementById('editTeamNameSheet').classList.remove('show');
}

function saveTeamName() {
    var team = getTeam();
    var val = document.getElementById('teamNameInput').value.trim();
    if (!team) return;
    if (!val) {
        showToast('请输入团队名称');
        return;
    }
    var teams = store.getAllTeams();
    var idx = teams.findIndex(function (item) { return item.teamId === team.teamId; });
    if (idx < 0) return;
    teams[idx].teamName = val;
    window.localStorage.setItem('ylt_teams_v1', JSON.stringify(teams));
    closeEditTeamNameSheet();
    render();
    showToast('已更新团队名称');
}

function openRemoveMemberSheet(userId) {
    if (!canManageTeamPage()) {
        showToast('仅超管可移除业务员');
        return;
    }
    var member = getMemberById(userId);
    if (!member) return;
    managingUserId = userId;
    document.getElementById('removeMemberDesc').textContent = '确定移除业务员“' + member.name + '”吗？移除后不可恢复。';
    document.getElementById('removeMemberOverlay').classList.add('show');
    document.getElementById('removeMemberSheet').classList.add('show');
}

function closeRemoveMemberSheet() {
    managingUserId = null;
    document.getElementById('removeMemberOverlay').classList.remove('show');
    document.getElementById('removeMemberSheet').classList.remove('show');
}

function confirmRemoveMember(userId) {
    if (userId) managingUserId = userId;
    if (!managingUserId) return;
    var team = getTeam();
    if (!team) return;

    var success = store.removeMember(team.teamId, managingUserId);
    if (!success) {
        showToast('移除失败');
        return;
    }

    closeRemoveMemberSheet();
    render();
    showToast('已移除该业务员');
}

function goPermissionManagePage(userId) {
    if (!canManageTeamPage()) {
        showToast('仅超管可管理开单权限');
        return;
    }
    window.location.href = 'buyer-team-permission.html?memberId=' + encodeURIComponent(userId);
}

let swipeStartX = 0;
let swipeStartY = 0;
let swipeTarget = null;

function memberSwipeStart(x, y, e) {
    if (!canManageTeamPage()) return;
    var card = e.target.closest('.member-swipe-wrapper');
    if (!card) return;
    swipeTarget = card;
    swipeStartX = x;
    swipeStartY = y;
}

function memberSwipeMove(x, y, e) {
    if (!swipeTarget || !canManageTeamPage()) return;
    var dx = x - swipeStartX;
    var dy = y - swipeStartY;
    if (Math.abs(dx) > Math.abs(dy) && dx < -30) {
        if (e.preventDefault) e.preventDefault();
        var id = swipeTarget.id.replace('member-swipe-', '');
        if (managingUserId !== id) {
            managingUserId = id;
            render();
        }
    }
}

function memberSwipeEnd() {
    swipeTarget = null;
}

document.addEventListener('touchstart', function (e) {
    memberSwipeStart(e.touches[0].clientX, e.touches[0].clientY, e);
}, { passive: true });

document.addEventListener('touchmove', function (e) {
    memberSwipeMove(e.touches[0].clientX, e.touches[0].clientY, e);
}, { passive: false });

document.addEventListener('touchend', memberSwipeEnd, { passive: true });
document.addEventListener('mousedown', function (e) { memberSwipeStart(e.clientX, e.clientY, e); });
document.addEventListener('mousemove', function (e) {
    if (swipeTarget) memberSwipeMove(e.clientX, e.clientY, e);
});
document.addEventListener('mouseup', memberSwipeEnd);
document.addEventListener('click', function (e) {
    if (!e.target.closest('.member-swipe-delete') && !e.target.closest('.member-swipe-content') && managingUserId) {
        managingUserId = null;
        render();
    }
});

window.addEventListener('pageshow', function () {
    render();
});

render();
</script>
</body>
</html>
