<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>品类设计方案对比实验室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', 'Noto Sans SC', sans-serif; background: #F0F2F5; color: #1F2937; margin: 0; padding: 20px; }
        .mobile-frame {
            width: 375px;
            height: 667px;
            background: #F7F8FA;
            border-radius: 32px;
            border: 8px solid #1F2937;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.25);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            margin-bottom: 40px;
        }
        .header { padding: 40px 20px 15px; background: #fff; text-align: center; }
        .section-title { font-size: 14px; font-weight: 700; color: #374151; margin-bottom: 20px; padding: 0 20px; display: flex; align-items: center; gap: 8px; }
        .section-title::before { content: ""; width: 4px; height: 16px; background: #11A64A; border-radius: 2px; }
        
        /* 方案一专属样式 */
        .card-active { background: #11A64A !important; color: #fff !important; transform: scale(1.03); box-shadow: 0 8px 16px rgba(17,166,74,0.2); }
        .tag-gray { background: #fff; border: 1px solid #E5E7EB; color: #6B7280; }

        /* 方案二专属样式 - 字符图标 */
        .char-avatar { 
            width: 32px; height: 32px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 700; color: #fff;
            background: linear-gradient(135deg, #11A64A, #34D399);
        }

        /* 隐藏滚动条 */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

    <div class="max-w-7xl mx-auto flex flex-wrap justify-around">

        <!-- 方案一：卡片层级法 (Visual Depth) -->
        <div class="flex flex-col items-center">
            <h2 class="mb-4 font-bold text-gray-500">方案一：大色块卡片 (无图标)</h2>
            <div class="mobile-frame" id="demo1">
                <div class="header">
                    <h1 class="text-lg font-bold">开单选择</h1>
                </div>
                
                <div class="section-title">快速选择一级</div>
                <div class="px-5 grid grid-cols-2 gap-3 mb-6">
                    <div onclick="switchDemo1('粮食')" id="d1-grains" class="card-active p-4 rounded-2xl flex flex-col justify-between h-20 transition-all cursor-pointer">
                        <span class="text-[15px] font-bold">粮食</span>
                        <span class="text-[10px] opacity-70">12种细分</span>
                    </div>
                    <div onclick="switchDemo1('水果')" id="d1-fruits" class="bg-white p-4 rounded-2xl flex flex-col justify-between h-20 text-gray-700 transition-all cursor-pointer border border-gray-100 shadow-sm">
                        <span class="text-[15px] font-bold">水果</span>
                        <span class="text-[10px] text-gray-400">18种细分</span>
                    </div>
                </div>

                <div class="section-title">对应二级明细</div>
                <div class="px-5 flex flex-wrap gap-2" id="d1-sub-list">
                    <!-- 动态渲染 -->
                </div>
            </div>
        </div>

        <!-- 方案二：首字图形化 (Character Avatar) -->
        <div class="flex flex-col items-center">
            <h2 class="mb-4 font-bold text-gray-500">方案二：文本转图形 (自动首字)</h2>
            <div class="mobile-frame" id="demo2">
                <div class="header">
                    <h1 class="text-lg font-bold">开单选择</h1>
                </div>

                <div class="section-title">品类分组</div>
                <div class="flex-1 flex overflow-hidden">
                    <!-- 左侧：自动生成的首字图标 -->
                    <div class="w-[88px] bg-[#F7F8FA] overflow-y-auto hide-scrollbar border-r border-gray-100 py-2">
                        <div onclick="switchDemo2('粮食')" id="d2-grains" class="flex flex-col items-center py-4 gap-2 cursor-pointer transition-all bg-white border-r-2 border-[#11A64A]">
                            <div class="char-avatar">粮</div>
                            <span class="text-[12px] font-bold text-[#11A64A]">粮食</span>
                        </div>
                        <div onclick="switchDemo2('水果')" id="d2-fruits" class="flex flex-col items-center py-4 gap-2 cursor-pointer transition-all opacity-40">
                            <div class="char-avatar bg-gray-400">水</div>
                            <span class="text-[12px] text-gray-500">水果</span>
                        </div>
                    </div>

                    <!-- 右侧：详情 -->
                    <div class="flex-1 bg-white p-4 overflow-y-auto hide-scrollbar">
                        <div class="text-[11px] text-gray-400 mb-4 tracking-wider">选择二级明细</div>
                        <div class="space-y-3" id="d2-sub-list">
                             <!-- 动态渲染 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 方案三：分段导航法 (Modern Segments) -->
        <div class="flex-1 min-w-[375px] max-w-[375px] flex flex-col items-center">
            <h2 class="mb-4 font-bold text-gray-500">方案三：Apple 风格分段导航</h2>
            <div class="mobile-frame" id="demo3">
                <div class="header pb-0">
                    <h1 class="text-lg font-bold mb-4">开单选择</h1>
                    <!-- 一级品类选项卡 -->
                    <div class="px-4 pb-4">
                        <div class="bg-gray-100 p-1 rounded-xl flex gap-1">
                            <button onclick="switchDemo3('粮食')" id="d3-grains" class="flex-1 py-1.5 text-[13px] font-bold rounded-lg bg-white shadow-sm transition-all">粮食</button>
                            <button onclick="switchDemo3('水果')" id="d3-fruits" class="flex-1 py-1.5 text-[13px] text-gray-500 rounded-lg hover:bg-white/50 transition-all">水果</button>
                            <button onclick="switchDemo3('蔬菜')" class="flex-1 py-1.5 text-[13px] text-gray-500 rounded-lg">蔬菜</button>
                        </div>
                    </div>
                </div>

                <div class="flex-1 overflow-y-auto px-5 py-6">
                    <div class="text-[12px] text-gray-400 font-bold mb-4">明细列表</div>
                    <div class="grid grid-cols-2 gap-3" id="d3-sub-list">
                         <!-- 动态渲染 -->
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const DATA = {
            '粮食': ['玉米', '大豆', '水稻', '小麦', '高粱', '谷子'],
            '水果': ['柑橘类', '苹果', '西瓜', '葡萄', '香蕉', '梨', '桃']
        };

        // Demo 1 Logic
        function switchDemo1(tab) {
            ['grains', 'fruits'].forEach(t => document.getElementById(`d1-${t}`).className = t === (tab === '粮食' ? 'grains' : 'fruits') ? 'card-active p-4 rounded-2xl flex flex-col justify-between h-20 transition-all cursor-pointer' : 'bg-white p-4 rounded-2xl flex flex-col justify-between h-20 text-gray-700 transition-all cursor-pointer border border-gray-100 shadow-sm');
            const list = document.getElementById('d1-sub-list');
            list.innerHTML = DATA[tab].map(item => `<div class="px-4 py-2 rounded-full border border-gray-200 text-[13px] bg-white text-gray-600 active:bg-gray-50">${item}</div>`).join('');
        }

        // Demo 2 Logic
        function switchDemo2(tab) {
            ['grains', 'fruits'].forEach(t => {
                const el = document.getElementById(`d2-${t}`);
                if (t === (tab === '粮食' ? 'grains' : 'fruits')) {
                    el.className = "flex flex-col items-center py-4 gap-2 cursor-pointer transition-all bg-white border-r-2 border-[#11A64A]";
                    el.querySelector('.char-avatar').style.background = "linear-gradient(135deg, #11A64A, #34D399)";
                    el.querySelector('span').style.color = "#11A64A";
                } else {
                    el.className = "flex flex-col items-center py-4 gap-2 cursor-pointer transition-all opacity-40";
                    el.querySelector('.char-avatar').style.background = "#9CA3AF";
                    el.querySelector('span').style.color = "#6B7280";
                }
            });
            const list = document.getElementById('d2-sub-list');
            list.innerHTML = DATA[tab].map(item => `
                <div class="flex items-center justify-between p-3 bg-[#F7F8FA] rounded-xl active:bg-gray-100">
                    <span class="text-[14px] font-medium text-gray-700">${item}</span>
                    <i class="fas fa-plus text-[#11A64A] text-xs"></i>
                </div>
            `).join('');
        }

        // Demo 3 Logic
        function switchDemo3(tab) {
            ['grains', 'fruits'].forEach(t => {
                const btn = document.getElementById(`d3-${t}`);
                if (t === (tab === '粮食' ? 'grains' : 'fruits')) {
                    btn.className = "flex-1 py-1.5 text-[13px] font-bold rounded-lg bg-white shadow-sm transition-all";
                } else {
                    btn.className = "flex-1 py-1.5 text-[13px] text-gray-500 rounded-lg hover:bg-white/50 transition-all";
                }
            });
            const list = document.getElementById('d3-sub-list');
            list.innerHTML = DATA[tab].map(item => `
                <div class="bg-white p-4 rounded-xl border border-gray-50 shadow-sm text-center active:scale-95 transition-all">
                    <div class="text-[13px] font-bold text-gray-800">${item}</div>
                    <div class="text-[9px] text-gray-400 mt-1">选择此项</div>
                </div>
            `).join('');
        }

        // Init
        switchDemo1('粮食');
        switchDemo2('粮食');
        switchDemo3('粮食');

    </script>
</body>
</html>
