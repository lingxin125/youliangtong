<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>丰收云 - 库存明细详情</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="shared.js"></script>
    <style>
        #statusBar,#navBar{background:#F7F8FA}.card{background:#fff;border:1px solid rgba(15,23,42,.05);border-radius:16px;padding:16px;box-shadow:0 2px 10px rgba(15,23,42,.02)}.row{min-height:42px;display:flex;align-items:center;justify-content:space-between;gap:12px;border-bottom:1px solid #F1F5F9}.row:last-child{border-bottom:0}.label{font-size:12px;color:#64748B}.value{font-size:13px;color:#111827;font-weight:800;text-align:right}.qty{font-family:Poppins,sans-serif;font-weight:700;color:#11A64A}.tag{display:inline-flex;height:24px;align-items:center;padding:0 8px;border-radius:999px;background:#EAF8EF;color:#11A64A;font-size:11px;font-weight:700}
    </style>
</head>
<body class="bg-[#F7F8FA]">
<div class="mobile-container relative bg-[#F7F8FA]">
    <div id="statusBar"></div>
    <div id="navBar"></div>
    <div class="flex-1 overflow-y-auto no-scrollbar px-4 pt-3 pb-8">
        <div id="detail"></div>
    </div>
</div>
<script>
document.getElementById('statusBar').innerHTML=renderStatusBar('light');
document.getElementById('navBar').innerHTML=renderHeader('库存明细详情','buyer-inventory-flows.html');
var store=window.BuyerMockStore||{};
var params=new URLSearchParams(location.search);
function escapeHtml(v){return String(v||'').replace(/[&<>"']/g,function(ch){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[ch];});}
function fmtQty(v,u){return (Number(v)>0?'+':'')+Number(v||0).toLocaleString('zh-CN')+(u||'斤');}
function fmtTime(v){var d=new Date(v);return Number.isNaN(d.getTime())?'-':String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function statusLabel(i){return i&&i.type==='out'?'出库':'入库';}
function ledgerBalance(productName, warehouseName, inventoryType){
    if(inventoryType==='存粮'){
        return (store.getFarmerStorageList?store.getFarmerStorageList():[]).filter(function(i){return i.productName===productName&&i.warehouseName===warehouseName;}).reduce(function(sum,i){return sum+Number(i.quantity||0);},0);
    }
    var item=(store.getInventoryLedger?store.getInventoryLedger():[]).find(function(i){return i.productName===productName&&i.warehouseName===warehouseName;});
    return item?Number(item.currentQty||0):0;
}
function row(k,v){return '<div class="row"><span class="label">'+escapeHtml(k)+'</span><span class="value">'+escapeHtml(v)+'</span></div>';}
var id=params.get('id')||'';
function rows(){
    var list=(store.getInventoryFlows?store.getInventoryFlows():[]).map(function(i){
        var inventoryType=i.inventoryType||'收粮';
        return { id:i.id||'', productName:i.productName, warehouseName:i.warehouseName, inventoryType:inventoryType, type:i.type, status:statusLabel(i), quantity:Number(i.quantity||0), balanceQty:ledgerBalance(i.productName,i.warehouseName,inventoryType), unit:i.unit||'斤', sourceOrderNo:i.sourceOrderNo||'-', occurredAt:i.occurredAt, remark:i.typeLabel||statusLabel(i) };
    });
    (store.getFarmerStorageList?store.getFarmerStorageList():[]).forEach(function(i,index){
        list.push({ id:'CL'+String(index+1).padStart(4,'0'), productName:i.productName, warehouseName:i.warehouseName, inventoryType:'存粮', type:'storage', status:'入库', quantity:Number(i.quantity||0), balanceQty:ledgerBalance(i.productName,i.warehouseName,'存粮'), unit:i.unit||'斤', sourceOrderNo:i.orderNo||'存粮记录', occurredAt:i.latestAt, remark:'农户存粮' });
    });
    return list;
}
var item=rows().find(function(i){return i.id===id||i.sourceOrderNo===id;})||{};
var status=statusLabel(item);
document.getElementById('detail').innerHTML='<div class="card mb-3"><div class="flex items-start justify-between gap-3"><div><div class="text-[18px] font-bold text-gray-900">'+escapeHtml(item.productName||'库存明细')+'</div><div class="text-[12px] text-gray-400 mt-1">'+escapeHtml(item.warehouseName||'-')+' · '+escapeHtml(item.inventoryType||'-')+'</div></div><span class="tag">'+escapeHtml(status)+'</span></div><div class="qty text-[28px] mt-4">'+fmtQty(item.quantity,item.unit)+'</div><div class="text-[11px] text-gray-400 mt-1">'+escapeHtml(status)+'重量</div></div><div class="card">'+row('农产品名称',item.productName||'-')+row('仓库名称',item.warehouseName||'-')+row('库存类型',item.inventoryType||'-')+row('出入库状态',status)+row(status+'重量',fmtQty(item.quantity,item.unit))+row('库存余量',Number.isFinite(Number(item.balanceQty))?Number(item.balanceQty||0).toLocaleString('zh-CN')+(item.unit||'斤'):'-')+row('订单编号',item.sourceOrderNo||'-')+row('库存流水号',item.id||'-')+row('库存变动时间',fmtTime(item.occurredAt))+row('操作备注',item.remark||status)+'</div>';
</script>
</body>
</html>
