                { name: '西红柿', price: 1.60, qty: 1000, unit: '斤', subtotal: 1600.00 },

            payeeCompany: '张三农产品合作社',
            payeeName: '张三',
            payeeBank: '农业银行保定支行',
            payeeCard: '6228********6666',
            items: [

};

const MERGED_STORAGE_KEY = 'MERGED_ORDERS';
const query = new URLSearchParams(window.location.search);
const captureState = query.get('captureState') || '';
const mergeId = query.get('mergeId');
const mockStore = window.BuyerMockStore || null;
document.getElementById('statusBar').innerHTML = renderStatusBar ? renderStatusBar() : '';

function formatMoney(amount) {
    return Number(amount || 0).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatTime(isoString) {
    if (!isoString) return '--';
    const d = new Date(isoString);
    if (Number.isNaN(d.getTime())) return '--';
    return d.getFullYear() + '-'
        + String(d.getMonth() + 1).padStart(2, '0') + '-'
        + String(d.getDate()).padStart(2, '0') + ' '
        + String(d.getHours()).padStart(2, '0') + ':'
        + String(d.getMinutes()).padStart(2, '0');
}

function escapeHtml(unsafe) {
    return (unsafe || '').toString()
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
}

function calcSubOrderAmount(subOrder) {
    if (typeof subOrder.amount === 'number') return Number(subOrder.amount || 0);
    return (subOrder.items || []).reduce((sum, item) => sum + Number(item.subtotal || 0), 0);
}

function normalizeMergedStatus(status) {
    if (status === 'paid' || status === 'completed') return 'success';
    if (status === 'paying') return 'processing';
    if (status === 'processing' || status === 'failed' || status === 'success' || status === 'partial') return status;
    return 'processing';
}

function getSubOrderStatus(status, fallbackStatus) {
    return normalizeMergedStatus(status || fallbackStatus || 'processing');
}

function resolveMergedStatusFromSubOrders(subOrders, fallbackStatus) {
    if (!Array.isArray(subOrders) || subOrders.length === 0) {
        return normalizeMergedStatus(fallbackStatus);
    }
    const counts = { processing: 0, success: 0, failed: 0 };
    subOrders.forEach(function(sub) {
        const subStatus = getSubOrderStatus(sub.status, fallbackStatus);
        if (subStatus === 'processing') counts.processing += 1;
        if (subStatus === 'success') counts.success += 1;
        if (subStatus === 'failed') counts.failed += 1;
    });
    if (counts.processing > 0) return 'processing';
    if (counts.success > 0 && counts.failed > 0) return 'partial';
    if (counts.success > 0) return 'success';
    if (counts.failed > 0) return 'failed';
    return normalizeMergedStatus(fallbackStatus);
}

function getProcessingSubOrders(record) {
    return (record && Array.isArray(record.subOrders) ? record.subOrders : []).filter(function(sub) {
        return getSubOrderStatus(sub.status, record && record.status) === 'processing';
    });
}

function getPayableSubOrders(record) {
    const processingSubOrders = getProcessingSubOrders(record);
    if (processingSubOrders.length > 0) return processingSubOrders;
    return record && Array.isArray(record.subOrders) ? record.subOrders : [];
}

function normalizeMergedRecord(record, idx) {
    const fallbackStatus = normalizeMergedStatus(record.status);
    const mergeKey = record.id || `HB${Date.now()}${idx || 0}`;
    const createdAt = record.createdAt || record.updatedAt || new Date().toISOString();
    const subOrders = (record.subOrders || []).map((sub, subIdx) => {
        const subStatus = getSubOrderStatus(sub.status, fallbackStatus);
        return {
            id: sub.id || sub.grainOrderNo || `${mergeKey}-${subIdx + 1}`,
            grainOrderNo: sub.grainOrderNo || sub.id || `${mergeKey}-${subIdx + 1}`,
            paymentOrderNo: sub.paymentOrderNo || `ZF${String(mergeKey).replace(/\D/g, '').slice(-10)}${String(subIdx + 1).padStart(2, '0')}`,
            createTime: sub.createTime || sub.createdAt || createdAt,
            createdAt: sub.createdAt || sub.createTime || createdAt,
            payeeCompany: sub.payeeCompany || sub.payeeName || '未知',
            payeeName: sub.payeeName || '未知',
            payeeBank: sub.payeeBank || '--',
            payeeCard: sub.payeeCard || '--',
            amount: Number(sub.amount || 0),
            items: Array.isArray(sub.items) ? sub.items : [],
            status: subStatus,
            paidAt: sub.paidAt || '',
            failReason: sub.failReason || ''
        };
    });
    const status = resolveMergedStatusFromSubOrders(subOrders, fallbackStatus);
    const firstFailed = subOrders.find(function(sub) { return sub.status === 'failed' && sub.failReason; });
    return {
        id: mergeKey,
        status,
        totalAmount: Number(record.totalAmount || subOrders.reduce((sum, sub) => sum + Number(sub.amount || 0), 0)),
        createdAt,
        updatedAt: record.updatedAt || record.paidAt || createdAt,
        paidAt: record.paidAt || '',
        failReason: record.failReason || (firstFailed ? firstFailed.failReason : ''),
        payMethod: record.payMethod || 'industry',
        subOrders
    };
}

function loadMergedOrders() {
    const raw = localStorage.getItem(MERGED_STORAGE_KEY);
    if (!raw) return [];
    try {
        const parsed = JSON.parse(raw);
        return (Array.isArray(parsed) ? parsed : []).map((item, idx) => normalizeMergedRecord(item, idx));
    } catch (err) {
        return [];
    }
}

function saveMergedOrders(list) {
    localStorage.setItem(MERGED_STORAGE_KEY, JSON.stringify(list));
}

function findMergedOrderById(targetId) {

    return loadMergedOrders().find(item => item.id === targetId) || null;
}

function buildPageDataFromMerged(record) {
    const payableSubOrders = getPayableSubOrders(record);
    return {
        paymentOrderNo: record.id,
        createdAt: record.createdAt,
        totalSubOrderCount: (record.subOrders || []).length,
        payableSubOrderCount: payableSubOrders.length,
        isRetry: payableSubOrders.length < (record.subOrders || []).length,
        subOrders: payableSubOrders.map(sub => ({
            grainOrderNo: sub.grainOrderNo || sub.id,
            paymentOrderNo: sub.paymentOrderNo || '',
            createTime: sub.createTime || sub.createdAt || record.createdAt,
            payeeCompany: sub.payeeCompany || sub.payeeName || '未知',
            payeeName: sub.payeeName || '未知',
            payeeBank: sub.payeeBank || '--',
            payeeCard: sub.payeeCard || '--',
            amount: Number(sub.amount || 0),
            items: Array.isArray(sub.items) ? sub.items : []
        }))
    };
}

const activeMergedRecord = mergeId ? findMergedOrderById(mergeId) : null;
const activeMergeData = activeMergedRecord ? buildPageDataFromMerged(activeMergedRecord) : mockMergeData;

function buildOrderCard(subOrder, index, inlineMode) {
    const amount = calcSubOrderAmount(subOrder);
    const wrapperClass = inlineMode ? 'summary-flat' : 'summary-card';
    const headClass = inlineMode ? 'summary-head single flat title-inline' : 'summary-head single title-inline';
    return [
        '<div class="' + wrapperClass + '">',
            '<div class="' + headClass + '">',
                '<div class="summary-index">订单' + (index + 1) + '</div>',
                '<span class="summary-separator">·</span>',
                '<div class="summary-merchant">' + escapeHtml(subOrder.payeeCompany || '--') + '</div>',
            '</div>',
            '<div class="info-row"><span class="info-label">收粮订单号</span><span class="info-value">' + escapeHtml(subOrder.grainOrderNo || '--') + '</span></div>',
            '<div class="info-row"><span class="info-label">支付订单号</span><span class="info-value">' + escapeHtml(subOrder.paymentOrderNo || '--') + '</span></div>',
            '<div class="info-row"><span class="info-label">应付金额</span><span class="info-value money">¥ ' + formatMoney(amount) + '</span></div>',
            '<div class="info-row"><span class="info-label">下单时间</span><span class="info-value">' + escapeHtml(formatTime(subOrder.createTime)) + '</span></div>',
        '</div>'
    ].join('');
}

function buildPayeeCard(subOrder, index, inlineMode) {
    const wrapperClass = inlineMode ? 'summary-flat' : 'summary-card compact';
    const headClass = inlineMode ? 'summary-head single flat' : 'summary-head single';
    return [
        '<div class="' + wrapperClass + '">',
            '<div class="' + headClass + '">',
                '<div class="summary-index">收款人' + (index + 1) + '</div>',
            '</div>',
            '<div class="info-row"><span class="info-label">商户名称</span><span class="info-value">' + escapeHtml(subOrder.payeeCompany || '--') + '</span></div>',
            '<div class="info-row"><span class="info-label">收款人</span><span class="info-value">' + escapeHtml(subOrder.payeeName || '--') + '</span></div>',
            '<div class="info-row"><span class="info-label">收款银行</span><span class="info-value">' + escapeHtml(subOrder.payeeBank || '--') + '</span></div>',
            '<div class="info-row"><span class="info-label">收款卡号</span><span class="info-value">' + escapeHtml(subOrder.payeeCard || '--') + '</span></div>',
        '</div>'
    ].join('');
}

function hasOpenSheet() {
    return ['ordersSheet', 'payeesSheet', 'resultSheet'].some(function(id) {
        const el = document.getElementById(id);
        return el && el.classList.contains('show');
    });
}

function setSheetState(sheetId, visible) {
    const mask = document.getElementById('sheetMask');
    const sheet = document.getElementById(sheetId);
    if (!mask || !sheet) return;
    sheet.classList.toggle('show', visible);
    sheet.setAttribute('aria-hidden', visible ? 'false' : 'true');
    const anyOpen = hasOpenSheet();
    mask.classList.toggle('show', anyOpen);
    document.body.classList.toggle('sheet-open', anyOpen);
}

function openSheet(type) {
    if (type === 'orders') setSheetState('ordersSheet', true);
    if (type === 'payees') setSheetState('payeesSheet', true);
    if (type === 'result') setSheetState('resultSheet', true);
}

function closeSheet(type) {
    if (type === 'orders') setSheetState('ordersSheet', false);
    if (type === 'payees') setSheetState('payeesSheet', false);
    if (type === 'result') setSheetState('resultSheet', false);
}

function closeAllSheets() {
    ['ordersSheet', 'payeesSheet', 'resultSheet'].forEach(function(id) {
        const sheet = document.getElementById(id);
        if (sheet) {
            sheet.classList.remove('show');
            sheet.setAttribute('aria-hidden', 'true');
        }
    });
    document.getElementById('sheetMask').classList.remove('show');
    document.body.classList.remove('sheet-open');
}

function fillPage() {

    const subOrders = activeMergeData.subOrders || [];
    const totalAmount = subOrders.reduce((sum, sub) => sum + calcSubOrderAmount(sub), 0);
    const orderCount = subOrders.length;
    const payeeCount = subOrders.length;
    const first = subOrders[0];

    document.getElementById('mainAmount').textContent = formatMoney(totalAmount);
    document.getElementById('orderCountBadge').textContent = '共 ' + orderCount + ' 笔';
    document.getElementById('payeeCountBadge').textContent = '共 ' + payeeCount + ' 户';
    document.getElementById('viewAllOrdersBtn').style.display = orderCount > 1 ? 'inline-flex' : 'none';
    document.getElementById('viewAllPayeesBtn').style.display = payeeCount > 1 ? 'inline-flex' : 'none';

    document.getElementById('orderSummaryContainer').innerHTML = first
        ? buildOrderCard(first, 0, true)
        : '<div class="sheet-empty">暂无订单信息</div>';

    document.getElementById('payeeSummaryContainer').innerHTML = first
        ? buildPayeeCard(first, 0, true)
        : '<div class="sheet-empty">暂无收款人信息</div>';

    document.getElementById('ordersSheetSubtitle').textContent = '共 ' + orderCount + ' 笔订单';
    document.getElementById('payeesSheetSubtitle').textContent = '共 ' + payeeCount + ' 户收款人';

    document.getElementById('ordersSheetBody').innerHTML = orderCount
        ? subOrders.map((sub, index) => buildOrderCard(sub, index, false)).join('')
        : '<div class="sheet-empty">暂无订单信息</div>';

    document.getElementById('payeesSheetBody').innerHTML = payeeCount
        ? subOrders.map((sub, index) => buildPayeeCard(sub, index, false)).join('')
        : '<div class="sheet-empty">暂无收款人信息</div>';
}

function syncMockStoreFromMergedRecord(record) {
    if (!mockStore || !mockStore.updateOrder) return;
    (record.subOrders || []).forEach(function(sub) {
        mockStore.updateOrder(sub.id, {
            status: getSubOrderStatus(sub.status, record.status),
            payMethod: record.payMethod || 'industry',
            paymentOrderNo: sub.paymentOrderNo || '',
            paidAt: sub.paidAt || '',
            failReason: sub.failReason || ''
        });
    });
}

function buildOutcomeSubOrders(record, outcome, now) {
    const payableSubOrders = getPayableSubOrders(record);
    const payableIds = payableSubOrders.map(function(sub) { return sub.id; });
    const payableIdSet = new Set(payableIds);
    const partialSuccessIds = new Set(
        outcome === 'partial'
            ? payableIds.slice(0, Math.ceil(payableIds.length / 2))
            : []
    );

    return (record.subOrders || []).map(function(sub) {
        if (!payableIdSet.has(sub.id)) return { ...sub };
        if (outcome === 'success' || (outcome === 'partial' && partialSuccessIds.has(sub.id))) {
            return {
                ...sub,
                status: 'success',
                paidAt: now,
                failReason: ''
            };
        }
        return {
            ...sub,
            status: 'failed',
            paidAt: '',
            failReason: '银行返回失败，请重新支付'
        };
    });
}

function finalizeMergedPayment(targetId, outcome) {
    if (!targetId) return null;
    const list = loadMergedOrders();
    const idx = list.findIndex(function(item) { return item.id === targetId; });
    if (idx < 0) return null;
    const current = normalizeMergedRecord(list[idx], idx);
    const now = new Date().toISOString();
    const nextSubOrders = buildOutcomeSubOrders(current, outcome, now);
    const nextStatus = resolveMergedStatusFromSubOrders(nextSubOrders, current.status);
    const updatedRecord = normalizeMergedRecord({
        ...current,
        updatedAt: now,
        paidAt: nextStatus === 'success' ? now : (current.paidAt || ''),
        failReason: nextStatus === 'failed'
            ? '银行返回失败，请重新支付'
            : (nextStatus === 'partial' ? '部分订单支付失败，可重新支付' : ''),
        payMethod: 'industry',
        subOrders: nextSubOrders
    }, idx);
    list[idx] = updatedRecord;
    saveMergedOrders(list);
    syncMockStoreFromMergedRecord(updatedRecord);
    return updatedRecord;
}

function renderResultSheet() {
    const subOrders = activeMergeData.subOrders || [];
    const totalAmount = subOrders.reduce((sum, sub) => sum + calcSubOrderAmount(sub), 0);
    const canPartial = subOrders.length > 1;
    document.getElementById('resultSheetSubtitle').textContent = `本次支付 ${subOrders.length} 笔，合计 ¥${formatMoney(totalAmount)}`;
    document.getElementById('resultSheetBody').innerHTML = [
        `<button type="button" class="result-option success" onclick="confirmPaymentOutcome('success')">
            <div class="result-option-main">
                <div class="result-option-icon"><i class="fas fa-circle-check"></i></div>
                <div>
                    <div class="result-option-title">全部成功</div>
                    <div class="result-option-desc">全部子单支付成功，合并单进入已完成</div>
                </div>
            </div>
            <i class="fas fa-chevron-right text-gray-300"></i>
        </button>`,
        canPartial ? `<button type="button" class="result-option partial" onclick="confirmPaymentOutcome('partial')">
            <div class="result-option-main">
                <div class="result-option-icon"><i class="fas fa-circle-half-stroke"></i></div>
                <div>
                    <div class="result-option-title">部分成功</div>
                    <div class="result-option-desc">仅本次部分子单成功，其余失败，可在原合并单重付</div>
                </div>
            </div>
            <i class="fas fa-chevron-right text-gray-300"></i>
        </button>` : '',
        `<button type="button" class="result-option failed" onclick="confirmPaymentOutcome('failed')">
            <div class="result-option-main">
                <div class="result-option-icon"><i class="fas fa-circle-xmark"></i></div>
                <div>
                    <div class="result-option-title">全部失败</div>
                    <div class="result-option-desc">本次子单全部支付失败，可回到原合并单重新支付</div>
                </div>
            </div>
            <i class="fas fa-chevron-right text-gray-300"></i>
        </button>`
    ].filter(Boolean).join('');
}

function confirmPaymentOutcome(outcome) {
    closeSheet('result');
    startPaymentProcess(outcome);
}

function startPaymentProcess(outcome) {
    const btn = document.getElementById('payBtn');
    if (btn.disabled) return;

    btn.disabled = true;
    btn.classList.add('opacity-90');
    btn.innerHTML = '<div class="spinner"></div><span class="ml-2">处理中...</span>';

    setTimeout(function() {
        if (activeMergedRecord && mergeId) {
            finalizeMergedPayment(mergeId, outcome);
        }
        const buttonMeta = {
            success: {
                text: '支付成功',
                color: '#13b15a',
                icon: 'fa-check-circle'
            },
            partial: {
                text: '部分完成',
                color: '#f59e0b',
                icon: 'fa-circle-half-stroke'
            },
            failed: {
                text: '支付失败',
                color: '#ef4444',
                icon: 'fa-circle-xmark'
            }
        }[outcome] || { text: '支付成功', color: '#13b15a', icon: 'fa-check-circle' };
        btn.innerHTML = `<i class="fas ${buttonMeta.icon}"></i><span class="ml-2">${buttonMeta.text}</span>`;
        btn.style.backgroundColor = buttonMeta.color;
        showToast('支付结果已同步');
        setTimeout(function() {
            history.back();
        }, 1400);
    }, 1200);
}

function showToast(msg) {
    const tip = document.getElementById('toastTip');
    tip.textContent = msg;
    tip.classList.add('show');
    clearTimeout(showToast.timer);
    showToast.timer = setTimeout(function() {
        tip.classList.remove('show');
    }, 2200);
}

function processPayment() {
    const btn = document.getElementById('payBtn');
    if (btn.disabled) return;
    renderResultSheet();
    openSheet('result');
}

fillPage();
if (captureState === 'modal') {
    setTimeout(function() {
        renderResultSheet();
        openSheet('result');
    }, 120);
}
</script>
