<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>合并付款 - 手机银行支付</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="shared.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background-color: #f7f8fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .cashier-header-bg {
            position: absolute;
            top: 48px;
            left: 0;
            right: 0;
            height: 160px;
            background: linear-gradient(135deg, #13b15a 0%, #0d964a 100%);
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
            z-index: 0;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
        }

        /* Information Rows */
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 12px 0;
            border-bottom: 1px dashed #f1f5f9;
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .info-label {
            font-size: 14px;
            color: #64748b;
            flex-shrink: 0;
            width: 80px;
        }
        .info-value {
            font-size: 14px;
            color: #1e293b;
            font-weight: 500;
            text-align: right;
            line-height: 1.5;
            word-break: break-all;
        }

        /* Loading Spinner */
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 20px;
            height: 20px;
            -webkit-animation: spin 1s linear infinite;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Toast */
        .toast-tip {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
            white-space: nowrap;
        }
        .toast-tip.show {
            opacity: 1;
        }

        /* 商品明细表格 */
        .detail-table { width: 100%; border-collapse: collapse; }
        .detail-table th {
            font-size: 11px;
            color: #9CA3AF;
            font-weight: 500;
            padding: 6px 0;
            text-align: left;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
        .detail-table th:nth-child(2),
        .detail-table th:nth-child(3),
        .detail-table th:nth-child(4),
        .detail-table td:nth-child(2),
        .detail-table td:nth-child(3),
        .detail-table td:nth-child(4) { text-align: right; }
        
        .detail-table td {
            font-size: 12px;
            color: #374151;
            padding: 8px 0;
            border-bottom: 1px dashed rgba(0, 0, 0, 0.03);
            vertical-align: top;
        }
        .detail-table tr:last-child td { border-bottom: none; }

        /* V3 Collapsible Sub Orders Classes */
        .sub-orders-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #13b15a;
            font-size: 14px;
            cursor: pointer;
            user-select: none;
            margin-left: 8px;
            transition: all 0.2s ease;
            vertical-align: middle;
        }
        .sub-orders-toggle i {
            transition: transform 0.3s ease;
        }
        .sub-orders-toggle.open i {
            transform: rotate(180deg);
        }
        .sub-orders-content {
            display: none;
            margin-top: 12px;
            background: rgba(19, 177, 90, 0.03);
            border-radius: 12px;
            padding: 10px;
            border: 1px dashed #d1ebd8;
            animation: fadeIn 0.3s ease;
        }
        .sub-orders-content.open {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .sub-order-card-compact {
            background: #fff;
            border: 1px solid #f1f5f9;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
            font-size: 12px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        .sub-order-card-compact:last-child {
            margin-bottom: 0;
        }
        .sub-order-card-compact .meta-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            line-height: 1.4;
        }
        .sub-order-card-compact .meta-row:last-child {
            margin-bottom: 0;
        }
        .sub-order-card-compact .meta-row .label {
            color: #6b7280;
            flex-shrink: 0;
        }
        .sub-order-card-compact .meta-row .value {
            color: #1e293b;
            text-align: right;
            word-break: break-all;
        }

        .toggle-btn {
            width: 100%;
            text-align: center;
            padding: 14px 0;
            color: #13b15a;
            font-size: 14px;
            font-weight: 500;
            background: rgba(19, 177, 90, 0.05);
            border-radius: 12px;
            cursor: pointer;
            user-select: none;
        }
        .toggle-btn i {
            margin-left: 4px;
            transition: transform 0.3s ease;
        }
        .toggle-btn.open i {
            transform: rotate(180deg);
        }
    </style>
</head>
<body>

<div class="mobile-container relative flex flex-col overflow-hidden" id="appContainer">
    <!-- 原生黑色状态栏 -->
    <div id="statusBar" class="relative z-20"></div>

    <!-- 模拟银行的沉浸式高级蓝/绿色背景 -->
    <div class="cashier-header-bg"></div>

    <!-- 导航栏 -->
    <div id="navBar" class="relative z-20">
        <div class="flex items-center justify-between px-4 mt-2 h-[44px] text-white">
            <div class="w-10 h-10 flex items-center justify-start text-white cursor-pointer" onclick="history.back()">
                <i class="fas fa-chevron-left text-lg"></i>
            </div>
            <div class="text-[17px] font-semibold absolute left-0 right-0 text-center pointer-events-none">确认付款</div>
            <div class="w-10"></div>
        </div>
    </div>

    <!-- 核心滚动内容区 -->
    <div class="flex-1 overflow-y-auto no-scrollbar relative z-10 px-4 pt-4 pb-32">
        
        <!-- 卡片1：交易金额核心区 -->
        <div class="glass-panel rounded-2xl p-6 mb-4 flex flex-col items-center justify-center text-center relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-[#13b15a]/10 rounded-full blur-3xl -mr-10 -mt-10 opacity-60"></div>
            
            <div class="text-[13px] text-gray-500 font-medium mb-1.5 z-10 flex items-center gap-1">
                <span>请在 10天 内完成支付</span>
            </div>
            
            <div class="text-[36px] font-bold text-gray-900 tracking-tight flex items-baseline gap-1 z-10 mt-1" style="font-family:Poppins;">
                <span class="text-[20px]">¥</span>
                <span id="mainAmount">0.00</span>
            </div>
        </div>

        <!-- 卡片2：合并订单信息 -->
        <div class="glass-panel rounded-2xl p-4 mb-4">
            <div class="flex items-center gap-2 mb-3 text-[14px] font-bold text-gray-800">
                <div class="w-1 h-3.5 bg-[#13b15a] rounded-full"></div>
                <span>合并订单信息</span>
            </div>
            <div class="info-row">
                <span class="info-label">订单号</span>
                <span id="infoPaymentOrderNo" class="info-value font-mono"></span>
            </div>
            <div class="info-row">
                <span class="info-label">下单时间</span>
                <span id="infoCreatedAt" class="info-value"></span>
            </div>
            <div class="info-row border-b-0 items-center">
                <span class="info-label">订单数</span>
                <div class="info-value text-[#13b15a] font-medium flex-1 text-right">
                    <span id="subCount">0</span> 笔
                    <span id="subOrdersToggle" class="sub-orders-toggle" onclick="toggleSubOrders()">
                        <i class="fas fa-chevron-down"></i>
                    </span>
                </div>
            </div>
            
            <div id="subOrdersContent" class="sub-orders-content">
                <!-- 子订单卡片注入区 -->
            </div>
        </div>

        <!-- 卡片群3：合并收款明细 -->
        <div id="payeeGroupsContainer">
            <!-- 动态注入首个商户和展开按钮 -->
        </div>

        <!-- 卡片4：付款方信息 -->
        <div class="glass-panel rounded-2xl p-4 mb-4">
            <div class="flex items-center gap-2 mb-3 text-[14px] font-bold text-gray-800">
                <div class="w-1 h-3.5 bg-[#13b15a] rounded-full"></div>
                <span>付款方信息</span>
            </div>
            <div class="info-row">
                <span class="info-label">商户名称</span>
                <span class="info-value">保定收购站有限公司</span>
            </div>
            <div class="info-row">
                <span class="info-label">付款人</span>
                <span class="info-value">张老板</span>
            </div>
            <div class="info-row">
                <span class="info-label">付款银行</span>
                <span class="info-value">邮储银行保定清苑支行</span>
            </div>
            <div class="info-row">
                <span class="info-label">付款卡号</span>
                <span class="info-value">6210********7288</span>
            </div>
        </div>

    </div>

    <!-- 底部固定操作区 -->
    <div class="absolute bottom-0 left-0 right-0 p-5 bg-white border-t border-gray-100 pb-8 z-50">
        <button id="payBtn" class="w-full h-12 bg-[#13b15a] active:bg-[#0d964a] text-white font-bold text-[16px] rounded-xl shadow-[0_8px_20px_rgba(19,177,90,0.3)] transition-all flex items-center justify-center gap-2" onclick="processPayment()">
            确认付款
        </button>
    </div>

    <div id="toastTip" class="toast-tip"></div>
</div>

<script>
// Mock data representing a merged payment scenario
const mockMergeData = {
    paymentOrderNo: 'ZF202603050800100',
    createdAt: new Date().toISOString(),
    subOrders: [
        {
            grainOrderNo: 'SL202603050101',
            paymentOrderNo: 'ZF202603050101',
            createTime: new Date(Date.now() - 3600000).toISOString(),
            payeeCompany: '李大姐农户',
            payeeName: '李大姐',
            payeeBank: '邮储银行济南历城支行',
            payeeCard: '6228********8901',
            items: [
                { name: '红富士苹果', price: 2.80, qty: 600, unit: '斤', subtotal: 1680.00 },
                { name: '黄元帅苹果', price: 3.50, qty: 420, unit: '斤', subtotal: 1470.00 }
            ]
        },
        {
            grainOrderNo: 'SL202603050102',
            paymentOrderNo: 'ZF202603050102',
            createTime: new Date(Date.now() - 7200000).toISOString(),
            payeeCompany: '王大哥果蔬合作社',
            payeeName: '王大哥',
            payeeBank: '邮储银行潍坊寒亭支行',
            payeeCard: '6210********1258',
            items: [
                { name: '西红柿', price: 1.60, qty: 1000, unit: '斤', subtotal: 1600.00 },
                { name: '黄瓜', price: 2.20, qty: 800, unit: '斤', subtotal: 1760.00 }
            ]
        },
        {
            grainOrderNo: 'SL202603050103',
            paymentOrderNo: 'ZF202603050103',
            createTime: new Date(Date.now() - 10800000).toISOString(),
            payeeCompany: '张三农产品合作社',
            payeeName: '张三',
            payeeBank: '农业银行保定支行',
            payeeCard: '6228********6666',
            items: [
                { name: '普通玉米', price: 1.25, qty: 2000, unit: '斤', subtotal: 2500.00 }
            ]
        }
    ]
};

// 渲染基础 UI
document.getElementById('statusBar').innerHTML = renderStatusBar ? renderStatusBar() : '';

function formatMoney(amount) {
    return Number(amount).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatTime(isoString) {
    if (!isoString) return '';
    const d = new Date(isoString);
    return d.getFullYear() + '-' + 
           String(d.getMonth() + 1).padStart(2, '0') + '-' + 
           String(d.getDate()).padStart(2, '0') + ' ' + 
           String(d.getHours()).padStart(2, '0') + ':' + 
           String(d.getMinutes()).padStart(2, '0');
}

function formatUnitPrice(price, unit) {
    const num = Number(price);
    if (!Number.isFinite(num) || num <= 0) return '--';
    const cleanPrice = Number.isInteger(num) ? String(num) : String(Number(num.toFixed(2)));
    const cleanUnit = String(unit || '').trim();
    return '¥' + cleanPrice + (cleanUnit ? '/' + cleanUnit : '');
}

function formatQtyOnly(qty) {
    const num = Number(qty);
    if (!Number.isFinite(num) || num <= 0) return '--';
    return Number.isInteger(num) ? String(num) : String(num);
}

function escapeHtml(unsafe) {
    return (unsafe || '').toString()
         .replace(/&/g, "&amp;")
         .replace(/</g, "&lt;")
         .replace(/>/g, "&gt;")
         .replace(/"/g, "&quot;")
         .replace(/'/g, "&#039;");
}

function toggleSubOrders() {
    const content = document.getElementById('subOrdersContent');
    const toggle = document.getElementById('subOrdersToggle');
    if (content && toggle) {
        content.classList.toggle('open');
        toggle.classList.toggle('open');
    }
}

function toggleRestPayees() {
    const container = document.getElementById('restPayeesContainer');
    const btnText = document.querySelector('#expandPayeesBtn span');
    const btnIcon = document.getElementById('expandPayeesIcon');
    if (container && btnText && btnIcon) {
        const isOpen = container.style.display === 'block';
        const totalRest = mockMergeData.subOrders.length - 1;
        if (isOpen) {
            container.style.display = 'none';
            btnText.textContent = `展开其余 ${totalRest} 个收款方`;
            btnIcon.style.transform = 'rotate(0deg)';
        } else {
            container.style.display = 'block';
            btnText.textContent = `收起其余 ${totalRest} 个收款方`;
            btnIcon.style.transform = 'rotate(180deg)';
        }
    }
}

function generatePayeeBlock(subOrder, index, total) {
    const itemRows = (subOrder.items || []).map(item => {
        const qty = Number(item.qty || 0);
        const unit = item.unit || '斤';
        const price = Number(item.price || 0);
        const subtotal = Number(item.subtotal || qty * price);
        return `
            <tr>
                <td class="font-medium">${escapeHtml(item.name || '-')}</td>
                <td style="font-family:Poppins;">${formatUnitPrice(price, unit)}</td>
                <td>${formatQtyOnly(qty)}</td>
                <td class="font-medium text-[#13b15a]" style="font-family:Poppins;">¥${formatMoney(subtotal)}</td>
            </tr>
        `;
    }).join('');

    const payeeTotal = (subOrder.items || []).reduce((sum, it) => sum + Number(it.subtotal || 0), 0);

    const divider = index > 0 ? '<div class="my-5 border-t border-dashed border-gray-200"></div>' : '';

    return `
        ${divider}
        <div class="payee-block">
            <div class="flex items-center justify-between mb-2">
                <div class="text-[13px] font-bold text-gray-500">收款方 (${index + 1}/${total})</div>
                <div class="font-bold text-[#13b15a] text-[15px]" style="font-family:Poppins;">¥${formatMoney(payeeTotal)}</div>
            </div>
            
            <div class="info-row">
                <span class="info-label">商户名称</span>
                <span class="info-value">${escapeHtml(subOrder.payeeCompany)}</span>
            </div>
            <div class="info-row">
                <span class="info-label">收款方</span>
                <span class="info-value">${escapeHtml(subOrder.payeeName)}</span>
            </div>
            <div class="info-row">
                <span class="info-label">收款银行</span>
                <span class="info-value">${escapeHtml(subOrder.payeeBank)}</span>
            </div>
            <div class="info-row mb-1 border-b-0">
                <span class="info-label">收款卡号</span>
                <span class="info-value">${escapeHtml(subOrder.payeeCard)}</span>
            </div>
            
            <div class="bg-gray-50/80 rounded-xl p-3 mt-2 border border-gray-100">
                <table class="detail-table">
                    <thead>
                        <tr>
                            <th>商品名称</th>
                            <th>单价</th>
                            <th>数量</th>
                            <th>小计</th>
                        </tr>
                    </thead>
                    <tbody>${itemRows}</tbody>
                </table>
            </div>
        </div>
    `;
}

function fillPage() {
    let globalTotal = 0;
    mockMergeData.subOrders.forEach(sub => {
        sub.items.forEach(it => {
            globalTotal += Number(it.subtotal || 0);
        });
    });

    document.getElementById('mainAmount').textContent = formatMoney(globalTotal);
    document.getElementById('infoPaymentOrderNo').textContent = mockMergeData.paymentOrderNo;
    document.getElementById('infoCreatedAt').textContent = formatTime(mockMergeData.createdAt);
    document.getElementById('subCount').textContent = mockMergeData.subOrders.length;
    
    // Render sub-orders miniature view
    const subHTML = mockMergeData.subOrders.map(sub => `
        <div class="sub-order-card-compact">
            <div class="meta-row"><span class="label">商户名称</span><span class="value">${escapeHtml(sub.payeeCompany)}</span></div>
            <div class="meta-row"><span class="label">收粮订单号</span><span class="value">${escapeHtml(sub.grainOrderNo)}</span></div>
            <div class="meta-row"><span class="label">支付订单号</span><span class="value">${escapeHtml(sub.paymentOrderNo)}</span></div>
            <div class="meta-row"><span class="label">下单时间</span><span class="value">${escapeHtml(formatTime(sub.createTime))}</span></div>
        </div>
    `).join('');
    document.getElementById('subOrdersContent').innerHTML = subHTML;

    // Render Payee Groups exactly mapped to user's new request (single card constraint)
    const container = document.getElementById('payeeGroupsContainer');
    if (mockMergeData.subOrders.length > 0) {
        const total = mockMergeData.subOrders.length;
        
        let groupsHTML = `
        <div class="glass-panel rounded-2xl p-4 mb-4">
            <div class="flex items-center gap-2 mb-4 text-[14px] font-bold text-gray-800 border-b border-gray-100 pb-3">
                <div class="w-1 h-3.5 bg-[#13b15a] rounded-full"></div>
                <span>收款方明细</span>
            </div>
            
            ${generatePayeeBlock(mockMergeData.subOrders[0], 0, total)}
        `;

        if (total > 1) {
            const restCards = mockMergeData.subOrders.slice(1).map((sub, i) => generatePayeeBlock(sub, i + 1, total)).join('');
            groupsHTML += `
            <div id="restPayeesContainer" style="display:none;">
                ${restCards}
            </div>
            
            <div class="mt-4 pt-4 border-t border-gray-100 text-center">
                <div class="inline-flex items-center justify-center text-[#13b15a] font-medium text-[13px] cursor-pointer" id="expandPayeesBtn" onclick="toggleRestPayees()">
                    <span>展开其余 ${total - 1} 个收款方</span>
                    <i class="fas fa-chevron-down ml-1 transition-transform duration-300" id="expandPayeesIcon"></i>
                </div>
            </div>
            `;
        }
        
        groupsHTML += `</div>`;
        container.innerHTML = groupsHTML;
    }
}

function showToast(msg) {
    const tip = document.getElementById('toastTip');
    tip.textContent = msg;
    tip.classList.add('show');
    clearTimeout(showToast.timer);
    showToast.timer = setTimeout(() => {
        tip.classList.remove('show');
    }, 2500);
}

function processPayment() {
    const btn = document.getElementById('payBtn');
    
    // 防止重复点击
    if (btn.disabled) return;
    
    // 变为加载中状态
    const originalText = btn.innerHTML;
    btn.disabled = true;
    btn.classList.add('opacity-90');
    btn.innerHTML = `<div class="spinner"></div><span class="ml-2">处理中...</span>`;
    
    // 模拟网络请求
    setTimeout(() => {
        btn.innerHTML = `<i class="fas fa-check-circle"></i><span class="ml-2">支付成功</span>`;
        btn.classList.remove('bg-blue-600', 'active:bg-blue-700');
        btn.classList.add('bg-[#13b15a]');
        
        showToast('支付处理完成');
        
        setTimeout(() => {
            history.back();
        }, 1500);
        
    }, 2000);
}

// 初始化
fillPage();
</script>
</body>
</html>
