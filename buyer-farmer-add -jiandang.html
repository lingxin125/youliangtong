<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>丰收云 - 农户建档</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="shared.js"></script>
    <style>
        .input-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid rgba(243, 244, 246, 0.8);
            gap: 12px;
        }
        .input-row:last-child {
            border-bottom: none;
            padding-bottom: 4px;
        }
        .input-label {
            font-size: 14px;
            color: #4B5563;
            font-weight: 500;
            width: 112px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .input-value {
            flex: 1;
            min-width: 0;
            width: 10%;
            text-align: right;
            font-size: 14px;
            color: #1F2937;
            font-weight: 500;
            outline: none;
            background: transparent;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
        }
        .input-value::placeholder {
            color: #9CA3AF;
            font-weight: 400;
        }
        .input-readonly {
            color: #6B7280;
        }
        .upload-box {
            border: 1.5px dashed #D1D5DB;
            background: #F9FAFB;
            border-radius: 12px;
            height: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #6B7280;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .upload-box:active {
            background: #F3F4F6;
            transform: scale(0.98);
        }
        .upload-box.uploaded {
            border-style: solid;
            border-color: rgba(17, 166, 74, 0.4);
            background: rgba(240, 253, 244, 0.5);
            color: #11A64A;
        }
        .settle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 0 10px;
        }
        .settle-switch {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px;
            background: #F3F4F6;
            border-radius: 999px;
        }
        .settle-chip {
            min-width: 60px;
            height: 32px;
            padding: 0 14px;
            border: none;
            border-radius: 999px;
            background: transparent;
            color: #6B7280;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .settle-chip.active {
            background: #FFFFFF;
            color: #11A64A;
            box-shadow: 0 2px 8px rgba(17, 24, 39, 0.08);
        }
        .hidden-row {
            display: none;
        }
        .toast-tip {
            position: absolute;
            left: 16px;
            right: 16px;
            bottom: 98px;
            padding: 14px;
            background: rgba(17, 24, 39, 0.9);
            border-radius: 14px;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            z-index: 70;
            opacity: 0;
            pointer-events: none;
            transform: translateY(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .toast-tip.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        .loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .loading-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body>
<div class="mobile-container relative bg-[#F4F6F8]">
    <!-- 原生黑色状态栏 -->
    <div id="statusBar" class="relative z-20"></div>

    <!-- 顶部导航栏 -->
    <div id="navBar" class="relative z-20"></div>

    <!-- 核心滚动内容区 -->
    <div class="flex-1 overflow-y-auto no-scrollbar relative z-10 px-4 pt-4 pb-10">
        
        <div class="glass-card rounded-2xl p-4 mb-4">
            <div class="flex items-center gap-2 mb-3 pb-2">
                <div class="w-1 h-3.5 bg-primary rounded-full"></div>
                <span class="text-[15px] font-bold text-gray-800">农户信息</span>
            </div>

            <div class="text-[11px] text-gray-400 flex items-center gap-1.5 mb-3">
                <i class="fas fa-wand-magic-sparkles text-primary/70 text-[10px]"></i>
                <span id="ocrHintText">上传身份证照片，可自动识别并回填信息</span>
            </div>

            <div class="flex gap-3 mb-2">
                <div class="flex-1 upload-box" id="uploadIdFront" onclick="simulateUpload('idFront')">
                    <i class="fas fa-id-card text-2xl mb-1.5 text-blue-400"></i>
                    <span class="text-[11px] font-medium">身份证人像面</span>
                </div>
                <div class="flex-1 upload-box" id="uploadIdBack" onclick="simulateUpload('idBack')">
                    <i class="far fa-id-card text-2xl mb-1.5 text-gray-400"></i>
                    <span class="text-[11px] font-medium">身份证国徽面</span>
                </div>
            </div>

            <div class="input-row">
                <span class="input-label">姓名</span>
                <input type="text" id="farmerName" placeholder="请输入农户姓名" class="input-value">
            </div>
            <div class="input-row">
                <span class="input-label">手机号</span>
                <input type="tel" id="farmerMobile" placeholder="请输入手机号" maxlength="11" class="input-value" style="font-family:Poppins,sans-serif;">
            </div>
            <div class="input-row">
                <span class="input-label">身份证号</span>
                <input type="text" id="farmerIdNo" placeholder="请输入身份证号" class="input-value font-mono">
            </div>
            <div class="input-row">
                <span class="input-label">农户地址</span>
                <input type="text" id="farmerAddress" placeholder="请输入农户地址" class="input-value">
            </div>
            <div class="input-row">
                <span class="input-label">种植面积</span>
                <input type="text" id="plantingArea" placeholder="请输入种植面积" class="input-value">
            </div>
        </div>

        <div class="glass-card rounded-2xl p-4 mb-4">
            <div class="flex items-center gap-2 mb-3 pb-2">
                <div class="w-1 h-3.5 bg-primary rounded-full"></div>
                <span class="text-[15px] font-bold text-gray-800">结算信息</span>
            </div>

            <div class="settle-row !pt-0">
                <span class="input-label">结算类型</span>
                <div class="settle-switch">
                    <button type="button" id="settlePrivateBtn" class="settle-chip active" onclick="switchSettleType('private')">对私</button>
                    <button type="button" id="settlePublicBtn" class="settle-chip" onclick="switchSettleType('public')">对公</button>
                </div>
            </div>
            <div class="upload-box h-24 w-full flex flex-col items-center justify-center gap-2 mb-3" id="uploadBankCard" onclick="simulateUpload('bankCard')">
                <i id="bankUploadIcon" class="fas fa-credit-card text-3xl text-primary"></i>
                <span id="bankUploadLabel" class="text-[14px] font-medium">上传银行卡照片</span>
            </div>
            <div class="input-row hidden-row" id="publicAccountRow">
                <span class="input-label">对公账户名称</span>
                <input type="text" id="publicAccountName" placeholder="请输入对公账户名称" class="input-value">
            </div>
            <div class="input-row">
                <span id="bankAccountLabel" class="input-label">银行卡号</span>
                <input type="text" id="bankCardNo" placeholder="请输入银行卡号" class="input-value font-mono">
            </div>
            <div class="input-row">
                <span class="input-label">开户行</span>
                <input type="text" id="bankName" placeholder="请输入开户行" class="input-value">
            </div>
            <div class="input-row !pb-0">
                <span class="input-label">开户支行</span>
                <input type="text" id="bankBranch" placeholder="请输入开户支行" class="input-value">
            </div>
        </div>

        <div class="px-1 pt-1">
            <button id="submitBtn" class="w-full h-10 bg-primary active:bg-primary-dark text-white font-semibold text-[15px] rounded-2xl shadow-[0_6px_16px_rgba(17,166,74,0.22)] transition-transform active:scale-95 flex items-center justify-center gap-2" onclick="submitApplication()">
                提交建档
            </button>
        </div>

    </div>

    <div id="toastTip" class="toast-tip"></div>
    
    <!-- 全屏提交状态层 -->
    <div id="submitOverlay" class="loading-overlay">
        <!-- 加载动画 -->
        <div id="loadingState" class="flex flex-col items-center">
            <div class="w-16 h-16 mb-4 relative">
                <svg class="animate-spin w-full h-full text-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-20" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"></circle>
                    <path fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </div>
            <div class="text-[16px] font-bold text-gray-800 mb-1">正在处理建档请求...</div>
            <div class="text-[13px] text-gray-500">请勿离开此页面</div>
        </div>
        
        <!-- 成功状态 (默认隐藏) -->
        <div id="successState" class="flex flex-col items-center hidden">
            <div class="w-20 h-20 bg-green-50 rounded-full flex items-center justify-center mb-5 scale-in relative">
                <i class="fas fa-check text-[36px] text-primary"></i>
                <!-- 装饰光圈 -->
                <div class="absolute inset-0 border-2 border-primary rounded-full animate-ping opacity-20"></div>
            </div>
            <div class="text-[20px] font-bold text-gray-800 mb-2">建档成功</div>
            <div class="text-[13px] text-gray-500 mb-8 max-w-[80%] text-center leading-relaxed">该农户已加入您的合作列表，可返回继续处理后续业务。</div>
            <button id="successBackBtn" onclick="routerBack()" class="h-11 px-8 bg-white border border-gray-200 text-gray-700 font-medium text-[15px] rounded-full shadow-sm active:bg-gray-50 transition-colors">
                返回合作农户
            </button>
        </div>
    </div>
</div>

<script>
document.getElementById('statusBar').innerHTML = renderStatusBar('dark');
const addQuery = new URLSearchParams(window.location.search);
let currentSettleType = 'private';

function getBackTarget() {
    const back = (addQuery.get('back') || '').trim();
    const source = (addQuery.get('source') || '').trim();
    if (back === 'mine') return 'buyer-my.html';
    if (back === 'contacts') return 'buyer-contacts.html';
    if (back) return back;
    if (source === 'invite' || source === 'scan_invite') return 'buyer-my.html';
    return 'buyer-contacts.html';
}

const backTarget = getBackTarget();
document.getElementById('navBar').innerHTML = renderHeader('农户建档', backTarget, false, 'bg-transparent text-gray-800');
const successBackBtn = document.getElementById('successBackBtn');
if (successBackBtn && backTarget === 'buyer-my.html') {
    successBackBtn.textContent = '返回我的';
} else if (successBackBtn && backTarget.indexOf('buyer-farmer-add.html') !== -1) {
    successBackBtn.textContent = '返回上一页';
}

let uploadStatus = {
    idFront: false,
    idBack: false,
    bankCard: false
};

function switchSettleType(type) {
    currentSettleType = type;
    const isPublic = type === 'public';
    const ocrHintText = document.getElementById('ocrHintText');
    document.getElementById('settlePrivateBtn').classList.toggle('active', !isPublic);
    document.getElementById('settlePublicBtn').classList.toggle('active', isPublic);
    document.getElementById('publicAccountRow').style.display = isPublic ? 'flex' : 'none';
    document.getElementById('bankAccountLabel').textContent = isPublic ? '银行账号' : '银行卡号';
    document.getElementById('bankCardNo').placeholder = isPublic ? '请输入银行账号' : '请输入银行卡号';
    document.getElementById('bankUploadLabel').textContent = isPublic ? '上传银行账户照片' : '上传银行卡照片';
    document.getElementById('bankUploadIcon').className = isPublic
        ? 'fas fa-building-columns text-3xl text-primary'
        : 'fas fa-credit-card text-3xl text-primary';
    if (ocrHintText) {
        ocrHintText.textContent = '上传身份证照片，可自动识别并回填信息';
    }
}

function simulateUpload(type) {
    showToast('正在调起相机进行OCR识别...');
    const btn = document.getElementById('upload' + capitalize(type));
    
    setTimeout(() => {
        uploadStatus[type] = true;
        btn.classList.add('uploaded');
        if (type === 'idFront') {
            btn.innerHTML = `<i class="fas fa-check-circle text-xl mb-1.5"></i><span class="text-[11px] font-medium">人像面已识别</span>`;
        } else if (type === 'idBack') {
            btn.innerHTML = `<i class="fas fa-check-circle text-xl mb-1.5"></i><span class="text-[11px] font-medium">国徽面已识别</span>`;
        } else if (type === 'bankCard') {
            btn.innerHTML = `<i class="fas fa-check-circle text-xl"></i><span class="text-[13px] font-medium">卡片已识别</span>`;
        }
        
        if (uploadStatus.idFront && uploadStatus.idBack) {
            if (!document.getElementById('farmerName').value.trim()) {
                document.getElementById('farmerName').value = '张建国';
            }
            document.getElementById('farmerIdNo').value = '510122198001018888';
            document.getElementById('farmerAddress').value = '四川省成都市双流区永安镇凤凰村';
            document.getElementById('plantingArea').value = '128亩';
        }
        if (uploadStatus.bankCard) {
            document.getElementById('bankCardNo').value = '6228 4800 1234 5678';
            document.getElementById('bankName').value = '中国农业银行';
            document.getElementById('bankBranch').value = '成都双流永安支行';
        }
        
        showToast('识别成功');
    }, 1500);
}

function submitApplication() {
    const name = document.getElementById('farmerName').value.trim();
    const phone = document.getElementById('farmerMobile').value.trim();
    const idNo = document.getElementById('farmerIdNo').value.trim();
    const address = document.getElementById('farmerAddress').value.trim();
    const plantingArea = document.getElementById('plantingArea').value.trim();
    const cardNo = document.getElementById('bankCardNo').value.trim();
    const bankName = document.getElementById('bankName').value.trim();
    const bankBranch = document.getElementById('bankBranch').value.trim();
    const publicAccountName = document.getElementById('publicAccountName').value.trim();
    
    if (!name || !phone) {
        showToast('请填写姓名和手机号');
        return;
    }
    if (!idNo || !cardNo) {
        showToast(currentSettleType === 'public' ? '请完善身份证号和银行账号' : '请完善身份证号和银行卡号');
        return;
    }
    if (!address || !plantingArea) {
        showToast('请填写农户地址和种植面积');
        return;
    }
    if (!bankName || !bankBranch) {
        showToast('请填写开户行和开户支行');
        return;
    }
    if (currentSettleType === 'public' && !publicAccountName) {
        showToast('请填写对公账户名称');
        return;
    }

    const overlay = document.getElementById('submitOverlay');
    overlay.classList.add('show');
    
    // Simulate API call
    setTimeout(() => {
        // Hide loading, show success
        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('successState').classList.remove('hidden');
    }, 2000);
}

function routerBack() {
    window.location.href = backTarget;
}

function showToast(msg) {
    const tip = document.getElementById('toastTip');
    tip.textContent = msg;
    tip.classList.add('show');
    clearTimeout(showToast.timer);
    showToast.timer = setTimeout(() => tip.classList.remove('show'), 2000);
}

function capitalize(str) {
    return str.charAt(0).toUpperCase() + str.slice(1);
}

switchSettleType('private');
</script>
</body>
</html>
