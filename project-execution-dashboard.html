<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>丰收云 · 智能驾驶舱</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2315d68f'/%3E%3Cpath d='M18 18h28v28H18z' fill='%2308231e'/%3E%3Cpath d='M18 18l14 8 14-8M32 26v20' stroke='%2315d68f' stroke-width='4'/%3E%3C/svg%3E">
<style>
  :root {
    --bg: #061714;
    --bg-2: #08231f;
    --side: #071916;
    --panel: rgba(10, 44, 39, 0.74);
    --panel-2: rgba(11, 55, 48, 0.88);
    --line: rgba(77, 218, 188, 0.17);
    --line-strong: rgba(77, 218, 188, 0.34);
    --text: #f2fffb;
    --muted: #8db7ab;
    --green: #19e391;
    --green-2: #43f3b8;
    --cyan: #52d7e6;
    --blue: #4e8cff;
    --yellow: #ffd35c;
    --red: #ff5b65;
    --pink: #ff6aa9;
    --shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-width: 320px;
    min-height: 100dvh;
    color: var(--text);
    font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    background:
      radial-gradient(circle at 48% 22%, rgba(20, 226, 145, 0.14), transparent 28%),
      radial-gradient(circle at 78% 18%, rgba(53, 202, 190, 0.10), transparent 26%),
      linear-gradient(135deg, #061210 0%, #08231f 48%, #061714 100%);
    overflow-x: hidden;
    font-variant-numeric: tabular-nums;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.2;
    background-image:
      linear-gradient(rgba(77, 218, 188, 0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(77, 218, 188, 0.08) 1px, transparent 1px),
      radial-gradient(circle, rgba(77, 218, 188, 0.18) 1px, transparent 1.4px);
    background-size: 80px 80px, 80px 80px, 18px 18px;
    mask-image: linear-gradient(90deg, transparent, black 8%, black 92%, transparent);
  }

  a { color: inherit; text-decoration: none; }
  button { font: inherit; }
  *::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }
  *::-webkit-scrollbar-thumb {
    border-radius: 999px;
    background: rgba(77, 218, 188, 0.28);
  }
  *::-webkit-scrollbar-track {
    background: transparent;
  }

  .app {
    position: relative;
    z-index: 1;
    min-height: 100dvh;
  }

  .logo-mark {
    width: 38px;
    height: 38px;
    margin: 0 auto;
    border-radius: 9px;
    background: linear-gradient(135deg, var(--green), #0bbf86);
    display: grid;
    place-items: center;
    color: #06231d;
    font-weight: 900;
  }

  .main {
    min-width: 0;
    padding: 22px 30px 30px;
  }

  .topbar {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: center;
    gap: 18px;
    margin-bottom: 20px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 23px;
    font-weight: 800;
    white-space: nowrap;
  }

  .brand .logo-mark {
    margin: 0;
    width: 28px;
    height: 28px;
    border-radius: 7px;
    font-size: 14px;
  }

  .top-meta {
    min-height: 34px;
    padding: 0 12px;
    border: 1px solid var(--line);
    border-radius: 7px;
    background: rgba(255, 255, 255, 0.05);
    color: #b4d4cc;
    display: inline-flex;
    align-items: center;
    font-size: 13px;
  }

  .dashboard-grid {
    display: grid;
    grid-template-columns: minmax(300px, 0.92fr) minmax(500px, 1.48fr) minmax(300px, 0.92fr);
    grid-template-rows: 270px 370px 320px minmax(240px, auto);
    gap: 18px;
  }

  .panel {
    min-width: 0;
    min-height: 0;
    border: 1px solid var(--line);
    border-radius: 8px;
    background:
      linear-gradient(180deg, rgba(10, 48, 42, 0.88), rgba(7, 34, 31, 0.78)),
      radial-gradient(circle at 30% 20%, rgba(25, 227, 145, 0.08), transparent 48%);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04), var(--shadow);
    overflow: hidden;
  }

  .panel-pad { padding: 16px 18px; }

  .panel-title {
    margin: 0 0 14px;
    color: #e8fff9;
    font-size: 17px;
    font-weight: 800;
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: center;
  }

  .panel-title small {
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
  }

  .core { grid-column: 1; grid-row: 1; }
  .hero {
    grid-column: 2 / 4;
    grid-row: 1;
    border: 0;
    background: transparent;
    box-shadow: none;
    overflow: hidden;
    isolation: isolate;
  }
  .risk { grid-column: 3; grid-row: 2; }
  .status { grid-column: 1; grid-row: 2; }
  .modules { grid-column: 2; grid-row: 2; }
  .rank { grid-column: 1; grid-row: 3; }
  .trend { grid-column: 2; grid-row: 3; }
  .todo { grid-column: 3; grid-row: 3; }
  .health { grid-column: 1 / span 2; grid-row: 4; }
  .insight { grid-column: 3; grid-row: 4; }

  .metric-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 0;
  }

  .metric {
    min-width: 0;
    padding: 4px 16px 14px 0;
    border-right: 1px solid rgba(255, 255, 255, 0.07);
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  }

  .metric:nth-child(3n) { border-right: 0; }
  .metric:nth-child(n+4) { border-bottom: 0; padding-top: 14px; }

  .metric label {
    display: block;
    color: #a8cfc5;
    font-size: 12px;
  }

  .metric strong {
    display: block;
    margin-top: 6px;
    color: #ffffff;
    font-size: 28px;
    line-height: 1;
  }

  .metric em {
    display: block;
    margin-top: 5px;
    color: var(--green);
    font-size: 12px;
    line-height: 1.3;
    font-style: normal;
  }

  .hero-wrap {
    position: relative;
    height: 100%;
    padding: 24px 28px 22px;
    display: block;
    background:
      radial-gradient(circle at 73% 64%, rgba(25, 227, 145, 0.24), transparent 33%),
      linear-gradient(90deg, rgba(6, 23, 20, 0.10), rgba(9, 53, 45, 0.22), rgba(6, 23, 20, 0));
    overflow: hidden;
  }

  .hero-copy {
    position: absolute;
    left: 30px;
    top: 50%;
    width: min(460px, 52%);
    z-index: 2;
    transform: translateY(-48%);
  }

  .hero h1 {
    margin: 0;
    font-size: 44px;
    line-height: 1.18;
    letter-spacing: 0;
    text-shadow: 0 10px 30px rgba(0, 0, 0, .42);
    white-space: nowrap;
  }

  .hero p {
    margin: 12px 0 0;
    color: #4cf1b5;
    font-size: 16px;
  }

  .hero-visual {
    position: absolute;
    inset: 0;
    margin: 0;
    pointer-events: none;
  }

  .hero-visual::after {
    content: "";
    position: absolute;
    left: 12%;
    right: 8%;
    bottom: 2px;
    height: 44px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(25, 227, 145, .36), transparent 68%);
    filter: blur(12px);
  }

  .hero-image {
    position: absolute;
    z-index: 1;
    right: 10px;
    top: -42px;
    width: min(520px, 58%);
    max-width: none;
    height: 330px;
    object-fit: contain;
    object-position: center;
    filter: drop-shadow(0 26px 42px rgba(0, 0, 0, .38)) saturate(1.05);
    -webkit-mask-image: radial-gradient(ellipse at 56% 48%, #000 0 44%, rgba(0, 0, 0, .82) 57%, transparent 78%);
    mask-image: radial-gradient(ellipse at 56% 48%, #000 0 44%, rgba(0, 0, 0, .82) 57%, transparent 78%);
  }

  .status-body {
    display: grid;
    grid-template-columns: 190px minmax(0, 1fr);
    align-items: center;
    gap: 18px;
    height: calc(100% - 46px);
  }

  .donut {
    position: relative;
    width: 176px;
    height: 176px;
    border-radius: 50%;
    background: var(--donut);
  }
  .donut::after {
    content: "";
    position: absolute;
    inset: 48px;
    border-radius: 50%;
    background: #0a2a25;
  }
  .donut-center {
    position: absolute;
    inset: 0;
    z-index: 1;
    display: grid;
    place-items: center;
    text-align: center;
    font-size: 26px;
    font-weight: 800;
  }
  .donut-center span {
    display: block;
    color: #b6d7d0;
    font-size: 12px;
    font-weight: 600;
  }

  .legend {
    display: grid;
    gap: 12px;
  }
  .legend-row {
    display: grid;
    grid-template-columns: 12px minmax(0, 1fr) auto;
    align-items: center;
    gap: 9px;
    color: #d5f3ec;
    font-size: 13px;
  }
  .legend-color {
    width: 10px;
    height: 10px;
    background: var(--color);
  }

  .module-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(126px, 1fr));
    gap: 10px;
    max-height: 312px;
    overflow: auto;
    padding-right: 4px;
  }

  .module-card {
    min-width: 0;
    padding: 10px;
    border: 1px solid rgba(25, 227, 145, 0.15);
    border-radius: 6px;
    background: rgba(4, 48, 40, 0.65);
    color: inherit;
    text-align: left;
    cursor: pointer;
  }
  .module-card:hover,
  .module-card.active {
    border-color: rgba(25, 227, 145, 0.6);
    background: rgba(9, 73, 58, 0.78);
  }
  .module-card h3 {
    margin: 0 0 9px;
    font-size: 12px;
    line-height: 1.35;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .module-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    text-align: center;
  }
  .module-stats strong {
    display: block;
    color: #fff;
    font-size: 17px;
  }
  .module-stats span {
    color: #99beb5;
    font-size: 10px;
  }

  .radar-wrap {
    display: grid;
    grid-template-columns: 150px minmax(0, 1fr);
    gap: 14px;
    align-items: center;
  }
  .radar-chart {
    position: relative;
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 50% 50%, rgba(255, 91, 101, .95) 0 9px, transparent 10px),
      repeating-radial-gradient(circle, transparent 0 22px, rgba(255, 120, 130, .30) 23px 24px, transparent 25px 100%),
      conic-gradient(from -18deg, transparent 0 8deg, rgba(255, 110, 118, .55) 9deg 10deg, transparent 11deg 58deg, rgba(255, 110, 118, .55) 59deg 60deg, transparent 61deg 118deg, rgba(255, 110, 118, .55) 119deg 120deg, transparent 121deg 178deg, rgba(255, 110, 118, .55) 179deg 180deg, transparent 181deg 238deg, rgba(255, 110, 118, .55) 239deg 240deg, transparent 241deg 298deg, rgba(255, 110, 118, .55) 299deg 300deg, transparent 301deg 360deg),
      radial-gradient(circle, rgba(255, 91, 101, .18), rgba(255, 91, 101, .05) 62%, transparent 64%);
    box-shadow: inset 0 0 24px rgba(255, 91, 101, .35), 0 0 28px rgba(255, 91, 101, .14);
  }
  .radar-chart::before {
    content: "";
    position: absolute;
    inset: 25px;
    clip-path: polygon(50% 0, 76% 21%, 85% 56%, 58% 86%, 24% 72%, 14% 32%);
    background: linear-gradient(135deg, rgba(255, 91, 101, .72), rgba(255, 211, 92, .34));
    filter: drop-shadow(0 0 12px rgba(255, 91, 101, .55));
  }
  .radar-chart::after {
    content: "";
    position: absolute;
    inset: 60px;
    border-radius: 50%;
    background: #ff5b65;
    box-shadow: 0 0 18px rgba(255, 91, 101, .85), 0 0 46px rgba(255, 211, 92, .3);
  }
  .risk-number strong {
    display: block;
    color: var(--red);
    font-size: 34px;
  }
  .risk-number span {
    color: #b8d6cf;
    font-size: 12px;
  }
  .risk-list {
    display: grid;
    gap: 9px;
    margin-top: 18px;
    max-height: calc(100% - 166px);
    overflow: auto;
  }
  .risk-item {
    display: grid;
    grid-template-columns: 8px minmax(0, 1fr);
    gap: 10px;
    padding: 8px 10px;
    border-radius: 5px;
    background: rgba(255, 255, 255, 0.05);
    color: #d6eee7;
    font-size: 12px;
    line-height: 1.45;
    text-align: left;
    border: 0;
    cursor: pointer;
  }
  .risk-dot {
    width: 7px;
    height: 7px;
    margin-top: 5px;
    border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 10px var(--red);
  }

  .rank-table,
  .todo-table {
    width: 100%;
    border-collapse: collapse;
    color: #cfeee7;
    font-size: 12px;
  }
  .table-scroll {
    max-height: calc(100% - 42px);
    overflow: auto;
    padding-right: 4px;
  }
  .rank-table th,
  .todo-table th {
    position: sticky;
    top: 0;
    z-index: 1;
    padding: 8px;
    background: rgba(28, 213, 149, 0.18);
    color: #e9fff9;
    text-align: left;
    font-weight: 700;
  }
  .rank-table td,
  .todo-table td {
    padding: 7px 8px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    vertical-align: middle;
  }
  .rank-table tr,
  .todo-table tr { cursor: pointer; }
  .rank-table tr:hover,
  .todo-table tr:hover { background: rgba(25, 227, 145, 0.08); }
  .bar-track {
    display: block;
    width: 100%;
    height: 6px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.08);
    overflow: hidden;
  }
  .bar-fill {
    display: block;
    height: 100%;
    width: var(--w);
    background: linear-gradient(90deg, var(--green), #84ffd1);
  }

  .trend-svg {
    width: 100%;
    height: calc(100% - 48px);
    min-height: 180px;
  }

  .health-body {
    display: grid;
    grid-template-columns: 126px repeat(4, minmax(0, 1fr));
    gap: 12px;
    align-items: center;
    min-height: 166px;
  }
  .health-ring {
    position: relative;
    width: 110px;
    height: 110px;
    border-radius: 50%;
    background: conic-gradient(var(--green) var(--score), rgba(255, 255, 255, .08) 0);
  }
  .health-ring::after {
    content: "";
    position: absolute;
    inset: 18px;
    border-radius: 50%;
    background: #0a2a25;
  }
  .health-ring div {
    position: absolute;
    inset: 0;
    z-index: 1;
    display: grid;
    place-items: center;
    text-align: center;
    font-size: 25px;
    font-weight: 800;
  }
  .health-card {
    min-height: 112px;
    padding: 14px;
    border: 1px solid rgba(25, 227, 145, .12);
    border-radius: 7px;
    background: rgba(4, 48, 40, 0.55);
  }
  .health-card strong {
    display: block;
    margin-top: 8px;
    color: var(--green);
    font-size: 18px;
  }
  .health-card span {
    color: #a8cfc5;
    font-size: 12px;
  }

  .insight-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 0;
    min-height: 150px;
  }
  .insight-item {
    min-height: 128px;
    padding: 18px 18px 14px;
    border-right: 1px solid rgba(255, 255, 255, .08);
  }
  .insight-item:last-child { border-right: 0; }
  .insight-item label {
    color: #a8cfc5;
    font-size: 12px;
  }
  .insight-item strong {
    display: block;
    margin-top: 8px;
    font-size: 25px;
  }
  .insight-item em {
    color: var(--green);
    font-size: 12px;
    font-style: normal;
  }

  .drawer-mask {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: none;
    background: rgba(0, 10, 8, 0.56);
  }
  .drawer-mask.open { display: block; }
  .drawer {
    position: fixed;
    top: 0;
    right: 0;
    z-index: 21;
    width: min(580px, 100vw);
    height: 100dvh;
    padding: 22px;
    border-left: 1px solid rgba(25, 227, 145, .36);
    background: rgba(5, 24, 21, 0.96);
    box-shadow: -24px 0 52px rgba(0, 0, 0, 0.36);
    transform: translateX(100%);
    transition: transform .22s ease;
    overflow: auto;
  }
  .drawer.open { transform: translateX(0); }
  .drawer-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 16px;
  }
  .drawer-title {
    margin: 0;
    font-size: 24px;
  }
  .drawer-subtitle {
    margin-top: 6px;
    color: var(--muted);
    font-size: 13px;
  }
  .drawer-close {
    width: 36px;
    height: 36px;
    border: 1px solid var(--line);
    border-radius: 7px;
    background: rgba(255, 255, 255, .06);
    color: #fff;
    cursor: pointer;
  }
  .detail-stats {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 14px;
  }
  .detail-stat,
  .detail-card {
    border: 1px solid rgba(25, 227, 145, .13);
    border-radius: 7px;
    background: rgba(8, 51, 43, .64);
  }
  .detail-stat { padding: 12px; }
  .detail-stat strong {
    display: block;
    font-size: 24px;
  }
  .detail-stat span {
    color: var(--muted);
    font-size: 12px;
  }
  .detail-list {
    display: grid;
    gap: 10px;
  }
  .detail-card {
    padding: 12px;
  }
  .detail-card h4 {
    margin: 0;
    font-size: 14px;
    line-height: 1.45;
  }
  .detail-card p {
    margin: 6px 0 0;
    color: #a8cfc5;
    font-size: 12px;
    line-height: 1.6;
  }
  .chip-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 9px;
  }
  .chip {
    display: inline-flex;
    min-height: 22px;
    align-items: center;
    padding: 3px 7px;
    border: 1px solid rgba(25, 227, 145, .18);
    border-radius: 4px;
    background: rgba(25, 227, 145, .08);
    color: #d9fff5;
    font-size: 11px;
    font-weight: 700;
  }

  @media (max-width: 1180px) {
    .dashboard-grid {
      grid-template-columns: 1fr;
      grid-template-rows: none;
    }
    .core, .hero, .risk, .status, .modules, .rank, .trend, .todo, .health, .insight {
      grid-column: auto;
      grid-row: auto;
    }
    .panel { min-height: 260px; }
    .hero { min-height: 320px; }
    .hero-wrap {
      padding-right: 22px;
    }
    .hero-copy {
      top: 34px;
      width: min(410px, calc(100% - 44px));
      transform: none;
    }
    .hero-visual {
      margin-top: -12px;
    }
    .hero-image {
      right: 50%;
      top: 54px;
      width: min(560px, 94vw);
      height: 300px;
      transform: translateX(50%);
    }
  }

  @media (max-width: 760px) {
    .main { padding: 14px; }
    .topbar {
      grid-template-columns: 1fr;
    }
    .brand { font-size: 20px; }
    .top-meta { width: fit-content; }
    .dashboard-grid { gap: 12px; }
    .hero { min-height: 300px; }
    .hero-copy {
      left: 18px;
      top: 24px;
      width: calc(100% - 36px);
    }
    .hero h1 {
      font-size: 32px;
      white-space: normal;
    }
    .hero p { font-size: 14px; }
    .hero-image {
      top: 88px;
      width: min(500px, 118vw);
      height: 245px;
    }
    .module-grid,
    .health-body,
    .insight-grid,
    .status-body,
    .radar-wrap,
    .detail-stats {
      grid-template-columns: 1fr;
    }
    .metric-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .metric:nth-child(3n) { border-right: 1px solid rgba(255, 255, 255, 0.07); }
    .metric:nth-child(2n) { border-right: 0; }
    .panel { min-height: auto; }
    .panel.hero { min-height: 300px; }
  }
</style>
</head>
<body>
<div class="app">
  <main class="main">
    <header class="topbar">
      <div class="brand"><div class="logo-mark">丰</div>丰收云｜智能驾驶舱</div>
      <span class="top-meta" id="sourceTime">当前快照：读取中...</span>
    </header>

    <section class="dashboard-grid">
      <section class="panel panel-pad core">
        <h2 class="panel-title">核心指标概览</h2>
        <div class="metric-grid" id="metricGrid"></div>
      </section>

      <section class="panel hero">
        <div class="hero-wrap">
          <div class="hero-copy">
            <h1>丰收云智能驾驶舱</h1>
            <p>让农产品流通更高效，让农业经营更智能</p>
          </div>
          <figure class="hero-visual" aria-label="丰收云智能农业温室与无人机插画">
            <img class="hero-image" src="ChatGPT Image 2026年6月12日 15_25_52.png" alt="丰收云智能农业温室、无人机巡检和数据看板三维场景">
          </figure>
        </div>
      </section>

      <section class="panel panel-pad risk">
        <h2 class="panel-title">风险雷达</h2>
        <div class="radar-wrap">
          <div class="radar-chart"></div>
          <div class="risk-number"><strong id="riskNumber">0</strong><span>高风险项</span></div>
        </div>
        <div class="risk-list" id="riskList"></div>
      </section>

      <section class="panel panel-pad status">
        <h2 class="panel-title">需求状态结构 <small>当前快照</small></h2>
        <div class="status-body">
          <div class="donut" id="statusDonut"><div class="donut-center" id="donutCenter">--<span>总需求量</span></div></div>
          <div class="legend" id="statusLegend"></div>
        </div>
      </section>

      <section class="panel panel-pad modules">
        <h2 class="panel-title">模块态势总览</h2>
        <div class="module-grid" id="moduleGrid"></div>
      </section>

      <section class="panel panel-pad rank">
        <h2 class="panel-title">模块推进排行</h2>
        <div class="table-scroll">
          <table class="rank-table">
            <thead><tr><th>模块</th><th>完成率</th><th>风险</th></tr></thead>
            <tbody id="rankTable"></tbody>
          </table>
        </div>
      </section>

      <section class="panel panel-pad trend">
        <h2 class="panel-title">推进趋势与风险分布</h2>
        <svg class="trend-svg" id="trendSvg" viewBox="0 0 760 250" preserveAspectRatio="none"></svg>
      </section>

      <section class="panel panel-pad todo">
        <h2 class="panel-title">周会待办一览</h2>
        <div class="table-scroll">
          <table class="todo-table">
            <thead><tr><th>事项</th><th>责任人</th><th>截止</th></tr></thead>
            <tbody id="todoTable"></tbody>
          </table>
        </div>
      </section>

      <section class="panel panel-pad health">
        <h2 class="panel-title">项目健康度</h2>
        <div class="health-body" id="healthBody"></div>
      </section>

      <section class="panel panel-pad insight">
        <h2 class="panel-title">同步洞察</h2>
        <div class="insight-grid" id="insightGrid"></div>
      </section>
    </section>
  </main>
</div>

<div class="drawer-mask" id="drawerMask"></div>
<aside class="drawer" id="detailDrawer" aria-label="模块明细">
  <div class="drawer-head">
    <div>
      <h2 class="drawer-title" id="drawerTitle">模块明细</h2>
      <div class="drawer-subtitle" id="drawerSubtitle"></div>
    </div>
    <button class="drawer-close" type="button" id="drawerClose" aria-label="关闭">×</button>
  </div>
  <div id="drawerBody"></div>
</aside>

<script src="requirements-map-data.js"></script>
<script src="project-progress-data.js"></script>
<script>
const reqMap = window.FSY_REQUIREMENT_MAP || { modules: [], source: {} };
const config = window.PROJECT_PROGRESS_CONFIG || { statusGroups: {}, manualWatchlist: [] };
const today = new Date('2026-06-12T00:00:00+08:00');
const statusColors = { done: '#19e391', active: '#4e8cff', planning: '#ffd35c', risk: '#ff5b65', other: '#8a99a8' };

function flattenRequirements() {
  return (reqMap.modules || []).flatMap(module => (module.items || []).map(item => ({ ...item, module: item.module || module.name, links: item.links || [] })));
}

function parseDate(value) {
  if (!value) return null;
  const date = new Date(`${value}T00:00:00+08:00`);
  return Number.isNaN(date.getTime()) ? null : date;
}

function daysBetween(a, b) { return Math.ceil((a.getTime() - b.getTime()) / 86400000); }
function inGroup(item, group) { return (config.statusGroups?.[group] || []).includes(item.status); }
function groupOf(item) {
  if (inGroup(item, 'done')) return 'done';
  if (inGroup(item, 'active')) return 'active';
  if (inGroup(item, 'planning')) return 'planning';
  if (inGroup(item, 'risk') || item.status === '延期') return 'risk';
  return 'other';
}
function hasTestDoc(item) { return (item.links || []).some(link => /测试|TEST/i.test(`${link.label || ''} ${link.href || ''}`)); }
function primaryLink(item) { return (item.links || []).find(link => !link.external) || (item.links || [])[0]; }

function buildRisks(items) {
  const risks = [];
  items.forEach(item => {
    const end = parseDate(item.end);
    const group = groupOf(item);
    const daysToEnd = end ? daysBetween(end, today) : null;
    if (group !== 'done' && end && daysToEnd < 0) risks.push({ type: '超期', level: Math.abs(daysToEnd) >= 7 ? '高' : '中', title: `${item.title} 已超过计划时间`, owner: item.owner || '未明确', module: item.module, action: '确认延期原因，调整资源', item });
    if (group !== 'done' && end && daysToEnd >= 0 && daysToEnd <= 7) risks.push({ type: '临期', level: daysToEnd <= 2 ? '高' : '中', title: `${item.title} 即将到期`, owner: item.owner || '未明确', module: item.module, action: '推进验收或同步对象', item });
    if (!item.owner) risks.push({ type: '缺 owner', level: '高', title: `${item.title} 缺少责任人`, owner: '未明确', module: item.module, action: '周会先补责任人', item });
    if (group !== 'done' && !item.hasLocalDoc && !item.hasFeishuLink) risks.push({ type: '缺资料', level: '高', title: `${item.title} 缺少可追溯资料`, owner: item.owner || '未明确', module: item.module, action: '补最小需求说明', item });
    if ((group === 'active' || group === 'planning') && item.hasLocalDoc && !hasTestDoc(item)) risks.push({ type: '缺测试', level: '中', title: `${item.title} 缺少测试用例入口`, owner: item.owner || '未明确', module: item.module, action: '补测试范围', item });
    if (item.status === '延期' || /延期|未上线|待跟进/.test(item.note || '')) risks.push({ type: '延期', level: '高', title: `${item.title} 存在延期信号`, owner: item.owner || '未明确', module: item.module, action: '给出新计划', item });
  });
  (config.manualWatchlist || []).forEach(item => risks.push({ type: '观察', level: item.level || '中', title: item.title, owner: item.owner, module: '项目协同', action: item.action, reason: item.signal }));
  return risks.sort((a, b) => ({ 高: 3, 中: 2, 低: 1 }[b.level] || 0) - ({ 高: 3, 中: 2, 低: 1 }[a.level] || 0));
}

function summarizeModules(items, risks) {
  return (reqMap.modules || []).map(module => {
    const moduleItems = items.filter(item => item.module === module.name);
    const moduleRisks = risks.filter(risk => risk.module === module.name);
    const done = moduleItems.filter(item => groupOf(item) === 'done').length;
    const active = moduleItems.filter(item => groupOf(item) === 'active').length;
    const planning = moduleItems.filter(item => groupOf(item) === 'planning').length;
    const completion = moduleItems.length ? Math.round(done / moduleItems.length * 100) : 0;
    const docRate = moduleItems.length ? Math.round(moduleItems.filter(item => item.hasLocalDoc || item.hasFeishuLink).length / moduleItems.length * 100) : 0;
    const health = Math.max(12, Math.min(98, completion + Math.round(docRate * 0.18) - moduleRisks.length * 7));
    return { name: module.name, items: moduleItems, risks: moduleRisks, total: moduleItems.length, done, active, planning, completion, docRate, health };
  }).filter(module => module.total > 0);
}

function buildModel() {
  const items = flattenRequirements();
  const risks = buildRisks(items);
  const modules = summarizeModules(items, risks);
  const done = items.filter(item => groupOf(item) === 'done').length;
  const active = items.filter(item => groupOf(item) === 'active').length;
  const planning = items.filter(item => groupOf(item) === 'planning').length;
  const riskStatus = items.filter(item => groupOf(item) === 'risk').length;
  const highRisks = risks.filter(risk => risk.level === '高').length;
  const docCoverage = items.length ? Math.round(items.filter(item => item.hasLocalDoc || item.hasFeishuLink).length / items.length * 100) : 0;
  const ownerCoverage = items.length ? Math.round(items.filter(item => item.owner).length / items.length * 100) : 0;
  const testCoverage = items.length ? Math.round(items.filter(hasTestDoc).length / items.length * 100) : 0;
  const onTimeRate = items.length ? Math.round(items.filter(item => groupOf(item) === 'done' || !parseDate(item.end) || daysBetween(parseDate(item.end), today) >= 0).length / items.length * 100) : 0;
  const healthScore = Math.max(32, Math.min(96, Math.round((docCoverage + ownerCoverage + onTimeRate + Math.min(100, done / Math.max(items.length, 1) * 120)) / 4 - highRisks * 2)));
  return { items, risks, modules, done, active, planning, riskStatus, highRisks, docCoverage, ownerCoverage, testCoverage, onTimeRate, healthScore };
}

const model = buildModel();

function renderMetrics() {
  const metrics = [
    ['项目健康分', model.healthScore, model.healthScore >= 70 ? '可按周会推进' : '需重点拉齐'],
    ['需求总数', model.items.length.toLocaleString(), `${model.active} 个推进中`],
    ['已上线功能', model.done, `${Math.round(model.done / Math.max(model.items.length, 1) * 100)}% 已闭环`],
    ['待评审/排期', model.planning, '确认优先级'],
    ['高风险事项', model.highRisks, model.highRisks ? '周会需处理' : '暂无高风险'],
    ['资料覆盖率', `${model.docCoverage}%`, 'PRD/原型/测试']
  ];
  document.getElementById('metricGrid').innerHTML = metrics.map(metric => `
    <div class="metric"><label>${metric[0]}</label><strong>${metric[1]}</strong><em>${metric[2]}</em></div>
  `).join('');
}

function renderStatus() {
  const counts = { done: model.done, active: model.active, planning: model.planning, risk: model.riskStatus, other: model.items.filter(item => groupOf(item) === 'other').length };
  const total = Math.max(1, model.items.length);
  let cursor = 0;
  const segments = Object.entries(counts).map(([key, value]) => {
    const start = cursor;
    const end = cursor + value / total * 360;
    cursor = end;
    return `${statusColors[key]} ${start}deg ${end}deg`;
  });
  document.getElementById('statusDonut').style.setProperty('--donut', `conic-gradient(${segments.join(',')})`);
  document.getElementById('donutCenter').innerHTML = `${model.items.length.toLocaleString()}<span>总需求量</span>`;
  const labels = { done: '已完成', active: '进行中', planning: '待审核', risk: '风险预警', other: '其他' };
  document.getElementById('statusLegend').innerHTML = Object.entries(counts).map(([key, value]) => `
    <div class="legend-row"><span class="legend-color" style="--color:${statusColors[key]}"></span><span>${labels[key]}</span><strong>${value} (${Math.round(value / total * 100)}%)</strong></div>
  `).join('');
}

function renderModules() {
  document.getElementById('moduleGrid').innerHTML = model.modules.map(module => `
    <button class="module-card" type="button" data-module="${module.name}">
      <h3>${module.name}</h3>
      <div class="module-stats">
        <span><strong>${module.done}</strong>上线</span>
        <span><strong>${module.active}</strong>推进</span>
        <span><strong>${module.risks.length}</strong>风险</span>
      </div>
    </button>
  `).join('');
  document.querySelectorAll('[data-module]').forEach(button => button.addEventListener('click', () => openModuleDetail(button.dataset.module)));
}

function renderRank() {
  const rows = [...model.modules].sort((a, b) => b.risks.length - a.risks.length || a.completion - b.completion).slice(0, 8);
  document.getElementById('rankTable').innerHTML = rows.map(module => `
    <tr data-module="${module.name}">
      <td>${module.name}</td>
      <td><span class="bar-track"><span class="bar-fill" style="--w:${module.completion}%"></span></span></td>
      <td>${module.risks.length}</td>
    </tr>
  `).join('');
  document.querySelectorAll('#rankTable tr').forEach(row => row.addEventListener('click', () => openModuleDetail(row.dataset.module)));
}

function renderTrend() {
  const modules = [...model.modules].sort((a, b) => a.completion - b.completion).slice(0, 7);
  const pointsA = modules.map((module, index) => ({ x: 50 + index * (660 / Math.max(1, modules.length - 1)), y: 205 - module.completion * 1.45, module }));
  const pointsB = modules.map((module, index) => ({ x: 50 + index * (660 / Math.max(1, modules.length - 1)), y: 220 - Math.min(90, module.risks.length * 12), module }));
  const line = points => points.map(point => `${point.x},${point.y}`).join(' ');
  document.getElementById('trendSvg').innerHTML = `
    <defs>
      <linearGradient id="trendGreen" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="rgba(25,227,145,.45)"/><stop offset="1" stop-color="rgba(25,227,145,0)"/></linearGradient>
    </defs>
    ${[40, 80, 120, 160, 200, 240].map(y => `<line x1="35" y1="${y}" x2="735" y2="${y}" stroke="rgba(255,255,255,.07)"/>`).join('')}
    <polygon points="50,230 ${line(pointsA)} 710,230" fill="url(#trendGreen)"/>
    <polyline points="${line(pointsA)}" fill="none" stroke="#19e391" stroke-width="3"/>
    <polyline points="${line(pointsB)}" fill="none" stroke="#ff5b65" stroke-width="2"/>
    ${pointsA.map(point => `<g data-svg-module="${point.module.name}" style="cursor:pointer"><circle cx="${point.x}" cy="${point.y}" r="5" fill="#19e391"/><circle cx="${point.x}" cy="${pointsB[pointsA.indexOf(point)].y}" r="4" fill="#ff5b65"/><text x="${point.x}" y="246" fill="#8db7ab" font-size="12" text-anchor="middle">${point.module.name.slice(0, 4)}</text></g>`).join('')}
  `;
  document.querySelectorAll('[data-svg-module]').forEach(node => node.addEventListener('click', () => openModuleDetail(node.dataset.svgModule)));
}

function renderRisk() {
  document.getElementById('riskNumber').textContent = model.highRisks;
  document.getElementById('riskList').innerHTML = model.risks.slice(0, 7).map((risk, index) => `
    <button class="risk-item" type="button" data-risk="${index}"><span class="risk-dot"></span><span>${risk.title}</span></button>
  `).join('');
  document.querySelectorAll('[data-risk]').forEach(button => button.addEventListener('click', () => openRiskDetail(model.risks[Number(button.dataset.risk)])));
}

function renderTodo() {
  document.getElementById('todoTable').innerHTML = model.risks.slice(0, 6).map(risk => `
    <tr><td>${risk.title}</td><td>${risk.owner}</td><td>${risk.item?.end || '06-15'}</td></tr>
  `).join('');
}

function renderHealth() {
  const items = [
    ['进度健康', model.healthScore >= 70 ? '良好' : '中等', `整体完成 ${Math.round(model.done / model.items.length * 100)}%`],
    ['风险健康', model.highRisks > 10 ? '中等' : '良好', `存在 ${model.highRisks} 个高风险项`],
    ['质量健康', model.testCoverage > 35 ? '良好' : '待补', `测试覆盖 ${model.testCoverage}%`],
    ['资源健康', model.ownerCoverage > 90 ? '良好' : '待补', `责任明确 ${model.ownerCoverage}%`]
  ];
  document.getElementById('healthBody').innerHTML = `
    <div class="health-ring" style="--score:${model.healthScore * 3.6}deg"><div>${model.healthScore}</div></div>
    ${items.map(item => `<div class="health-card"><span>${item[0]}</span><strong>${item[1]}</strong><span>${item[2]}</span></div>`).join('')}
  `;
}

function renderInsight() {
  const values = [
    ['责任人覆盖', `${model.ownerCoverage}%`, '未明确需补齐'],
    ['测试覆盖', `${model.testCoverage}%`, '联调前重点检查'],
    ['按期风险', `${model.onTimeRate}%`, '计划内事项占比'],
    ['超期事项', model.risks.filter(r => r.type === '超期').length, '需给新计划']
  ];
  document.getElementById('insightGrid').innerHTML = values.map(item => `
    <div class="insight-item"><label>${item[0]}</label><strong>${item[1]}</strong><em>${item[2]}</em></div>
  `).join('');
}

function openDrawer(title, subtitle, html) {
  document.getElementById('drawerTitle').textContent = title;
  document.getElementById('drawerSubtitle').textContent = subtitle;
  document.getElementById('drawerBody').innerHTML = html;
  document.getElementById('drawerMask').classList.add('open');
  document.getElementById('detailDrawer').classList.add('open');
}

function openModuleDetail(moduleName) {
  const module = model.modules.find(item => item.name === moduleName);
  if (!module) return;
  const html = `
    <div class="detail-stats">
      <div class="detail-stat"><strong>${module.total}</strong><span>需求总数</span></div>
      <div class="detail-stat"><strong>${module.completion}%</strong><span>完成率</span></div>
      <div class="detail-stat"><strong>${module.risks.length}</strong><span>风险项</span></div>
    </div>
    <div class="detail-list">
      ${module.items.map(item => {
        const link = primaryLink(item);
        return `<article class="detail-card"><h4>${item.id} · ${item.title}</h4><p>${item.description || item.note || '暂无描述'}</p><div class="chip-row"><span class="chip">${item.status || '未填状态'}</span><span class="chip">Owner：${item.owner || '未明确'}</span><span class="chip">${item.end ? `计划：${item.end}` : '未填计划'}</span>${link ? `<a class="chip" href="${link.href}" target="${link.external ? '_blank' : '_self'}">${link.label || '查看资料'}</a>` : ''}</div></article>`;
      }).join('')}
    </div>
  `;
  openDrawer(module.name, `完成率 ${module.completion}% / 文档覆盖 ${module.docRate}%`, html);
}

function openRiskDetail(risk) {
  if (!risk) return;
  const link = risk.item ? primaryLink(risk.item) : null;
  const html = `<div class="detail-stats"><div class="detail-stat"><strong>${risk.level}</strong><span>风险等级</span></div><div class="detail-stat"><strong>${risk.type}</strong><span>风险类型</span></div><div class="detail-stat"><strong>${risk.owner || '-'}</strong><span>责任人</span></div></div><div class="detail-list"><article class="detail-card"><h4>${risk.title}</h4><p>${risk.reason || risk.action}</p><p>建议动作：${risk.action}</p><div class="chip-row"><span class="chip">${risk.module || '-'}</span>${risk.item ? `<span class="chip">${risk.item.status || '未填状态'}</span>` : ''}${link ? `<a class="chip" href="${link.href}" target="${link.external ? '_blank' : '_self'}">${link.label || '查看资料'}</a>` : ''}</div></article></div>`;
  openDrawer('风险明细', risk.module || '项目协同', html);
}

function bindDrawer() {
  const close = () => {
    document.getElementById('drawerMask').classList.remove('open');
    document.getElementById('detailDrawer').classList.remove('open');
  };
  document.getElementById('drawerClose').addEventListener('click', close);
  document.getElementById('drawerMask').addEventListener('click', close);
}

function render() {
  document.getElementById('sourceTime').textContent = `当前快照：${reqMap.source?.generatedAt || '-'}`;
  renderMetrics();
  renderStatus();
  renderModules();
  renderRank();
  renderTrend();
  renderRisk();
  renderTodo();
  renderHealth();
  renderInsight();
  bindDrawer();
}

render();
</script>
</body>
</html>
