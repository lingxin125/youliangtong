<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>丰收云 - 订单管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="shared.js?v=2"></script>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
    <style>
        /* ========== 基础样式 ========== */
        .amount-received { color: #11A64A; }
        .amount-pending { color: #D97706; }
        .amount-cancelled { color: #9CA3AF; text-decoration: line-through; }

        .status-success { background: #DCFCE7; color: #166534; }
        .status-pending { background: #FEF3C7; color: #92400E; }
        .status-cancelled { background: #F3F4F6; color: #6B7280; }

        /* ========== 筛选面板 ========== */
        .filter-overlay {
            position: absolute; inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 100;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .filter-overlay.show { opacity: 1; pointer-events: auto; }

        .filter-sheet {
            position: absolute; bottom: 0; left: 0; right: 0;
            z-index: 101;
            background: white;
            border-radius: 16px 16px 0 0;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 70%;
            display: flex; flex-direction: column;
        }
        .filter-sheet.show { transform: translateY(0); }

        .filter-option {
            font-size: 12px; padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid #E5E7EB;
            background: white; color: #4B5563;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .filter-option.active {
            background: #F0FDF4;
            border-color: #11A64A;
            color: #11A64A;
            font-weight: 500;
        }

        .date-input {
            flex: 1; height: 36px; padding: 0 12px;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            font-size: 12px; color: #374151;
            background: white;
        }

        .stage-tabs {
            display: flex;
            align-items: center;
            background: #FFFFFF;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            position: relative;
        }
        .stage-tab {
            flex: 1;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            color: #6B7280;
            font-size: 14px;
            font-weight: 600;
            position: relative;
        }
        .stage-tab.active { color: #11A64A; }
        .stage-tab.active::after {
            content: "";
            position: absolute;
            left: 50%;
            bottom: 0;
            width: 34px;
            height: 3px;
            border-radius: 3px 3px 0 0;
            background: #11A64A;
            transform: translateX(-50%);
        }
        .stage-count {
            min-width: 16px;
            height: 16px;
            padding: 0 4px;
            border-radius: 8px;
            background: #F3F4F6;
            color: #6B7280;
            font-size: 10px;
            line-height: 16px;
            text-align: center;
        }
        .stage-tab.active .stage-count { background: #EBF7F0; color: #11A64A; }
        .sub-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 9px 16px 8px;
            background: #FFFFFF;
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }
        .sub-tabs::-webkit-scrollbar { display: none; }
        .sub-tab {
            height: 28px;
            padding: 0 12px;
            border-radius: 999px;
            border: 1px solid #E5E7EB;
            background: #FFFFFF;
            color: #6B7280;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .sub-tab.active {
            color: #11A64A;
            border-color: rgba(17,166,74,0.55);
            background: #FFFFFF;
        }
        .order-card {
            background: #FFFFFF;
            border: 1px solid rgba(17, 24, 39, 0.05);
            border-radius: 14px;
            box-shadow: 0 2px 10px rgba(15, 23, 42, 0.04);
        }
        .status-tag {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 600;
            white-space: nowrap;
        }
        .status-draft { background:#F3F4F6; color:#6B7280; }
        .status-pending-price { background:#EFF6FF; color:#2563EB; }
        .status-unpaid { background:#FEF3C7; color:#D97706; }
        .status-paying { background:#EEF2FF; color:#4F46E5; }
        .status-failed { background:#FEF2F2; color:#DC2626; }
        .status-success { background:#ECFDF5; color:#059669; }
        .status-canceled { background:#F3F4F6; color:#6B7280; }

        /* ========== Toast提示 ========== */
        .toast-tip {
            position: absolute; left: 16px; right: 16px; bottom: 88px;
            padding: 11px 14px;
            background: rgba(17, 24, 39, 0.9);
            border-radius: 11px;
            color: #fff; font-size: 12px; line-height: 1.45;
            z-index: 70;
            opacity: 0; pointer-events: none;
            transform: translateY(8px);
            transition: all 0.2s ease;
        }
        .toast-tip.show { opacity: 1; transform: translateY(0); }

        .filter-group-title {
            display: flex; align-items: center; gap: 6px;
            font-size: 13px; font-weight: 500;
            color: #374151; margin-bottom: 10px;
        }
        .filter-group-title i { color: #9CA3AF; font-size: 14px; }

        .filter-content { flex: 1; overflow-y: auto; padding: 16px; }
    </style>
</head>
<body>
<div class="mobile-container" style="position: relative; overflow: hidden;">
    <div id="statusBar"></div>
    <div id="navBar"></div>

    <div class="stage-tabs shrink-0">
        <button class="stage-tab active" id="stagePending" onclick="App.switchStage('pending')">待收款 <span class="stage-count" id="countPending">0</span></button>
        <button class="stage-tab" id="stagePaid" onclick="App.switchStage('paid')">已收款 <span class="stage-count" id="countPaid">0</span></button>
        <button class="stage-tab" id="stageCanceled" onclick="App.switchStage('canceled')">已取消 <span class="stage-count" id="countCanceled">0</span></button>
    </div>
    <div id="subTabs" class="sub-tabs shrink-0"></div>

    <!-- 搜索与筛选 -->
    <div class="px-4 py-2.5 shrink-0 flex items-center gap-2 bg-white border-b border-gray-100">
        <div class="flex-1 h-9 px-3 rounded-xl bg-gray-50 border border-gray-100 flex items-center gap-2">
            <i class="fas fa-search text-gray-400 text-xs"></i>
            <input id="searchInput" type="text" placeholder="搜索农产品或收购商" class="flex-1 bg-transparent outline-none text-[13px] text-gray-700 placeholder-gray-400">
        </div>
        <button id="filterBtn" class="w-9 h-9 rounded-xl bg-gray-50 border border-gray-100 flex items-center justify-center active:bg-gray-100" onclick="FilterPanel.open()">
            <i class="fas fa-filter text-gray-500 text-xs"></i>
        </button>
    </div>

    <!-- 统计栏 -->
    <div class="px-4 my-3 shrink-0 flex items-center justify-between">
        <div class="text-[13px] text-gray-500">
            共 <span class="text-primary font-semibold" id="recordCount">0</span> 笔订单
        </div>
        <div id="amountSummary" class="text-[12px] text-gray-500"></div>
    </div>

    <!-- 筛选结果汇总（仅筛选时显示） -->
    <div id="filterResult" class="px-4 mb-3 shrink-0 hidden">
        <div class="glass-card rounded-2xl p-4 bg-gradient-to-r from-green-50 to-white border border-green-100">
            <div class="text-[14px] font-semibold text-gray-800 mb-3">筛选结果</div>
            <div class="flex items-center">
                <div class="flex-1 text-center">
                    <div class="text-[12px] text-gray-500 mb-0.5">收入总额</div>
                    <div class="text-[18px] font-bold text-gray-900" style="font-family:Poppins;">
                        ¥<span id="filterTotalAmount">0.00</span>
                    </div>
                </div>
                <div class="w-px h-10 bg-gray-200"></div>
                <div class="flex-1 text-center">
                    <div class="text-[12px] text-gray-500 mb-0.5">交易笔数</div>
                    <div class="text-[18px] font-bold text-gray-900">
                        <span id="filterRecordCount">0</span>笔
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 空状态 -->
    <div id="emptyState" class="px-4 pt-8 hidden">
        <div class="text-center">
            <div class="w-16 h-16 rounded-full bg-gray-100 flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-wallet text-gray-300 text-2xl"></i>
            </div>
            <div class="text-[15px] font-medium text-gray-600">暂无订单</div>
            <div class="text-[12px] text-gray-400 mt-2">收购商给您开单后会展示在这里</div>
        </div>
    </div>

    <!-- 订单列表 -->
    <div id="recordList" class="flex-1 overflow-y-auto no-scrollbar px-4 space-y-3" style="padding-bottom:80px;"></div>

    <!-- Toast提示 -->
    <div id="toastTip" class="toast-tip"></div>

    <!-- 底部导航栏 -->
    <div id="tabBar"></div>

    <!-- 筛选弹窗 -->
    <div id="filterOverlay" class="filter-overlay" onclick="FilterPanel.close()"></div>
    <div id="filterSheet" class="filter-sheet">
        <div class="flex justify-center pt-2 pb-1">
            <div class="w-10 h-1 bg-gray-300 rounded-full"></div>
        </div>
        <div class="px-4 py-3 border-b border-gray-100 flex-shrink-0">
            <div class="flex items-center justify-between">
                <h3 class="text-[15px] font-semibold text-gray-800">筛选订单</h3>
                <button class="w-7 h-7 flex items-center justify-center rounded-full hover:bg-gray-100" onclick="FilterPanel.close()">
                    <i class="fas fa-times text-gray-400 text-sm"></i>
                </button>
            </div>
        </div>
        <div class="filter-content space-y-5">
            <!-- 时间范围 -->
            <div>
                <div class="filter-group-title">
                    <i class="far fa-calendar-alt"></i><span>时间范围</span>
                </div>
                <div class="flex flex-wrap gap-2">
                    <button class="filter-option active" data-type="time" data-value="all">全部</button>
                    <button class="filter-option" data-type="time" data-value="today">今天</button>
                    <button class="filter-option" data-type="time" data-value="week">近7天</button>
                    <button class="filter-option" data-type="time" data-value="month">近30天</button>
                    <button class="filter-option" data-type="time" data-value="custom">自定义日期</button>
                </div>
                <div id="customDateRange" class="mt-3 hidden">
                    <div class="flex items-center gap-2">
                        <input type="date" id="startDate" class="date-input">
                        <span class="text-gray-400">至</span>
                        <input type="date" id="endDate" class="date-input">
                    </div>
                </div>
            </div>

        </div>
        <div class="px-4 py-3 border-t border-gray-100 flex gap-3 flex-shrink-0">
            <button class="flex-1 h-10 rounded-2xl border border-gray-200 text-[13px] font-medium text-gray-600 bg-white" onclick="FilterPanel.reset()">重置</button>
            <button class="flex-1 h-10 rounded-2xl text-[13px] font-medium text-white bg-primary" onclick="FilterPanel.confirm()">确定</button>
        </div>
    </div>
</div>

<script>
const FARMER_NAME = '李大姐';
const STAGE_STATUS_MAP = {
    pending: ['draft', 'pending_price', 'unpaid', 'pending_client', 'pending', 'paying', 'processing', 'failed'],
    paid: ['success'],
    canceled: ['canceled']
};
const PENDING_SUB_TABS = [
    { id: 'all', label: '全部' },
    { id: 'draft', label: '挂单' },
    { id: 'pending_price', label: '待开价' },
    { id: 'unpaid', label: '待结算' },
    { id: 'paying', label: '付款中' },
    { id: 'failed', label: '付款失败' }
];
const STATUS_CONFIG = {
    draft: { label: '挂单', cls: 'status-draft', sub: 'draft', stage: 'pending', rank: 5 },
    pending_price: { label: '待开价', cls: 'status-pending-price', sub: 'pending_price', stage: 'pending', rank: 4 },
    unpaid: { label: '待结算', cls: 'status-unpaid', sub: 'unpaid', stage: 'pending', rank: 3 },
    pending_client: { label: '待结算', cls: 'status-unpaid', sub: 'unpaid', stage: 'pending', rank: 3 },
    pending: { label: '付款中', cls: 'status-paying', sub: 'paying', stage: 'pending', rank: 2 },
    paying: { label: '付款中', cls: 'status-paying', sub: 'paying', stage: 'pending', rank: 2 },
    processing: { label: '付款中', cls: 'status-paying', sub: 'paying', stage: 'pending', rank: 2 },
    failed: { label: '付款失败', cls: 'status-failed', sub: 'failed', stage: 'pending', rank: 1 },
    success: { label: '付款成功', cls: 'status-success', sub: 'success', stage: 'paid', rank: 9 },
    canceled: { label: '已取消', cls: 'status-canceled', sub: 'canceled', stage: 'canceled', rank: 10 }
};
const AMOUNT_KNOWN_STATUSES = ['unpaid', 'pending_client', 'pending', 'paying', 'processing', 'failed', 'success', 'canceled'];

// ==================== 数据服务层 ====================
const RecordService = {
    mockStore: window.BuyerMockStore || null,

    getRecords() {
        if (this.mockStore && typeof this.mockStore.getOrders === 'function') {
            return this.mockStore.getOrders().filter(function(order) {
                return order.payeeName === FARMER_NAME;
            });
        }
        return this.getFallbackRecords();
    },

    getFallbackRecords() {
        return [
            {
                id: 'SL20260212142210',
                payerName: '张老板',
                payeeName: FARMER_NAME,
                productName: '东北大米',
                amount: 3200,
                status: 'success',
                createdAt: '2026-02-12T14:22:10+08:00',
                paidAt: '2026-02-12T14:23:08+08:00',
                items: [{ name: '东北大米', qty: 1000, unit: '斤', price: 3.2, subtotal: 3200 }]
            },
            {
                id: 'SL20260211103322',
                payerName: '李经理',
                payeeName: FARMER_NAME,
                productName: '有机西红柿',
                amount: 0,
                status: 'pending_price',
                createdAt: '2026-02-11T10:33:22+08:00',
                items: [{ name: '有机西红柿', qty: 500, unit: '斤', price: 0, subtotal: 0 }]
            }
        ];
    },

    findById(recordId) {
        return this.getRecords().find(function(item) { return item.id === recordId; });
    }
};

function getStage(order) {
    const cfg = STATUS_CONFIG[order.status] || STATUS_CONFIG.draft;
    return cfg.stage;
}

function getSubStatus(order) {
    const cfg = STATUS_CONFIG[order.status] || STATUS_CONFIG.draft;
    return cfg.sub;
}

function getProductName(order) {
    return order.productName || (order.items && order.items[0] && order.items[0].name) || '农产品';
}

function getPayerName(order) {
    return order.payerCompany || order.payerOrg || order.operatorName || order.payerName || '收购商';
}

function hasKnownAmount(order) {
    return AMOUNT_KNOWN_STATUSES.includes(order.status) && Number(order.amount || 0) > 0;
}

// ==================== 筛选服务层 ====================
const FilterService = {
    state: {
        timeRange: 'all',
        startDate: null,
        endDate: null,
        keyword: ''
    },

    isActive() {
        return this.state.timeRange !== 'all' || !!this.state.keyword;
    },

    setTimeRange(value) {
        this.state.timeRange = value;
    },

    setKeyword(value) {
        this.state.keyword = String(value || '').trim().toLowerCase();
    },

    setCustomDates(start, end) {
        this.state.startDate = start;
        this.state.endDate = end;
    },

    reset() {
        this.state = { timeRange: 'all', startDate: null, endDate: null, keyword: this.state.keyword };
    },

    apply(records) {
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const { timeRange, startDate, endDate, keyword } = this.state;

        return records.filter(function(record) {
            const recordDate = new Date(record.createdAt);
            const recordDay = new Date(recordDate.getFullYear(), recordDate.getMonth(), recordDate.getDate());
            let timeMatch = true;
            if (timeRange === 'today') {
                timeMatch = recordDay.getTime() === today.getTime();
            } else if (timeRange === 'week') {
                timeMatch = recordDay >= new Date(today.getTime() - 7 * 24 * 60 * 60 * 1000);
            } else if (timeRange === 'month') {
                timeMatch = recordDay >= new Date(today.getTime() - 30 * 24 * 60 * 60 * 1000);
            } else if (timeRange === 'custom' && startDate && endDate) {
                const start = new Date(startDate);
                const end = new Date(endDate);
                end.setHours(23, 59, 59, 999);
                timeMatch = recordDay >= start && recordDay <= end;
            }
            if (!timeMatch) return false;
            if (!keyword) return true;
            const haystack = [getProductName(record), getPayerName(record), record.summary || ''].join(' ').toLowerCase();
            return haystack.indexOf(keyword) > -1;
        });
    }
};

// ==================== 格式化服务层 ====================
const FormatService = {
    smartTime(iso) {
        const date = new Date(iso || '');
        if (Number.isNaN(date.getTime())) return '--';
        const now = new Date();
        const diff = now - date;
        const minutes = Math.floor(diff / 60000);
        if (minutes < 1) return '刚刚';
        if (minutes < 60) return minutes + '分钟前';
        const hours = Math.floor(minutes / 60);
        if (hours < 24) return hours + '小时前';
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return month + '-' + day;
    },

    amount(value) {
        return Number(value || 0).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
};

// ==================== UI 渲染层 ====================
const RenderService = {
    renderSubTabs() {
        const el = document.getElementById('subTabs');
        if (App.state.stage !== 'pending') {
            el.style.display = 'none';
            el.innerHTML = '';
            return;
        }
        el.style.display = 'flex';
        el.innerHTML = PENDING_SUB_TABS.map(function(tab) {
            const active = App.state.subStatus === tab.id;
            return `<button class="sub-tab ${active ? 'active' : ''}" onclick="App.switchSubStatus('${tab.id}')">${tab.label}</button>`;
        }).join('');
    },

    renderStageTabs(allOrders) {
        const counts = { pending: 0, paid: 0, canceled: 0 };
        allOrders.forEach(function(order) {
            const stage = getStage(order);
            counts[stage] = (counts[stage] || 0) + 1;
        });
        document.getElementById('countPending').textContent = counts.pending || 0;
        document.getElementById('countPaid').textContent = counts.paid || 0;
        document.getElementById('countCanceled').textContent = counts.canceled || 0;
        ['Pending', 'Paid', 'Canceled'].forEach(function(name) {
            document.getElementById('stage' + name).classList.remove('active');
        });
        const id = App.state.stage === 'paid' ? 'stagePaid' : (App.state.stage === 'canceled' ? 'stageCanceled' : 'stagePending');
        document.getElementById(id).classList.add('active');
        this.renderSubTabs();
    },

    renderEmpty() {
        document.getElementById('recordList').innerHTML = '';
        document.getElementById('emptyState').classList.remove('hidden');
        document.getElementById('filterResult').classList.add('hidden');
        document.getElementById('recordCount').textContent = '0';
        document.getElementById('amountSummary').textContent = '';
    },

    renderList(records) {
        document.getElementById('emptyState').classList.add('hidden');
        document.getElementById('filterResult').classList.add('hidden');
        document.getElementById('recordCount').textContent = records.length;
        const knownTotal = records.reduce(function(sum, order) {
            return hasKnownAmount(order) ? sum + Number(order.amount || 0) : sum;
        }, 0);
        document.getElementById('amountSummary').textContent = knownTotal > 0 ? ('合计 ¥' + FormatService.amount(knownTotal)) : '';
        document.getElementById('recordList').innerHTML = records.map(this.renderOrderCard).join('');
    },

    renderOrderCard(order) {
        const cfg = STATUS_CONFIG[order.status] || STATUS_CONFIG.draft;
        const amountText = hasKnownAmount(order) ? ('¥' + FormatService.amount(order.amount)) : '--';
        const amountClass = order.status === 'canceled' ? 'text-gray-400' : (order.status === 'failed' ? 'text-red-500' : 'text-primary');
        return `<div class="order-card p-3.5 cursor-pointer active:bg-gray-50" onclick="Actions.goDetail('${order.id}')">
            <div class="flex items-stretch gap-2">
                <div class="min-w-0 flex-1">
                    <div class="flex items-start justify-between gap-2">
                        <div class="text-[15px] font-bold text-gray-800 truncate">${getProductName(order)}</div>
                        <span class="status-tag ${cfg.cls}">${cfg.label}</span>
                    </div>
                    <div class="text-[12px] text-gray-500 mt-1 truncate">收购商 ${getPayerName(order)}</div>
                    <div class="mt-3 flex items-end justify-between gap-3">
                        <div class="text-[18px] leading-none font-bold ${amountClass}" style="font-family:Poppins;">${amountText}</div>
                        <div class="text-[11px] text-gray-400">${FormatService.smartTime(order.updatedAt || order.paidAt || order.createdAt)}</div>
                    </div>
                </div>
                <div class="w-4 flex items-center justify-center text-gray-300">
                    <i class="fas fa-chevron-right text-sm"></i>
                </div>
            </div>
        </div>`;
    }
};

// ==================== 筛选面板控制 ====================
const FilterPanel = {
    open() {
        document.getElementById('filterOverlay').classList.add('show');
        document.getElementById('filterSheet').classList.add('show');
    },

    close() {
        document.getElementById('filterOverlay').classList.remove('show');
        document.getElementById('filterSheet').classList.remove('show');
    },

    reset() {
        FilterService.reset();
        document.querySelectorAll('.filter-option').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.value === 'all');
        });
        document.getElementById('customDateRange').classList.add('hidden');
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = '';
    },

    confirm() {
        if (FilterService.state.timeRange === 'custom') {
            FilterService.setCustomDates(
                document.getElementById('startDate').value,
                document.getElementById('endDate').value
            );
        }
        this.close();
        App.refresh();
    },

    init() {
        // 筛选按钮点击事件委托
        document.querySelectorAll('.filter-option').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const type = e.target.dataset.type;
                const value = e.target.dataset.value;

                // 同组其他按钮取消激活
                document.querySelectorAll(`[data-type="${type}"]`).forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');

                // 更新筛选状态
                if (type === 'time') {
                    FilterService.setTimeRange(value);
                    document.getElementById('customDateRange').classList.toggle('hidden', value !== 'custom');
                }
            });
        });
    }
};

// ==================== 用户操作 ====================
const Actions = {
    goDetail(recordId) {
        window.location.href = 'farmer-collection-detail.html?source=records&orderNo=' + encodeURIComponent(recordId);
    }
};

// ==================== 应用主控 ====================
const App = {
    state: {
        stage: 'pending',
        subStatus: 'all'
    },

    init() {
        const urlParams = new URLSearchParams(window.location.search);
        const sourcePage = urlParams.get('source') || 'my';
        const backLink = sourcePage === 'home' ? 'farmer-home.html' : 'farmer-my.html';
        const stageParam = urlParams.get('stage');
        if (stageParam === 'paid' || stageParam === 'canceled' || stageParam === 'pending') {
            this.state.stage = stageParam;
        }
        const subParam = urlParams.get('sub');
        if (subParam) this.state.subStatus = subParam;

        document.getElementById('statusBar').innerHTML = renderStatusBar();
        document.getElementById('navBar').innerHTML = renderHeader('订单管理', backLink);
        document.getElementById('tabBar').innerHTML = renderFarmerTabBar('mine');
        document.getElementById('searchInput').addEventListener('input', function(e) {
            FilterService.setKeyword(e.target.value);
            App.refresh();
        });

        FilterPanel.init();
        this.refresh();
    },

    switchStage(stage) {
        if (!STAGE_STATUS_MAP[stage]) return;
        this.state.stage = stage;
        this.state.subStatus = 'all';
        this.refresh();
    },

    switchSubStatus(sub) {
        this.state.subStatus = sub || 'all';
        this.refresh();
    },

    refresh() {
        const allOrders = RecordService.getRecords();
        RenderService.renderStageTabs(allOrders);
        let filtered = FilterService.apply(allOrders).filter(order => getStage(order) === this.state.stage);
        if (this.state.stage === 'pending' && this.state.subStatus !== 'all') {
            filtered = filtered.filter(order => getSubStatus(order) === this.state.subStatus);
        }
        filtered.sort(function(a, b) {
            const ar = (STATUS_CONFIG[a.status] || STATUS_CONFIG.draft).rank;
            const br = (STATUS_CONFIG[b.status] || STATUS_CONFIG.draft).rank;
            if (App.state.stage === 'pending' && ar !== br) return ar - br;
            return new Date(b.updatedAt || b.paidAt || b.createdAt || 0) - new Date(a.updatedAt || a.paidAt || a.createdAt || 0);
        });

        if (filtered.length === 0) {
            RenderService.renderEmpty();
            return;
        }
        RenderService.renderList(filtered);
    },

    showToast(msg) {
        const tip = document.getElementById('toastTip');
        tip.textContent = msg;
        tip.classList.add('show');
        clearTimeout(this._toastTimer);
        this._toastTimer = setTimeout(() => tip.classList.remove('show'), 1800);
    }
};

const captureState = new URLSearchParams(window.location.search).get('captureState') || '';

// 启动应用
App.init();

if (captureState === 'empty') {
    FilterService.setTimeRange('custom');
    FilterService.setCustomDates('2035-01-01', '2035-01-02');
    App.refresh();
}

if (captureState === 'modal') {
    setTimeout(() => {
        FilterPanel.open();
    }, 120);
}
</script>
</body>
</html>
