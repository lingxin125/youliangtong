function switchChart(type) {
    var segTrendBar = document.getElementById('segTrendBar');
    var segCategoryBar = document.getElementById('segCategoryBar');
    var trendBtn = segTrendBar.parentElement;
    var categoryBtn = segCategoryBar.parentElement;
    var trendPanel = document.getElementById('trendPanel');
    var categoryPanel = document.getElementById('categoryPanel');
    if (type === 'trend') {
        trendBtn.style.color = '#11A64A';
        categoryBtn.style.color = '#6B7280';
        segTrendBar.style.opacity = '1';
        segCategoryBar.style.opacity = '0';
        trendPanel.style.display = 'block';

    }
}

var _masked = false;

    _masked = !_masked;
    var icon = document.getElementById('eyeIcon');
    var amount = document.getElementById('heroAmount');
    var cent = document.getElementById('heroCent');
    var countNum = document.getElementById('heroCountNum');
    icon.className = _masked ? 'fas fa-eye-slash text-white/50 text-[10px] cursor-pointer' : 'fas fa-eye text-white/50 text-[10px] cursor-pointer';
    // 脱敏时隐藏 ¥ 符号，只显示 ****
    amount.textContent = _masked ? '****' : '¥43,650';
    cent.textContent = _masked ? '' : '.00';
    countNum.textContent = _masked ? '***' : '24';
}

        '禽蛋': { bg: 'bg-[#EBF7F0]', text: 'text-[#FB923C]', border: 'border-[#11A64A]/10' },
        '肉类': { bg: 'bg-[#EBF7F0]', text: 'text-[#EF4444]', border: 'border-[#11A64A]/10' },
        '其他': { bg: 'bg-[#EBF7F0]', text: 'text-[#94A3B8]', border: 'border-[#11A64A]/10' }
    };

    function switchPeriod(period) {
        var chips = document.querySelectorAll('#categorySummaryPanel .filter-chip');
        chips.forEach(function(chip, i) {
            chip.classList.toggle('active', ['today', 'month', 'year'][i] === period);
        });
        var container = document.getElementById('categoryList');
        var data = categoryData[period];
        // 渲染品类明细行
        container.innerHTML = data.map(function(item) {
            var c = _catColors[item.name] || _catColors['其他'];
            return '<div class="flex items-center justify-between py-2.5 rounded-lg px-1 -mx-1">' +
                '<div class="flex items-center gap-2">' +
                '<div class="w-8 h-8 rounded-[10px] ' + c.bg + ' ' + c.border + ' flex items-center justify-center border"><i class="fas ' + _icons[item.name] + ' ' + c.text + ' text-[13px]"></i></div>' +
                '<span class="text-[13px] font-medium text-gray-700 tracking-wide">' + item.name + '</span></div>' +
                '<div class="flex items-center gap-1">' +
                '<span class="text-sm font-bold text-gray-800" style="font-family:Poppins;">' + item.amount + '</span>' +
                '<span class="text-[10px] text-gray-400 ml-0.5 mt-0.5">' + item.count + '</span>' +

        }).join('');
    }

// ==================== 我关注的销售需求模块（MVP：关键词能力暂时隐藏） ====================

function getCategoryClass(category) {
    var classes = {
        '水果': 'bg-red-50 text-red-500',
        '蔬菜': 'bg-green-50 text-green-500',
        '粮食': 'bg-amber-50 text-amber-500',
        '禽蛋': 'bg-violet-50 text-violet-500',
        '肉类': 'bg-orange-50 text-orange-500',
        '其他': 'bg-gray-100 text-gray-400'
    };
    return classes[category] || 'bg-gray-100 text-gray-400';
}

function renderFollowedDemands() {
    var container = document.getElementById('followedDemandsContainer');

        { id: 'F1', category: '水果', content: '出售红富士苹果 5000斤', qty: 5000, unit: '斤', price: 2.6, distanceKm: 3.2, time: '5分钟前' },
        { id: 'F2', category: '蔬菜', content: '自种有机西红柿 3000斤', qty: 3000, unit: '斤', price: 2.3, distanceKm: 12, time: '18分钟前' },
        { id: 'F3', category: '粮食', content: '优质甜玉米 大量出货', qty: 8000, unit: '斤', price: 1.8, distanceKm: 8.5, time: '32分钟前' }
    ];

    var html = '<div class="space-y-2.5">';
    html += followedDemands.map(function(item) {
        var catClass = getCategoryClass(item.category);
        return '<a href="buyer-demand-detail.html" class="glass-card rounded-2xl p-3.5 block no-underline relative pr-10" style="text-decoration:none;">' +
            '<div class="flex justify-between items-start mb-1.5">' +
            '<div class="flex items-center gap-1.5">' +
            '<span class="text-[10px] ' + catClass + ' px-2 py-0.5 rounded-full font-medium">' + item.category + '</span>' +
            '<span class="text-[10px] text-gray-400"><i class="fas fa-location-dot mr-0.5"></i>' + item.distanceKm + 'km</span>' +
            '</div>' +
            '<span class="text-[10px] bg-primary/10 text-primary px-2 py-0.5 rounded-full font-medium absolute right-3 top-3.5">进行中</span>' +
            '</div>' +
            '<div class="text-sm text-gray-800 font-medium mb-1 truncate">' + item.content + '</div>' +
            '<div class="flex items-center justify-between">' +
            '<div class="flex items-center gap-3">' +
            '<span class="text-xs text-primary font-bold" style="font-family:Poppins;">¥' + item.price + '/斤</span>' +
            '<span class="text-[11px] text-gray-500 font-medium">共 ' + item.qty + item.unit + '</span>' +
            '</div>' +
            '<span class="text-[10px] text-gray-400 absolute right-3 bottom-3.5">' + item.time + '</span>' +
            '</div>' +
            '<i class="fas fa-chevron-right text-xs text-gray-300 absolute right-3 top-1/2 -translate-y-1/2"></i>' +
            '</a>';
    }).join('');

    container.innerHTML = html;
}

var homeDemandStore = window.DemandMockStore || null;

function formatPublishedTime(iso) {
    var d = new Date(iso || '');
    if (Number.isNaN(d.getTime())) return '-';
    var diff = Date.now() - d.getTime();
    var minutes = Math.floor(diff / 60000);
    if (minutes < 1) return '刚刚';
    if (minutes < 60) return minutes + '分钟前';
    var hours = Math.floor(minutes / 60);
    if (hours < 24) return hours + '小时前';
    var days = Math.floor(hours / 24);
    return days + '天前';
}

function formatPublishedPrice(item) {
    if (item.price === null || item.price === undefined || item.price === '') return '面议';
    return '¥' + Number(item.price).toFixed(2) + '/' + (item.unit || '斤');
}

function getPublishedDemandTypeLabel(item) {
    if (homeDemandStore && typeof homeDemandStore.getDemandTypeLabel === 'function') {
        return homeDemandStore.getDemandTypeLabel(item);
    }
    return item && item.role === 'farmer' ? '销售' : '收购';
}

function getPublishedDemandTypeClass(item) {
    if (homeDemandStore && typeof homeDemandStore.getDemandTypeTagClass === 'function') {
        return homeDemandStore.getDemandTypeTagClass(item);
    }
    return item && item.role === 'farmer' ? 'bg-green-50 text-green-600' : 'bg-blue-50 text-blue-600';
}

function getPublishedDemandTitle(item) {
    if (homeDemandStore && typeof homeDemandStore.getDemandTitle === 'function') {
        return homeDemandStore.getDemandTitle(item);
    }
    return (item && (item.title || item.content)) || '-';
}

function renderPublishedDemands() {
    var container = document.getElementById('myPublishedDemandList');
    if (!container) return;
    var fallbackList = [
        { id: 'B1', role: 'buyer', demandType: 'purchase', title: '收购红富士苹果 500斤', qty: 500, unit: '斤', price: 3.5, status: 'active', updatedAt: new Date(Date.now() - 5 * 60 * 1000).toISOString() },
        { id: 'B2', role: 'buyer', demandType: 'sale', title: '销售有机西红柿 800斤', qty: 800, unit: '斤', price: 2.8, status: 'active', updatedAt: new Date(Date.now() - 22 * 60 * 1000).toISOString() },
        { id: 'B3', role: 'buyer', demandType: 'purchase', title: '收购东北大米 2000斤', qty: 2000, unit: '斤', price: 2.2, status: 'closed', updatedAt: new Date(Date.now() - 60 * 60 * 1000).toISOString() }
    ];
    var list = homeDemandStore && typeof homeDemandStore.getDemands === 'function'
        ? homeDemandStore.getDemands({ role: 'buyer', status: 'all' }).slice(0, 3)
        : fallbackList;

    if (!list.length) {
        container.innerHTML = '<div class="glass-card rounded-2xl p-6 text-center"><div class="text-xs text-gray-400">暂未发布需求</div></div>';
        return;
    }

    container.innerHTML = list.map(function(item) {
        var href = 'buyer-publish.html?mode=' + (item.status === 'active' ? 'edit' : 'view') + '&id=' + encodeURIComponent(item.id || '') + '&source=home';
        var statusClass = item.status === 'active' ? 'bg-primary/10 text-primary' : 'bg-gray-100 text-gray-500';
        var statusLabel = item.status === 'active' ? '进行中' : '已下架';
        return '<a href="' + href + '" class="glass-card rounded-2xl p-3.5 block no-underline relative pr-10" style="text-decoration:none;">' +
            '<div class="flex justify-between items-start mb-1.5">' +
                '<div class="flex items-center gap-1.5">' +
                    '<span class="text-[10px] ' + getPublishedDemandTypeClass(item) + ' px-2 py-0.5 rounded-full font-medium">' + getPublishedDemandTypeLabel(item) + '</span>' +
                '</div>' +
                '<span class="text-[10px] ' + statusClass + ' px-2 py-0.5 rounded-full font-medium absolute right-3 top-3.5">' + statusLabel + '</span>' +
            '</div>' +
            '<div class="text-sm text-gray-800 font-medium mb-1 truncate">' + getPublishedDemandTitle(item) + '</div>' +
            '<div class="flex items-center justify-between">' +
                '<div class="flex items-center gap-3">' +
                    '<span class="text-xs text-primary font-bold" style="font-family:Poppins;">' + formatPublishedPrice(item) + '</span>' +
                    '<span class="text-[11px] text-gray-500 font-medium">共 ' + String(item.qty || 0) + (item.unit || '斤') + '</span>' +
                '</div>' +
                '<span class="text-[10px] text-gray-400 absolute right-3 bottom-3.5">' + formatPublishedTime(item.updatedAt || item.createdAt) + '</span>' +
            '</div>' +
            '<i class="fas fa-chevron-right text-xs text-gray-300 absolute right-3 top-1/2 -translate-y-1/2"></i>' +
        '</a>';
    }).join('');
}

// ==================== 消息红点状态管理 ====================
var MESSAGE_BADGE_KEY = 'ylt_message_badge_count';

function getUnreadCount() {
    try {
        var count = localStorage.getItem(MESSAGE_BADGE_KEY);
        return count ? parseInt(count, 10) : 3; // 默认3条未读用于演示
    } catch (e) {
        return 3;
    }
}

function updateMessageBadges() {
    var count = getUnreadCount();
    var badge = document.getElementById('homeMessageBadge');
    if (badge) {
        if (count > 0) {
            badge.classList.remove('hidden');
            var numEl = badge.querySelector('span');
            if (numEl) numEl.textContent = count > 99 ? '99+' : count;
        } else {
            badge.classList.add('hidden');
        }
    }
}

function clearUnreadCount() {
    localStorage.setItem(MESSAGE_BADGE_KEY, '0');
    updateMessageBadges();
}

// 页面加载时渲染
document.addEventListener('DOMContentLoaded', function() {
    renderFollowedDemands();
    renderPublishedDemands();
    updateMessageBadges();
});
</script>
