<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>丰收云 - 农户建档</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="shared.js"></script>
    <style>
        .manager-bg { background-color: #F7F8FA; }

        .manager-header-bg {
            background: #13b15a;
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 176px;
            z-index: 0;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
        }

        .manager-nav {
            position: relative;
            z-index: 10;
        }

        .form-card {
            background: #FFFFFF;
            border-radius: 20px;
            border: 1px solid rgba(0, 0, 0, 0.04);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.03);
            position: relative;
            z-index: 10;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #E5E7EB;
            border-radius: 12px;
            font-size: 14px;
            color: #111827;
            background: #FFFFFF;
            outline: none;
            transition: all 0.2s;
        }
        .form-input:focus {
            border-color: #13b15a;
            box-shadow: 0 0 0 3px rgba(19, 177, 90, 0.1);
        }

        .form-label {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            font-weight: 500;
            color: #374151;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #111827;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
        }

        .submit-btn {
            width: 100%;
            border: none;
            border-radius: 16px;
            padding: 14px 16px;
            color: #FFFFFF;
            font-size: 15px;
            font-weight: 600;
            background: linear-gradient(180deg, #19bf61 0%, #13b15a 100%);
            box-shadow: 0 8px 18px rgba(19, 177, 90, 0.25);
        }
    </style>
</head>
<body>
<div class="mobile-container manager-bg">
    <div class="manager-header-bg"></div>

    <div class="manager-nav">
        <div class="h-12 w-full flex justify-between items-end px-5 pb-2 select-none text-white font-medium text-sm">
            <span>9:41</span>
            <div class="flex gap-2 items-center">
                <i class="fas fa-signal text-xs"></i>
                <i class="fas fa-wifi text-xs"></i>
                <i class="fas fa-battery-full text-xs"></i>
            </div>
        </div>
        <div class="flex items-center justify-between px-4 mt-2 h-[44px] text-white">
            <a href="manager-home.html" class="w-10 h-10 flex items-center justify-start z-20">
                <i class="fas fa-chevron-left text-lg"></i>
            </a>
            <div class="text-[17px] font-semibold absolute left-0 right-0 text-center pointer-events-none">农户建档</div>
            <div class="w-10"></div>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto no-scrollbar px-4 pb-8 relative z-10">
        <div class="form-card p-4 mt-4">
            <div class="section-title">
                <i class="fas fa-user-check text-[#13b15a]"></i>
                建档信息
            </div>
            <div class="space-y-3">
                <div>
                    <label class="form-label">姓名</label>
                    <input class="form-input" placeholder="请输入姓名">
                </div>
                <div>
                    <label class="form-label">手机号</label>
                    <input class="form-input" type="tel" inputmode="numeric" maxlength="11" placeholder="请输入11位手机号">
                </div>
                <div>
                    <label class="form-label">银行卡号</label>
                    <input class="form-input" type="tel" inputmode="numeric" placeholder="请输入银行卡号">
                </div>
            </div>
        </div>

        <div class="mt-5">
            <button class="submit-btn">提交建档</button>
        </div>
    </div>
</div>
</body>
</html>
