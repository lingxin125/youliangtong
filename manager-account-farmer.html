<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>丰收云 - 农户进件</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="shared.js"></script>
    <style>
        .manager-bg { background-color: #F7F8FA; }

        .manager-header-bg {
            background: #13b15a;
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 176px;
            z-index: 0;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
        }

        .manager-nav {
            position: relative;
            z-index: 10;
        }

        .form-card {
            background: #FFFFFF;
            border-radius: 20px;
            border: 1px solid rgba(0, 0, 0, 0.04);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.03);
            position: relative;
            z-index: 10;
        }

        .upload-zone {
            border: 2px dashed #D1D5DB;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            background: #F9FAFB;
        }
        .upload-zone:active {
            border-color: #13b15a;
            background: #F0FDF4;
        }

        .form-input {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #E5E7EB;
            border-radius: 12px;
            font-size: 13px;
            color: #111827;
            background: #FFFFFF;
            outline: none;
            transition: all 0.2s;
        }
        .form-input:focus {
            border-color: #13b15a;
            box-shadow: 0 0 0 3px rgba(19, 177, 90, 0.1);
        }

        .form-label {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            font-weight: 500;
            color: #374151;
        }

        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: #111827;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
        }

        .account-type-wrap {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .account-type-btn {
            border: 1px solid #E5E7EB;
            background: #FFFFFF;
            color: #6B7280;
            border-radius: 14px;
            padding: 10px 8px;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .account-type-btn.active {
            border-color: #13b15a;
            background: #F0FDF4;
            color: #13b15a;
            font-weight: 600;
        }

        .submit-btn {
            width: 100%;
            border: none;
            border-radius: 16px;
            padding: 14px 16px;
            color: #FFFFFF;
            font-size: 15px;
            font-weight: 600;
            background: linear-gradient(180deg, #19bf61 0%, #13b15a 100%);
            box-shadow: 0 8px 18px rgba(19, 177, 90, 0.25);
        }
    </style>
</head>
<body>
<div class="mobile-container manager-bg">
    <div class="manager-header-bg"></div>

    <div class="manager-nav">
        <div class="h-12 w-full flex justify-between items-end px-5 pb-2 select-none text-white font-medium text-sm">
            <span>9:41</span>
            <div class="flex gap-2 items-center">
                <i class="fas fa-signal text-xs"></i>
                <i class="fas fa-wifi text-xs"></i>
                <i class="fas fa-battery-full text-xs"></i>
            </div>
        </div>
        <div class="flex items-center justify-between px-4 mt-2 h-[44px] text-white">
            <a href="manager-account.html" class="w-10 h-10 flex items-center justify-start z-20">
                <i class="fas fa-chevron-left text-lg"></i>
            </a>
            <div class="text-[17px] font-semibold absolute left-0 right-0 text-center pointer-events-none">农户进件</div>
            <div class="w-10"></div>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto no-scrollbar px-4 pb-8 relative z-10">
        <div class="form-card p-4 mt-4">
            <div class="section-title">
                <i class="fas fa-user-check text-[#13b15a]"></i>
                开户类型
            </div>
            <div class="account-type-wrap">
                <button type="button" class="account-type-btn active" onclick="selectAccountType(this, 'personal')">个人商户</button>
                <button type="button" class="account-type-btn" onclick="selectAccountType(this, 'enterprise')">企业商户</button>
                <button type="button" class="account-type-btn" onclick="selectAccountType(this, 'sole')">个体工商户</button>
            </div>
        </div>

        <div class="form-card p-4 mt-4">
            <div class="section-title">
                <i class="fas fa-circle-info text-[#13b15a]"></i>
                基础信息
            </div>
            <div class="space-y-3">
                <div>
                    <label class="form-label">商户名称</label>
                    <input class="form-input" placeholder="请输入商户名称">
                </div>
                <div>
                    <label class="form-label">商户简称</label>
                    <input class="form-input" placeholder="请输入商户简称">
                </div>
                <!-- <div>
                    <label class="form-label">联系人姓名</label>
                    <input class="form-input" placeholder="请输入联系人姓名">
                </div>
                <div>
                    <label class="form-label">手机号码</label>
                    <input class="form-input" type="tel" placeholder="请输入手机号码">
                </div> -->
                <div>
                    <label class="form-label">经营范围</label>
                    <select class="form-input text-gray-500">
                        <option>请选择经营范围</option>
                        <option>粮食种植</option>
                        <option>蔬菜种植</option>
                        <option>水果种植</option>
                        <option>禽蛋养殖</option>
                        <option>水产养殖</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">详细地址</label>
                    <input class="form-input" placeholder="请输入详细地址">
                </div>
            </div>
        </div>

        <div class="form-card p-4 mt-4 personal-only">
            <div class="section-title">
                <i class="fas fa-id-card text-[#13b15a]"></i>
                结算信息（*必填项）
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div class="upload-zone h-24">
                    <i class="fas fa-id-card text-xl text-gray-400 mb-1"></i>
                    <div class="text-[11px] text-gray-500">身份证 人像面</div>
                </div>
                <div class="upload-zone h-24">
                    <i class="fas fa-id-card text-xl text-gray-400 mb-1"></i>
                    <div class="text-[11px] text-gray-500">身份证 国徽面</div>
                </div>
                <div class="upload-zone h-24">
                    <i class="fas fa-id-card text-xl text-gray-400 mb-1"></i>
                    <div class="text-[11px] text-gray-500">结算人 身份证</div>
                </div>
            </div>
            <div class="text-[11px] text-gray-400 mt-3">以下为识别信息，可手动校正，需与上传资料保持一致。</div>
            <div class="space-y-3 mt-3">
                <div>
                    <label class="form-label">结算人姓名</label>
                    <input class="form-input" placeholder="请填写">
                </div>
                <div>
                    <label class="form-label">结算人电话</label>
                    <input class="form-input" type="tel" placeholder="请输入11位手机号">
                </div>
                <div>
                    <label class="form-label">证件类型</label>
                    <select class="form-input text-gray-500">
                        <option>身份证</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">证件号码</label>
                    <input class="form-input" placeholder="请核对号码，需要与证照保持一致">
                </div>
                <div>
                    <label class="form-label">证件起始日</label>
                    <select class="form-input text-gray-500">
                        <option>请选择</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">是否长期证件</label>
                    <select class="form-input text-gray-500">
                        <option>否</option>
                        <option>是</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">证件到期日</label>
                    <select class="form-input text-gray-500">
                        <option>请选择</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="form-card p-4 mt-4 company-only hidden">
            <div class="section-title">
                <i class="fas fa-building text-[#13b15a]"></i>
                营业执照（*必填项）
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div class="upload-zone h-28">
                    <i class="fas fa-camera text-[24px] text-gray-400 mb-2"></i>
                    <div class="text-[11px] text-gray-500">营业执照 正面</div>
                </div>
                <!-- <div class="upload-zone h-28">
                    <i class="fas fa-file-lines text-[24px] text-gray-400 mb-2"></i>
                    <div class="text-[11px] text-gray-500">开户许可证 正面</div>
                </div> -->
            </div>
            <div class="space-y-3 mt-3">
                <div>
                    <label class="form-label">营业执照号</label>
                    <input class="form-input" placeholder="请输入营业执照号">
                </div>
                <div>
                    <label class="form-label">执照起始日期</label>
                    <select class="form-input text-gray-500">
                        <option>请选择</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">是否长期执照</label>
                    <select class="form-input text-gray-500">
                        <option>否</option>
                        <option>是</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">执照到期日期</label>
                    <select class="form-input text-gray-500">
                        <option>请选择</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="form-card p-4 mt-4 company-only hidden">
            <div class="section-title">
                <i class="fas fa-user-tie text-[#13b15a]"></i>
                法人信息（*必填项）
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div class="upload-zone h-24">
                    <i class="fas fa-id-card text-xl text-gray-400 mb-1"></i>
                    <div class="text-[11px] text-gray-500">身份证 人像面</div>
                </div>
                <div class="upload-zone h-24">
                    <i class="fas fa-id-card text-xl text-gray-400 mb-1"></i>
                    <div class="text-[11px] text-gray-500">身份证 国徽面</div>
                </div>
            </div>
            <div class="text-[11px] text-gray-400 mt-3">以下为识别信息，可手动校正，需与上传资料保持一致。</div>
            <div class="space-y-3 mt-3">
                <div>
                    <label class="form-label">法人姓名</label>
                    <input class="form-input" placeholder="请输入法人姓名">
                </div>
                <div>
                    <label class="form-label">法人电话</label>
                    <input class="form-input" type="tel" placeholder="请输入11位手机号">
                </div>
                <div>
                    <label class="form-label">法人证件类型</label>
                    <select class="form-input text-gray-500">
                        <option>身份证</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">法人证件</label>
                    <input class="form-input" placeholder="请核对号码，需要与证照保持一致">
                </div>
                <div>
                    <label class="form-label">证件起始日</label>
                    <select class="form-input text-gray-500">
                        <option>请选择</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">是否长期证件</label>
                    <select class="form-input text-gray-500">
                        <option>否</option>
                        <option>是</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">证件到期日</label>
                    <select class="form-input text-gray-500">
                        <option>请选择</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="form-card p-4 mt-4">
            <div class="section-title">
                <i class="fas fa-building-columns text-[#13b15a]"></i>
                结算银行信息（*必填项）
            </div>
            <div class="upload-zone h-28">
                <i class="fas fa-credit-card text-[26px] text-gray-400 mb-2"></i>
                <div class="text-[11px] text-gray-500">银行卡 卡号面</div>
            </div>
            <div class="text-[11px] text-gray-400 mt-3">以下为识别信息，可手动校正，需与上传资料保持一致。</div>
            <div class="space-y-3 mt-3">
                <div>
                    <label class="form-label">银行名称</label>
                    <input class="form-input" value="中国邮政储蓄银行">
                </div>
                <div>
                    <label class="form-label">支行名称</label>
                    <input class="form-input" value="中国邮政储蓄银行总行">
                </div>
                <div>
                    <label class="form-label">支行联号</label>
                    <input class="form-input" value="403100000004">
                </div>
                <div>
                    <label class="form-label">银行卡号</label>
                    <input class="form-input" type="tel" placeholder="请输入银行卡号">
                </div>
            </div>
        </div>

        <div class="mt-5">
            <button class="submit-btn">提交进件申请</button>
        </div>
    </div>
</div>

<script>
function selectAccountType(el, type) {
    document.querySelectorAll('.account-type-btn').forEach(btn => btn.classList.remove('active'));
    el.classList.add('active');

    const isPersonal = type === 'personal';
    document.querySelectorAll('.personal-only').forEach(section => section.classList.toggle('hidden', !isPersonal));
    document.querySelectorAll('.company-only').forEach(section => section.classList.toggle('hidden', isPersonal));
}
</script>
</body>
</html>
