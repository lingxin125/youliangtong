<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>丰收云 - 账户管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="shared.js"></script>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body class="bg-[#F7F8FA]">
<div class="mobile-container relative bg-[#F7F8FA]">
    <div id="statusBar"></div>
    <div id="navBar"></div>

    <div class="flex-1 overflow-y-auto no-scrollbar px-4 pt-4 pb-8">
        <div class="flex items-center gap-2">
            <div class="w-1 h-4 bg-primary rounded-full"></div>
            <span id="defaultSectionTitle" class="text-sm font-medium text-gray-700">默认账户</span>
        </div>

        <div id="defaultAccountCard" class="mt-3"></div>

        <div class="mt-5 flex items-center gap-2">
            <div class="w-1 h-4 bg-primary/70 rounded-full"></div>
            <span id="listSectionTitle" class="text-sm font-medium text-gray-700">其他账户</span>
        </div>

        <div id="accountList" class="mt-3 space-y-3"></div>

        <div id="emptyState" class="hidden mt-3 bg-white rounded-2xl p-6 border border-black/[0.04] text-center">
            <div class="w-12 h-12 rounded-full bg-emerald-50 text-emerald-600 mx-auto flex items-center justify-center">
                <i class="fas fa-wallet text-lg"></i>
            </div>
            <div class="text-sm font-medium text-gray-700 mt-3">暂无其他账户</div>
            <div id="emptyStateDesc" class="text-[12px] text-gray-400 mt-1">可新增一张新的账户卡作为备用账户。</div>
        </div>

        <div class="mt-5">
            <button id="addAccountBtn" onclick="openAccountForm()" class="w-full h-12 rounded-2xl bg-primary text-white text-[15px] font-semibold shadow-glow active:scale-[0.98] transition-transform">
                新增账户
            </button>
        </div>
    </div>

    <div id="accountModal" class="absolute inset-0 bg-black/40 z-[75] flex items-end opacity-0 pointer-events-none transition-opacity duration-300">
        <div id="accountModalContent" class="bg-white rounded-t-[24px] p-5 w-full transform translate-y-full transition-transform duration-300 shadow-[0_-10px_40px_rgba(0,0,0,0.1)]">
            <div class="flex items-center justify-between mb-4">
                <div id="accountModalTitle" class="text-[16px] font-semibold text-gray-800">新增账户</div>
                <button onclick="closeAccountForm()" class="w-8 h-8 flex items-center justify-center text-gray-400">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="space-y-3">
                <div>
                    <label class="block text-[12px] text-gray-500 mb-1.5">银行名称</label>
                    <input id="bankNameInput" class="w-full h-11 rounded-xl border border-gray-200 bg-gray-50 px-3 text-sm text-gray-800 outline-none focus:border-primary focus:bg-white" placeholder="请输入银行名称">
                </div>
                <div>
                    <label class="block text-[12px] text-gray-500 mb-1.5">开户行</label>
                    <input id="branchNameInput" class="w-full h-11 rounded-xl border border-gray-200 bg-gray-50 px-3 text-sm text-gray-800 outline-none focus:border-primary focus:bg-white" placeholder="请输入开户行">
                </div>
                <div>
                    <label class="block text-[12px] text-gray-500 mb-1.5">银行卡号</label>
                    <input id="cardNoInput" class="w-full h-11 rounded-xl border border-gray-200 bg-gray-50 px-3 text-sm text-gray-800 outline-none focus:border-primary focus:bg-white" placeholder="请输入银行卡号" inputmode="numeric">
                </div>
                <div>
                    <label class="block text-[12px] text-gray-500 mb-1.5">户名</label>
                    <input id="holderNameInput" class="w-full h-11 rounded-xl border border-gray-200 bg-gray-50 px-3 text-sm text-gray-800 outline-none focus:border-primary focus:bg-white" placeholder="请输入户名">
                </div>
            </div>
            <div class="mt-5 flex gap-3">
                <button onclick="closeAccountForm()" class="flex-1 h-11 rounded-xl border border-gray-200 bg-white text-sm text-gray-600 active:scale-[0.98] transition-transform">取消</button>
                <button onclick="submitAccountForm()" class="flex-1 h-11 rounded-xl bg-primary text-white text-sm font-medium active:scale-[0.98] transition-transform">确认新增</button>
            </div>
        </div>
    </div>

    <div id="deleteModal" class="absolute inset-0 bg-black/40 z-[76] flex items-end opacity-0 pointer-events-none transition-opacity duration-300">
        <div id="deleteModalContent" class="bg-white rounded-t-[24px] p-5 w-full transform translate-y-full transition-transform duration-300 shadow-[0_-10px_40px_rgba(0,0,0,0.1)]">
            <div class="text-[16px] font-semibold text-gray-800">删除账户</div>
            <div id="deleteModalDesc" class="text-[13px] text-gray-500 leading-6 mt-2">删除后该账户将不再用于当前业务，请确认是否继续。</div>
            <div class="mt-5 flex gap-3">
                <button onclick="closeDeleteModal()" class="flex-1 h-11 rounded-xl border border-gray-200 bg-white text-sm text-gray-600 active:scale-[0.98] transition-transform">取消</button>
                <button onclick="confirmDeleteAccount()" class="flex-1 h-11 rounded-xl bg-red-500 text-white text-sm font-medium active:scale-[0.98] transition-transform">确认删除</button>
            </div>
        </div>
    </div>

    <div id="defaultModal" class="absolute inset-0 bg-black/40 z-[77] flex items-end opacity-0 pointer-events-none transition-opacity duration-300">
        <div id="defaultModalContent" class="bg-white rounded-t-[24px] p-5 w-full transform translate-y-full transition-transform duration-300 shadow-[0_-10px_40px_rgba(0,0,0,0.1)]">
            <div class="text-[16px] font-semibold text-gray-800">设为默认账户</div>
            <div id="defaultModalDesc" class="text-[13px] text-gray-500 leading-6 mt-2">确认将该账户切换为默认账户吗？</div>
            <div class="mt-5 flex gap-3">
                <button onclick="closeDefaultModal()" class="flex-1 h-11 rounded-xl border border-gray-200 bg-white text-sm text-gray-600 active:scale-[0.98] transition-transform">取消</button>
                <button onclick="confirmSetDefaultAccount()" class="flex-1 h-11 rounded-xl bg-primary text-white text-sm font-medium active:scale-[0.98] transition-transform">确认切换</button>
            </div>
        </div>
    </div>

    <div id="toastTip" class="hidden absolute left-1/2 -translate-x-1/2 bottom-8 px-4 py-2 bg-black/80 text-white text-xs rounded-lg z-[90] opacity-0 pointer-events-none transition-all duration-200"></div>
    </div>
</div>

<script>
    var q = new URLSearchParams(window.location.search);
    var captureState = q.get('captureState') || '';
    var sourcePage = q.get('source') || 'buyer-my.html';
    var isFarmerPage = sourcePage.indexOf('farmer') >= 0;
    var pageConfig = isFarmerPage
        ? {
            title: '账户管理',
            heroTitle: '收款账户管理',
            heroDesc: '当前默认收款账户会用于收款码与收款场景，新增账户后可随时切换默认账户。',
            defaultTitle: '默认收款账户',
            listTitle: '其他收款账户',
            emptyText: '可新增一张新的收款账户卡作为备用账户。',
            addText: '新增收款账户',
            deleteText: '该收款账户删除后将不再用于账户码展示与收款场景。',
            defaultConfirmText: '确认将该收款账户设为默认账户吗？',
            badge: '默认收款',
            storageKey: 'ylt_farmer_receipt_accounts',
            seedAccounts: [
                { id: 'farmer-1', bank: '中国邮政储蓄银行', branch: '烟台市福山区支行', cardNo: '6228888888888888', holder: '李大姐', isDefault: true },
                { id: 'farmer-2', bank: '烟台农商银行', branch: '福山清洋支行', cardNo: '6215853322334455', holder: '李大姐', isDefault: false }
            ]
        }
        : {
            title: '账户管理',
            heroTitle: '付款账户管理',
            heroDesc: '当前默认付款账户会用于付款流程，新增账户后可按业务场景切换默认付款账户。',
            defaultTitle: '默认付款账户',
            listTitle: '其他付款账户',
            emptyText: '可新增一张新的付款账户卡作为备用账户。',
            addText: '新增付款账户',
            deleteText: '该付款账户删除后将不再用于付款场景，请确认后继续。',
            defaultConfirmText: '确认将该付款账户设为默认账户吗？',
            badge: '默认付款',
            storageKey: 'ylt_buyer_payment_accounts',
            seedAccounts: [
                { id: 'buyer-1', bank: '中国邮政储蓄银行', branch: '烟台市芝罘区支行', cardNo: '6221888800002233', holder: '张三的粮站', isDefault: true },
                { id: 'buyer-2', bank: '中国农业银行', branch: '烟台市开发区支行', cardNo: '6228480100098012', holder: '张三的粮站', isDefault: false }
            ]
        };

    var pendingDeleteId = null;
    var pendingDefaultId = null;
    var accounts = loadAccounts();
    if (captureState === 'empty') {
        var defaultSeed = (pageConfig.seedAccounts.find(function(item) { return item.isDefault; }) || pageConfig.seedAccounts[0]);
        accounts = defaultSeed ? [{ ...defaultSeed, isDefault: true }] : [];
    }

    document.getElementById('statusBar').innerHTML = renderStatusBar();
    document.getElementById('navBar').innerHTML = renderHeader(pageConfig.title, sourcePage);
    document.getElementById('defaultSectionTitle').textContent = pageConfig.defaultTitle;
    document.getElementById('listSectionTitle').textContent = pageConfig.listTitle;
    document.getElementById('emptyStateDesc').textContent = pageConfig.emptyText;
    document.getElementById('addAccountBtn').textContent = pageConfig.addText;
    document.getElementById('accountModalTitle').textContent = pageConfig.addText;

    renderAccounts();
    if (captureState === 'modal') {
        setTimeout(function() {
            openAccountForm();
        }, 120);
    }

    function loadAccounts() {
        try {
            var stored = localStorage.getItem(pageConfig.storageKey);
            if (stored) return JSON.parse(stored);
        } catch (e) {}
        return pageConfig.seedAccounts.slice();
    }

    function saveAccounts() {
        try {
            localStorage.setItem(pageConfig.storageKey, JSON.stringify(accounts));
        } catch (e) {}
    }

    function maskCardNo(cardNo) {
        var clean = (cardNo || '').replace(/\s+/g, '');
        if (clean.length <= 4) return clean;
        return clean.slice(0, 4) + ' **** **** ' + clean.slice(-4);
    }

    function getDefaultAccount() {
        return accounts.find(function(account) { return account.isDefault; }) || accounts[0] || null;
    }

    function renderAccounts() {
        if (!accounts.length) {
            accounts = pageConfig.seedAccounts.slice();
        }

        var defaultAccount = getDefaultAccount();
        if (defaultAccount && !defaultAccount.isDefault) {
            accounts = accounts.map(function(item) {
                item.isDefault = item.id === defaultAccount.id;
                return item;
            });
            defaultAccount.isDefault = true;
            saveAccounts();
        }

        var defaultWrap = document.getElementById('defaultAccountCard');
        var listWrap = document.getElementById('accountList');
        var emptyWrap = document.getElementById('emptyState');
        var otherAccounts = accounts.filter(function(item) { return !item.isDefault; });

        defaultWrap.innerHTML = defaultAccount ? renderAccountCard(defaultAccount, true) : '';
        listWrap.innerHTML = otherAccounts.map(function(item) {
            return renderAccountCard(item, false);
        }).join('');
        emptyWrap.style.display = otherAccounts.length ? 'none' : 'block';
    }

    if (captureState === 'default-confirm') {
        setTimeout(function() {
            var candidate = accounts.find(function(item) { return !item.isDefault; });
            if (candidate) {
                promptSetDefaultAccount(candidate.id);
            }
        }, 120);
    }

    function renderAccountCard(account, isDefault) {
        var actionHtml = isDefault
            ? ''
            : '<div class="flex gap-2.5 mt-4 pt-1">' +
                '<button onclick="promptSetDefaultAccount(\'' + account.id + '\')" class="flex-1 h-10 rounded-2xl border border-emerald-100 bg-emerald-50/80 text-emerald-600 text-[12px] font-semibold shadow-[inset_0_1px_0_rgba(255,255,255,0.65)] active:scale-[0.98] transition-transform">设为默认</button>' +
                '<button onclick="promptDeleteAccount(\'' + account.id + '\')" class="w-[88px] h-10 rounded-2xl border border-red-100 bg-white text-red-500 text-[12px] font-medium shadow-[inset_0_1px_0_rgba(255,255,255,0.65)] active:scale-[0.98] transition-transform">删除</button>' +
              '</div>';

        return '' +
            '<div class="bg-white rounded-2xl p-4 border border-gray-100 shadow-[0_2px_8px_rgba(15,23,42,0.04)]">' +
                '<div class="flex items-center justify-between gap-3 mb-4">' +
                    '<div class="flex items-center gap-3 min-w-0 flex-1">' +
                        '<div class="w-10 h-10 rounded-full bg-[#11A64A]/10 flex items-center justify-center shrink-0">' +
                            '<i class="fas fa-building-columns text-[#11A64A] text-lg"></i>' +
                        '</div>' +
                        '<div class="min-w-0 flex-1">' +
                            '<div class="text-sm font-semibold text-gray-800 truncate">' + account.bank + '</div>' +
                            '<div class="text-xs text-gray-400 mt-0.5 truncate">开户行：' + account.branch + '</div>' +
                        '</div>' +
                    '</div>' +
                    (isDefault ? '<div class="shrink-0 inline-flex items-center gap-1 rounded-full bg-emerald-50 text-emerald-600 px-2.5 py-1 text-[11px] font-medium"><i class="fas fa-circle-check text-[10px]"></i>' + pageConfig.badge + '</div>' : '') +
                '</div>' +
                '<div class="h-px bg-gray-100 mb-3"></div>' +
                '<div class="space-y-2">' +
                    '<div class="flex items-center justify-between gap-3">' +
                        '<span class="text-xs text-gray-400">银行卡号</span>' +
                        '<span class="text-sm font-medium text-gray-800 text-right" style="font-family:Poppins,monospace;">' + maskCardNo(account.cardNo) + '</span>' +
                    '</div>' +
                    '<div class="flex items-center justify-between gap-3">' +
                        '<span class="text-xs text-gray-400">开户人</span>' +
                        '<span class="text-sm font-medium text-gray-800 text-right">' + account.holder + '</span>' +
                    '</div>' +
                '</div>' +
                actionHtml +
            '</div>';
    }

    function openAccountForm() {
        var modal = document.getElementById('accountModal');
        var content = document.getElementById('accountModalContent');
        modal.classList.remove('pointer-events-none', 'opacity-0');
        content.classList.remove('translate-y-full');
    }

    function closeAccountForm() {
        var modal = document.getElementById('accountModal');
        var content = document.getElementById('accountModalContent');
        modal.classList.add('pointer-events-none', 'opacity-0');
        content.classList.add('translate-y-full');
        clearAccountForm();
    }

    function clearAccountForm() {
        document.getElementById('bankNameInput').value = '';
        document.getElementById('branchNameInput').value = '';
        document.getElementById('cardNoInput').value = '';
        document.getElementById('holderNameInput').value = '';
    }

    function submitAccountForm() {
        var bank = document.getElementById('bankNameInput').value.trim();
        var branch = document.getElementById('branchNameInput').value.trim();
        var cardNo = document.getElementById('cardNoInput').value.trim().replace(/\s+/g, '');
        var holder = document.getElementById('holderNameInput').value.trim();

        if (!bank || !branch || !cardNo || !holder) {
            showToast('请完整填写账户信息');
            return;
        }

        accounts.push({
            id: 'acc-' + Date.now(),
            bank: bank,
            branch: branch,
            cardNo: cardNo,
            holder: holder,
            isDefault: false
        });
        saveAccounts();
        renderAccounts();
        closeAccountForm();
        showToast('已新增账户');
    }

    function promptSetDefaultAccount(id) {
        pendingDefaultId = id;
        document.getElementById('defaultModalDesc').textContent = pageConfig.defaultConfirmText;
        var modal = document.getElementById('defaultModal');
        var content = document.getElementById('defaultModalContent');
        modal.classList.remove('pointer-events-none', 'opacity-0');
        content.classList.remove('translate-y-full');
    }

    function closeDefaultModal() {
        pendingDefaultId = null;
        var modal = document.getElementById('defaultModal');
        var content = document.getElementById('defaultModalContent');
        modal.classList.add('pointer-events-none', 'opacity-0');
        content.classList.add('translate-y-full');
    }

    function confirmSetDefaultAccount() {
        if (!pendingDefaultId) return;
        var id = pendingDefaultId;
        accounts = accounts.map(function(item) {
            item.isDefault = item.id === id;
            return item;
        });
        saveAccounts();
        renderAccounts();
        closeDefaultModal();
        showToast('默认账户已切换');
    }

    function promptDeleteAccount(id) {
        pendingDeleteId = id;
        document.getElementById('deleteModalDesc').textContent = pageConfig.deleteText;
        var modal = document.getElementById('deleteModal');
        var content = document.getElementById('deleteModalContent');
        modal.classList.remove('pointer-events-none', 'opacity-0');
        content.classList.remove('translate-y-full');
    }

    function closeDeleteModal() {
        pendingDeleteId = null;
        var modal = document.getElementById('deleteModal');
        var content = document.getElementById('deleteModalContent');
        modal.classList.add('pointer-events-none', 'opacity-0');
        content.classList.add('translate-y-full');
    }

    function confirmDeleteAccount() {
        if (!pendingDeleteId) return;
        accounts = accounts.filter(function(item) { return item.id !== pendingDeleteId; });
        saveAccounts();
        renderAccounts();
        closeDeleteModal();
        showToast('账户已删除');
    }

    function showToast(text) {
        var tip = document.getElementById('toastTip');
        tip.textContent = text;
        tip.classList.remove('hidden');
        tip.classList.remove('opacity-0');
        tip.style.transform = 'translate(-50%, 0)';
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(function() {
            tip.classList.add('opacity-0');
            setTimeout(function() {
                tip.classList.add('hidden');
            }, 200);
        }, 1800);
    }
</script>
</body>
</html>
