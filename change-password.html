<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>丰收云 - 修改登录密码</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="shared.js"></script>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
    <style>
        /* 复用登录页一致的输入框样式 */
        .login-input {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #F9FAFB;
            border: 1px solid #E5E7EB;
            border-radius: 12px;
            padding: 0 14px;
            height: 48px;
            overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .login-input:focus-within {
            border-color: #11A64A;
            box-shadow: 0 0 0 3px rgba(17,166,74,0.08);
        }
        .login-input i.icon {
            color: #9CA3AF;
            font-size: 14px;
            width: 18px;
            text-align: center;
        }
        .login-input input {
            flex: 1;
            min-width: 0;
            border: none;
            background: transparent;
            outline: none;
            font-size: 14px;
            color: #1F2937;
            font-family: inherit;
        }
        .login-input input::placeholder {
            color: #D1D5DB;
        }
        .toast-tip {
            position: absolute;
            left: 50%;
            right: auto;
            bottom: 70px;
            padding: 11px 14px;
            background: rgba(17, 24, 39, 0.9);
            border-radius: 11px;
            color: #fff;
            font-size: 12px;
            line-height: 1.45;
            width: fit-content;
            max-width: calc(100% - 32px);
            text-align: center;
            z-index: 80;
            opacity: 0;
            pointer-events: none;
            transform: translate(-50%, 8px);
            transition: all 0.2s ease;
        }
        .toast-tip.show {
            opacity: 1;
            transform: translate(-50%, 0);
        }
    </style>
</head>
<body class="bg-gray-50/50">
<div class="mobile-container relative bg-gray-50/50">
    <div id="statusBar"></div>
    <div id="navBar"></div>

    <div class="px-5 pt-6 pb-6 bg-white rounded-3xl mt-4 shadow-sm mx-4">
        
        <div class="mb-6">
            <h1 class="text-xl font-bold text-gray-800 mb-1.5">安全验证</h1>
            <p class="text-xs text-gray-500">为了保障账号安全，本次操作需要验证您的身份</p>
        </div>

        <div class="space-y-4">
            <!-- 手机号展示 (禁用态) -->
            <div class="login-input bg-gray-50/80 border-transparent">
                <i class="fas fa-mobile-alt icon text-gray-400"></i>
                <div class="flex-1 text-sm text-gray-500 flex items-center justify-between">
                    <span>验证手机号</span>
                    <span class="font-semibold text-gray-700" style="font-family: 'Poppins', sans-serif;">138 **** 5678</span>
                </div>
            </div>

            <!-- 验证码 -->
            <div class="login-input">
                <i class="fas fa-shield-alt icon"></i>
                <input type="text" placeholder="请输入验证码" maxlength="6" id="smsInput" />
                <button onclick="getSmsCode()" id="smsBtn"
                    class="shrink-0 text-xs font-medium text-primary whitespace-nowrap rounded-lg bg-primary-bg border border-primary/20 hover:bg-primary/10 transition-colors"
                    style="padding: 6px 12px; line-height: 1; height: 32px;">
                    获取验证码
                </button>
            </div>

            <!-- 新密码 -->
            <div>
                <div class="login-input" style="margin-bottom: 12px;">
                    <i class="fas fa-lock icon"></i>
                    <input type="password" placeholder="请设置新密码" id="pwdInput" />
                    <i class="fas fa-eye-slash text-gray-300 cursor-pointer text-sm w-6 text-center" id="togglePwd1" onclick="togglePassword('pwdInput', 'togglePwd1')"></i>
                </div>
                <!-- 确认新密码 -->
                <div class="login-input">
                    <i class="fas fa-lock icon"></i>
                    <input type="password" placeholder="请再次输入新密码" id="pwdConfirmInput" />
                    <i class="fas fa-eye-slash text-gray-300 cursor-pointer text-sm w-6 text-center" id="togglePwd2" onclick="togglePassword('pwdConfirmInput', 'togglePwd2')"></i>
                </div>
                <div class="text-[11px] text-gray-400 mt-2 ml-1">最少8位数，密码须包含大小写字母+数字组合</div>
            </div>
        </div>


        <!-- 提交按钮 -->
        <div class="mt-6 pb-4">
            <button onclick="submitChange()" id="submitBtn"
                class="login-btn w-full h-11 rounded-xl text-white font-semibold text-[15px] shadow-glow transition-all active:scale-[0.98]"
                style="background:linear-gradient(135deg,#11A64A 0%,#0D8A3C 100%);">
                确认修改
            </button>
        </div>
    </div>
    
    <div id="toastTip" class="toast-tip"></div>
</div>

<script>
    var changePasswordCaptureState = new URLSearchParams(window.location.search).get('captureState') || '';

    document.getElementById('statusBar').innerHTML = renderStatusBar();
    document.getElementById('navBar').innerHTML = renderHeader('修改登录密码', 'account-security.html');

    // 密码显示/隐藏切换
    function togglePassword(inputId, iconId) {
        var inp = document.getElementById(inputId);
        var icon = document.getElementById(iconId);
        var isText = inp.type === 'text';
        inp.type = isText ? 'password' : 'text';
        icon.classList.toggle('fa-eye', !isText);
        icon.classList.toggle('fa-eye-slash', isText);
    }
    
    // 获取验证码
    function getSmsCode() {
        var btn = document.getElementById('smsBtn');
        var sec = 60;
        btn.disabled = true;
        btn.style.opacity = '0.5';
        btn.textContent = sec + 's';
        showToast('验证码已发送');
        var timer = setInterval(function() {
            sec--;
            btn.textContent = sec + 's';
            if (sec <= 0) {
                clearInterval(timer);
                btn.disabled = false;
                btn.style.opacity = '1';
                btn.textContent = '获取验证码';
            }
        }, 1000);
    }

    function showToast(msg) {
        var tip = document.getElementById('toastTip');
        tip.textContent = msg;
        tip.classList.add('show');
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(function() {
            tip.classList.remove('show');
        }, 2000);
    }
    
    function submitChange() {
        var code = document.getElementById('smsInput').value.trim();
        var pwd = document.getElementById('pwdInput').value.trim();
        var pwdConfirm = document.getElementById('pwdConfirmInput').value.trim();
        
        if(!code || code.length < 4) {
            showToast('请输入有效的验证码');
            return;
        }
        if(!pwd || pwd.length < 6) {
            showToast('密码长度不能少于6位');
            return;
        }
        if(pwd !== pwdConfirm) {
            showToast('两次输入的密码不一致');
            return;
        }
        
        showToast('修改成功，请重新登录！');
        setTimeout(() => {
            if (changePasswordCaptureState === 'success') {
                return;
            }
            window.location.href = 'login.html';
        }, 1500);
    }

    function applyCaptureState() {
        if (!changePasswordCaptureState) return;

        if (changePasswordCaptureState === 'error') {
            document.getElementById('smsInput').value = '12';
            document.getElementById('pwdInput').value = '123456';
            document.getElementById('pwdConfirmInput').value = '123456';
            submitChange();
            return;
        }

        if (changePasswordCaptureState === 'success') {
            document.getElementById('smsInput').value = '123456';
            document.getElementById('pwdInput').value = '123456';
            document.getElementById('pwdConfirmInput').value = '123456';
            submitChange();
        }
    }

    setTimeout(applyCaptureState, 120);
</script>
</body>
</html>
