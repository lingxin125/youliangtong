<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>丰收云 - 开单配置</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="shared.js"></script>
    <style>
        .page-bg { background:#F7F8FA; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
        .content { flex:1; overflow-y:auto; padding:14px 16px 124px; }
        .section-title { display:flex; align-items:center; gap:7px; margin:14px 0 9px; font-size:15px; font-weight:800; color:#111827; }
        .section-title::before { content:''; width:4px; height:15px; border-radius:999px; background:#11A64A; }
        .section-sub { margin:-4px 0 9px 11px; color:#94A3B8; font-size:12px; line-height:1.45; }
        .template-card { margin-bottom:12px; padding:14px; border-radius:16px; background:#fff; border:1px solid rgba(15,23,42,.05); box-shadow:0 4px 14px rgba(15,23,42,.035); }
        .template-card.active { border-color:rgba(17,166,74,.26); background:linear-gradient(180deg,#FFFFFF 0%,#F6FCF8 100%); }
        .template-top { display:flex; align-items:flex-start; gap:11px; }
        .template-icon { width:42px; height:42px; flex:none; border-radius:14px; display:flex; align-items:center; justify-content:center; background:#EBF7F0; color:#11A64A; font-size:17px; font-weight:900; }
        .template-icon.quick,
        .template-icon.custom { background:#EBF7F0; color:#11A64A; }
        .template-main { flex:1; min-width:0; }
        .title-row { display:flex; align-items:center; gap:8px; min-width:0; }
        .template-name { color:#111827; font-size:16px; font-weight:800; line-height:1.25; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .template-desc { margin-top:6px; color:#64748B; font-size:12.5px; line-height:1.5; }
        .button-row { display:flex; gap:8px; justify-content:flex-end; margin-top:12px; flex-wrap:wrap; }
        .btn { height:34px; min-width:62px; padding:0 12px; display:inline-flex; align-items:center; justify-content:center; border-radius:11px; border:0; font-size:13px; font-weight:750; white-space:nowrap; }
        .btn.primary { background:#11A64A; color:#fff; box-shadow:0 8px 16px rgba(17,166,74,.16); }
        .btn.soft { background:#F1F5F9; color:#475569; }
        .btn.green-soft { background:#F0FDF4; color:#0F8A3D; border:1px solid rgba(17,166,74,.16); }
        .btn.danger-soft { background:#FEF2F2; color:#DC2626; }
        .empty-card { padding:24px 18px; border-radius:16px; background:#fff; border:1px dashed #DDE5ED; text-align:center; }
        .empty-icon { width:44px; height:44px; margin:0 auto 10px; border-radius:16px; display:flex; align-items:center; justify-content:center; background:#EBF7F0; color:#11A64A; font-size:18px; }
        .bottom-bar { position:absolute; left:0; right:0; bottom:0; padding:10px 16px calc(12px + env(safe-area-inset-bottom)); background:rgba(247,248,250,.96); border-top:1px solid rgba(226,232,240,.9); backdrop-filter:blur(10px); }
        .bottom-add { width:100%; height:46px; border-radius:15px; background:#11A64A; color:#fff; display:flex; align-items:center; justify-content:center; gap:8px; font-size:15px; font-weight:800; box-shadow:0 10px 20px rgba(17,166,74,.18); }
        .toast { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); z-index:600; padding:10px 18px; border-radius:14px; color:#fff; background:rgba(0,0,0,.76); font-size:13px; opacity:0; pointer-events:none; transition:.22s; white-space:nowrap; }
        .toast.show { opacity:1; }
        .sheet-mask { position:absolute; inset:0; z-index:700; background:rgba(15,23,42,.42); opacity:0; pointer-events:none; transition:.22s; }
        .sheet-mask.show { opacity:1; pointer-events:auto; }
        .confirm-sheet { position:absolute; left:0; right:0; bottom:0; z-index:710; padding:14px 16px calc(14px + env(safe-area-inset-bottom)); border-radius:20px 20px 0 0; background:#fff; transform:translateY(105%); transition:.24s; box-shadow:0 -12px 30px rgba(15,23,42,.16); }
        .confirm-sheet.show { transform:translateY(0); }
        .sheet-handle { width:38px; height:4px; border-radius:999px; background:#E5E7EB; margin:0 auto 14px; }
        .sheet-title { color:#111827; font-size:17px; font-weight:850; text-align:center; }
        .sheet-desc { margin-top:8px; color:#64748B; font-size:13px; line-height:1.5; text-align:center; }
        .sheet-actions { display:flex; gap:10px; margin-top:18px; }
        .sheet-btn { flex:1; height:46px; border-radius:15px; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:800; }
        .sheet-btn.cancel { background:#F8FAFC; color:#475569; border:1px solid #E5E7EB; }
        .sheet-btn.danger { background:#DC2626; color:#fff; box-shadow:0 10px 20px rgba(220,38,38,.16); }
    </style>
</head>
<body>
<div class="mobile-container">
    <div id="statusBar"></div>
    <div id="navBar"></div>

    <div class="page-bg">
        <main class="content no-scrollbar">
            <div class="section-title">内置开单模板</div>
            <div class="section-sub">系统预设的常用开单方式</div>
            <section id="builtInSceneList"></section>

            <div class="section-title mt-5">自定义开单模板</div>
            <!-- <div class="section-sub">按实际开单习惯维护字段和规则，可编辑、启用或删除。</div> -->
            <section id="customSceneList"></section>
        </main>
        <div id="bottomBar" class="bottom-bar">
            <button type="button" class="bottom-add" onclick="goCreate()">
                <i class="fas fa-plus"></i>
                <span>新增自定义模板</span>
            </button>
        </div>
    </div>

    <div id="toastTip" class="toast"></div>
    <div id="deleteMask" class="sheet-mask" onclick="closeDeleteSheet()"></div>
    <div id="deleteSheet" class="confirm-sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-title">删除自定义模板</div>
        <div id="deleteSheetDesc" class="sheet-desc">删除后不可恢复，已启用模板删除后将回到标准称重收购。</div>
        <div class="sheet-actions">
            <button type="button" class="sheet-btn cancel" onclick="closeDeleteSheet()">取消</button>
            <button type="button" class="sheet-btn danger" onclick="confirmDeleteScene()">删除</button>
        </div>
    </div>
</div>

<script>
document.getElementById('statusBar').innerHTML = renderStatusBar();
document.getElementById('navBar').innerHTML = renderHeader('开单配置', 'buyer-my.html');
var pendingDeleteSceneId = '';

function showToast(msg) {
    var tip = document.getElementById('toastTip');
    tip.textContent = msg;
    tip.classList.add('show');
    clearTimeout(showToast.timer);
    showToast.timer = setTimeout(function () { tip.classList.remove('show'); }, 1600);
}

function canManageBillingConfig() {
    if (typeof TeamMockStore === 'undefined') return true;
    if (!TeamMockStore.getCurrentRole || !TeamMockStore.getRoleInfo) return true;
    var role = TeamMockStore.getCurrentRole();
    var info = TeamMockStore.getRoleInfo(role);
    return !!(info && info.canManage);
}

function getStore() {
    return window.BillingSceneConfigStore;
}

function escapeHtml(value) {
    return String(value || '').replace(/[&<>"']/g, function (ch) {
        return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[ch];
    });
}

function getSceneDesc(scene) {
    if (scene.desc) return scene.desc;
    return scene.mode === 'quick' ? '适合水果、蔬菜等快速收购，只填总重量和价格。' : '适合粮食等需要毛重、皮重、净重的标准收购。';
}

function getIconHtml(scene) {
    if (!scene.builtIn) return '<i class="fas fa-file-pen"></i>';
    if (scene.id === 'quick' || scene.mode === 'quick') return '<i class="fas fa-bolt"></i>';
    return '<i class="fas fa-weight-scale"></i>';
}

function getIconClass(scene) {
    if (!scene.builtIn) return 'custom';
    return scene.id === 'quick' ? 'quick' : '';
}

function stopEvent(event) {
    if (event && event.stopPropagation) event.stopPropagation();
}

function goDetail(id) {
    window.location.href = 'buyer-billing-config-detail.html?id=' + encodeURIComponent(id);
}

function goEdit(id) {
    window.location.href = 'buyer-billing-config-edit.html?id=' + encodeURIComponent(id);
}

function goCreate() {
    window.location.href = 'buyer-billing-config-edit.html';
}

function setActiveScene(id, event) {
    stopEvent(event);
    getStore().setActive(id);
    renderPage();
    showToast('已启用');
}

function deleteScene(id, event) {
    stopEvent(event);
    openDeleteSheet(id);
}

function openDeleteSheet(id) {
    var state = getStore().read();
    var target = state.scenes.find(function (item) { return item.id === id; });
    if (!target || target.builtIn) return;
    pendingDeleteSceneId = id;
    document.getElementById('deleteSheetDesc').textContent = '确认删除「' + (target.name || '未命名模板') + '」？删除后不可恢复。';
    document.getElementById('deleteMask').classList.add('show');
    document.getElementById('deleteSheet').classList.add('show');
}

function closeDeleteSheet() {
    pendingDeleteSceneId = '';
    document.getElementById('deleteMask').classList.remove('show');
    document.getElementById('deleteSheet').classList.remove('show');
}

function confirmDeleteScene() {
    if (!pendingDeleteSceneId) return;
    var id = pendingDeleteSceneId;
    closeDeleteSheet();
    getStore().deleteScene(id);
    renderPage();
    showToast('已删除');
}

function renderActions(scene, active) {
    var html = scene.builtIn
        ? '<button type="button" class="btn soft" onclick="stopEvent(event);goDetail(\'' + scene.id + '\')">查看</button>'
        : '';
    if (!scene.builtIn) {
        html += '<button type="button" class="btn soft" onclick="stopEvent(event);goEdit(\'' + scene.id + '\')">编辑</button>';
    }
    if (active) {
        html += '<button type="button" class="btn green-soft" onclick="stopEvent(event)">已启用</button>';
    } else {
        html += '<button type="button" class="btn primary" onclick="setActiveScene(\'' + scene.id + '\', event)">启用</button>';
    }
    if (!scene.builtIn) {
        html += '<button type="button" class="btn danger-soft" onclick="deleteScene(\'' + scene.id + '\', event)">删除</button>';
    }
    return html;
}

function renderSceneCard(scene, activeId) {
    var active = scene.id === activeId;
    return '<article class="template-card ' + (active ? 'active' : '') + '"' + (scene.builtIn ? ' onclick="goDetail(\'' + scene.id + '\')"' : '') + '>'
        + '<div class="template-top">'
        + '<div class="template-icon ' + getIconClass(scene) + '">' + getIconHtml(scene) + '</div>'
        + '<div class="template-main">'
        + '<div class="title-row">'
        + '<div class="template-name">' + escapeHtml(scene.name || '未命名模板') + '</div>'
        + '</div>'
        + '<div class="template-desc">' + escapeHtml(getSceneDesc(scene)) + '</div>'
        + '</div>'
        + '</div>'
        + '<div class="button-row">' + renderActions(scene, active) + '</div>'
        + '</article>';
}

function renderEmptyCustom() {
    return '<div class="empty-card">'
        + '<div class="empty-icon"><i class="fas fa-file-circle-plus"></i></div>'
        + '<div class="text-[14px] font-bold text-gray-800">暂无自定义配置</div>'
        + '<div class="text-[12px] text-gray-400 mt-1">可新增后维护开单字段和规则。</div>'
        + '</div>';
}

function renderPage() {
    var state = getStore().read();
    var builtInScenes = state.scenes.filter(function (item) { return item.builtIn; });
    var customScenes = state.scenes.filter(function (item) { return !item.builtIn; });
    document.getElementById('builtInSceneList').innerHTML = builtInScenes.map(function (item) {
        return renderSceneCard(item, state.activeSceneId);
    }).join('');
    document.getElementById('customSceneList').innerHTML = customScenes.length
        ? customScenes.map(function (item) { return renderSceneCard(item, state.activeSceneId); }).join('')
        : renderEmptyCustom();
}

if (!canManageBillingConfig()) {
    document.querySelector('.content').innerHTML = '<div class="template-card text-center mt-6 py-8"><div class="text-[16px] font-bold text-gray-900">暂无配置权限</div><div class="text-[12px] text-gray-400 mt-2">开单配置由超管统一维护。</div></div>';
    document.getElementById('bottomBar').style.display = 'none';
} else {
    renderPage();
}
</script>
</body>
</html>
