<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>丰收云 - 确认付款</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="shared.js"></script>
    <style>
        body { background-color: #F7F8FA; }

        .billing-sheet-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .billing-sheet-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        .billing-sheet {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 210;
            background: #FFFFFF;
            border-radius: 24px 24px 0 0;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 80%;
            overflow-y: auto;
        }
        .billing-sheet.show {
            transform: translateY(0);
        }
        .billing-sheet-handle {
            width: 40px;
            height: 4px;
            background: #D1D5DB;
            border-radius: 2px;
            margin: 12px auto;
        }
        .toast-tip {
            position: absolute;
            left: 16px;
            right: 16px;
            bottom: 36px;
            padding: 11px 14px;
            background: rgba(17, 24, 39, 0.9);
            border-radius: 11px;
            color: #fff;
            font-size: 12px;
            line-height: 1.45;
            z-index: 300;
            opacity: 0;
            pointer-events: none;
            transform: translateY(8px);
            transition: all 0.2s ease;
        }
        .toast-tip.show {
            opacity: 1;
            transform: translateY(0);
        }
        .client-item,
        .payment-account-item,
        .remark-item,
        .action-card {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .client-item:active,
        .payment-account-item:active,
        .remark-item:active,
        .action-card:active {
            transform: scale(0.98);
        }
        .client-item.selected,
        .payment-account-item.selected,
        .remark-item.selected {
            border-color: rgba(17, 166, 74, 0.35);
            box-shadow: 0 4px 12px rgba(17, 166, 74, 0.12), 0 2px 4px rgba(0, 0, 0, 0.04);
            background: rgba(240, 253, 244, 0.65);
        }
        .amount-text {
            font-family: Poppins, sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: #11A64A;
            line-height: 1.1;
            letter-spacing: -0.02em;
        }
        .remark-display {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            word-break: break-all;
        }
    </style>
</head>
<body>
<div class="mobile-container">
    <div id="statusBar"></div>
    <div id="navBar"></div>

    <div id="mainContent" class="flex-1 overflow-y-auto no-scrollbar px-4 pt-3" style="padding-bottom:120px;">
        <div class="glass-panel rounded-2xl p-5 text-center mt-2">
            <div class="text-[11px] text-gray-400 mb-2">应付金额</div>
            <div id="amountText" class="amount-text">¥38,500.00</div>
        </div>

        <div class="glass-card rounded-2xl p-4 mt-3 cursor-pointer" onclick="openRemarkSheet()">
            <div class="flex items-center gap-3">
                <div class="text-[13px] text-gray-500 shrink-0">付款附言</div>
                <div class="flex-1 min-w-0 text-right">
                    <div id="remarkSelectedText" class="remark-display text-[13px] text-gray-800">--</div>
                </div>
                <i class="fas fa-chevron-right text-gray-300 text-xs shrink-0"></i>
            </div>
        </div>

        <div class="mt-4 space-y-3">
            <div class="action-card glass-card rounded-2xl p-4 flex items-center gap-4 cursor-pointer" onclick="goDirectPay()">
                <div class="w-11 h-11 rounded-2xl bg-green-100 flex items-center justify-center shrink-0">
                    <i class="fas fa-wallet text-primary text-base"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <div class="text-[15px] font-semibold text-gray-800">直接付款</div>
                    <div class="text-[12px] text-gray-400 mt-0.5">默认使用付款账户，进入收银台付款</div>
                </div>
                <i class="fas fa-chevron-right text-gray-300 text-sm"></i>
            </div>

            <div class="action-card glass-card rounded-2xl p-4 flex items-center gap-4 cursor-pointer" onclick="openClientSheet()">
                <div class="w-11 h-11 rounded-2xl bg-blue-100 flex items-center justify-center shrink-0">
                    <i class="fas fa-user-tie text-blue-500 text-base"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <div class="text-[15px] font-semibold text-gray-800">选择客户代付</div>
                    <div class="text-[12px] text-gray-400 mt-0.5">同步订单给客户，由客户代为付款</div>
                </div>
                <i class="fas fa-chevron-right text-gray-300 text-sm"></i>
            </div>
        </div>
    </div>

    <div id="errorContent" class="flex-1 overflow-y-auto no-scrollbar p-4" style="display:none;">
        <div class="glass-panel rounded-2xl p-8 text-center mt-8">
            <div class="w-14 h-14 rounded-full bg-red-50 flex items-center justify-center mx-auto mb-3">
                <i class="fas fa-circle-exclamation text-red-400 text-2xl"></i>
            </div>
            <div class="text-[15px] font-semibold text-gray-700 mb-1">订单未找到</div>
            <div class="text-[12px] text-gray-400 mb-4">该订单可能已被删除或参数有误</div>
            <a href="buyer-home.html" class="inline-block px-6 py-2.5 bg-primary text-white text-sm font-medium rounded-xl no-underline" style="text-decoration:none;">返回首页</a>
        </div>
    </div>

    <div class="billing-sheet-overlay" id="paymentAccountSheetOverlay" onclick="closePaymentAccountSheet()"></div>
    <div class="billing-sheet" id="paymentAccountSheet">
        <div class="billing-sheet-handle"></div>
        <div class="px-4 pb-2 flex items-center justify-between">
            <div>
                <div class="text-[16px] font-bold text-gray-800">选择付款银行卡</div>
                <div class="text-[12px] text-gray-400 mt-1">请选择本次订单使用的付款账户</div>
            </div>
            <button class="w-8 h-8 flex items-center justify-center text-gray-400" onclick="closePaymentAccountSheet()">
                <i class="fas fa-xmark text-lg"></i>
            </button>
        </div>
        <div id="paymentAccountListContainer" class="px-4 space-y-2.5 overflow-y-auto" style="max-height:360px;padding-bottom:90px;"></div>
        <div id="noPaymentAccountTip" class="px-4 py-8 text-center" style="display:none;">
            <div class="w-12 h-12 rounded-full bg-gray-100 flex items-center justify-center mx-auto mb-2">
                <i class="fas fa-credit-card text-gray-300 text-lg"></i>
            </div>
            <div class="text-sm text-gray-500 mb-1">暂无付款账户</div>
            <a href="account-security.html?source=buyer-my.html" class="text-[12px] text-primary font-medium no-underline" style="text-decoration:none;">前往账户管理 <i class="fas fa-arrow-right text-[10px]"></i></a>
        </div>
        <div class="absolute bottom-0 left-0 right-0 px-4 py-4 bg-gradient-to-t from-white via-white to-transparent">
            <button id="confirmPaymentAccountBtn" class="w-full py-3 bg-primary text-white rounded-2xl text-sm font-medium active:scale-95 transition-transform" onclick="confirmSelfPayAccount()">确认付款</button>
        </div>
    </div>

    <div class="billing-sheet-overlay" id="remarkSheetOverlay" onclick="closeRemarkSheet()"></div>
    <div class="billing-sheet" id="remarkSheet">
        <div class="billing-sheet-handle"></div>
        <div class="px-4 pb-2 flex items-center justify-between">
            <span class="text-[16px] font-bold text-gray-800">选择附言</span>
            <button class="w-8 h-8 flex items-center justify-center text-gray-400" onclick="closeRemarkSheet()">
                <i class="fas fa-xmark text-lg"></i>
            </button>
        </div>
        <div id="remarkListContainer" class="px-4 space-y-2.5 overflow-y-auto" style="max-height:380px;padding-bottom:16px;"></div>
        <div id="noRemarkTip" class="px-4 py-8 text-center" style="display:none;">
            <div class="w-12 h-12 rounded-full bg-gray-100 flex items-center justify-center mx-auto mb-2">
                <i class="fas fa-comment-slash text-gray-300 text-lg"></i>
            </div>
            <div class="text-sm text-gray-500">暂无可用附言</div>
        </div>
    </div>

    <div class="billing-sheet-overlay" id="clientSheetOverlay" onclick="closeClientSheet()"></div>
    <div class="billing-sheet" id="clientSheet">
        <div class="billing-sheet-handle"></div>
        <div class="px-4 pb-2 flex items-center justify-between">
            <span class="text-[16px] font-bold text-gray-800">选择客户</span>
            <button class="w-8 h-8 flex items-center justify-center text-gray-400" onclick="closeClientSheet()">
                <i class="fas fa-xmark text-lg"></i>
            </button>
        </div>
        <div class="px-4 pb-3">
            <div class="glass-card rounded-xl px-3.5 py-2.5 flex items-center gap-2.5 border border-gray-100">
                <i class="fas fa-search text-gray-400 text-sm"></i>
                <input id="clientSearchInput" type="text" placeholder="搜索客户" class="flex-1 bg-transparent text-sm text-gray-700 outline-none placeholder-gray-400" oninput="renderClientList()">
            </div>
        </div>
        <div id="clientListContainer" class="px-4 space-y-2.5 overflow-y-auto" style="max-height:340px;padding-bottom:90px;"></div>
        <div id="noClientTip" class="px-4 py-8 text-center" style="display:none;">
            <div class="w-12 h-12 rounded-full bg-gray-100 flex items-center justify-center mx-auto mb-2">
                <i class="fas fa-user-slash text-gray-300 text-lg"></i>
            </div>
            <div class="text-sm text-gray-500 mb-1">请先添加客户</div>
            <a href="buyer-clients.html" class="text-[12px] text-primary font-medium no-underline" style="text-decoration:none;">前往添加 <i class="fas fa-arrow-right text-[10px]"></i></a>
        </div>
        <div class="absolute bottom-0 left-0 right-0 px-4 py-4 bg-gradient-to-t from-white via-white to-transparent">
            <button id="confirmClientBtn" class="w-full py-3 bg-primary text-white rounded-2xl text-sm font-medium active:scale-95 transition-transform" onclick="confirmClient()">确认选择</button>
        </div>
    </div>

    <div id="toastTip" class="toast-tip"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const orderNo = params.get('orderNo');
const mockStore = window.BuyerMockStore || null;
const clientStore = window.ClientMockStore || null;
const remarkStore = window.RemarkMockStore || null;
const payerProfile = (mockStore && typeof mockStore.getPayer === 'function')
    ? mockStore.getPayer()
    : { name: '张老板', org: '默认收购站' };

document.getElementById('statusBar').innerHTML = renderStatusBar();
document.getElementById('navBar').innerHTML = renderHeader('确认付款', 'buyer-home.html');

let order = null;
let selectedClientId = null;
let selectedPaymentAccountId = null;
let selectedRemarkId = '';
let selectedRemark = null;
let allRemarks = [];
let paymentAccounts = [];

if (orderNo && mockStore && typeof mockStore.findOrderById === 'function') {
    order = mockStore.findOrderById(orderNo);
}

if (!order) {
    document.getElementById('mainContent').style.display = 'none';
    document.getElementById('errorContent').style.display = '';
} else {
    initPage();
}

function initPage() {
    allRemarks = (remarkStore && typeof remarkStore.getRemarks === 'function') ? remarkStore.getRemarks() : [];
    selectedRemark = (remarkStore && typeof remarkStore.getDefaultRemark === 'function') ? remarkStore.getDefaultRemark() : null;
    if (!selectedRemark && allRemarks.length > 0) selectedRemark = allRemarks[0];
    selectedRemarkId = selectedRemark ? selectedRemark.id : '';
    paymentAccounts = loadPaymentAccounts();
    renderOrderInfo();
    renderRemarkDisplay();
    renderRemarkList();
}

function formatMoney(amount) {
    return '¥' + Number(amount || 0).toLocaleString('zh-CN', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
    });
}

function formatWeight(weight, unit) {
    const qty = Number(weight || 0);
    if (!qty) return '--';
    return qty.toLocaleString('zh-CN') + (unit || '斤');
}

function escapeHtml(str) {
    return String(str == null ? '' : str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function escapeJs(str) {
    return String(str == null ? '' : str)
        .replace(/\\/g, '\\\\')
        .replace(/'/g, "\\'")
        .replace(/\n/g, '\\n')
        .replace(/\r/g, '');
}

function maskCardNo(cardNo) {
    const clean = String(cardNo || '').replace(/\s+/g, '');
    if (!clean) return '--';
    if (clean.length <= 4) return clean;
    return clean.slice(0, 4) + ' **** **** ' + clean.slice(-4);
}

function cardTail(cardNo) {
    const clean = String(cardNo || '').replace(/\D/g, '');
    return clean ? '尾号 ' + clean.slice(-4) : '';
}

function loadPaymentAccounts() {
    const seedAccounts = [
        { id: 'buyer-1', bank: '中国邮政储蓄银行', branch: '烟台市芝罘区支行', cardNo: '6221888800002233', holder: '张三的粮站', isDefault: true },
        { id: 'buyer-2', bank: '中国农业银行', branch: '烟台市开发区支行', cardNo: '6228480100098012', holder: '张三的粮站', isDefault: false }
    ];
    try {
        const stored = localStorage.getItem('ylt_buyer_payment_accounts');
        const parsed = stored ? JSON.parse(stored) : null;
        if (Array.isArray(parsed) && parsed.length) return parsed;
    } catch (e) {}
    return seedAccounts;
}

function getDisplayCategory() {
    const primary = order.categoryPrimary || order.category || '';
    if (primary === '粮油') return '粮食';
    return primary || '粮食';
}

function getDisplayProductName() {
    const firstItem = (order.items && order.items[0]) ? order.items[0] : null;
    return order.categorySecondary || order.productName || (firstItem && firstItem.name) || '--';
}

function getDisplayWeight() {
    const firstItem = (order.items && order.items[0]) ? order.items[0] : null;
    return formatWeight(order.netWeight || (firstItem && firstItem.qty) || 0, order.unit || (firstItem && firstItem.unit) || '斤');
}

function getRemarkRenderOrder() {
    const firstItem = (order.items && order.items[0]) ? order.items[0] : null;
    return Object.assign({}, order, {
        productName: order.productName || (firstItem && firstItem.name) || '',
        netWeight: order.netWeight || (firstItem && firstItem.qty) || 0,
        unit: order.unit || (firstItem && firstItem.unit) || '斤',
        amount: Number(order.amount || 0),
        payeeName: order.payeeName || '',
        clientName: order.clientName || ''
    });
}

function getSelectedRemarkText(payerName) {
    if (!selectedRemark || !remarkStore || typeof remarkStore.renderRemarkText !== 'function') return '';
    return remarkStore.renderRemarkText(selectedRemark, getRemarkRenderOrder(), payerName || payerProfile.name || '');
}

function renderOrderInfo() {
    document.getElementById('amountText').textContent = formatMoney(order.amount);
}

function renderRemarkDisplay() {
    const text = getSelectedRemarkText(payerProfile.name);
    document.getElementById('remarkSelectedText').textContent = text || '请选择付款附言';
    document.getElementById('remarkSelectedText').className = 'remark-display text-[13px] ' + (text ? 'text-gray-800' : 'text-gray-400');
}

function renderRemarkList() {
    const container = document.getElementById('remarkListContainer');
    const noTip = document.getElementById('noRemarkTip');
    if (!allRemarks.length) {
        container.innerHTML = '';
        noTip.style.display = '';
        return;
    }
    noTip.style.display = 'none';
    container.innerHTML = allRemarks.map(function (remark) {
        const selected = remark.id === selectedRemarkId;
        const preview = remarkStore && typeof remarkStore.renderRemarkText === 'function'
            ? remarkStore.renderRemarkText(remark, getRemarkRenderOrder(), payerProfile.name || '')
            : (remark.template || '');
        return '<div class="remark-item glass-card rounded-2xl p-4 flex items-start gap-3 cursor-pointer ' + (selected ? 'selected' : '') + '" onclick="pickRemark(\'' + escapeHtml(remark.id) + '\')">'
            + '<div class="w-10 h-10 rounded-2xl bg-green-50 flex items-center justify-center shrink-0 border border-green-100/70">'
            + '<i class="fas fa-comment-dots text-primary text-sm"></i>'
            + '</div>'
            + '<div class="flex-1 min-w-0">'
            + '<div class="text-[14px] font-semibold text-gray-800">' + escapeHtml(remark.name || '未命名附言') + '</div>'
            + '<div class="text-[12px] text-gray-500 mt-1 leading-relaxed">' + escapeHtml(preview || '-') + '</div>'
            + '</div>'
            + (selected ? '<i class="fas fa-check-circle text-primary text-lg shrink-0 mt-1"></i>' : '<i class="far fa-circle text-gray-200 text-lg shrink-0 mt-1"></i>')
            + '</div>';
    }).join('');
}

function openRemarkSheet() {
    document.getElementById('remarkSheetOverlay').classList.add('show');
    document.getElementById('remarkSheet').classList.add('show');
}

function closeRemarkSheet() {
    document.getElementById('remarkSheetOverlay').classList.remove('show');
    document.getElementById('remarkSheet').classList.remove('show');
}

function pickRemark(id) {
    const found = allRemarks.find(function (item) { return item.id === id; });
    if (!found) return;
    selectedRemarkId = found.id;
    selectedRemark = found;
    renderRemarkDisplay();
    renderRemarkList();
    closeRemarkSheet();
}

function openPaymentAccountSheet() {
    paymentAccounts = loadPaymentAccounts();
    const defaultAccount = paymentAccounts.find(function (item) { return item.isDefault; }) || paymentAccounts[0] || null;
    selectedPaymentAccountId = defaultAccount ? defaultAccount.id : null;
    renderPaymentAccountList();
    document.getElementById('paymentAccountSheetOverlay').classList.add('show');
    document.getElementById('paymentAccountSheet').classList.add('show');
}

function closePaymentAccountSheet() {
    document.getElementById('paymentAccountSheetOverlay').classList.remove('show');
    document.getElementById('paymentAccountSheet').classList.remove('show');
}

function goDirectPay() {
    paymentAccounts = loadPaymentAccounts();
    const defaultAccount = paymentAccounts.find(function (item) { return item.isDefault; }) || paymentAccounts[0] || null;
    if (!defaultAccount) {
        showToast('暂无默认付款账户，请先前往账户管理添加');
        return;
    }
    selectedPaymentAccountId = defaultAccount.id;
    goSelfPay(defaultAccount);
}

function renderPaymentAccountList() {
    const container = document.getElementById('paymentAccountListContainer');
    const noTip = document.getElementById('noPaymentAccountTip');
    const confirmBtn = document.getElementById('confirmPaymentAccountBtn');
    if (!paymentAccounts.length) {
        container.innerHTML = '';
        noTip.style.display = '';
        confirmBtn.style.display = 'none';
        return;
    }
    noTip.style.display = 'none';
    confirmBtn.style.display = '';
    container.innerHTML = paymentAccounts.map(function (account) {
        const selected = account.id === selectedPaymentAccountId;
        const isDefault = !!account.isDefault;
        return '<div class="payment-account-item glass-card rounded-2xl p-4 cursor-pointer border border-gray-100 ' + (selected ? 'selected' : '') + '" onclick="pickPaymentAccount(\'' + escapeJs(account.id) + '\')">'
            + '<div class="flex items-center gap-3">'
            + '<div class="w-11 h-11 rounded-2xl bg-green-50 flex items-center justify-center shrink-0 border border-green-100/70">'
            + '<i class="fas fa-credit-card text-primary text-base"></i>'
            + '</div>'
            + '<div class="flex-1 min-w-0">'
            + '<div class="flex items-center gap-2">'
            + '<span class="text-[15px] font-semibold text-gray-800 truncate">' + escapeHtml(account.bank || '--') + '</span>'
            + (isDefault ? '<span class="shrink-0 text-[10px] px-2 py-0.5 rounded-full bg-green-50 text-primary border border-green-100/70">默认</span>' : '')
            + '</div>'
            + '<div class="text-[13px] text-gray-500 mt-1 font-medium" style="font-family:Poppins,monospace;">' + escapeHtml(maskCardNo(account.cardNo)) + '</div>'
            + '</div>'
            + (selected ? '<i class="fas fa-check-circle text-primary text-lg shrink-0"></i>' : '<i class="far fa-circle text-gray-200 text-lg shrink-0"></i>')
            + '</div>'
            + '</div>';
    }).join('');
}

function pickPaymentAccount(id) {
    selectedPaymentAccountId = id;
    renderPaymentAccountList();
}

function confirmSelfPayAccount() {
    if (!selectedPaymentAccountId) {
        showToast('请选择付款银行卡');
        return;
    }
    const account = paymentAccounts.find(function (item) { return item.id === selectedPaymentAccountId; });
    if (!account) {
        showToast('付款账户信息异常');
        return;
    }
    goSelfPay(account);
}

function goSelfPay(account) {
    const payerName = account && account.holder ? account.holder : payerProfile.name;
    const renderedRemark = getSelectedRemarkText(payerName);
    if (mockStore && typeof mockStore.upsertOrder === 'function') {
        mockStore.upsertOrder(Object.assign({}, order, {
            status: 'pending',
            payMethod: 'industry',
            paymentOrderNo: order.paymentOrderNo || ('ZF' + String(Date.now()).slice(-10) + String(order.id || '').slice(-4)),
            bankFlowNo: order.bankFlowNo || ('YH' + String(Date.now()).slice(-10) + String(order.id || '').slice(-4)),
            remark: renderedRemark,
            priceMode: order.priceMode || 'unit',
            payerName: payerName,
            payerOrg: payerProfile.org || '',
            payerBank: account ? account.bank : '',
            payerCard: account ? cardTail(account.cardNo) : ''
        }));
    }
    const p = new URLSearchParams({
        source: 'billing',
        orderNo: order.id,
        grainOrderNo: order.id,
        status: 'pending',
        amount: Number(order.amount || 0).toFixed(2),
        payeeName: order.payeeName || '',
        payeeMobile: order.payeeMobile || '',
        payeeBank: order.payeeBank || '',
        payeeCard: order.payeeCard || '',
        summary: order.summary || '',
        createdAt: order.createdAt || new Date().toISOString(),
        mode: 'detail',
        items: JSON.stringify(order.items || []),
        productName: order.productName || '',
        grossWeight: String(order.grossWeight || 0),
        tareWeight: String(order.tareWeight || 0),
        tareWeightRaw: order.tareWeightRaw !== undefined ? String(order.tareWeightRaw ?? '') : '',
        deduction: String(order.deduction || 0),
        deductRatioRaw: order.deductRatioRaw !== undefined ? String(order.deductRatioRaw ?? '') : '',
        netWeight: String(order.netWeight || 0),
        unitPrice: String(order.unitPrice || 0),
        priceMode: order.priceMode || 'unit',
        unit: order.unit || '斤',
        payerName: payerName,
        payerOrg: payerProfile.org || '',
        payerBank: account ? account.bank : '',
        payerCard: account ? cardTail(account.cardNo) : '',
        payerCardNo: account ? account.cardNo : '',
        payerBranch: account ? account.branch : '',
        remark: renderedRemark,
        photos: JSON.stringify(order.photos || [])
    });
    window.location.href = 'buyer-cashier.html?' + p.toString();
}

function openClientSheet() {
    const clients = (clientStore && typeof clientStore.getClients === 'function') ? clientStore.getClients() : [];
    if (clients.length === 0) {
        document.getElementById('clientListContainer').style.display = 'none';
        document.getElementById('noClientTip').style.display = '';
        document.getElementById('confirmClientBtn').style.display = 'none';
    } else {
        document.getElementById('clientListContainer').style.display = '';
        document.getElementById('noClientTip').style.display = 'none';
        document.getElementById('confirmClientBtn').style.display = '';
    }
    selectedClientId = null;
    document.getElementById('clientSearchInput').value = '';
    renderClientList();
    document.getElementById('clientSheetOverlay').classList.add('show');
    document.getElementById('clientSheet').classList.add('show');
}

function closeClientSheet() {
    document.getElementById('clientSheetOverlay').classList.remove('show');
    document.getElementById('clientSheet').classList.remove('show');
}

function renderClientList() {
    let clients = (clientStore && typeof clientStore.getClients === 'function') ? clientStore.getClients() : [];
    const keyword = document.getElementById('clientSearchInput').value.trim();
    if (keyword) {
        clients = clients.filter(function (c) {
            return (c.name && c.name.includes(keyword))
                || (c.mobile && c.mobile.includes(keyword))
                || (c.org && c.org.includes(keyword));
        });
    }
    const container = document.getElementById('clientListContainer');
    if (clients.length === 0 && keyword) {
        container.innerHTML = '<div class="py-6 text-center text-sm text-gray-400">未找到匹配客户</div>';
        return;
    }
    container.innerHTML = clients.map(function (c) {
        const selected = c.id === selectedClientId;
        const initial = ((c.name || '?').charAt(0));
        return '<div class="client-item glass-card rounded-2xl p-4 flex items-center gap-3.5 cursor-pointer ' + (selected ? 'selected' : '') + '" onclick="pickClient(\'' + escapeHtml(c.id) + '\')">'
            + '<div class="w-11 h-11 rounded-full bg-blue-50 flex items-center justify-center shrink-0 border border-blue-100/60 text-blue-500 font-bold text-[15px]">' + escapeHtml(initial) + '</div>'
            + '<div class="flex-1 min-w-0">'
            + '<div class="flex items-center gap-2 flex-wrap"><span class="text-[15px] font-semibold text-gray-800">' + escapeHtml(c.name || '--') + '</span></div>'
            + '<div class="text-[13px] text-gray-500 mt-0.5" style="font-family:Poppins,monospace;">' + escapeHtml(c.mobile || '') + '</div>'
            + '</div>'
            + (selected ? '<i class="fas fa-check-circle text-primary text-lg shrink-0"></i>' : '')
            + '</div>';
    }).join('');
}

function pickClient(id) {
    selectedClientId = id;
    renderClientList();
}

function confirmClient() {
    if (!selectedClientId) {
        showToast('请选择一个客户');
        return;
    }
    const client = (clientStore && typeof clientStore.findClientById === 'function')
        ? clientStore.findClientById(selectedClientId)
        : null;
    if (!client) {
        showToast('客户信息异常');
        return;
    }
    const renderedRemark = getSelectedRemarkText(client.name || payerProfile.name);
    if (mockStore && typeof mockStore.updateOrder === 'function') {
        mockStore.updateOrder(order.id, { remark: renderedRemark });
    }
    if (mockStore && typeof mockStore.transferToClient === 'function') {
        mockStore.transferToClient(order.id, client.id, client.name, client.mobile);
    }
    closeClientSheet();
    showToast('已发送给 ' + (client.name || '客户'));
    setTimeout(function () {
        window.location.href = 'buyer-order-manage.html?tab=unpaid';
    }, 1200);
}

function showToast(msg) {
    const tip = document.getElementById('toastTip');
    tip.textContent = msg;
    tip.classList.add('show');
    clearTimeout(showToast.timer);
    showToast.timer = setTimeout(function () {
        tip.classList.remove('show');
    }, 1800);
}
</script>
</body>
</html>
