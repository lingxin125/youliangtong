<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>丰收云 - 库存台账</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="shared.js"></script>
    <style>
        #statusBar,#navBar { background:#F7F8FA; }
        .search-box { height:42px; border-radius:12px; background:#fff; border:1px solid rgba(15,23,42,.05); display:flex; align-items:center; gap:8px; padding:0 12px; }
        .filter-btn { width:42px; height:42px; border-radius:12px; background:#fff; border:1px solid #E5E7EB; color:#64748B; display:flex; align-items:center; justify-content:center; box-shadow:0 1px 3px rgba(15,23,42,.03); }
        .checkline { display:flex; align-items:center; gap:8px; font-size:12px; color:#475569; font-weight:800; }
        .checkline input { width:16px; height:16px; accent-color:#11A64A; }
        .list-card { background:#fff; border:1px solid rgba(15,23,42,.05); border-radius:16px; padding:16px; box-shadow:0 2px 10px rgba(15,23,42,.02); }
        .tag { display:inline-flex; align-items:center; height:22px; padding:0 8px; border-radius:999px; font-size:11px; font-weight:700; white-space:nowrap; }
        .tag-green { background:#EAF8EF; color:#11A64A; }
        .tag-orange { background:#FEF3C7; color:#D97706; }
        .tag-blue { background:#DBEAFE; color:#2563EB; }
        .tag-gray { background:#F1F5F9; color:#64748B; }
        .info-icon { color:#CBD5E1; font-size:12px; flex-shrink:0; }
        .qty { font-family:Poppins, sans-serif; font-weight:700; letter-spacing:-.01em; }
        .field-box { border-radius:12px; background:#F8FAFC; padding:10px; min-width:0; }
        .sheet-mask { position:absolute; inset:0; background:rgba(15,23,42,.4); backdrop-filter:blur(4px); opacity:0; visibility:hidden; z-index:400; transition:.22s ease; }
        .sheet-mask.show { opacity:1; visibility:visible; }
        .sheet { position:absolute; left:0; right:0; bottom:0; max-height:84%; overflow-y:auto; background:#fff; border-radius:24px 24px 0 0; padding:10px 16px calc(20px + env(safe-area-inset-bottom)); z-index:410; transform:translateY(100%); transition:.28s cubic-bezier(.4,0,.2,1); }
        .sheet.show { transform:translateY(0); }
        .handle { width:40px; height:4px; border-radius:999px; background:#D1D5DB; margin:0 auto 14px; }
        .filter-chip { min-height:36px; padding:0 12px; border-radius:999px; background:#F1F5F9; color:#475569; font-size:12px; font-weight:700; display:inline-flex; align-items:center; }
        .filter-chip.active { background:#EAF8EF; color:#11A64A; }
    </style>
</head>
<body class="bg-[#F7F8FA]">
<div class="mobile-container relative bg-[#F7F8FA]">
    <div id="statusBar"></div>
    <div id="navBar"></div>
    <div class="flex-1 overflow-y-auto no-scrollbar px-4 pt-3 pb-8">
        <div class="flex items-center gap-2 mb-3">
            <div class="search-box flex-1 min-w-0">
                <i class="fas fa-search text-gray-400 text-sm"></i>
                <input id="q" class="flex-1 bg-transparent outline-none text-[13px]" placeholder="搜索农产品/仓库" oninput="renderLedger()">
            </div>
            <button type="button" class="filter-btn" onclick="openFilterSheet()"><i class="fas fa-filter"></i></button>
        </div>
        <div class="flex items-center justify-end mb-3 px-1">
            <span id="countText" class="text-[11px] text-gray-400"></span>
        </div>
        <div id="ledgerList" class="space-y-3"></div>
    </div>
    <div id="sheetMask" class="sheet-mask" onclick="closeSheets()"></div>
    <div id="filterSheet" class="sheet no-scrollbar">
        <div class="handle"></div>
        <div class="flex items-center justify-between mb-3">
            <div class="text-[17px] font-bold text-gray-900">筛选</div>
            <button type="button" class="w-9 h-9 rounded-full bg-gray-100 text-gray-500" onclick="closeSheets()"><i class="fas fa-times"></i></button>
        </div>
        <div id="filterBody"></div>
    </div>
</div>
<script>
document.getElementById('statusBar').innerHTML = renderStatusBar('light');
document.getElementById('navBar').innerHTML = renderHeader('库存台账', 'buyer-inventory.html');
var store = window.BuyerMockStore || {};
var state = { warehouse:'all', category:'all', type:'all' };

function escapeHtml(value){return String(value||'').replace(/[&<>"']/g,function(ch){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[ch];});}
function fmtQty(v,u){return (Number(v||0)).toLocaleString('zh-CN')+(u||'斤');}
function baseRows(){
    var stockRows = (store.getInventoryLedger?store.getInventoryLedger():[]).map(function(i){
        return { productName:i.productName, warehouseName:i.warehouseName, inventoryType:'收粮', currentQty:Number(i.currentQty||0), unit:i.unit||'斤', count:1 };
    });
    var storageMap = {};
    (store.getFarmerStorageList?store.getFarmerStorageList():[]).forEach(function(i){
        var key = i.warehouseName + '|' + i.productName;
        if(!storageMap[key]) storageMap[key] = { productName:i.productName, warehouseName:i.warehouseName, inventoryType:'存粮', currentQty:0, unit:i.unit||'斤', count:0 };
        storageMap[key].currentQty += Number(i.quantity||0);
        storageMap[key].count += 1;
    });
    return stockRows.concat(Object.keys(storageMap).map(function(key){return storageMap[key];}));
}
function filteredRows(){
    var q=(document.getElementById('q').value||'').trim().toLowerCase();
    return baseRows().filter(function(i){
        if(state.warehouse!=='all'&&i.warehouseName!==state.warehouse)return false;
        if(state.category!=='all'&&i.productName!==state.category)return false;
        if(state.type!=='all'&&i.inventoryType!==state.type)return false;
        return !q||[i.productName,i.warehouseName,i.inventoryType].join(' ').toLowerCase().indexOf(q)>=0;
    });
}
function displayRows(){
    return filteredRows();
}
function renderLedger(){
  var list=displayRows();
  document.getElementById('countText').textContent='共 '+list.length+' 条';
  document.getElementById('ledgerList').innerHTML=list.map(function(i){
    var isStorage = i.inventoryType === '存粮';
    var tagClass = isStorage ? 'tag-blue' : 'tag-gray';
    return '<article class="list-card"><div class="flex items-start justify-between gap-3"><div class="flex-1 min-w-0"><div class="flex items-center gap-1.5 min-w-0"><i class="fas fa-box info-icon"></i><div class="text-[16px] font-bold text-gray-900 truncate">'+escapeHtml(i.productName)+'</div></div><div class="text-[12px] text-gray-500 mt-0.5 truncate flex items-center gap-1.5"><i class="fas fa-warehouse info-icon text-[11px]"></i><span class="truncate text-gray-600">'+escapeHtml(i.warehouseName)+'</span></div></div><span class="tag '+tagClass+'">'+escapeHtml(i.inventoryType)+'</span></div><div class="mt-4"><div class="field-box flex items-center justify-start gap-2.5"><div class="text-[11px] text-gray-400 shrink-0">结存重量</div><div class="qty text-[20px] text-[#11A64A] truncate">'+fmtQty(i.currentQty,i.unit)+'</div></div></div></article>';
  }).join('')||'<div class="list-card text-center py-10 text-[13px] text-gray-500">暂无库存台账</div>';
}
function optionValues(key){
    var map={};
    baseRows().forEach(function(i){var v=key==='warehouseName'?i.warehouseName:key==='inventoryType'?i.inventoryType:i.productName;if(v)map[v]=true;});
    return Object.keys(map);
}
function openFilterSheet(){
    var groups=[['warehouse','仓库名称',['all'].concat(optionValues('warehouseName'))],['category','农产品种类',['all'].concat(optionValues('productName'))],['type','库存类型',['all'].concat(optionValues('inventoryType'))]];
    document.getElementById('filterBody').innerHTML=groups.map(function(group){
        return '<div class="mb-4"><div class="text-[13px] font-bold text-gray-800 mb-2">'+group[1]+'</div><div class="flex flex-wrap gap-2">'+group[2].map(function(value){var active=state[group[0]]===value;return '<button type="button" class="filter-chip '+(active?'active':'')+'" onclick="setFilter(&quot;'+group[0]+'&quot;,&quot;'+escapeHtml(value)+'&quot;)">'+escapeHtml(value==='all'?'全部':value)+'</button>';}).join('')+'</div></div>';
    }).join('')+'<button type="button" class="w-full h-11 rounded-xl bg-[#11A64A] text-white text-[14px] font-bold mt-5" onclick="closeSheets()">确定</button>';
    openSheet('filterSheet');
}
function setFilter(key,value){state[key]=value;openFilterSheet();renderLedger();}
function openSheet(id){document.getElementById('sheetMask').classList.add('show');document.getElementById(id).classList.add('show');}
function closeSheets(){document.getElementById('sheetMask').classList.remove('show');document.getElementById('filterSheet').classList.remove('show');}
renderLedger();
</script>
</body>
</html>
