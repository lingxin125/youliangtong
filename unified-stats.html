<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>丰收云 - 交易报表</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="shared.js?v=20260324"></script>
    <style>
        .kpi-card { transition: all 0.3s cubic-bezier(0.4,0,0.2,1); }
        .kpi-card:active { transform: scale(0.97); }
        .fade-enter { animation: fadeSlideIn 0.35s ease-out; }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .segment-btn {
            padding: 6px 16px; border-radius: 8px; font-size: 12px; font-weight: 500;
            background: #F3F4F6; color: #6B7280; transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
            border: 1px solid transparent; cursor: pointer; white-space: nowrap;
        }
        .segment-btn.active {
            background: #F0FDF4; color: #11A64A; border-color: #11A64A; font-weight: 700;
        }
    </style>
</head>
<body>
<div class="mobile-container" style="background:#FFFBF0;">
    <div id="statusBar"></div>
    <div id="navBar"></div>

    <!-- 主内容区 -->
    <div class="flex-1 overflow-y-auto no-scrollbar px-4 pb-4 space-y-3" style="padding-bottom:90px;">

        <!-- 时间分段器 -->
        <div class="flex items-center justify-center gap-2 mt-3">
            <button class="segment-btn active" onclick="switchTab('week')">近7天</button>
            <button class="segment-btn" onclick="switchTab('month')">本月</button>
            <button class="segment-btn" onclick="switchTab('year')">本年</button>
        </div>

        <!-- KPI 2x2 网格 -->
        <div id="kpiGrid" class="grid grid-cols-2 gap-3"></div>

        <!-- ECharts 图表 -->
        <div class="glass-panel rounded-2xl overflow-hidden">
            <div id="chartLegend" class="flex items-center gap-4 px-4 pt-3 pb-1"></div>
            <div id="trendChart" style="width:100%;height:200px;"></div>
        </div>

        <!-- 收支概览 -->
        <div id="summaryPanel" class="glass-panel rounded-2xl p-4 space-y-3"></div>

    </div>
    <div id="tabBar"></div>
</div>

<script>
document.getElementById('statusBar').innerHTML = renderStatusBar();
document.getElementById('navBar').innerHTML = renderHeader('交易报表', 'unified-home.html');
document.getElementById('tabBar').innerHTML = renderUnifiedTabBar('stats');

// ==================== Mock 数据 ====================
var mockData = {
    week: {
        labels: ['3/18','3/19','3/20','3/21','3/22','3/23','3/24'],
        receive: [6200, 8400, 5100, 9800, 7600, 8200, 8640],
        pay: [4800, 6100, 3200, 7500, 5900, 6800, 6290],
        totalAmount: 94430,
        totalCount: 156,
        avgDaily: 13490,
        maxSingle: 18500,
        totalRatio: 12.5,
        countRatio: 8.3,
        avgRatio: 5.2,
        maxRatio: -2.1,
        receiveTotal: 53940,
        receiveCount: 89,
        receiveDailyAvg: 7706,
        receiveRatio: 15.2,
        payTotal: 40490,
        payCount: 67,
        payDailyAvg: 5784,
        payRatio: 8.7,
        profit: 13450,
        profitRate: 24.9
    },
    month: {
        labels: Array.from({length:30}, function(_,i){ return String(i+1); }),
        receive: [8200,7600,9100,6800,11200,8900,7400,10500,9200,8100,12400,7800,9600,8500,10800,7200,9900,11600,8300,7100,10200,9400,8700,12100,7500,9800,10400,8600,11300,9000],
        pay: [6100,5800,7200,4900,8500,6700,5600,8100,7000,6200,9400,5900,7300,6400,8200,5500,7500,8800,6300,5400,7800,7100,6600,9200,5700,7400,7900,6500,8600,6800],
        totalAmount: 356800,
        totalCount: 286,
        avgDaily: 11893,
        maxSingle: 22400,
        totalRatio: 18.6,
        countRatio: 12.1,
        avgRatio: 6.8,
        maxRatio: 15.3,
        receiveTotal: 186500,
        receiveCount: 168,
        receiveDailyAvg: 6217,
        receiveRatio: 22.4,
        payTotal: 142300,
        payCount: 118,
        payDailyAvg: 4743,
        payRatio: 14.8,
        profit: 44200,
        profitRate: 23.7
    },
    year: {
        labels: ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],
        receive: [168000,142000,186500,0,0,0,0,0,0,0,0,0],
        pay: [128000,106000,142300,0,0,0,0,0,0,0,0,0],
        totalAmount: 2856000,
        totalCount: 3248,
        avgDaily: 10563,
        maxSingle: 35000,
        totalRatio: 32.1,
        countRatio: 28.4,
        avgRatio: 8.9,
        maxRatio: 22.6,
        receiveTotal: 1496500,
        receiveCount: 1892,
        receiveDailyAvg: 5536,
        receiveRatio: 35.8,
        payTotal: 1376300,
        payCount: 1356,
        payDailyAvg: 5090,
        payRatio: 28.2,
        profit: 120200,
        profitRate: 8.0
    }
};

var currentTab = 'week';
var chart = null;

// ==================== 工具函数 ====================
function fmtMoney(val) {
    return '¥' + Number(val).toLocaleString('zh-CN');
}

function fmtNum(val) {
    return Number(val).toLocaleString('zh-CN');
}

function ratioHtml(ratio) {
    if (ratio > 0) {
        return '<span class="text-[11px] font-medium text-green-600" style="font-family:Poppins;">↑' + Math.abs(ratio).toFixed(1) + '%</span>';
    } else if (ratio < 0) {
        return '<span class="text-[11px] font-medium text-red-500" style="font-family:Poppins;">↓' + Math.abs(ratio).toFixed(1) + '%</span>';
    }
    return '<span class="text-[11px] text-gray-400" style="font-family:Poppins;">—</span>';
}

function hasPay(data) {
    return data.payTotal > 0;
}

// ==================== KPI 卡片渲染 ====================
function renderKpi(data) {
    var cards = [
        { label: '累计交易额', value: fmtMoney(data.totalAmount), ratio: data.totalRatio, icon: 'fa-coins', color: '#11A64A', bg: '#F0FDF4' },
        { label: '交易笔数', value: fmtNum(data.totalCount), ratio: data.countRatio, icon: 'fa-receipt', color: '#3B82F6', bg: '#EFF6FF' },
        { label: '日均交易额', value: fmtMoney(data.avgDaily), ratio: data.avgRatio, icon: 'fa-chart-line', color: '#F59E0B', bg: '#FFFBEB' },
        { label: '最大单笔', value: fmtMoney(data.maxSingle), ratio: data.maxRatio, icon: 'fa-arrow-up-right-dots', color: '#8B5CF6', bg: '#F5F3FF' }
    ];

    var html = cards.map(function(c) {
        return '<div class="kpi-card glass-card rounded-2xl p-3.5 fade-enter">' +
            '<div class="flex items-center justify-between mb-2">' +
                '<div class="w-8 h-8 rounded-xl flex items-center justify-center" style="background:' + c.bg + ';">' +
                    '<i class="fas ' + c.icon + ' text-sm" style="color:' + c.color + ';"></i>' +
                '</div>' +
                ratioHtml(c.ratio) +
            '</div>' +
            '<div class="text-lg font-bold text-gray-800" style="font-family:Poppins;line-height:1.2;">' + c.value + '</div>' +
            '<div class="text-[11px] text-gray-400 mt-1">' + c.label + '</div>' +
        '</div>';
    }).join('');

    document.getElementById('kpiGrid').innerHTML = html;
}

// ==================== ECharts 图表 ====================
function renderChart(data) {
    var container = document.getElementById('trendChart');
    if (!chart) {
        chart = echarts.init(container);
    }

    var showPay = hasPay(data);

    // 图例
    var legendHtml = '<div class="flex items-center gap-1"><span class="inline-block w-2.5 h-2.5 rounded-sm" style="background:#11A64A;"></span><span class="text-[11px] text-gray-500">收款</span></div>';
    if (showPay) {
        legendHtml += '<div class="flex items-center gap-1"><span class="inline-block w-2.5 h-2.5 rounded-sm" style="background:#9CA3AF;"></span><span class="text-[11px] text-gray-500">付款</span></div>';
        legendHtml += '<div class="flex items-center gap-1"><span class="inline-block w-2.5 h-2.5 rounded-full" style="background:#F59E0B;"></span><span class="text-[11px] text-gray-500">利润</span></div>';
    }
    document.getElementById('chartLegend').innerHTML = legendHtml;

    // 利润计算
    var profitLine = data.receive.map(function(v, i) {
        return v - (data.pay[i] || 0);
    });

    var series = [
        {
            name: '收款',
            type: 'bar',
            data: data.receive,
            itemStyle: { color: '#11A64A', borderRadius: [4, 4, 0, 0] },
            barMaxWidth: 12,
            barGap: '20%'
        }
    ];

    if (showPay) {
        series.push({
            name: '付款',
            type: 'bar',
            data: data.pay,
            itemStyle: { color: '#9CA3AF', borderRadius: [4, 4, 0, 0] },
            barMaxWidth: 12
        });
        series.push({
            name: '利润',
            type: 'line',
            data: profitLine,
            smooth: true,
            symbol: 'circle',
            symbolSize: 4,
            lineStyle: { color: '#F59E0B', width: 2, type: 'dashed' },
            itemStyle: { color: '#F59E0B' },
            areaStyle: { color: 'rgba(245,158,11,0.06)' }
        });
    }

    var option = {
        grid: { left: 8, right: 8, top: 10, bottom: 24, containLabel: true },
        xAxis: {
            type: 'category',
            data: data.labels,
            axisLine: { show: false },
            axisTick: { show: false },
            axisLabel: {
                fontSize: 10,
                color: '#9CA3AF',
                interval: data.labels.length > 12 ? 4 : 0,
                rotate: data.labels.length > 15 ? 45 : 0
            }
        },
        yAxis: {
            type: 'value',
            show: false
        },
        tooltip: {
            trigger: 'axis',
            backgroundColor: 'rgba(0,0,0,0.75)',
            borderColor: 'transparent',
            textStyle: { color: '#fff', fontSize: 11 },
            formatter: function(params) {
                var tip = '<div style="font-size:11px;margin-bottom:4px;color:#ccc;">' + params[0].axisValue + '</div>';
                params.forEach(function(p) {
                    tip += '<div style="display:flex;align-items:center;gap:4px;margin:2px 0;">' +
                        '<span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:' + p.color + ';"></span>' +
                        '<span>' + p.seriesName + '：¥' + Number(p.value).toLocaleString('zh-CN') + '</span></div>';
                });
                return tip;
            }
        },
        series: series
    };

    chart.setOption(option, true);
}

// ==================== 收支概览 ====================
function renderSummary(data) {
    var showPay = hasPay(data);
    var html = '';

    // 标题
    html += '<div class="flex items-center gap-1.5">' +
        '<div class="w-[3px] h-[14px] rounded-sm" style="background:#11A64A;"></div>' +
        '<span class="text-sm font-medium text-gray-700">收支概览</span>' +
    '</div>';

    // 收款汇总
    html += '<div class="rounded-xl p-3 fade-enter" style="background:linear-gradient(135deg,#F0FDF4 0%,#FAFFFE 100%);border:1px solid rgba(17,166,74,0.08);">' +
        '<div class="flex items-center justify-between mb-2">' +
            '<div class="flex items-center gap-1.5">' +
                '<div class="w-6 h-6 rounded-lg bg-green-100 flex items-center justify-center"><i class="fas fa-arrow-down text-green-600 text-[10px]"></i></div>' +
                '<span class="text-xs font-medium text-gray-600">收款汇总</span>' +
            '</div>' +
            ratioHtml(data.receiveRatio) +
        '</div>' +
        '<div class="text-xl font-bold text-gray-800 mb-1" style="font-family:Poppins;">' + fmtMoney(data.receiveTotal) + '</div>' +
        '<div class="flex items-center gap-3 text-[11px] text-gray-400">' +
            '<span><span style="font-family:Poppins;">' + fmtNum(data.receiveCount) + '</span> 笔</span>' +
            '<span>日均 <span style="font-family:Poppins;">' + fmtMoney(data.receiveDailyAvg) + '</span></span>' +
        '</div>' +
    '</div>';

    // 付款汇总（数据驱动）
    if (showPay) {
        html += '<div class="rounded-xl p-3 fade-enter" style="background:linear-gradient(135deg,#F9FAFB 0%,#FFFFFF 100%);border:1px solid rgba(0,0,0,0.04);">' +
            '<div class="flex items-center justify-between mb-2">' +
                '<div class="flex items-center gap-1.5">' +
                    '<div class="w-6 h-6 rounded-lg bg-gray-100 flex items-center justify-center"><i class="fas fa-arrow-up text-gray-500 text-[10px]"></i></div>' +
                    '<span class="text-xs font-medium text-gray-600">付款汇总</span>' +
                '</div>' +
                ratioHtml(data.payRatio) +
            '</div>' +
            '<div class="text-xl font-bold text-gray-800 mb-1" style="font-family:Poppins;">' + fmtMoney(data.payTotal) + '</div>' +
            '<div class="flex items-center gap-3 text-[11px] text-gray-400">' +
                '<span><span style="font-family:Poppins;">' + fmtNum(data.payCount) + '</span> 笔</span>' +
                '<span>日均 <span style="font-family:Poppins;">' + fmtMoney(data.payDailyAvg) + '</span></span>' +
            '</div>' +
        '</div>';

        // 利润行
        html += '<div class="rounded-xl p-3 fade-enter" style="background:linear-gradient(135deg,#FFFBEB 0%,#FFFFF5 100%);border:1px solid rgba(245,158,11,0.1);">' +
            '<div class="flex items-center justify-between">' +
                '<div class="flex items-center gap-1.5">' +
                    '<div class="w-6 h-6 rounded-lg bg-amber-100 flex items-center justify-center"><i class="fas fa-chart-line text-amber-500 text-[10px]"></i></div>' +
                    '<span class="text-xs font-medium text-gray-600">利润</span>' +
                '</div>' +
                '<div class="flex items-center gap-2">' +
                    '<span class="text-lg font-bold" style="font-family:Poppins;color:' + (data.profit >= 0 ? '#11A64A' : '#EF4444') + ';">' + fmtMoney(data.profit) + '</span>' +
                    '<span class="text-[11px] font-medium px-1.5 py-0.5 rounded-md" style="font-family:Poppins;background:' + (data.profit >= 0 ? 'rgba(17,166,74,0.1);color:#11A64A' : 'rgba(239,68,68,0.1);color:#EF4444') + ';">' + data.profitRate.toFixed(1) + '%</span>' +
                '</div>' +
            '</div>' +
        '</div>';
    }

    document.getElementById('summaryPanel').innerHTML = html;
}

// ==================== Tab 切换 ====================
function switchTab(tab) {
    currentTab = tab;

    // 更新分段器
    var btns = document.querySelectorAll('.segment-btn');
    var tabKeys = ['week', 'month', 'year'];
    btns.forEach(function(btn, i) {
        btn.classList.toggle('active', tabKeys[i] === tab);
    });

    var data = mockData[tab];
    renderKpi(data);
    renderChart(data);
    renderSummary(data);
}

// ==================== 页面初始化 ====================
document.addEventListener('DOMContentLoaded', function() {
    switchTab('week');

    window.addEventListener('resize', function() {
        if (chart) chart.resize();
    });
});
</script>
</body>
</html>
