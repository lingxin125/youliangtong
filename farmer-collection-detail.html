<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>丰收云 - 收款详情</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500,700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="shared.js"></script>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
    <style>
        .product-info-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .product-info-card {
            border-radius: 16px;
            border: 1px solid rgba(15, 23, 42, 0.06);
            background: #F8FAFC;
            padding: 14px 16px;
        }
        .product-info-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            padding-bottom: 10px;
            margin-bottom: 2px;
            border-bottom: 1px solid rgba(15, 23, 42, 0.05);
        }
        .product-info-title {
            font-size: 11px;
            color: #9CA3AF;
            flex-shrink: 0;
            padding-top: 2px;
        }
        .product-info-name {
            font-size: 14px;
            color: #1F2937;
            font-weight: 600;
            line-height: 1.5;
            text-align: right;
            word-break: break-word;
        }
        .product-field-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(15, 23, 42, 0.05);
        }
        .product-field-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }
        .product-field-row.remark-row {
            align-items: flex-start;
        }
        .product-field-label {
            font-size: 12px;
            color: #9CA3AF;
            flex-shrink: 0;
        }
        .product-field-value {
            font-size: 13px;
            color: #374151;
            font-weight: 500;
            text-align: right;
            line-height: 1.5;
            word-break: break-word;
        }
        .product-field-value.remark-value {
            max-width: 72%;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
        }
        .info-row:last-child { border-bottom: none; }
        .info-label { font-size: 12px; color: #9CA3AF; }
        .info-value { font-size: 12px; color: #374151; font-weight: 500; }

        .section-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
            padding-top: 12px;
            border-top: 1px solid rgba(0, 0, 0, 0.06);
        }
        .section-title:first-child {
            padding-top: 0;
            border-top: none;
        }
        .section-dot {
            width: 4px;
            height: 14px;
            background: #11A64A;
            border-radius: 2px;
        }

        .toast-tip {
            position: absolute;
            left: 16px;
            right: 16px;
            bottom: 98px;
            padding: 11px 14px;
            background: rgba(17, 24, 39, 0.9);
            border-radius: 11px;
            color: #fff;
            font-size: 12px;
            line-height: 1.45;
            z-index: 80;
            opacity: 0;
            pointer-events: none;
            transform: translateY(8px);
            transition: all 0.2s ease;
        }
        .toast-tip.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
<div class="mobile-container">
    <div id="statusBar"></div>
    <div id="navBar"></div>

    <div class="flex-1 overflow-y-auto no-scrollbar p-4" style="padding-bottom:90px;">
        <!-- 卡片1：状态 + 金额 -->
        <div class="glass-panel rounded-2xl overflow-hidden mb-3">
            <!-- 状态区域 -->
            <div class="p-5 text-center border-b border-gray-100">
                <div id="statusIconWrap" class="w-14 h-14 rounded-full bg-green-50 flex items-center justify-center mx-auto mb-2">
                    <i id="statusIcon" class="fas fa-check-circle text-primary text-2xl"></i>
                </div>
                <div id="statusTitle" class="text-base font-bold text-primary mb-1">支付成功</div>
                <div id="statusDesc" class="text-[10px] text-gray-400">款项已到达您的银行卡</div>
            </div>
            <!-- 金额区域 -->
            <div class="p-4 text-center bg-gradient-to-b from-white to-gray-50/50">
                <div class="text-[11px] text-gray-400 mb-1">收款金额</div>
                <div id="amountText" class="text-3xl font-bold text-gray-800" style="font-family:Poppins;">¥ 0.00</div>
            </div>
        </div>

        <!-- 卡片2：订单信息 + 收款方 + 付款方 + 商品信息 -->
        <div class="glass-panel rounded-2xl p-4">
            <!-- 订单信息 -->
            <div class="section-title" style="padding-top:0;border-top:none;">
                <div class="section-dot"></div>
                <span>订单信息</span>
            </div>
            <div class="info-row">
                <span class="info-label">收粮订单号</span>
                <span id="infoGrainOrderNo" class="info-value font-mono"></span>
            </div>
            <div class="info-row">
                <span class="info-label">支付订单号</span>
                <span id="infoPaymentOrderNo" class="info-value font-mono"></span>
            </div>
            <div class="info-row">
                <span class="info-label">下单时间</span>
                <span id="infoCreatedAt" class="info-value"></span>
            </div>
            <div id="paidAtRow" class="info-row">
                <span class="info-label">收款时间</span>
                <span id="infoPaidAt" class="info-value"></span>
            </div>

            <!-- 收款方信息 -->
            <div class="section-title" style="margin-top:16px;">
                <div class="section-dot"></div>
                <span>收款方信息</span>
            </div>
            <div class="info-row">
                <span class="info-label">收款方</span>
                <span id="payeeText" class="info-value">李大姐</span>
            </div>
            <div class="info-row">
                <span class="info-label">收款银行</span>
                <span id="payeeBankText" class="info-value"></span>
            </div>
            <div class="info-row">
                <span class="info-label">收款卡号</span>
                <span id="payeeCardText" class="info-value"></span>
            </div>

            <!-- 付款方信息 -->
            <div class="section-title" style="margin-top:16px;">
                <div class="section-dot"></div>
                <span>付款方信息</span>
            </div>
            <div class="info-row">
                <span class="info-label">付款方</span>
                <span id="payerNameText" class="info-value"></span>
            </div>
            <div class="info-row">
                <span class="info-label">付款银行</span>
                <span id="payerBankText" class="info-value"></span>
            </div>
            <div class="info-row">
                <span class="info-label">付款卡号</span>
                <span id="payerCardText" class="info-value"></span>
            </div>

            <!-- 商品信息 -->
            <div class="section-title" style="margin-top:16px;">
                <div class="section-dot"></div>
                <span>商品信息</span>
            </div>
            <div id="productCardList" class="product-info-list"></div>
            <div class="flex items-center justify-between py-3 border-t border-gray-100 bg-gray-50/50 -mx-4 px-4 -mb-4 mt-3 rounded-b-2xl">
                <span id="itemCountText" class="text-xs text-gray-500 font-medium">合计（0项商品）</span>
                <span id="itemTotalText" class="text-base font-bold text-primary" style="font-family:Poppins;">¥ 0.00</span>
            </div>
        </div>

        <div id="photosCard" class="glass-panel rounded-2xl p-4 mb-3" style="display:none;">
            <div class="section-title" style="padding-top:0;border-top:none;">
                <div class="section-dot"></div>
                <span id="photosTitle">拍照留存</span>
            </div>
            <div id="photoGrid" class="grid grid-cols-3 gap-2"></div>
        </div>
    </div>

    <div id="bottomActions" class="absolute bottom-0 left-0 right-0 px-4 py-4 bg-gradient-to-t from-[#FFFBF0] via-[#FFFBF0] to-transparent"></div>
    <div id="toastTip" class="toast-tip"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const fallbackNow = new Date();
const mockStore = window.BuyerMockStore || null;
const payeeProfile = { name: '李大姐', org: '个体农户' };
const queryOrderNo = params.get('orderNo');
const queryGrainOrderNo = params.get('grainOrderNo') || queryOrderNo;
const orderFromStore = (mockStore && queryGrainOrderNo && typeof mockStore.findOrderById === 'function')
    ? mockStore.findOrderById(queryGrainOrderNo)
    : null;

const state = {
    status: normalizeStatus(params.get('status')) || normalizeStatus(orderFromStore && orderFromStore.status) || 'success',
    orderNo: queryGrainOrderNo || (orderFromStore && orderFromStore.id) || 'SL' + fallbackNow.toISOString().replace(/[-:TZ.]/g, '').slice(0, 14),
    amount: parseFloat(params.get('amount')) || parseFloat(orderFromStore && orderFromStore.amount) || 5000,
    payerName: params.get('payerName') || (orderFromStore && orderFromStore.payerName) || '张老板',
    payerMobile: params.get('payerMobile') || (orderFromStore && orderFromStore.payerMobile) || '139****6666',
    payerOrg: params.get('payerOrg') || (orderFromStore && orderFromStore.payerOrg) || '保定收购站',
    payeeName: params.get('payeeName') || (orderFromStore && orderFromStore.payeeName) || '李大姐',
    payeeCompany: params.get('payeeCompany') || params.get('payeeOrg') || (orderFromStore && (orderFromStore.payeeCompany || orderFromStore.payeeOrg)) || payeeProfile.org,
    payerCompany: params.get('payerCompany') || params.get('companyName') || params.get('payerOrg') || (orderFromStore && (orderFromStore.payerCompany || orderFromStore.payerOrg)) || '保定收购站有限公司',
    payerBank: params.get('payerBank') || (orderFromStore && orderFromStore.payerBank) || '中国农业银行',
    payerCard: params.get('payerCard') || (orderFromStore && orderFromStore.payerCard) || '尾号 5678',
    payeeBank: params.get('payeeBank') || (orderFromStore && orderFromStore.payeeBank) || '中国邮政储蓄银行',
    payeeCard: params.get('payeeCard') || (orderFromStore && orderFromStore.payeeCard) || '尾号 8888',
    summary: params.get('summary') || (orderFromStore && orderFromStore.summary) || '苹果 x 50斤',
    createdAt: params.get('createdAt') || (orderFromStore && orderFromStore.createdAt) || fallbackNow.toISOString(),
    payMethod: params.get('payMethod') || (orderFromStore && orderFromStore.payMethod) || '',
    paidAt: params.get('paidAt') || (orderFromStore && orderFromStore.paidAt) || '',
    failReason: params.get('failReason') || (orderFromStore && orderFromStore.failReason) || '',
    paymentOrderNo: params.get('paymentOrderNo') || params.get('payOrderNo') || (orderFromStore && (orderFromStore.paymentOrderNo || orderFromStore.payOrderNo)) || '',
    bankFlowNo: params.get('bankFlowNo') || params.get('bankOrderNo') || (orderFromStore && (orderFromStore.bankFlowNo || orderFromStore.bankOrderNo)) || '',
    items: parseItems(params.get('items') || JSON.stringify(orderFromStore && orderFromStore.items || [])),
    photosFromQuery: parseItems(params.get('photos')),
    source: params.get('source') || 'records',
    productName: (orderFromStore && orderFromStore.productName) || '',
    grossWeight: parseFloat(orderFromStore && orderFromStore.grossWeight) || 0,
    tareWeight: parseFloat(orderFromStore && orderFromStore.tareWeight) || 0,
    tareWeightRaw: orderFromStore && orderFromStore.tareWeightRaw !== undefined ? String(orderFromStore.tareWeightRaw ?? '') : '',
    deduction: parseFloat(orderFromStore && orderFromStore.deduction) || 0,
    deductRatioRaw: orderFromStore && orderFromStore.deductRatioRaw !== undefined ? String(orderFromStore.deductRatioRaw ?? '') : '',
    netWeight: parseFloat(orderFromStore && orderFromStore.netWeight) || 0,
    unitPrice: parseFloat(orderFromStore && orderFromStore.unitPrice) || 0,
    unit: (orderFromStore && orderFromStore.unit) || '斤',
    photos: (orderFromStore && orderFromStore.photos) || [],
    remark: params.get('remark') || (orderFromStore && orderFromStore.remark) || ''
};
state.paymentOrderNo = state.paymentOrderNo || buildPaymentOrderNo(state.orderNo);
state.bankFlowNo = state.bankFlowNo || buildBankFlowNo(state.orderNo);

const backLink = state.source === 'records' ? 'farmer-collection-records.html' : 'farmer-home.html';

document.getElementById('statusBar').innerHTML = renderStatusBar();
document.getElementById('navBar').innerHTML = renderHeader('收款详情', backLink);
document.getElementById('payeeText').textContent = state.payeeName;

ensureItems();
if ((!state.photos || !state.photos.length) && state.photosFromQuery && state.photosFromQuery.length) {
    state.photos = state.photosFromQuery;
}
renderAll();

function normalizeStatus(status) {
    // 农户视角：始终显示为支付成功
    return 'success';
}

function parseItems(raw) {
    if (!raw) return [];
    try {
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
    } catch (err) {
        return [];
    }
}

function ensureItems() {
    if (state.items.length > 0) return;
    state.items = [{
        name: state.summary || '订单收款',
        qty: 1,
        unit: '单',
        price: Number(state.amount.toFixed(2)),
        subtotal: Number(state.amount.toFixed(2))
    }];
}

function formatMoney(amount) {
    return '¥ ' + amount.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatTime(iso) {
    const d = new Date(iso);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    const hh = String(d.getHours()).padStart(2, '0');
    const mm = String(d.getMinutes()).padStart(2, '0');
    const ss = String(d.getSeconds()).padStart(2, '0');
    return `${y}-${m}-${day} ${hh}:${mm}:${ss}`;
}

function deterministicDigits(seed, length) {
    const source = String(seed || '000000000000');
    let hash = 0;
    let output = '';
    for (let i = 0; i < source.length; i += 1) {
        hash = (hash * 131 + source.charCodeAt(i)) % 1000000007;
    }
    for (let i = 0; i < length; i += 1) {
        hash = (hash * 1103515245 + 12345 + i) % 2147483647;
        output += String(hash % 10);
    }
    return output;
}

function buildPaymentOrderNo(grainOrderNo) {
    return 'ZF' + deterministicDigits('PAY-' + (grainOrderNo || ''), 18);
}

function buildBankFlowNo(grainOrderNo) {
    return 'YH' + deterministicDigits('BANK-' + (grainOrderNo || ''), 18);
}

function formatUnitPrice(price, unit) {
    const num = Number(price);
    if (!Number.isFinite(num) || num <= 0) return '--';
    const cleanPrice = Number.isInteger(num) ? String(num) : String(Number(num.toFixed(2)));
    const cleanUnit = String(unit || '').trim();
    return '¥' + cleanPrice + (cleanUnit ? '/' + cleanUnit : '');
}

function formatQtyOnly(qty) {
    const num = Number(qty);
    if (!Number.isFinite(num) || num <= 0) return '--';
    return Number.isInteger(num) ? String(num) : String(num);
}

function formatWeight(value, unit, rawValue, allowZero) {
    const raw = rawValue !== undefined && rawValue !== null ? String(rawValue).trim() : '';
    if (raw === '') {
        const numeric = Number(value);
        if (!Number.isFinite(numeric) || (!allowZero && numeric <= 0)) return '未填写';
        return formatQtyOnly(numeric) + (unit ? ' ' + unit : '');
    }
    const numeric = Number(value);
    if (!Number.isFinite(numeric)) return '未填写';
    return formatQtyOnly(numeric) + (unit ? ' ' + unit : '');
}

function formatPercent(rawValue, deduction, grossWeight, tareWeight) {
    const raw = rawValue !== undefined && rawValue !== null ? String(rawValue).trim() : '';
    if (raw !== '') {
        const numeric = Number(raw);
        if (Number.isFinite(numeric)) {
            return (Number.isInteger(numeric) ? String(numeric) : numeric.toFixed(2).replace(/\.?0+$/, '')) + '%';
        }
    }
    const base = Math.max(Number(grossWeight || 0) - Number(tareWeight || 0), 0);
    const deductionNum = Number(deduction || 0);
    if (base <= 0) return deductionNum > 0 ? '0%' : '-';
    const ratio = (deductionNum / base) * 100;
    return (Number.isInteger(ratio) ? String(ratio) : ratio.toFixed(2).replace(/\.?0+$/, '')) + '%';
}

function formatText(value, fallback) {
    const text = value === undefined || value === null ? '' : String(value).trim();
    return text || (fallback || '-');
}

function renderStatus() {
    // 农户视角：只显示已收款状态
    const iconWrap = document.getElementById('statusIconWrap');
    const icon = document.getElementById('statusIcon');
    const title = document.getElementById('statusTitle');
    const desc = document.getElementById('statusDesc');

    iconWrap.className = 'w-14 h-14 rounded-full bg-green-50 flex items-center justify-center mx-auto mb-2';
    icon.className = 'fas fa-check-circle text-primary text-2xl';
    title.className = 'text-base font-bold text-primary mb-1';
    title.textContent = '支付成功';
    desc.textContent = '款项已转入您的邮储银行账户';
}

function renderItems() {
    const list = document.getElementById('productCardList');
    const items = state.items.length ? state.items : [{}];
    list.innerHTML = items.map(function(item) {
        const productName = formatText(item.name || state.productName, '-');
        const unit = item.unit || state.unit || '斤';
        const qty = Number(item.qty || item.netWeight || state.netWeight || 0);
        const price = Number(item.price || item.unitPrice || state.unitPrice || 0);
        const grossWeight = item.grossWeight !== undefined ? item.grossWeight : state.grossWeight;
        const tareWeight = item.tareWeight !== undefined ? item.tareWeight : state.tareWeight;
        const tareWeightRaw = item.tareWeightRaw !== undefined ? item.tareWeightRaw : state.tareWeightRaw;
        const deduction = item.deduction !== undefined ? item.deduction : state.deduction;
        const deductRatioRaw = item.deductRatioRaw !== undefined ? item.deductRatioRaw : state.deductRatioRaw;
        const remark = formatText(item.remark !== undefined ? item.remark : state.remark, '-');
        return `
            <div class="product-info-card">
                <div class="product-info-header">
                    <div class="product-info-title">商品名称</div>
                    <div class="product-info-name">${productName}</div>
                </div>
                <div class="product-field-row">
                    <span class="product-field-label">毛重</span>
                    <span class="product-field-value">${formatWeight(grossWeight, unit, grossWeight, false)}</span>
                </div>
                <div class="product-field-row">
                    <span class="product-field-label">皮重</span>
                    <span class="product-field-value">${formatWeight(tareWeight, unit, tareWeightRaw, true)}</span>
                </div>
                <div class="product-field-row">
                    <span class="product-field-label">扣减比例</span>
                    <span class="product-field-value">${formatPercent(deductRatioRaw, deduction, grossWeight, tareWeight)}</span>
                </div>
                <div class="product-field-row">
                    <span class="product-field-label">净重</span>
                    <span class="product-field-value">${formatWeight(qty, unit, qty, true)}</span>
                </div>
                <div class="product-field-row">
                    <span class="product-field-label">单价</span>
                    <span class="product-field-value">${formatUnitPrice(price, unit)}</span>
                </div>
                <div class="product-field-row remark-row">
                    <span class="product-field-label">备注</span>
                    <span class="product-field-value remark-value">${remark}</span>
                </div>
            </div>
        `;
    }).join('');

    const total = state.items.reduce((sum, item) => {
        const subtotal = Number(item.subtotal || (Number(item.qty || 0) * Number(item.price || 0)));
        return sum + subtotal;
    }, 0);
    const fallbackItem = items[0] || {};
    const fallbackQty = Number(fallbackItem.qty || fallbackItem.netWeight || state.netWeight || 0);
    const fallbackPrice = Number(fallbackItem.price || fallbackItem.unitPrice || state.unitPrice || 0);
    const fallbackTotal = Number(fallbackItem.subtotal || state.amount || fallbackQty * fallbackPrice || 0);
    const finalTotal = total > 0 ? total : fallbackTotal;
    document.getElementById('itemCountText').textContent = '合计（' + Math.max(state.items.length, 1) + '项商品）';
    document.getElementById('itemTotalText').textContent = formatMoney(finalTotal);
}

function renderInfo() {
    document.getElementById('amountText').textContent = formatMoney(state.amount);
    
    document.getElementById('payerNameText').textContent = state.payerName;
    document.getElementById('payerBankText').textContent = state.payerBank;
    document.getElementById('payerCardText').textContent = state.payerCard;
    
    document.getElementById('payeeText').textContent = state.payeeName;
    document.getElementById('payeeBankText').textContent = state.payeeBank;
    document.getElementById('payeeCardText').textContent = state.payeeCard;
    
    // 订单信息
    document.getElementById('infoGrainOrderNo').textContent = state.orderNo;
    document.getElementById('infoPaymentOrderNo').textContent = state.paymentOrderNo;
    document.getElementById('infoCreatedAt').textContent = formatTime(state.createdAt);
    const paidAtRow = document.getElementById('paidAtRow');

    if (state.status === 'success') {
        paidAtRow.style.display = 'flex';
        document.getElementById('infoPaidAt').textContent = formatTime(state.paidAt || state.createdAt);
    } else {
        paidAtRow.style.display = 'none';
    }
}

function renderBottomActions() {
    const box = document.getElementById('bottomActions');
    box.innerHTML = `
        <a href="${backLink}" class="block w-full py-3 bg-primary text-white font-bold text-sm rounded-2xl shadow-glow text-center no-underline" style="text-decoration:none;">
            ${state.source === 'records' ? '返回收款记录' : '返回首页'}
        </a>
    `;
}

function renderPhotos() {
    const card = document.getElementById('photosCard');
    const grid = document.getElementById('photoGrid');
    if (!card || !grid || !state.photos || !state.photos.length) {
        if (card) card.style.display = 'none';
        return;
    }
    card.style.display = '';
    document.getElementById('photosTitle').textContent = '拍照留存（' + state.photos.length + '张）';
    grid.innerHTML = state.photos.map(function(p, i) {
        const src = (p && typeof p === 'object') ? (p.url || '') : String(p || '');
        return '<img src="' + src + '" alt="照片' + (i + 1) + '" class="w-full aspect-square object-cover rounded-xl">';
    }).join('');
}

function renderAll() {
    renderStatus();
    renderItems();
    renderInfo();
    renderPhotos();
    renderBottomActions();
}

function showToast(msg) {
    const tip = document.getElementById('toastTip');
    tip.textContent = msg;
    tip.classList.add('show');
    clearTimeout(showToast.timer);
    showToast.timer = setTimeout(() => tip.classList.remove('show'), 1800);
}
</script>
</body>
</html>
