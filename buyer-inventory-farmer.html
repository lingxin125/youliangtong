<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>丰收云 - 农户存粮</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="shared.js"></script>
    <style>
        #statusBar,#navBar { background:#F7F8FA; }
        .search-box { height:42px; border-radius:12px; background:#fff; border:1px solid rgba(15,23,42,.05); display:flex; align-items:center; gap:8px; padding:0 12px; }
        .filter-btn { width:42px; height:42px; border-radius:12px; background:#fff; border:1px solid #E5E7EB; color:#64748B; display:flex; align-items:center; justify-content:center; box-shadow:0 1px 3px rgba(15,23,42,.03); }
        .checkline { display:flex; align-items:center; gap:8px; font-size:12px; color:#475569; font-weight:800; }
        .checkline input { width:16px; height:16px; accent-color:#11A64A; }
        .list-card { background:#fff; border:1px solid rgba(15,23,42,.05); border-radius:16px; padding:16px; box-shadow:0 2px 10px rgba(15,23,42,.02); }
        .tag { display:inline-flex; align-items:center; height:22px; padding:0 8px; border-radius:999px; font-size:11px; font-weight:700; white-space:nowrap; background:#EAF8EF; color:#11A64A; }
        .info-icon { color:#CBD5E1; font-size:12px; flex-shrink:0; }
        .qty { font-family:Poppins, sans-serif; font-weight:700; letter-spacing:-.01em; }
        .field-box { border-radius:12px; background:#F8FAFC; padding:10px; min-width:0; }
        .sheet-mask { position:absolute; inset:0; background:rgba(15,23,42,.4); backdrop-filter:blur(4px); opacity:0; visibility:hidden; z-index:400; transition:.22s ease; }
        .sheet-mask.show { opacity:1; visibility:visible; }
        .sheet { position:absolute; left:0; right:0; bottom:0; max-height:84%; overflow-y:auto; background:#fff; border-radius:24px 24px 0 0; padding:10px 16px calc(20px + env(safe-area-inset-bottom)); z-index:410; transform:translateY(100%); transition:.28s cubic-bezier(.4,0,.2,1); }
        .sheet.show { transform:translateY(0); }
        .handle { width:40px; height:4px; border-radius:999px; background:#D1D5DB; margin:0 auto 14px; }
        .filter-chip { min-height:36px; padding:0 12px; border-radius:999px; background:#F1F5F9; color:#475569; font-size:12px; font-weight:700; display:inline-flex; align-items:center; }
        .filter-chip.active { background:#EAF8EF; color:#11A64A; }
        .detail-row { min-height:42px; display:flex; align-items:center; justify-content:space-between; gap:12px; border-bottom:1px solid #F1F5F9; }
        .detail-row:last-child { border-bottom:0; }
        .detail-label { font-size:12px; color:#64748B; flex-shrink:0; }
        .detail-value { font-size:13px; color:#111827; font-weight:700; text-align:right; min-width:0; word-break:break-all; }
        .group-drill { height:26px; padding:0 9px; border-radius:999px; background:#F8FAFC; color:#64748B; font-size:11px; font-weight:800; display:inline-flex; align-items:center; gap:4px; }
        .drill-icon { width:16px; height:24px; color:#94A3B8; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; }
    </style>
</head>
<body class="bg-[#F7F8FA]">
<div class="mobile-container relative bg-[#F7F8FA]">
    <div id="statusBar"></div>
    <div id="navBar"></div>
    <div class="flex-1 overflow-y-auto no-scrollbar px-4 pt-3 pb-8">
        <div class="flex items-center gap-2 mb-3">
            <div class="search-box flex-1 min-w-0">
                <i class="fas fa-search text-gray-400 text-sm"></i>
                <input id="q" class="flex-1 bg-transparent outline-none text-[13px]" placeholder="搜索农户/农产品/仓库" oninput="renderFarmers()">
            </div>
            <button type="button" class="filter-btn" onclick="openFilterSheet()"><i class="fas fa-filter"></i></button>
        </div>
        <div class="flex items-center justify-between mb-3 px-1">
            <label class="checkline"><input id="summaryToggle" type="checkbox" onchange="renderFarmers()"><span>汇总展示</span></label>
            <span id="countText" class="text-[11px] text-gray-400"></span>
        </div>
        <div id="farmerList" class="space-y-3"></div>
    </div>
    <div id="sheetMask" class="sheet-mask" onclick="closeSheets()"></div>
    <div id="filterSheet" class="sheet no-scrollbar">
        <div class="handle"></div>
        <div class="flex items-center justify-between mb-3">
            <div class="text-[17px] font-bold text-gray-900">筛选</div>
            <button type="button" class="w-9 h-9 rounded-full bg-gray-100 text-gray-500" onclick="closeSheets()"><i class="fas fa-times"></i></button>
        </div>
        <div id="filterBody"></div>
    </div>
    <div id="detailSheet" class="sheet no-scrollbar">
        <div class="handle"></div>
        <div id="detailBody"></div>
    </div>
</div>
<script>
document.getElementById('statusBar').innerHTML = renderStatusBar('light');
document.getElementById('navBar').innerHTML = renderHeader('农户存粮', 'buyer-inventory.html');
var store = window.BuyerMockStore || {};
var state = { warehouse:'all', category:'all' };

function escapeHtml(value){return String(value||'').replace(/[&<>"']/g,function(ch){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[ch];});}
function fmtQty(v,u){return (Number(v||0)).toLocaleString('zh-CN')+(u||'斤');}
function fmtTime(v){var d=new Date(v);return Number.isNaN(d.getTime())?'-':d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0');}
function mockPhone(name){var map={'李大姐':'138****5612','王大哥':'139****8821','刘师傅':'137****2098','潘恒':'184****1411'};return map[name]||'-';}
function mockOrderNo(i,index){return i.orderNo||('35519761045922'+String(56+index).padStart(2,'0'));}
function storageDuration(v){var d=new Date(v);if(Number.isNaN(d.getTime()))return '-';return Math.max(0,Math.floor((Date.now()-d.getTime())/86400000))+' 天';}
function uniqueText(values,fallback){var map={};values.forEach(function(v){if(v)map[v]=true;});var list=Object.keys(map);if(!list.length)return fallback||'-';return list.length===1?list[0]:'多'+fallback;}
function baseRows(){
    return (store.getFarmerStorageList?store.getFarmerStorageList():[]).map(function(i){
        return { farmerName:i.farmerName, farmerMobile:i.farmerMobile||mockPhone(i.farmerName), productName:i.productName, quantity:Number(i.quantity||0), unit:i.unit||'斤', warehouseName:i.warehouseName, latestAt:i.latestAt, orderNo:mockOrderNo(i,arguments[1]||0), duration:storageDuration(i.latestAt), count:1 };
    });
}
function filteredRows(){
  var q=(document.getElementById('q').value||'').trim().toLowerCase();
  return baseRows().filter(function(i){
    if(state.warehouse!=='all'&&i.warehouseName!==state.warehouse)return false;
    if(state.category!=='all'&&i.productName!==state.category)return false;
    return !q||[i.farmerName,i.farmerMobile,i.productName,i.warehouseName,i.orderNo].join(' ').toLowerCase().indexOf(q)>=0;
  });
}
function displayRows(){
    var rows=filteredRows();
    if(!document.getElementById('summaryToggle').checked)return rows;
    var map={};
    rows.forEach(function(i){
        var key=i.farmerName+'|'+i.farmerMobile+'|'+i.productName;
        if(!map[key])map[key]={farmerName:i.farmerName,farmerMobile:i.farmerMobile,productName:i.productName,quantity:0,unit:i.unit,warehouseName:'',latestAt:i.latestAt,status:'汇总',orderNo:'汇总记录',count:0,categories:[],warehouses:[],summary:true};
        map[key].quantity+=i.quantity;
        map[key].count+=1;
        map[key].categories.push(i.productName);
        map[key].warehouses.push(i.warehouseName);
        if(new Date(i.latestAt).getTime()>new Date(map[key].latestAt).getTime())map[key].latestAt=i.latestAt;
    });
    return Object.keys(map).map(function(k){var row=map[k];row.productName=uniqueText(row.categories,'品种');row.warehouseName=uniqueText(row.warehouses,'仓库');return row;});
}
function renderFarmers(){
  var list=displayRows();
  document.getElementById('countText').textContent='共 '+list.length+' 条';
  document.getElementById('farmerList').innerHTML=list.map(function(i,index){
    if(i.summary){
      return '<article class="list-card"><div class="flex items-start justify-between gap-3"><div class="flex-1 min-w-0"><div class="flex items-center gap-1.5 min-w-0"><i class="fas fa-user-circle info-icon"></i><div class="text-[16px] font-bold text-gray-900 truncate">'+escapeHtml(i.farmerName)+'</div></div><div class="text-[12px] text-gray-500 mt-0.5 truncate flex items-center gap-1.5"><i class="fas fa-phone info-icon text-[11px]"></i><span class="truncate text-gray-600">'+escapeHtml(i.farmerMobile)+'</span></div></div><button type="button" class="group-drill" onclick="openGroupList('+index+')">明细<i class="fas fa-chevron-right text-[9px]"></i></button></div><div class="border-t border-gray-100 mt-3 pt-3"><div class="grid grid-cols-2 gap-3"><div class="field-box flex items-center justify-between gap-3"><div class="text-[11px] text-gray-400 shrink-0">存粮种类</div><div class="text-[13px] font-bold text-gray-800 truncate text-right">'+escapeHtml(i.productName)+'</div></div><div class="field-box flex items-center justify-between gap-3"><div class="text-[11px] text-gray-400 shrink-0">存粮重量</div><div class="qty text-[16px] text-[#11A64A] text-right truncate">'+fmtQty(i.quantity,i.unit)+'</div></div></div></div></article>';
    }
    return '<article class="list-card" onclick="openDetail('+index+')"><div class="flex items-start justify-between gap-3"><div class="flex-1 min-w-0"><div class="flex items-center gap-1.5 min-w-0"><i class="fas fa-user-circle info-icon"></i><div class="text-[16px] font-bold text-gray-900 truncate">'+escapeHtml(i.farmerName)+'</div></div><div class="text-[12px] text-gray-500 mt-0.5 truncate flex items-center gap-1.5"><i class="fas fa-phone info-icon text-[11px]"></i><span class="truncate text-gray-600">'+escapeHtml(i.farmerMobile)+'</span></div><div class="text-[12px] text-gray-500 mt-1 truncate flex items-center gap-1.5"><i class="fas fa-hashtag info-icon text-[11px]"></i><span class="font-mono text-gray-600 truncate">'+escapeHtml(i.orderNo)+'</span></div></div><span class="drill-icon"><i class="fas fa-chevron-right text-[13px]"></i></span></div><div class="border-t border-gray-100 mt-3 pt-3"><div class="grid grid-cols-2 gap-3"><div class="field-box flex items-center justify-between gap-3"><div class="text-[11px] text-gray-400 shrink-0">存粮种类</div><div class="text-[13px] font-bold text-gray-800 truncate text-right">'+escapeHtml(i.productName)+'</div></div><div class="field-box flex items-center justify-between gap-3"><div class="text-[11px] text-gray-400 shrink-0">存粮重量</div><div class="qty text-[16px] text-[#11A64A] text-right truncate">'+fmtQty(i.quantity,i.unit)+'</div></div></div><div class="mt-3 flex justify-between gap-2 text-[11px] text-gray-500"><span>存粮时长：<span class="font-semibold text-gray-600">'+escapeHtml(i.duration)+'</span></span><span>'+fmtTime(i.latestAt)+'</span></div></div></article>';
  }).join('')||'<div class="list-card text-center py-10 text-[13px] text-gray-500">暂无农户存粮</div>';
}
function optionValues(key){
    var map={};
    baseRows().forEach(function(i){var v=key==='warehouseName'?i.warehouseName:i.productName;if(v)map[v]=true;});
    return Object.keys(map);
}
function openFilterSheet(){
    var groups=[['warehouse','仓库名称',['all'].concat(optionValues('warehouseName'))],['category','农产品种类',['all'].concat(optionValues('productName'))]];
    document.getElementById('filterBody').innerHTML=groups.map(function(group){
        return '<div class="mb-4"><div class="text-[13px] font-bold text-gray-800 mb-2">'+group[1]+'</div><div class="flex flex-wrap gap-2">'+group[2].map(function(value){var active=state[group[0]]===value;return '<button type="button" class="filter-chip '+(active?'active':'')+'" onclick="setFilter(&quot;'+group[0]+'&quot;,&quot;'+escapeHtml(value)+'&quot;)">'+escapeHtml(value==='all'?'全部':value)+'</button>';}).join('')+'</div></div>';
    }).join('')+'<button type="button" class="w-full h-11 rounded-xl bg-[#11A64A] text-white text-[14px] font-bold mt-5" onclick="closeSheets()">确定</button>';
    openSheet('filterSheet');
}
function setFilter(key,value){state[key]=value;openFilterSheet();renderFarmers();}
function openSheet(id){document.getElementById('sheetMask').classList.add('show');document.getElementById(id).classList.add('show');}
function detailRows(items){return '<div class="rounded-2xl bg-[#FAFAFA] border border-gray-100 px-4">'+items.map(function(row){return '<div class="detail-row"><span class="detail-label">'+escapeHtml(row[0])+'</span><span class="detail-value">'+escapeHtml(row[1])+'</span></div>';}).join('')+'</div>';}
function openDetail(index){
    var row=displayRows()[index];
    if(!row)return;
    document.getElementById('detailBody').innerHTML='<div class="flex items-center justify-between mb-4"><div class="text-[18px] font-bold text-gray-900">农户存粮详情</div><button type="button" class="w-9 h-9 rounded-full bg-gray-100 text-gray-500" onclick="closeSheets()"><i class="fas fa-times"></i></button></div>'+detailRows([
        ['农户姓名',row.farmerName],
        ['农户电话',row.farmerMobile],
        ['订单编号',row.orderNo],
        ['存粮时间',fmtTime(row.latestAt)],
        ['存粮种类',row.productName],
        ['存粮重量',fmtQty(row.quantity,row.unit)],
        ['存粮时长',row.duration]
    ]);
    openSheet('detailSheet');
}
function openGroupList(index){
    var row=displayRows()[index];
    if(!row)return;
    var rows=filteredRows().filter(function(item){return item.farmerName===row.farmerName&&item.farmerMobile===row.farmerMobile&&item.productName===row.productName;});
    document.getElementById('detailBody').innerHTML='<div class="flex items-center justify-between mb-4"><div class="text-[18px] font-bold text-gray-900">农户存粮明细</div><button type="button" class="w-9 h-9 rounded-full bg-gray-100 text-gray-500" onclick="closeSheets()"><i class="fas fa-times"></i></button></div><div class="space-y-2">'+rows.map(function(item){return '<div class="rounded-xl bg-[#F8FAFC] p-3"><div class="flex items-center justify-between gap-3"><div class="min-w-0"><div class="text-[13px] font-bold text-gray-900 truncate">'+escapeHtml(item.farmerName+' · '+item.productName)+'</div><div class="text-[11px] text-gray-400 mt-1 truncate">'+escapeHtml(item.orderNo+' · '+fmtTime(item.latestAt))+'</div></div><div class="text-[13px] font-bold text-[#11A64A] shrink-0">'+escapeHtml(fmtQty(item.quantity,item.unit))+'</div></div></div>';}).join('')+'</div>';
    openSheet('detailSheet');
}
function closeSheets(){document.getElementById('sheetMask').classList.remove('show');document.getElementById('filterSheet').classList.remove('show');document.getElementById('detailSheet').classList.remove('show');}
renderFarmers();
</script>
</body>
</html>
